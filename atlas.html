<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Market Mechanics Atlas</title></head><body><nav class="chnav" aria-label="Cutting Holes sections"><style>.chnav{position:fixed;top:9px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;align-items:center;gap:2px;padding:4px;border-radius:12px;background:color-mix(in srgb,var(--panel,#111826) 85%,transparent);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--line,#1f2937);box-shadow:var(--shadow,0 6px 24px rgba(0,0,0,.4));font-family:var(--mono,ui-monospace,monospace);max-width:calc(100vw - 24px)}.chnav .chn-a{font-size:11.5px;letter-spacing:.02em;color:var(--muted,#8896a9);text-decoration:none;padding:5px 10px;border-radius:8px;transition:.14s;white-space:nowrap}.chnav .chn-a:hover{color:var(--text,#dfe6f0);background:var(--bg2,rgba(128,128,128,.12))}.chnav .chn-a.on{color:var(--accent-ink,#a7e0ff);background:var(--accent-soft,rgba(92,200,255,.14))}.chnav .chn-a:first-child{font-size:14px;color:var(--accent,#5cc8ff);padding:5px 9px}@media(max-width:560px){.chnav .chn-a{font-size:11px;padding:5px 7px}}</style><a class="chn-a" href="./">◈</a><a class="chn-a on" href="atlas.html">Atlas</a><a class="chn-a" href="accounting.html">Ledger</a><a class="chn-a" href="backstage.html">Backstage</a></nav><title>Market Mechanics Atlas</title>
<style>
:root{
  --bg:#eef1f5; --bg2:#e7ebf1; --panel:#ffffff; --panel2:#f6f8fb;
  --line:#d3dae3; --line2:#e4e9ef;
  --text:#16202c; --muted:#5a6a7b; --faint:#8a97a8;
  --accent:#0e7fb0; --accent-ink:#0a5b80; --accent-soft:rgba(14,127,176,.12);
  --pos:#127e57; --neg:#c23a55; --amb:#b3730d;
  --glow-r:#c67e12; --glow-b:#2f74b0;
  --ok:#127e57; --warn:#b3730d; --idle:#9aa7b6; --lock:#8a6db0;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --r:10px; --shadow:0 1px 3px rgba(16,28,44,.08),0 10px 34px rgba(16,28,44,.07);
}
@media (prefers-color-scheme:dark){:root{
  --bg:#080b11; --bg2:#0a0e15; --panel:#111826; --panel2:#0d1420;
  --line:#1f2937; --line2:#172131;
  --text:#dfe6f0; --muted:#8896a9; --faint:#5b6b80;
  --accent:#5cc8ff; --accent-ink:#a7e0ff; --accent-soft:rgba(92,200,255,.14);
  --pos:#3ecf8e; --neg:#ff6b81; --amb:#f5b74e;
  --glow-r:#f5b74e; --glow-b:#5cc8ff;
  --ok:#3ecf8e; --warn:#f5b74e; --idle:#5b6b80; --lock:#b79be6;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 14px 44px rgba(0,0,0,.4);
}}
:root[data-theme="light"]{
  --bg:#eef1f5; --bg2:#e7ebf1; --panel:#ffffff; --panel2:#f6f8fb;
  --line:#d3dae3; --line2:#e4e9ef;
  --text:#16202c; --muted:#5a6a7b; --faint:#8a97a8;
  --accent:#0e7fb0; --accent-ink:#0a5b80; --accent-soft:rgba(14,127,176,.12);
  --pos:#127e57; --neg:#c23a55; --amb:#b3730d;
  --glow-r:#c67e12; --glow-b:#2f74b0;
  --ok:#127e57; --warn:#b3730d; --idle:#9aa7b6; --lock:#8a6db0;
  --shadow:0 1px 3px rgba(16,28,44,.08),0 10px 34px rgba(16,28,44,.07);
}
:root[data-theme="dark"]{
  --bg:#080b11; --bg2:#0a0e15; --panel:#111826; --panel2:#0d1420;
  --line:#1f2937; --line2:#172131;
  --text:#dfe6f0; --muted:#8896a9; --faint:#5b6b80;
  --accent:#5cc8ff; --accent-ink:#a7e0ff; --accent-soft:rgba(92,200,255,.14);
  --pos:#3ecf8e; --neg:#ff6b81; --amb:#f5b74e;
  --glow-r:#f5b74e; --glow-b:#5cc8ff;
  --ok:#3ecf8e; --warn:#f5b74e; --idle:#5b6b80; --lock:#b79be6;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 14px 44px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;
  line-height:1.55;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}
.app{display:grid;grid-template-rows:auto 1fr;height:100vh}
header{display:flex;align-items:center;gap:16px;padding:11px 18px;border-bottom:1px solid var(--line);
  background:var(--panel2);z-index:20;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:1px;margin-right:2px}
.brand .kick{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
.brand h1{font-family:var(--mono);font-size:15px;font-weight:600;margin:0;letter-spacing:-.01em}
.seg{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:3px}
.seg button{font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);
  background:none;border:0;padding:6px 12px;border-radius:7px;cursor:pointer;transition:.15s;white-space:nowrap}
.seg button:hover{color:var(--text)}
.seg button[aria-pressed="true"]{background:var(--accent-soft);color:var(--accent-ink)}
.seg.sm button{font-size:10px;padding:5px 9px}
.spacer{flex:1}
.hbtn{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--bg2);border:1px solid var(--line);
  border-radius:8px;padding:7px 11px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.hbtn:hover{color:var(--text);border-color:var(--accent)}
.hbtn[aria-pressed="true"]{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-ink)}
.hbtn .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
main{display:grid;grid-template-columns:244px 1fr 424px;min-height:0}
.rail{border-right:1px solid var(--line);background:var(--panel2);overflow-y:auto;padding:16px}
.inspector{border-left:1px solid var(--line);background:var(--panel2);overflow-y:auto}
.stage{position:relative;min-width:0;background:radial-gradient(1200px 620px at 55% -12%,var(--bg2),var(--bg) 72%);overflow:hidden}
svg.graph{width:100%;height:100%;display:block;touch-action:none;cursor:grab}
svg.graph.grabbing{cursor:grabbing}
.search{width:100%;font-size:13px;color:var(--text);background:var(--panel);border:1px solid var(--line);
  border-radius:8px;padding:9px 11px;margin-bottom:16px;font-family:var(--sans)}
.search:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
.grouplabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:18px 0 9px}
.grouplabel:first-child{margin-top:0}
.legrow{display:flex;align-items:center;gap:9px;padding:3px 0;font-size:12px;color:var(--muted)}
.legrow .swatch{flex:none;width:26px;display:flex;align-items:center;justify-content:center}
.navlist{display:flex;flex-direction:column;gap:1px}
.navitem{text-align:left;font-family:var(--mono);font-size:11.5px;color:var(--muted);background:none;border:0;
  border-left:2px solid transparent;padding:6px 9px;cursor:pointer;border-radius:0 6px 6px 0;transition:.13s;
  display:flex;justify-content:space-between;gap:8px;align-items:center}
.navitem:hover{background:var(--panel);color:var(--text)}
.navitem[aria-current="true"]{border-left-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
.navitem .n{font-size:10px;color:var(--faint)}
/* breadcrumb + floating controls */
.topbar{position:absolute;left:16px;top:14px;display:flex;align-items:center;gap:8px;z-index:12;flex-wrap:wrap;max-width:70%}
.crumb{font-family:var(--mono);font-size:11.5px;color:var(--muted);background:var(--panel);border:1px solid var(--line);
  border-radius:8px;padding:6px 11px;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow)}
.crumb .arm{color:var(--faint)}
.crumb.here{color:var(--text);cursor:default}
.title-chip{font-family:var(--mono);font-size:11.5px;color:var(--text);background:var(--panel);border:1px solid var(--line);
  border-radius:8px;padding:6px 11px;box-shadow:var(--shadow);max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.floatctl{position:absolute;right:16px;top:14px;display:flex;gap:8px;z-index:12}
.zoombar{position:absolute;left:16px;bottom:16px;display:flex;flex-direction:column;gap:5px;z-index:11}
.zoombar button{width:30px;height:30px;font-family:var(--mono);font-size:15px;color:var(--muted);background:var(--panel);
  border:1px solid var(--line);border-radius:8px;cursor:pointer}
.zoombar button:hover{color:var(--text);border-color:var(--accent)}
.hint{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);font-family:var(--mono);font-size:11px;
  color:var(--faint);background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:6px 14px;
  pointer-events:none;opacity:0;transition:opacity .4s;box-shadow:var(--shadow);white-space:nowrap;z-index:12}
.hint.show{opacity:1}
/* mechanisms gallery */
.gallery{position:absolute;inset:0;overflow-y:auto;padding:70px 26px 30px;display:none}
.gallery.open{display:block}
.gallery h2{font-family:var(--mono);font-size:13px;letter-spacing:.02em;color:var(--text);margin:0 0 4px}
.gallery .lead{color:var(--muted);font-size:12.5px;margin:0 0 20px;max-width:60ch}
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;
  transition:.15s;display:flex;flex-direction:column;gap:9px}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.card .top{display:flex;align-items:center;gap:8px}
.card .kind{font-family:var(--mono);font-size:15px;line-height:1}
.card .kind.R{color:var(--glow-r)} .card .kind.B{color:var(--glow-b)}
.card h3{font-size:13.5px;margin:0;font-weight:600;line-height:1.25}
.card .via{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.card .mech{font-size:12px;color:var(--muted);line-height:1.5}
.card .chain{font-family:var(--mono);font-size:10.5px;color:var(--accent-ink);opacity:.9;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
/* inspector (shared) */
.insp-pad{padding:18px}
.overview .stat{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--line2)}
.overview .stat .v{font-family:var(--mono);font-size:22px;color:var(--text);font-variant-numeric:tabular-nums}
.overview .stat .l{font-size:12px;color:var(--muted)}
.overview .lead{font-size:13px;color:var(--muted);margin:0 0 16px;line-height:1.6}
.bar{height:7px;border-radius:4px;background:var(--line);overflow:hidden;display:flex;margin-top:14px}
.bar>span{display:block;height:100%}
.insp-head{padding:20px 22px 15px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel2);z-index:2}
.insp-kind{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
  display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.insp-title{font-family:var(--mono);font-size:19px;font-weight:600;margin:0;letter-spacing:-.01em;text-wrap:balance;line-height:1.25}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.badge{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:5px;
  border:1px solid transparent;display:inline-flex;gap:5px;align-items:center}
.badge .d{width:7px;height:7px;border-radius:50%}
.b-status-validated{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 40%,transparent);background:color-mix(in srgb,var(--ok) 12%,transparent)}
.b-status-in_progress{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 40%,transparent);background:color-mix(in srgb,var(--warn) 12%,transparent)}
.b-status-topological{color:var(--muted);border-color:var(--line)}
.b-status-blocked_data{color:var(--lock);border-color:color-mix(in srgb,var(--lock) 40%,transparent);background:color-mix(in srgb,var(--lock) 10%,transparent)}
.b-ev{color:var(--muted);border-color:var(--line);background:var(--panel)}
.insp-body{padding:20px 22px 32px}
.what{font-size:15px;line-height:1.68;color:var(--text);margin:0 0 4px}
abbr.gl{text-decoration:underline dotted;text-underline-offset:2px;text-decoration-color:color-mix(in srgb,var(--accent) 60%,transparent);cursor:help;text-decoration-thickness:1px}
.story{font-size:15px;line-height:1.72;color:var(--text);margin:0}
.eg{font-size:14px;line-height:1.66;color:var(--muted)}
.eg b{color:var(--text)}
.dilemma{font-size:14px;line-height:1.66;color:var(--text);border-left:2px solid var(--amb);padding-left:12px}
.forces{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:4px}
.force{border:1px solid var(--line);border-radius:9px;padding:10px 11px;background:var(--panel)}
.force .fh{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.force.up .fh{color:var(--pos)} .force.down .fh{color:var(--neg)}
.force .fx{font-size:13.5px;line-height:1.56;color:var(--muted)}
.player{border:1px solid var(--line);border-radius:11px;padding:13px 14px;background:var(--panel2);margin-top:4px}
.player .ph{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:8px}
.player .pname{font-family:var(--mono);font-size:14px;font-weight:600;margin-bottom:8px}
.player dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:5px 10px}
.player dt{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);white-space:nowrap;padding-top:2px}
.player dd{margin:0;font-size:13.5px;line-height:1.56;color:var(--text)}
.acctcard{border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);background:var(--accent-soft);border-radius:11px;padding:13px 14px;margin-top:4px}
.acctcard .ah{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:7px}
.acctcard .asum{font-size:14px;line-height:1.6;color:var(--text);margin-bottom:11px}
.acctcard a{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11.5px;color:var(--accent-ink);text-decoration:none;border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);border-radius:8px;padding:7px 11px;transition:.14s}
.acctcard a:hover{background:color-mix(in srgb,var(--accent) 14%,transparent)}
.forcechips{display:flex;flex-wrap:wrap;gap:6px}
.fchip{font-family:var(--mono);font-size:10.5px;border-radius:6px;padding:4px 8px;cursor:pointer;border:1px solid var(--line);background:var(--panel);transition:.13s}
.fchip.op{color:var(--neg);border-color:color-mix(in srgb,var(--neg) 35%,transparent)}
.fchip.al{color:var(--pos);border-color:color-mix(in srgb,var(--pos) 35%,transparent)}
.fchip:hover{border-color:var(--accent)}
.storylead{font-size:14.5px;color:var(--muted);line-height:1.76}
.storylead p{margin:0 0 12px}
.sec{margin-top:22px}
.sec>.h{font-family:var(--mono);font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
  margin-bottom:10px;display:flex;align-items:center;gap:7px}
.sec>.h::after{content:"";flex:1;height:1px;background:var(--line2)}
.finding{border:1px solid var(--line);border-radius:9px;padding:11px 12px;margin-bottom:8px;background:var(--panel)}
.finding .claim{font-size:14px;color:var(--text);font-weight:500;margin-bottom:5px;line-height:1.5}
.finding .res{font-family:var(--mono);font-size:12.5px;color:var(--accent-ink);font-variant-numeric:tabular-nums}
.finding .src{font-size:11.5px;color:var(--faint);margin-top:6px}
.reflist{display:flex;flex-direction:column;gap:8px}
.ref{font-size:12px;color:var(--muted);line-height:1.5;padding-left:12px;position:relative}
.ref::before{content:"";position:absolute;left:0;top:7px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
.ref b{color:var(--text);font-weight:600}
.links{display:flex;flex-direction:column;gap:3px}
.linkrow{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);background:none;border:0;
  border-radius:7px;padding:7px 8px;cursor:pointer;text-align:left;width:100%;transition:.12s}
.linkrow:hover{background:var(--panel);color:var(--text)}
.linkrow .ar{font-family:var(--mono);flex:none;width:16px;color:var(--faint)}
.linkrow .sg{font-family:var(--mono);font-size:11px;flex:none;width:14px;text-align:center}
.linkrow .lb{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.datachip{font-family:var(--mono);font-size:10.5px;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:4px 7px}
.actions{display:flex;gap:8px;margin-top:22px}
.act{flex:1;font-family:var(--mono);font-size:11.5px;letter-spacing:.03em;text-transform:uppercase;padding:10px;border-radius:8px;
  cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--text);transition:.14s}
.act:hover{border-color:var(--accent);color:var(--accent-ink)}
.act.primary{background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 40%,transparent);color:var(--accent-ink)}
.empty{color:var(--faint);font-size:12.5px;font-style:italic}
.tray{position:absolute;right:18px;bottom:18px;z-index:15}
.traybtn{font-family:var(--mono);font-size:11px;color:var(--text);background:var(--panel);border:1px solid var(--line);
  border-radius:9px;padding:9px 13px;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;gap:8px}
.traybtn .cnt{background:var(--accent);color:#04121b;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:600}
:root[data-theme="light"] .traybtn .cnt{color:#fff}
.traypanel{position:absolute;right:0;bottom:44px;width:340px;max-height:52vh;overflow-y:auto;background:var(--panel);
  border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:14px;display:none}
.traypanel.open{display:block}
.trayitem{font-size:12px;color:var(--muted);border:1px solid var(--line2);border-radius:8px;padding:9px 10px;margin-bottom:7px;line-height:1.45;position:relative}
.trayitem .x{position:absolute;top:6px;right:8px;cursor:pointer;color:var(--faint);font-family:var(--mono)}
.trayitem .tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-ink);display:block;margin-bottom:3px}
.trayfoot{display:flex;gap:8px;margin-top:10px}
/* svg element classes */
.edge{fill:none;transition:opacity .22s,stroke-width .2s}
.edge.hidden{opacity:0!important}
.edge.dim{opacity:.05!important}
.node{cursor:pointer}
.node circle.body{stroke-width:1.5;transition:.18s}
.node .ring{fill:none;transition:.18s}
/* label rides ON the node as a chip — attached to the mark, legible over the field */
.node .lblwrap{pointer-events:none;transition:opacity .15s}
.node .lblbg{fill:var(--panel);stroke:var(--line);stroke-width:1;rx:7;transition:.18s;opacity:.94}
.node text.lbl{font-family:var(--mono);font-size:12.5px;fill:var(--text);pointer-events:none;transition:.18s}
.node.dim{opacity:.14}
.node.sel circle.body{stroke:var(--accent)!important}
.node.sel .lblbg,.node.hl .lblbg{stroke:var(--accent);fill:var(--panel);opacity:1}
.node.sel text.lbl,.node.hl text.lbl{fill:var(--text);font-weight:600}
/* Flow: keep it a clean lattice — labels appear only for the node you touch */
.graph.flowmode .node .lblwrap{opacity:0;transition:opacity .15s}
.graph.flowmode .node.hl .lblwrap,.graph.flowmode .node.sel .lblwrap{opacity:1}
.cbox{cursor:pointer}
.cbox rect.box{fill:var(--panel);stroke:var(--line);stroke-width:1.5;transition:.18s}
.cbox:hover rect.box{stroke:var(--accent)}
.cbox.dim{opacity:.28}
.cbox.hl rect.box{stroke:var(--accent)}
.cbox text.t{font-family:var(--mono);font-size:14px;font-weight:600;fill:var(--text)}
.cbox text.s{font-family:var(--mono);font-size:11px;letter-spacing:.05em;fill:var(--muted)}
.cedge{fill:none;stroke:var(--muted);transition:opacity .2s}
.cedge.back{stroke:var(--amb);stroke-dasharray:5 4}
.cedge.dim{opacity:.08}
.port{cursor:pointer}
.port rect{fill:var(--bg2);stroke:var(--line);stroke-width:1;transition:.15s}
.port:hover rect{stroke:var(--accent)}
.port text{font-family:var(--mono);font-size:11.5px;fill:var(--text)}
.collabel{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;fill:var(--muted);opacity:.92}
.pulse{pointer-events:none}
@media (max-width:1080px){
  main{grid-template-columns:1fr}
  .rail,.inspector{position:absolute;top:0;bottom:0;width:300px;z-index:30;transform:translateX(-100%);transition:transform .25s}
  .inspector{right:0;left:auto;transform:translateX(100%)}
  .rail.open,.inspector.open{transform:none}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

<script>
const GRAPH = {"levels":[{"id":"L0","label":"Firm primitives (accounting graph)","order":0},{"id":"L1","label":"Cross-sectional context / ratios & loadings","order":1},{"id":"L2","label":"Players, allocation & price","order":2},{"id":"L3","label":"Threshold / regime / exposure mechanics","order":3},{"id":"L4","label":"Macro drivers & feedback","order":4},{"id":"L5","label":"Society & development","order":-1}],"sccs":[{"id":"SCC-MON","label":"Monetary core","kind":"macro-cycle","summary":"Rates <-> inflation <-> liquidity. The balancing loop the central bank tries to run (B2): inflation lifts rates, rates drain liquidity and demand, which cools inflation."},{"id":"SCC-CREDIT","label":"Credit / refinancing spiral","kind":"macro-cycle","summary":"Rates <-> refinancing conditions <-> firm distress (R2). Higher rates make rollover of maturing debt harder; firms that borrow to service old debt default, repricing risk and tightening conditions further."},{"id":"SCC-NAME","label":"Single-name ascent / ceiling","kind":"reinforcing-core","summary":"Index inclusion <-> price <-> cap-weight <-> concentration cap. Reinforcing inclusion/cap-weight ignition (R1) dominates mid-range; the balancing concentration ceiling (B1) forces distribution near the top."},{"id":"SCC-DELEV","label":"Deleveraging contagion (multiplex)","kind":"multiplex","summary":"A P&L shock breaches one exposure dimension of a levered fund, which unwinds that sleeve and pressures every name sharing the exposure; if peers share it too, they breach and unwind in turn. It is k coupled graphs over the same stocks (ownership, factor, theme), not one blended adjacency."},{"id":"SCC-GAMMA","label":"Dealer gamma core","kind":"reinforcing-core","summary":"Net dealer gamma <-> delta-hedging flow <-> price, a tight high-frequency loop near the price sink with an internal threshold (the zero-gamma flip). Short-gamma amplifies (R5), long-gamma damps (B6)."},{"id":"SCC-WRITEBACK","label":"Fundamentals-routed writeback cycles","kind":"macro-cycle","summary":"Large spanning loops in which agents edit L0 primitives directly — buybacks cutting share count (R6) and activist intervention changing capital structure/strategy (R8) — then flow back through ratios and relative value to price. The only feedback that reaches the fundamentals level from downstream."}],"archetypes":[{"id":"A0","label":"Issuer / IR","binding_constraint":"Cost of capital; share price as currency","signature":"Actively persuades the market (roadshows, guidance) and bids for its own shares via buybacks; the company as an agent, not just the priced object."},{"id":"A1","label":"Tracking-constrained (index / ETF)","binding_constraint":"Tracking error vs. benchmark","signature":"Fully rule-forced; mechanically buys/sells to match index weights and reconstitution."},{"id":"A2","label":"Benchmark-relative + redemptions","binding_constraint":"Relative performance vs. benchmark; redemption flow","signature":"Closet-indexes, tilts toward relative winners, window-dresses at quarter-end; the persuadable holder."},{"id":"A3","label":"Risk-limit levered","binding_constraint":"VaR / margin / drawdown limits","signature":"Sizes to a risk budget represented as an exposure vector; on breach it deleverages the specific breaching sleeve, propagating cross-book contagion."},{"id":"A4","label":"Sentiment / liquidity-servicing","binding_constraint":"Sentiment; leverage servicing","signature":"Extrapolative, momentum-chasing demand; forced to sell to service debt on rate shocks. Retail buy-and-hold vs. day-traders differ only by turnover/overnight parameters."},{"id":"A5","label":"Dealer / Market Maker","binding_constraint":"Delta-neutrality (hedges customer option flow, takes no directional view)","signature":"Hedging flow whose sign flips on the sign of aggregate gamma; amplifies moves when short gamma, damps them when long gamma."},{"id":"A6","label":"Activist","binding_constraint":"Return via intervention rather than relative value (often an A3 fund in activist mode)","signature":"Accumulates a stake, discloses on the 5% (13D) event, then edits L0 fundamentals directly through the intervention."}],"nodes":[{"id":"L0.txn","label":"Operations & transactions","archetype":null,"scc":null,"level":"L0","kind":"primitive","what":"The physical/commercial reality of the firm — what it actually buys, makes and sells. Transactions post into the accounting statements, so this is the root of the accounting-derivation sub-tree.","evidence":"IDENT","status":"topological","cluster":"FIRM","story":"This is the firm stripped of all accounting abstraction: the trucks that roll, the chips that ship, the coffee poured, the contracts signed. Everything else in a company's financial life is just this physical, commercial reality getting posted into ledgers — it is the taproot from which revenue, costs and cash all grow. When people forget that a stock is a claim on real operations and start trading the ticker as a pure symbol, this is the node reality eventually drags them back to.","example":"In the 2001 Enron collapse the gap between the operations node and the reported statements became lethal: mark-to-market 'trades' and special-purpose entities booked profit and revenue that no real transaction ever supported. When the actual cash-generating business turned out to be a fraction of the reported empire, the whole edifice imploded within weeks.","dilemma":"The real business runs on its own physical and competitive clock, but the market wants it re-scored every 90 days — so managers are perpetually tempted to shape how operations get posted rather than improve the operations themselves.","pushes_up":"Genuine demand for the product, capacity expansion, new markets, product launches, operational execution and market-share gains.","pushes_down":"Recessions, competitive displacement, supply disruptions, plant shutdowns, strikes, and demand collapse."},{"id":"L0.rev","label":"Revenue / sales","archetype":null,"scc":null,"level":"L0","kind":"state","what":"Top-line sales derived from transactions. Sensitive to macro demand, dollar translation for exporters, and (for forward-booked deals) to counterparty solvency that can force restatements.","evidence":"MIXED","status":"topological","cluster":"FIRM","story":"Revenue is the top line — the total dollars customers actually handed over before a single cost is subtracted. It is the number Wall Street fixates on first because you can massage margins for a while but you cannot fake growth forever, and a revenue miss is often the earliest honest signal that the story is breaking. For exporters it also quietly carries a currency bet, since a strong dollar shrinks foreign sales when they are translated home.","example":"In July 2021 Netflix's revenue growth held but subscriber adds stalled, and the following year the April 2022 report showed a loss of 200,000 subscribers — the first quarterly subscriber decline in over a decade — and the stock fell roughly 35% in a day because the top-line growth engine, not profitability, was what investors had been paying for.","dilemma":"Wants to grow fast to justify a high multiple, but chasing growth via forward-booked or channel-stuffed deals invites restatement risk when counterparties can't pay or the demand was never real.","pushes_up":"Rising demand, pricing power, new products, market expansion, and a weakening dollar for exporters (foreign sales translate to more home-currency dollars).","pushes_down":"Macro demand slumps, price cuts, share loss to competitors, a strengthening dollar for exporters, and reversal of previously pulled-forward sales."},{"id":"L0.cogs","label":"COGS / input costs","archetype":null,"scc":null,"level":"L0","kind":"state","what":"Cost of goods sold, driven directly by commodity and supply-chain input prices. The hook through which raw-material and memory-price shocks enter the income statement.","evidence":"IDENT","status":"topological","cluster":"FIRM","story":"Cost of goods sold is what it costs to actually make the things you sold — raw materials, components, the memory chips and steel and cobalt. It is the trapdoor through which commodity and supply-chain shocks fall straight onto the income statement, so when input prices spike, margins get squeezed here first, before management can react. For hardware and industrial names it is often the single most volatile line on the P&L.","example":"Through 2021-2022 automakers like Ford and Toyota were hit on two fronts at once: a semiconductor shortage that starved production lines and forced deep output cuts, and surging steel, lithium and freight costs that inflated the cost of every vehicle they did build. Where sticker-price hikes couldn't keep pace with that input inflation, COGS ate straight into gross margin.","dilemma":"The firm wants inputs cheap and reliable, but the cheapest sourcing (single supplier, low inventory, distant geography) is also the most fragile — cost efficiency trades directly against supply resilience.","pushes_up":"Commodity price spikes, memory/chip shortages, tariffs, freight and energy costs, and supply-chain disruption.","pushes_down":"Falling input prices, scale efficiencies, automation, cheaper sourcing, and easing supply chains.","aka":"COGS = Cost Of Goods Sold — the direct cost of producing what was sold."},{"id":"L0.opex","label":"Operating expenses","archetype":null,"scc":null,"level":"L0","kind":"state","what":"Operating costs including interest expense on floating-rate debt. The point where macro policy rates mechanically reach the P&L.","evidence":"IDENT","status":"topological","cluster":"FIRM","story":"Operating expenses are the costs of running the business that aren't baked into each unit — salaries, R&D, marketing, rent, and critically the interest on floating-rate debt. That last piece makes this the exact node where central-bank policy physically reaches a company's earnings: when the Fed hikes, the interest line on variable-rate borrowings climbs and profit erodes without anything about the actual business changing.","example":"In 2022-2023 the Fed raised its policy rate from near-zero to over 5%, and the roughly $1.4 trillion leveraged-loan market — where the debt carries floating rates tied to short-term benchmarks — saw interest costs jump in lockstep. Private-equity-owned companies financed with those loans watched interest expense roughly double or triple, collapsing their interest coverage, and commercial-real-estate owners with floating-rate mortgages hit the same wall — a wave of distress and defaults driven purely by the rate channel, with nothing about the underlying businesses having changed.","dilemma":"Wants to invest in R&D, growth and talent, but every dollar of opex directly lowers this quarter's earnings — the eternal spend-for-the-future versus report-a-profit-now tension, made worse when rates raise the cost of the debt financing it.","pushes_up":"Rising interest rates on floating debt, wage inflation, R&D and sales-force expansion, higher rents, and growth investment.","pushes_down":"Rate cuts, cost-cutting and layoffs, refinancing to fixed or lower rates, and operating discipline.","aka":"Opex = operating expenses — running costs plus interest on variable-rate debt."},{"id":"L0.earn","label":"Earnings / profit (loss)","archetype":null,"scc":null,"level":"L0","kind":"state","what":"Profit derived by the income-statement identity: revenue minus COGS minus operating expenses. A derived, not primitive, quantity.","evidence":"IDENT","status":"topological","cluster":"FIRM","story":"Earnings is the bottom line — revenue minus every cost — and it is important to see that it is a derived, squeezed-out residual, not a thing the firm directly produces. Because it sits at the tail of a subtraction chain, tiny percentage moves in revenue or costs become huge percentage swings in profit; that operating leverage is why an earnings miss of a few cents can vaporize billions in market value. It is the number the entire quarterly-reporting ritual is built to reveal.","example":"Meta reported Q4 2021 on February 2, 2022, and the next day the stock collapsed about 26%, erasing roughly $232 billion of market value — the largest single-day loss in U.S. market history at that point. Profit had actually fallen year over year as Apple's App-Tracking-Transparency privacy change gutted ad targeting and Reality Labs metaverse losses ballooned; stacked on the first-ever sequential drop in Facebook's daily active users and soft revenue guidance, the tail-end residual snapped the whole valuation.","dilemma":"As a residual it is the most manipulable statement line — the pull to 'make the number' via timing, reserves and one-time-charge classification is enormous, but every gamed quarter borrows credibility from the next.","pushes_up":"Rising revenue, falling COGS and opex, operating leverage in an upcycle, buyback-driven per-share optics, and favorable tax and one-time items.","pushes_down":"Revenue misses, input-cost and interest spikes, write-downs and impairments, margin compression, and reversal of prior accounting pull-forwards."},{"id":"L0.bs_assets","label":"Balance sheet: assets","archetype":null,"scc":null,"level":"L0","kind":"state","what":"The firm's asset base. Its size helps gate institutional eligibility and feeds derived ratios.","evidence":"IDENT","status":"topological","cluster":"FIRM","story":"The asset base is everything the firm owns and controls — cash, factories, inventory, receivables, goodwill from acquisitions. Its sheer size matters in the market's plumbing because it acts as a gate: index and institutional eligibility rules often screen on size, so a big balance sheet buys a name entry into the passive-money club. It also anchors the denominator of return ratios, so bloated assets quietly drag down measured returns on capital.","example":"General Electric's balance sheet swelled toward $800 billion at its 2008 peak, much of it opaque GE Capital financial assets; when the crisis exposed how little return that mountain of assets actually earned, the return-on-assets story collapsed and GE spent the following decade shrinking the balance sheet — eventually breaking itself into three separately traded companies (GE Aerospace, GE HealthCare and GE Vernova) by 2024.","dilemma":"A bigger asset base signals scale and buys index eligibility, but every idle asset dilutes returns on capital — so the firm is torn between empire-building and the capital-efficiency the market rewards.","pushes_up":"Capital investment, acquisitions and goodwill, inventory build, retained earnings, and debt- or equity-funded expansion.","pushes_down":"Asset sales and spin-offs, write-downs and impairments, depreciation, inventory drawdowns, and buyback-driven equity shrinkage."},{"id":"L0.bs_debt","label":"Balance sheet: debt (fixed vs. floating)","archetype":null,"scc":"SCC-CREDIT","level":"L0","kind":"state","what":"Firm leverage, split into fixed and floating tranches because floating-rate debt is a distinct macro-transmission channel. Rollover of maturing debt under tight credit is the fuel of the refinancing spiral.","evidence":"MIXED","status":"topological","cluster":"CREDIT","story":"This is a company's debt pile, split into two kinds that behave nothing alike: fixed-rate debt locked in at yesterday's cheap coupons, and floating-rate debt whose interest cost re-prices with the market. That split is the whole game, because floating debt is the wire through which a central bank's rate hike travels straight into a firm's income statement as higher interest expense. Debt is also the fuel of every refinancing crisis: when old bonds mature and must be rolled over into new ones, a healthy firm shrugs and a fragile one dies, depending entirely on what the credit window will lend it that day.","example":"In 2022-2023 the leveraged-buyout world learned the difference the hard way: companies loaded with floating-rate debt saw their interest bills explode as the Fed hauled rates from near-0% to ~5.25%. Elon Musk's $44B buyout of Twitter/X carried roughly $13B of acquisition debt, much of it floating-rate, and the interest bill ran toward ~$1.5B a year; KKR-owned Envision Healthcare, buried under leveraged loans, filed for Chapter 11 bankruptcy in May 2023. Meanwhile fixed-rate blue chips that had termed out cheap, long-dated debt in 2020-21 barely noticed.","dilemma":"Debt is the cheapest capital there is and it juices returns on equity, but it must be paid or refinanced on someone else's schedule; management wants leverage for growth and buybacks, yet every dollar of floating debt is a hostage to a macro rate it cannot control.","pushes_up":"Debt-funded buybacks (A0.buyback loads the balance sheet to shrink the share count), cheap-money regimes, aggressive PE/LBO ownership, and any appetite to boost return on equity all pile on leverage.","pushes_down":"Deleveraging, equity raises, retained-earnings paydown, and refinancing into fixed at low rates all shrink the burden; a tight credit window (L4.credit) forces distressed firms to shed or restructure debt the hard way.","aka":"Floating-rate debt = loans whose interest resets periodically with a benchmark (e.g., SOFR), so the borrower's cost rises in lockstep with central-bank rates; fixed-rate debt keeps the same coupon to maturity regardless of the market."},{"id":"L0.cf","label":"Cash flow (op/invest/fin)","archetype":null,"scc":null,"level":"L0","kind":"state","what":"Cash generated and consumed across operations, investing and financing. A statement input to the derived ratios.","evidence":"IDENT","status":"topological","cluster":"FIRM","story":"Cash flow tracks the actual money moving through the business across three buckets — operations, investing and financing — and it is the lie detector for earnings. Profit is an accountant's opinion; cash is a fact, so when reported earnings rise but operating cash flow doesn't follow, seasoned investors smell aggressive accounting. It feeds directly into the coverage and quality ratios that separate durable companies from ones running on paper profits.","example":"Before its 2001 implosion, Enron reported soaring earnings while its operating cash flow told a very different, weaker story that its structured-finance vehicles were designed to obscure; the divergence between booked profit and real cash was the tell that skeptics like short-seller Jim Chanos read correctly.","dilemma":"Wants to show strong operating cash to prove earnings quality, yet growth and buybacks and dividends all consume cash — so it must constantly balance funding the future against demonstrating self-funding strength today.","pushes_up":"Rising profitable sales, disciplined working-capital management, collecting receivables faster, and asset sales (in the investing/financing lines).","pushes_down":"Heavy capex, working-capital build, dividend and buyback outflows, debt repayment, and deteriorating collections.","aka":"Op/invest/fin = operating, investing, and financing cash flows — the three sources and uses of a firm's cash."},{"id":"L0.ratios","label":"Derived ratios","archetype":null,"scc":null,"level":"L0","kind":"state","what":"Second-order accounting quantities (profitability, leverage, returns, coverage, EPS) computed from the statements. What cross-sectional ranking and factor loadings actually operate on.","evidence":"IDENT","status":"topological","cluster":"FIRM","story":"Derived ratios are the second-order distillate of the raw statements — profitability, leverage, return on capital, interest coverage, EPS — and this is what the market's ranking machinery actually chews on. Nobody cross-sectionally sorts thousands of stocks by absolute revenue; they sort by margins, ROE and valuation multiples. So these ratios are the true bridge between a firm's accounting and its factor loadings, its rank, and ultimately the flows that move its price.","example":"The entire quality-factor and Piotroski-F-score investing world runs on these ratios: through the 2010s, high-ROE, low-leverage 'quality' names were systematically bid up, while the 2022 rate shock brutally re-rated high-multiple, low-current-profitability growth stocks as the same ratio lens suddenly punished names with no earnings to divide into their price.","dilemma":"Ratios reward capital efficiency and clean leverage, but optimizing the ratio (buying back stock to lift ROE and EPS, or off-balance-sheet financing to hide leverage) can hollow out the underlying business the ratio was meant to measure.","pushes_up":"Rising margins and earnings, buybacks (lifting EPS and ROE), debt paydown improving coverage, and asset-light efficiency.","pushes_down":"Margin compression, rising leverage and interest costs, asset bloat dragging returns, and earnings declines.","aka":"EPS = earnings per share; ROE = return on equity; coverage = earnings relative to interest owed."},{"id":"L0.share_count","label":"Share count","archetype":null,"scc":"SCC-WRITEBACK","level":"L0","kind":"state","what":"Number of shares outstanding. Buybacks reduce it by identity, mechanically lifting EPS even with flat earnings — the writeback channel that lets an agent edit the object being priced.","evidence":"IDENT","status":"topological","cluster":"FIRM","story":"Share count is the number of slices the company is cut into, and it hides one of the market's sneakiest levers: buybacks shrink the count, so earnings-per-share rises by pure arithmetic even if total profit is flat. This is the 'writeback' channel — a rare case where an agent (management) reaches in and edits the very object being priced, rather than just reacting to the price. It closes a slow feedback loop where a cheap stock invites buybacks that boost EPS that re-rate the stock.","example":"Apple has retired well over a third of its shares since 2013, spending more than $600 billion on buybacks; a large share of its EPS growth in some years came not from selling more iPhones but from there being fewer shares to divide profit across — financial engineering doing the work of operations.","dilemma":"Buybacks flatter per-share metrics and return cash to holders, but money spent shrinking the count is money not invested in the business — and firms notoriously buy back most at peak prices and least when cheap, destroying the value the tactic was meant to create.","pushes_up":"Equity issuance, stock-based compensation to employees, acquisitions paid in stock, and convertible conversions.","pushes_down":"Share buybacks and tender offers — mechanically lifting EPS by identity."},{"id":"L1.peer","label":"Peer-set fundamentals","archetype":null,"scc":null,"level":"L1","kind":"state","what":"Same-sector comparable firms' fundamentals. They set the bar: a firm's rank is relative, so better peers mechanically lower its standing.","evidence":"IDENT","status":"topological","cluster":"FIRM","story":"Peer-set fundamentals are the report cards of the other kids in the same sector — and they matter because a stock is never graded in absolute terms, only on a curve. Your firm can post record numbers and still get sold if its rivals posted better; a great quarter against a stronger peer group is a relative miss. This node is why earnings season moves whole sectors: one bellwether's print re-benchmarks everyone around it.","example":"When Nvidia posts blowout AI-chip results, it doesn't just lift itself — it resets the bar so that AMD or Intel, even with decent numbers, look relatively weak and sell off; conversely a weak Micron memory guide drags the entire semiconductor peer set because it recalibrates expectations for the group.","dilemma":"A firm can only control its own execution, yet its market standing is hostage to rivals it can't influence — so improving fundamentals is necessary but never sufficient; you have to out-improve the pack.","pushes_up":"Rivals cutting costs, launching winning products, gaining share, or beating estimates — all of which raise the bar.","pushes_down":"Peers stumbling, missing, or exiting the market — which lowers the bar and lifts your relative rank."},{"id":"L1.mkt_agg","label":"Market aggregate (breadth, valuation, concentration)","archetype":null,"scc":null,"level":"L1","kind":"state","what":"Aggregate market state — breadth, valuation, index weights and concentration. Sets the benchmark weights that trackers must match.","evidence":"RULE","status":"topological","cluster":"FIRM","story":"The market aggregate is the weather system every stock lives inside — overall breadth, valuation level, and how concentrated the index has become in a handful of giants. It sets the benchmark weights that passive trackers are legally bound to match, so when concentration rises, index funds are forced to keep buying the biggest names simply to avoid tracking error, regardless of value. This is the node where 'the market' becomes a mechanical force acting on individual stocks rather than a mere backdrop.","example":"By 2024 the 'Magnificent Seven' (Apple, Microsoft, Nvidia, Amazon, Alphabet, Meta, Tesla) grew to roughly a third of the S&P 500's weight; index-tracking flows had to keep funneling money into them proportional to their size, an extreme concentration that echoed the top-heavy market right before the 2000 dot-com peak.","dilemma":"High concentration and rich valuations mean the biggest names carry the index up in good times, but it also means the whole market is dangerously levered to a few stocks — breadth-less rallies are exactly the fragile, top-heavy setups that precede sharp reversals.","pushes_up":"Broadening participation, liquidity injections, falling rates lifting valuations, and mega-cap momentum concentrating the index.","pushes_down":"Narrowing breadth, rate shocks compressing multiples, rotation out of crowded leaders, and mean-reversion of concentration.","aka":"Breadth = how many stocks participate in a move; concentration = how much of the index sits in its largest names."},{"id":"L1.rel_val","label":"Relative valuation / ranking","archetype":null,"scc":null,"level":"L1","kind":"state","what":"The firm's position in the cross-section — the signal allocation actually acts on. Turns single-firm accounting into a rank versus peers.","evidence":"IDENT","status":"topological","cluster":"FIRM","story":"Relative valuation is where single-firm accounting finally becomes a tradable signal: the firm's rank in the cross-section of all names, cheap-to-expensive, good-to-bad. Allocation engines don't act on your raw ratios — they act on where those ratios place you in the pecking order. This is the true hinge of the fundamental side of the market: everything upstream (statements, ratios, peers) exists to determine this rank, and everything downstream (factor loadings, institutional flows, price) responds to it.","example":"The classic value-versus-growth regime turns on this node: for years leading into 2020, cheap 'value' names ranked attractively on price-to-book yet kept underperforming as money chased growth; then in the 2021-2022 rotation the same relative-value rankings suddenly paid off as rising rates flipped which end of the cross-section the market rewarded.","dilemma":"A firm improving its own fundamentals can still see its rank fall if others improve faster or if the market's taste rotates to a different factor — so relative standing is a moving target shaped as much by regime as by performance.","pushes_up":"Improving own ratios, weakening peers, and a regime that favors the firm's style (value or growth) — all lifting cross-sectional rank.","pushes_down":"Deteriorating ratios, stronger peers, and factor rotation away from the firm's style — pushing it down the ranking."},{"id":"L1.liq","label":"Liquidity profile (ADV, float, mkt cap)","archetype":null,"scc":null,"level":"L1","kind":"state","what":"How tradable the name is — average daily volume, free float, market cap. Gatekeeper for institutional eligibility and for the 'sell what's liquid' spillover.","evidence":"RULE","status":"topological","cluster":"FIRM","story":"The liquidity profile — average daily volume, free float, and market cap — measures how easily you can get into and out of a name without moving the price. It is the bouncer at the door of the institutional club: too illiquid and big funds and index products literally can't own you, no matter how good the fundamentals. It also drives a perverse contagion route: in a crisis, funds sell what they can, not what they should, so the most liquid names get dumped hardest precisely because they're sellable.","example":"During the March 2020 COVID crash, gold and large-cap blue chips were sold aggressively even as safe havens because managers facing redemptions liquidated their most liquid holdings to raise cash — the 'sell what you can, not what you want' spillover, where liquidity became a liability, not a virtue.","dilemma":"Deep liquidity earns index eligibility and a lower cost of capital, but it also makes a stock the first thing forced-sellers dump in a panic — being easy to sell is both a blessing in calm markets and a curse in stressed ones.","pushes_up":"Rising market cap, larger free float (lockups expiring, secondary offerings), higher trading volume, and index inclusion.","pushes_down":"Falling market cap, insider/strategic holders shrinking float, low volume, delisting risk, and crisis-driven liquidity evaporation.","aka":"ADV = average daily volume; float = shares actually available to trade (excluding locked-up insider/strategic holdings)."},{"id":"L1.elig","label":"Eligibility flags (size, liquidity, index membership)","archetype":null,"scc":"SCC-NAME","level":"L1","kind":"threshold","what":"A step (nonlinear) gate: below size/liquidity/index thresholds a name cannot be bought by constrained capital; crossing them discretely expands the buyable audience. The trigger for inclusion ignition.","evidence":"RULE","status":"topological","cluster":"PRICE","story":"Eligibility flags are the market's velvet rope: a stock is either on the guest list of buyable names or it isn't. A vast pool of constrained capital — index funds, pension mandates, most institutions — is contractually forbidden from owning names below a size, liquidity, or index-membership line, so a company can be a fine business and still be structurally starved of the largest buyers. This node is a step function, not a dimmer: nothing happens as you approach the line, then everything changes the instant you cross it. It is the ignition key for the whole single-name ascent loop (R1).","example":"Tesla was enormous for years but ineligible for the S&P 500 until it strung together four straight quarters of GAAP profit; the moment that fourth green quarter landed with its mid-2020 earnings the box was finally ticked — and when S&P actually added the stock that December, a wall of index money that had been legally barred from owning it suddenly had to buy (eligibility opened the gate, but note S&P even declined to add Tesla at its September 2020 rebalance, proof the committee still chooses when to walk through it). The mirror image: any stock that falls under $5 or off the Russell index becomes 'un-ownable' for whole categories of funds overnight.","dilemma":"A company wants the deep, sticky, price-insensitive demand that only comes from crossing the line, but the gate is binary and rule-set by others (index committees, mandate lawyers) — quality alone won't open it, and a business can be excellent yet quarantined below the threshold, or mediocre yet flooded with forced buyers above it.","pushes_up":"Growing market cap and float; rising average daily volume; posting the specific accounting box an index rule demands (e.g. cumulative GAAP profitability); index reconstitution adding the name; uplisting from OTC to a major exchange.","pushes_down":"Shrinking float or liquidity; price collapsing under mandate floors (the sub-$5 penny-stock line); index deletion; loss of profitability that revokes index qualification; dual-class share structures or domicile rules that disqualify a name.","aka":"ADV = average daily volume (how many shares trade per day, a liquidity gauge); float = shares actually available to trade; 'eligible' = allowed to be bought by rule-constrained capital."},{"id":"L1.loadings","label":"Factor loadings","archetype":null,"scc":null,"level":"L1","kind":"state","what":"Each stock's exposures to Fama-French/Barra/concentration factors, computed from statements and return history. Their similarity defines the factor-layer adjacency of the contagion multiplex, so the contagion wiring is endogenous.","evidence":"IDENT","status":"topological","cluster":"FIRM","story":"Factor loadings are a stock's genetic fingerprint of exposures — how much it behaves like 'value', 'momentum', 'small-cap', a given industry, or a crowded theme — computed from its statements and return history. Crucially, these loadings are what wire the contagion network: two stocks are neighbors not because they're in the same business but because they load on the same factors, so funds deleveraging a style dump both at once. This makes the market's crisis-transmission map endogenous — the wiring is generated by the fundamentals and returns upstream, not handed down from outside.","example":"The August 2007 'quant quake' was pure loadings contagion: quant funds with no common holdings but nearly identical factor exposures all deleveraged the same value/momentum bets simultaneously, so unrelated stocks cratered together purely because they shared loadings — invisible on any holdings-overlap map, obvious on a factor-loading one.","dilemma":"A fund can look perfectly diversified by holdings yet be dangerously crowded by loadings — so the very exposures that define a strategy's edge in calm times become the shared fault line along which everyone gets liquidated together in stress.","pushes_up":"Drifting fundamentals or returns toward a factor, style crowding into similar names, and thematic clustering (e.g., AI, biotech, lidar) tightening shared exposure.","pushes_down":"Idiosyncratic divergence in returns, changing business mix, factor de-crowding, and de-correlation from the theme.","aka":"Fama-French/Barra factors = standardized style exposures (market, size, value, momentum, quality, industry) used to model why stocks co-move."},{"id":"L2.demand","label":"Net demand / order flow","archetype":null,"scc":null,"level":"L2","kind":"flow","what":"The aggregator: ownership flows from all player classes plus issuer buybacks and system liquidity sum here into net demand. The proximate driver of price.","evidence":"IDENT","status":"topological","cluster":"PRICE","story":"Net demand is the great adding machine of the market: every buy and sell impulse from index funds, institutions, hedge funds, retail, corporate buybacks, and dealer hedging pours into this one bucket, and the imbalance that comes out is what actually moves price. It doesn't care why anyone is trading — a forced index buy, a panicked retail sell, and a buyback bid all count the same. This is the proximate cause of price: fundamentals, narrative, and rules all matter only insofar as they finally express themselves as order flow here.","example":"In January 2021, GameStop's fundamentals barely moved but net demand exploded — a flood of retail buy orders through Robinhood plus forced covering by shorts (who had sold more than the entire float) swamped the available supply, and the stock ran from about $4 to a peak near $120 intraday (roughly $20 to $483 before the 2022 four-for-one split) purely because the flow imbalance was violently one-sided. The reverse played out in the March 2020 COVID crash, when near-universal selling met almost no bids.","dilemma":"Demand is an honest aggregator but a blind one — it sums conviction-free forced flow (index rebalances, margin liquidations, buybacks) with genuine information-driven buying, so price can be dominated by mechanics that have nothing to do with a company's worth; the tug is signal versus flow, and flow often wins in the short run.","pushes_up":"Index inclusion buying; institutional accumulation; retail momentum-chasing; corporate buybacks bidding for their own shares; short-covering; dealer buying in short-gamma regimes; easy liquidity and low rates.","pushes_down":"Redemptions and outflows; the concentration-cap forced trimming; deleveraging fire-sales; rate hikes draining liquidity and forcing retail deleveraging; index deletion selling; dealer selling in long-gamma or down-move hedging.","aka":"Order flow = the running stream of buy and sell orders; 'net' demand = buys minus sells, the imbalance that moves price."},{"id":"L2.price","label":"Price","archetype":null,"scc":"SCC-NAME","level":"L2","kind":"state","what":"The market output and the system's central hub. A sink on the forward path but a feedback source: it routes back up through cap-weighting, deleveraging, gamma hedging, borrow recalls and the writeback loops.","evidence":"MIXED","status":"topological","cluster":"PRICE","story":"Price is both the finish line and the starting gun. On the way in it is a sink — everything the market does funnels down to it — but the instant it prints, it becomes a source, routing back up through the system: it sets cap-weights (so trackers buy more of what rose), it triggers margin calls and deleveraging, it forces dealer gamma hedging, it recalls stock borrow, and it rewrites the very fundamentals via buybacks and activism. That feedback is why markets trend and crash instead of politely settling — price is the hub every reinforcing and balancing loop passes through.","example":"On October 19, 1987, price itself became the contagion: falling prices triggered portfolio-insurance selling programs, whose selling pushed prices lower, which triggered more selling — a pure price-begets-price feedback that took the Dow down 22.6% in a day with no fundamental news remotely big enough to justify it. The same wiring runs in reverse in a melt-up like the Magnificent Seven's 2023–24 run, where rising price mechanically forced cap-weighted funds to buy still more.","dilemma":"Price is supposed to be an output that reflects value, but because so many loops feed on it as an input, it routinely detaches from value and chases itself — the market's central tension between price as a truthful signal and price as a self-referential reflexive engine.","pushes_up":"Net demand imbalance to the buy side; cap-weight reinforcement (R1); short squeezes (R7); buyback bids (R6); short-gamma dealer hedging (R5); roadshow persuasion lifting conviction (B5); activist re-rating (R8).","pushes_down":"Selling demand imbalance; concentration-cap distribution (B1); deleveraging cascades (R4); higher discount rates re-rating equities (B3); long-gamma pinning (B6); index deletion; fundamental deterioration flowing through relative value."},{"id":"A0.roadshow","label":"Issuer narrative / roadshow","archetype":"A0","scc":null,"level":"L2","kind":"flow","what":"The issuer's strategic persuasion effort — guidance, investor days, IR — that actively shapes the story. An optimized (STRAT) agent action, not a passive transfer, and it works better in easy-liquidity regimes.","evidence":"EMP-W","status":"topological","cluster":"ISSUER","story":"This is the company talking its own book — the CEO and CFO out on the road with guidance, investor days, and an investor-relations machine, all bent on framing how the market reads them. The graph treats it as a strategic action with a payoff, not a passive fact: management is an agent trying to lower its own cost of capital by making the story sound inevitable. Its lever is the narrative itself — it feeds directly into MKT.narrative, the collective story that eventually gets priced.","example":"Elon Musk's serial Tesla guidance — '5,000 Model 3s a week,' 'full self-driving next year,' the 2018 'funding secured' tweet — is roadshow as a weapon: years of forward promises that kept the multiple aloft far ahead of the fundamentals. The mirror image is Enron's late-1990s investor days, where a polished IR story masked the accounting until the narrative and the numbers violently reconnected in 2001.","dilemma":"Management wants a high share price as cheap currency for deals and comp, but every promise is a hostage to future reality — over-sell and you invite an activist, a short report, or an SEC subpoena; under-sell and rivals raise capital more cheaply than you. Persuasion works best exactly when it's least needed (easy money) and fails when you need it most (a credit squeeze).","pushes_up":"Easy-liquidity regimes where investors want to believe; a charismatic, credible management team; upcoming capital raises or M&A that reward a rich currency; an activist attack (A6) that forces the company to counter-message and defend its story.","pushes_down":"Tight-money regimes that make audiences skeptical; a track record of missed guidance that burns credibility; quiet-period and disclosure rules that legally cap what management can say; and a hard fundamental reality check that makes any spin collapse.","aka":"IR = Investor Relations, the corporate function that manages communication with shareholders and analysts; a roadshow is the in-person pitch tour management gives to big investors."},{"id":"A0.buyback","label":"Buyback flow","archetype":"A0","scc":"SCC-WRITEBACK","level":"L2","kind":"flow","what":"The issuer bidding for its own shares — a persistent, pro-cyclical demand source that also cuts share count by identity. A fair-weather bid: it shrinks when rates rise and pauses in earnings blackout windows.","evidence":"MIXED","status":"topological","cluster":"ISSUER","story":"This is the company becoming a buyer of its own stock — a standing bid in the market that props up demand and, by simple arithmetic, shrinks the share count so each remaining share owns a bigger slice. It's one of the largest and most persistent sources of demand in modern equity markets, but it's a fair-weather friend: it swells when times are good and vanishes when they aren't. In the graph it does two things at once — it pushes on L2.demand (price support) and rewrites L0.share_count (the object being priced literally gets smaller).","example":"Apple has retired more than a third of its shares since 2013 through the biggest buyback program in history — over $700 billion spent, a near-constant bid under the stock. The dark side showed in 2018-2019, when many S&P 500 firms borrowed to buy back shares at record highs, then slammed the brakes in the March 2020 COVID crash — buying high, freezing exactly when support was most needed.","dilemma":"Buybacks return cash and boost per-share metrics (and often executive comp), but they're pro-cyclical — firms authorize the most at market highs, the opposite of value timing, and debt-funded buybacks trade balance-sheet safety for a richer stock. The bid you count on for price support is structurally weakest in a downturn, precisely when you'd want it.","pushes_up":"A rising price and confident management (price->more authorization, a self-reinforcing loop); flush cash flow; comp incentives tied to EPS; cheap credit that makes debt-funded repurchase attractive.","pushes_down":"Higher rates and tighter credit (a fair-weather bid that weakens just as credit core tightens); earnings blackout windows that punch periodic calendar holes in the bid; leverage limits or covenants; and better uses for the cash like capex or dividends.","aka":"Buyback (share repurchase) = a company buying back its own shares from the market, reducing shares outstanding; blackout window = the pre-earnings period when a firm halts repurchases of its own stock."},{"id":"A1.idx_hold","label":"Index / ETF holdings","archetype":"A1","scc":"SCC-NAME","level":"L2","kind":"flow","what":"Passive trackers' holdings, forced to benchmark weight to minimize tracking error. Membership is binary and forcing, and cap-weighting makes them buy more of what rises — a reinforcing edge.","evidence":"RULE","status":"blocked_data","research":[{"claim":"Blocked — we have index/ETF prices but no ETF-ownership-per-stock or membership-change events.","result":"needs data","source":"literature_validation_map.md Area 5"}],"lit":[{"ref":"Ben-David-Franzoni-Moussawi 2018","finding":"higher ETF ownership raises stock volatility (basket arbitrage)"}],"cluster":"PRICE","story":"Index and ETF holdings are the market's obedient giant: trillions of dollars that hold no opinion and take no view, existing only to mirror a benchmark as exactly as possible. Because tracking error is their one sin, they are fully rule-forced — when a name enters the index they must buy it, when its weight rises they must buy more, and they do so at whatever price the rules dictate, blind to valuation. Crucially, cap-weighting makes them a reinforcing edge: the more a stock rises, the bigger its index weight, the more they must own — they buy high because the rulebook, not judgment, commands it.","example":"When Tesla joined the S&P 500 in December 2020, index funds had to absorb roughly $80 billion of stock essentially at a single rebalance, mechanically, regardless of the stock having already run ~70% into the event. Vanguard and BlackRock's funds weren't betting on Tesla — they were forced buyers with no discretion, the purest example of price-insensitive demand.","dilemma":"The index fund wants zero tracking error above all else, which means it must buy winners at their most expensive and sell losers at their cheapest — it is structurally forbidden from the value-timing that would help it, so its own discipline makes it a momentum amplifier and, at the top, a forced seller via the concentration cap.","pushes_up":"Inflows into passive vehicles; a held name rising (cap-weight forces more buying); index additions and up-weightings at reconstitution; broad market melt-ups concentrating weight in megacaps.","pushes_down":"Outflows and redemptions; index deletions and down-weightings; concentration caps forcing trims on the largest names; capped-index special rebalances; a held name falling (cap-weight shrinks the required holding).","aka":"Tracking error = how far a fund's return drifts from its benchmark, the thing index funds exist to minimize; cap-weighted = each stock held in proportion to its market value."},{"id":"A2.report_cosmetics","label":"Window-dressing trades","archetype":"A2","scc":null,"level":"L2","kind":"flow","what":"Calendar-triggered cosmetic trades: benchmark-relative funds buy recent winners and dump losers before a reporting date to 'look smart'. A transient pulse that builds into the date and reverses after.","evidence":"MIXED","status":"topological","cluster":"ALLOCATION","story":"This is the quarter-end costume change. Benchmark-relative funds that must publish their holdings buy up whatever has already been winning and quietly dump their embarrassing losers right before the reporting snapshot, so the disclosed portfolio looks like it was run by a genius. Nothing about the businesses changed; it's a photo op. The tell is that the pressure builds into the date and then unwinds after it, a little calendar-clocked wave that decays as soon as the camera is put away.","example":"The classic academic name for it is 'window dressing.' Its close cousin is turn-of-year tax-loss selling, the mechanism behind the old 'January effect': small beaten-down stocks get dumped into late December — both to keep them off the year-end holdings photo and to harvest tax losses — and historically bounced in early January when the selling stopped. (That January bounce has largely been arbitraged away since it became famous, but the quarter-end fingerprint persists in high-momentum names funds want to be seen owning.)","dilemma":"A fund manager wants to look smart to clients and consultants who judge the holdings list, but chasing winners at the snapshot means buying high and selling low on purpose — cosmetics that cost real performance. Vanity versus return.","pushes_up":"The arrival of the reporting date itself (the L3.regime calendar trigger, loop B4) fires it; a wide dispersion between recent winners and losers gives more to hide; heavy career/consultant scrutiny of holdings lists; end of quarter, and especially end of year.","pushes_down":"The calendar passing the report date (it immediately reverses); being a rule-bound index tracker that has no discretion to primp; low turnover mandates; transparency reforms or more frequent disclosure that make the trick pointless.","aka":"'Window-dressing' — cosmetic, temporary trades timed to a portfolio-disclosure date to make the holdings list look better than the manager's actual conviction."},{"id":"A2.conviction","label":"Benchmark-relative allocation / conviction","archetype":"A2","scc":null,"level":"L2","kind":"flow","what":"The active-but-benchmark-aware fund's tilt: buys eligible names with good relative value, is persuadable by issuer narrative, and is forced to trim on concentration-cap breach and on activist proxy mobilization.","evidence":"MIXED","status":"topological","cluster":"ALLOCATION","story":"This is the persuadable institutional holder — the big active-but-benchmark-aware mutual fund that closet-indexes but tilts toward the names it believes in. It's the swing voter of the market: it can only buy names that clear eligibility screens, it leans toward stocks with good relative value, it genuinely listens to management's story, and its accumulated bets become the 13F ownership map that everyone else reads. Crucially it is not free — a concentration cap forces it to trim a winner no matter how much it loves the stock, and an activist's proxy fight can drag its vote.","example":"When S&P added Tesla to the 500 on 21 December 2020, the pure index trackers were forced buyers — roughly $80B+ of Tesla had to be bought to match its ~1.6% index weight against the ~$5T tracking the S&P 500. For the benchmark-relative funds this node describes, inclusion converted Tesla from a name they could ignore into one they had to reckon with, because sitting it out now meant a big active underweight against their yardstick. The flip side: Cathie Wood's ARK funds riding a narrative into concentrated conviction positions, then bumping into diversification and single-name-weight limits as those bets ballooned.","dilemma":"It wants to overweight its best ideas and justify them with a story, but it's boxed in on three sides — eligibility rules gate what it may touch, concentration caps force it to sell its winners (loop B1, the 'cup' that caps a rally), and redemptions/relative-performance pressure mean it can never stray too far from the index it secretly hugs.","pushes_up":"A name crossing into eligibility (L1.elig); improving relative value (L1.rel_val, stock-picking); index inclusion unlocking constrained capital (L3.idx_thresh, loop R1); a persuasive issuer narrative and roadshow (MKT.narrative / A0, loop B5); governance and earnings-call information it can act on before retail (L0.txn); an activist's 13D that mobilizes it to a side.","pushes_down":"Breaching the concentration cap, which forces trimming regardless of quality (L3.conc_cap, loop B1); a name falling out of eligibility; deteriorating relative value; client redemptions; proxy-advisor (ISS/Glass Lewis) recommendations pulling its vote away.","aka":"'Benchmark-relative conviction / 13F holder' — a fund measured against an index (like the S&P 500) that tilts toward favorites but must file its holdings quarterly (Form 13F) and stay close to the benchmark."},{"id":"A3.pnl","label":"Levered-fund book P&L","archetype":"A3","scc":"SCC-DELEV","level":"L2","kind":"state","what":"The mark-to-market gain/loss on a risk-limit-bound fund's book. A price shock lands here and lands on specific exposure dimensions, not a scalar.","evidence":"EMP-S","status":"topological","cluster":"DELEVERAGING","story":"This is the running scoreboard of a leveraged fund's book: the mark-to-market gain or loss on everything it holds, long and short. The key insight the graph encodes is that a loss is never just a number — it lands on specific exposure dimensions (it was the small-cap shorts, or the momentum longs, that bled), and those dimensions decide what the fund is forced to sell next. It is the entry wound through which an outside price shock becomes an internal crisis.","example":"In the first days of August 2007, quant funds like Goldman's Global Equity Opportunities watched their books post losses so extreme that Goldman's own CFO David Viniar described them as '25-standard-deviation moves, several days in a row' — statistical near-impossibilities that kicked off the Quant Quake and forced a $3 billion rescue of that fund, all before anyone understood why.","dilemma":"A fund wants to run maximum leverage to juice returns, but every extra turn of leverage means a given price move produces a larger P&L swing — and a large enough negative swing trips the risk limits that force selling at the worst possible moment.","pushes_up":"A favorable price move on held exposures (feeds from L2.price); tighter, more concentrated positioning; higher leverage amplifying every tick.","pushes_down":"Adverse price shocks landing on the fund's specific exposures; crowded trades reversing; the very deleveraging it triggers feeding back as further losses.","aka":"P&L = profit and loss, the mark-to-market change in the book's value."},{"id":"A3.E","label":"Exposure vector","archetype":"A3","scc":"SCC-DELEV","level":"L3","kind":"state","what":"The fund's risk budget as a vector with one component per risk dimension it controls (ownership, FF6, Barra, concentration, theme, liquidity, counterparty). A loss consumes the components it loaded on; deleveraging happens along whichever breaches.","evidence":"RULE","status":"topological","lit":[{"ref":"Khandani-Lo 2011","finding":"deleveraging lands on shared exposures, not individual names — the vector, not a scalar"}],"cluster":"DELEVERAGING","story":"Think of the fund's risk budget not as one gas tank but as a dashboard of separate gauges — one for ownership overlap, one for Fama-French style tilt, one for Barra factors, one for concentration, one for theme crowding, one for liquidity, one for counterparty. A loss doesn't drain the whole tank evenly; it empties the specific gauges the losing trade loaded on. When any single gauge hits empty, that is a breach, and the fund must deleverage that exact sleeve — which is why forced selling is surgical, not broad.","example":"A market-neutral quant in August 2007 might have been fine on net market exposure but blew through its factor-concentration gauge because half the industry was crowded into the same value-and-momentum tilt — so the breach was on the style axis, and that axis is what got liquidated.","dilemma":"The fund wants to spend its whole risk budget to maximize return per dollar, but loading heavily on any one exposure dimension makes that gauge the first to breach — concentrating risk into the very axis most likely to force a fire sale.","pushes_up":"Bigger risk limits / more allowed leverage; diversifying exposures so no single component is near its cap; profits that rebuild the budget.","pushes_down":"Losses consuming the components they loaded on (from A3.pnl); risk managers cutting limits in a drawdown; volatility spikes that mechanically shrink VaR-based budgets.","aka":"E = exposure vector; FF6 = the six Fama-French style factors (market, size, value, profitability, investment, momentum); Barra = the industry-standard multi-factor risk model; VaR = value-at-risk, the statistical loss limit that sets the budget."},{"id":"A3.unwind","label":"Deleveraging unwind","archetype":"A3","scc":"SCC-DELEV","level":"L3","kind":"flow","what":"The forced sale of a specific exposure sleeve when its component of E breaches. Pressure propagates only through that layer's adjacency, hitting even names the fund's peers do not co-hold.","evidence":"MIXED","status":"topological","cluster":"DELEVERAGING","story":"This is the moment theory becomes violence: when a component of the risk budget breaches, the fund is forced to sell the specific sleeve that breached — right now, into whatever price it can get. Crucially, the pressure travels only through that breached layer's network of connections, so it hits names that share the offending characteristic even if the fund's competitors never held them. One fund's margin call becomes another stock's crash through a channel nobody was watching.","example":"The August 2007 Quant Quake: as one big multi-strat deleveraged its equity book, the selling cascaded through every fund holding the same factor tilts, so AQR, Renaissance's RIEF, and Goldman's quant books all cratered together over three days despite no shared crisis — then much of it snapped back on August 10th, proving it was mechanical unwinding, not fundamentals.","dilemma":"The fund wants to sell slowly to avoid moving the price against itself, but the risk limit demands the breach be cured immediately — so it must dump fast, which craters the price, which deepens the loss and can trip the next gauge.","pushes_up":"A breached exposure component (from A3.E); tighter margin/risk enforcement; low market liquidity forcing larger price impact per share sold.","pushes_down":"Fresh capital or a relaxed limit that cures the breach without selling; deep liquidity absorbing the sale quietly; a price rebound that un-breaches the gauge before the trigger fires."},{"id":"A3.short_alloc","label":"Short allocation","archetype":"A3","scc":null,"level":"L2","kind":"flow","what":"The size of a fund's short book, gated by borrow availability and eroded by borrow fees. Short selling pressures price down until a squeeze forces cover.","evidence":"RULE","status":"topological","cluster":"BORROW","story":"This is the size of a fund's short book — the pile of borrowed shares
