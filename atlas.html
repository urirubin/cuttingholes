it has sold, betting they'll fall. It's not free money: every short is a rented position that costs a daily fee and can be yanked away, so the book is squeezed between how much stock the fund can borrow and how much that borrowing costs. Shorting also isn't passive — selling borrowed shares actively presses the price down, right up until the moment a rally forces everyone to buy back and cover at once. It's the offensive weapon of a long/short fund, and the most dangerous thing on the balance sheet because losses on a short are theoretically infinite.","example":"Melvin Capital in January 2021 had a huge short book against GameStop. As the price rocketed from around $17-20 at the start of January to an intraday peak near $483 on January 28 (it had traded under $5 the year before), the losses were so large the fund took a $2.75B lifeline — $2B from Citadel and its partners, $750M from Point72 — and still wound down, closing by mid-2022, about seventeen months later.","dilemma":"Wants to profit from falling prices and hedge the long book, but is capped by borrow availability, bled by borrow fees, and exposed to unlimited loss when the trade goes against it — conviction on the downside versus survival if a squeeze hits.","pushes_up":"Cheap and plentiful borrow (general-collateral names), high conviction bearish theses, a mandate to hedge market beta, easy-to-borrow lists that clear the locate, and calm regimes where squeezes feel remote.","pushes_down":"Rising borrow fees, hard-to-borrow or no-locate constraints, lender recalls, margin pressure, and forced buy-ins — every element of the borrow subsystem erodes or caps the short set."},{"id":"A4.sentiment","label":"Retail sentiment flow","archetype":"A4","scc":null,"level":"L2","kind":"flow","what":"Sentiment-driven, extrapolative retail demand. Responds to news and to price momentum, and is forced to deleverage (sell) when rate shocks stress leverage servicing; direction is well-supported but magnitude is contested.","evidence":"EMP-W","status":"topological","cluster":"ALLOCATION","story":"This is the crowd — extrapolative retail demand that buys because a stock is going up and because the news feels good, not because a spreadsheet says so. It's the market's accelerant: it chases momentum, amplifies a story well past fundamentals, and then gets force-sold when a rate shock makes its margin loans and leverage too expensive to carry. Its direction is easy to call; its magnitude is the eternally contested question, because sometimes the crowd is a ripple and sometimes it's a tidal wave.","example":"GameStop in January 2021 — Reddit's WallStreetBets turned a left-for-dead retailer into a rocket that hit an intraday high of $483 on January 28, on pure sentiment and momentum with no fundamental change. The dark mirror is 2022: as the Fed jacked rates, the same crowd's leveraged, speculative favorites (meme stocks, Cathie Wood's ARK names, crypto-adjacent bets) got margin-called and puked, sentiment demand flipping to forced selling.","dilemma":"It's driven by feeling and the fear of missing out, so it wants to buy strength and ride the story — but it's structurally fragile: the very leverage that magnifies its buying becomes a leash when rates rise, and it must sell exactly when it least wants to.","pushes_up":"Positive news and sentiment (L4.news_sent); rising prices / momentum it extrapolates forward (L2.price); a compelling issuer or influencer narrative (MKT.narrative); an activist 13D headline that screams opportunity (A6.disclose); easy money and cheap leverage.","pushes_down":"Rate hikes forcing deleveraging to service margin and loans (L4.rates, negative sign); falling prices that kill the momentum it was chasing; fundamentals reasserting themselves so the story decays; margin calls and tightening credit.","aka":"'Retail sentiment flow' — ordinary individual investors trading on mood, headlines and price trends rather than valuation; 'extrapolative' means they assume recent moves continue."},{"id":"A5.gex","label":"Net dealer gamma (GEX)","archetype":"A5","scc":"SCC-GAMMA","level":"L2","kind":"state","what":"The signed aggregate gamma dealers carry from customer option flow. Its sign sets whether hedging amplifies or damps price moves; it switches at the zero-gamma flip.","evidence":"RULE","status":"blocked_data","research":[{"claim":"Blocked — we hold no options chain / open-interest / GEX feed, so dealer gamma stays topological.","result":"needs data","source":"literature_validation_map.md Area 6"}],"lit":[{"ref":"Barbon-Buraschi 2021","finding":"dealer gamma imbalance × illiquidity predicts intraday momentum / fragility"}],"cluster":"GAMMA","story":"Net dealer gamma is the single number that tells you whether the options market is a shock absorber or a gas can. Dealers (the banks and market-makers who sell most options to the public) hedge whatever they're holding; the aggregate 'gamma' they carry decides which way that hedging pushes. When it's positive, their trading leans against every move and calms the tape; when it's negative, their trading chases the move and turns a wobble into an avalanche.","example":"Through most of 2017 the great vol-selling trade left dealers sitting long gamma, and the S&P 500 went months without a 1% day — 2017 had the fewest 1% moves since the 1960s. Then in February 2018's 'Volmageddon' the short-volatility complex detonated: Credit Suisse's XIV note lost ~90% of its value overnight as the VIX roughly doubled on Feb 5, the vol-suppressing positioning unwound, and the eerie calm inverted into a violent spike.","dilemma":"It's the market's most powerful regime switch, yet it's invisible without an options-chain and open-interest feed — you can feel its effect (eerie calm vs. air-pocket fragility) long before you can measure it, so traders are forever inferring the sign from behavior rather than reading it directly.","pushes_up":"Customers net-selling options (covered-call funds, yield-harvesting, vol sellers) push dealer gamma positive; rising prices into big call open interest; index-level put-selling programs.","pushes_down":"Customers net-buying options — panic put demand in a selloff, retail call-buying manias — push dealers short gamma; falling prices toward heavy put strikes; expiry mechanics that strip away offsetting positions.","aka":"GEX = Gamma Exposure, the signed total of how much dealers must buy or sell for each 1% move in the underlying."},{"id":"A5.flip","label":"Zero-gamma flip level","archetype":"A5","scc":"SCC-GAMMA","level":"L2","kind":"threshold","what":"The threshold where net dealer gamma crosses zero, flipping the regime between amplifying (R5) and damping (B6). A nonlinearity analogous to the concentration cap.","evidence":"RULE","status":"blocked_data","cluster":"GAMMA","story":"The zero-gamma flip is the exact price level where dealers' aggregate gamma crosses from positive to negative — the market's Jekyll-and-Hyde line. Above it the crowd of hedgers is a brake pad (mean-reverting, quiet); below it they become an accelerant (trend-following, fragile). Crossing it doesn't just change the odds, it flips the sign of the whole feedback loop.","example":"During the December 2018 selloff the S&P sliced below its estimated flip level and every subsequent down-tick forced more dealer selling, producing the Christmas Eve waterfall; peak-to-trough the index fell 19.8% from its September high, kissing the bear-market line before an equally mechanical bounce once gamma turned back.","dilemma":"It behaves like a hard nonlinearity — a tripwire — but its location drifts every day with open interest and moves as spot moves, so knowing roughly where it is doesn't tell you when a fast tape will punch through it.","pushes_up":"Anything that raises the flip level toward spot — decaying put open interest, call-heavy positioning building overhead, time passing toward expiry that concentrates gamma.","pushes_down":"Fresh put-buying that stacks negative gamma below the market, a rising spot that leaves the flip level behind, and expiries that reset the strike map lower.","aka":"'Flip' = the zero-crossing threshold; conceptually the market's analog of a phase-transition point where one regime becomes its opposite."},{"id":"A5.hedge","label":"Delta-hedging flow","archetype":"A5","scc":"SCC-GAMMA","level":"L2","kind":"flow","what":"The buying/selling dealers do to stay delta-neutral as price moves. Its sign is set by the gamma regime: with the move when short gamma (squeeze fuel), against the move when long gamma (pinning/vol-suppression).","evidence":"MIXED","status":"blocked_data","cluster":"GAMMA","story":"Delta-hedging flow is the actual buying and selling dealers must do to stay market-neutral as prices move — pure mechanical, price-insensitive order flow with no opinion attached. Its direction is dictated entirely by the gamma sign: short gamma forces them to buy strength and sell weakness (pouring fuel on the fire), long gamma forces them to sell strength and buy weakness (pinning price in place). It is the transmission belt that turns option positioning into real pressure on the stock.","example":"In late January 2021 GameStop, dealers who had sold waves of cheap out-of-the-money calls were violently short gamma; as the stock ripped they had to keep buying shares to hedge, mechanically feeding the squeeze from around $40 to an intraday $483 in days — a self-reinforcing 'gamma squeeze' distinct from (and stacked on top of) the retail short squeeze.","dilemma":"It's dumb flow with no view, yet it can dominate price for hours — the tension is that it stabilizes markets in calm long-gamma regimes and destabilizes them in short-gamma regimes, so the same hedging discipline is alternately savior and arsonist.","pushes_up":"Larger absolute gamma (more open interest, near expiry), bigger price moves, and short-gamma regimes that make each move demand more hedging in the same direction.","pushes_down":"Long-gamma regimes (hedging fights the move and shrinks it), thin open interest, and post-expiry position roll-off that leaves little left to hedge.","aka":"Delta = an option's price-sensitivity to the stock; delta-hedging = trading the stock to keep that net sensitivity at zero."},{"id":"A5.walls","label":"Gamma walls (high-OI strikes)","archetype":"A5","scc":"SCC-GAMMA","level":"L2","kind":"state","what":"High open-interest strikes toward which price gravitates near expiry as charm/gamma hedging concentrates there. The pinning / 'max-pain' mechanism is real but its predictive power is contested.","evidence":"EMP-W","status":"blocked_data","cluster":"GAMMA","story":"Gamma walls are the strike prices stacked with so much open interest that price gets magnetically drawn to them as expiration nears — the 'pinning' or 'max-pain' effect. Near expiry, dealers' hedging (gamma plus charm, the drift of delta as time runs out) concentrates around these strikes and quietly nudges the stock to close right on top of them, where the most options expire worthless.","example":"Monthly and now weekly SPX/SPY option expirations routinely see the index gravitate to round-number strikes into Friday's close, and single names like Tesla have repeatedly pinned to heavily-traded strikes on OPEX day — the effect is real but famously hard to trade because it only bites in the last hours.","dilemma":"The pinning mechanism is genuine, but its predictive power is contested — walls are strongest right at expiry and easily overwhelmed by any real news or trend, so a 'wall' is a soft magnet, not a fence, and betting on it is picking up nickels near a fast-moving tape.","pushes_up":"Heavy open interest piling up at a strike, proximity to expiration, low realized volatility, and long-gamma dealers whose hedging actively defends the level.","pushes_down":"Fresh directional news or a strong trend that blows through the strike, short-gamma regimes that repel rather than attract, and the reset after each expiry that clears the accumulated interest.","aka":"High-OI = high open-interest (many contracts outstanding at a strike); 'max pain' = the strike where the most option value expires worthless."},{"id":"A6.accumulate","label":"Activist stake accumulation","archetype":"A6","scc":null,"level":"L2","kind":"flow","what":"The activist quietly building a position, typically below the 5% disclosure line. Crossing 5% is the event that fires the 13D filing.","evidence":"RULE","status":"topological","cluster":"ACTIVIST","story":"This is the quiet-before-the-storm phase: an activist fund buys up shares of a target as cheaply and secretly as possible, deliberately staying under the 5% ownership line that would force it to tip its hand. The whole game is to amass real voting power at a pre-announcement price, because the moment the world learns an activist is circling, the stock jumps and every additional share gets more expensive. It's the market's version of loading up before you kick down the door.","example":"When The Children's Investment Fund (TCI) went after railroad CSX in 2007-08, it used cash-settled total-return swaps to build economic exposure far beyond 5% without triggering disclosure — a maneuver so aggressive that federal judge Lewis Kaplan ruled TCI had violated Section 13(d), and the fight reshaped how the SEC thinks about hidden 'synthetic' stakes.","dilemma":"Wants a big, cheap stake before anyone notices, but is constrained by the 5%-then-file disclosure rule and by the fact that buying itself pushes the price up — accumulate too slowly and a rival or the company reacts; too fast and you move the tape and overpay.","pushes_up":"A visibly undervalued or mismanaged target, a fragmented shareholder base easy to rally, cheap financing and derivative structures (swaps) that let you build exposure off-radar, and a fund in activist mode hunting return through intervention rather than passive value.","pushes_down":"The 5% disclosure trigger, poison pills and staggered boards that cap how much power a stake buys, illiquidity that makes silent accumulation impossible, front-running by copycats, and a rising price that erodes the margin of the eventual campaign.","aka":"13D refers to Schedule 13D, the SEC form an investor must file after crossing 5% ownership with intent to influence the company — within 5 business days since the 2024 rule change (formerly 10 calendar days)."},{"id":"A6.disclose","label":"13D disclosure event","archetype":"A6","scc":null,"level":"L2","kind":"flow","what":"The mandatory filing on crossing 5%. The disclosure itself moves price (the market prices expected intervention value) and mobilizes other holders into a proxy contest.","evidence":"EMP-S","status":"topological","cluster":"ACTIVIST","story":"The 13D filing is the starting gun of an activist campaign — the legally required public confession, once you cross 5%, that you own a big slice and mean to shake things up. The disclosure is itself a market event: the stock typically pops several percent on the spot because traders instantly price in the expected value of the coming fight, and dormant shareholders wake up and start choosing sides. It converts a private position into a public mandate to wage a proxy war.","example":"When Dan Loeb's Third Point filed a Schedule 13D on Yahoo in 2011 disclosing a ~5.1% stake and blasting the board, it lit the fuse for a campaign that ousted CEO Scott Thompson — caught padding his résumé with a computer-science degree he never earned — and installed new directors, clearing the runway that brought in Marissa Mayer. The purest illustration of the disclosure pop itself was Carl Icahn's 2013 Apple tweet, a 'large position' revealed in a single post that added billions in minutes — though Icahn deliberately stayed under 5% and so never had to file a 13D at all, showing the same repricing reflex fires the instant activist intent goes public.","dilemma":"The filing unlocks the ability to organize other holders and openly pressure management, but it also gives away the surprise, invites the price to run up against further buying, and starts the clock on a public fight the activist must now win or be embarrassed by.","pushes_up":"Crossing the 5% threshold, a credible thesis that intervention will unlock value, a well-known activist name that lends the filing weight, and other institutions eager to piggyback and mobilize into a proxy contest.","pushes_down":"Company defenses announced in response (pills, buybacks that pre-empt the demand), a weak or vague thesis the market shrugs off, regulatory scrutiny of how the stake was built, and passive-investor (13G) status that lets a holder avoid the aggressive-intent filing entirely.","aka":"13D disclosure = the Schedule 13D public filing triggered at 5% ownership with activist intent; distinct from the passive Schedule 13G."},{"id":"A6.intervene","label":"Activist intervention","archetype":"A6","scc":"SCC-WRITEBACK","level":"L2","kind":"flow","what":"The activist editing the firm directly — forcing buybacks, spinoffs, leverage or management/strategy changes. Writes back to L0; sign and magnitude depend on whether the intervention creates or destroys value.","evidence":"EMP-W","status":"topological","cluster":"ACTIVIST","story":"This is the payoff move where the activist stops signaling and actually rewrites the company — demanding buybacks, spinoffs, added leverage, cost cuts, or the firing of the CEO and installation of its own directors. It's the rare force in markets that reaches past the stock price and edits the underlying business (L0 fundamentals) directly, which is why its effect can cut either way: a well-aimed intervention unlocks trapped value, while a bad one strip-mines a company for a short-term pop and leaves it weaker.","example":"In 2021 tiny hedge fund Engine No. 1, holding just ~0.02% of ExxonMobil, won three board seats by rallying giant index holders like BlackRock and Vanguard — forcing a climate-and-capital-discipline overhaul at one of the largest companies on earth. Contrast Nelson Peltz's grinding 2017 proxy fight at Procter & Gamble — the priciest proxy contest in history to that point, so close that Peltz's board seat was confirmed only after a recount — where the value case was hotly contested.","dilemma":"Wants to force changes that lift value and prove the thesis, but is constrained by needing other shareholders' votes, by management's defenses, and by the deep ambiguity of whether its edits build durable worth or just extract cash — the same buyback that thrills traders can starve R&D.","pushes_up":"Winning board seats and shareholder votes, support from large index and institutional holders, a genuinely fixable operational or capital-allocation problem, and management weakness or scandal that lowers resistance.","pushes_down":"Entrenched boards and poison pills, a strong incumbent CEO with shareholder loyalty, interventions that destroy value and discredit the activist, regulatory and stakeholder pushback, and the target's own defensive concessions that defuse the campaign.","aka":"L0 fundamentals = the base layer of the company itself (its real operations, balance sheet and strategy), as opposed to the market price layered on top of it."},{"id":"R4.e_own","label":"Ownership fire-sale layer (13F)","archetype":null,"scc":"SCC-DELEV","level":"L3","kind":"state","what":"The contagion layer where two names are neighbors iff the same 13F filers co-hold them. A blown-up fund dumping its book pressures everything it holds regardless of factor character. Validated empirically as a stress-concentrated channel.","evidence":"EMP-S","status":"validated","research":[{"claim":"Rolling per-quarter 13F ownership overlap predicts excess residual co-movement, concentrated in stress.","result":"own coef +0.0155 stress > +0.0139 calm (VIX); +0.0156 > +0.0133 (mom-drawdown); perm p .003","source":"Test 1 · REAL_RUN_FINDINGS.md"}],"data_assets":["holdings_13f.parquet · 82M rows","universe_prices_22m","FF6 (canonical loader)"],"lit":[{"ref":"Coval-Stafford 2007","finding":"forced fund trades create reversible price pressure in commonly held names"},{"ref":"Anton-Polk 2014","finding":"common ownership forecasts excess residual co-movement (2SLS 0.029–0.042)"},{"ref":"Greenwood-Landier-Thesmar 2015","finding":"overlap × leverage × illiquidity → systemicness / vulnerability"}],"cluster":"DELEVERAGING","story":"This is the contagion map where two stocks are 'neighbors' if the same institutional filers own both of them. When a blown-up fund dumps its entire book, everything it holds gets pressured together — regardless of sector, style, or story — simply because it all sat in the same portfolio. It's guilt by co-ownership, and the graph flags it as a channel that concentrates specifically during stress.","example":"When Melvin Capital was forced to unwind in late January 2021 during the GameStop squeeze, the pain didn't stay in GME — hedge funds racing to cut leverage dumped their crowded longs to raise cash, so Goldman's basket of most-popular hedge-fund longs had one of its worst weeks on record, dragging down names that shared no theme except sitting in the same books.","dilemma":"A stock benefits from being held by big, stable institutions, but that same ownership makes it hostage to those institutions' worst days — a forced seller elsewhere can sink it for reasons that have nothing to do with the company.","pushes_up":"Allocation decisions that build overlapping 13F ownership (from A2.conviction); crowded institutional holdings; a forced-seller fund dumping a shared book (from A3.unwind).","pushes_down":"Diverse, non-overlapping ownership; long-term holders who don't sell under stress; the fire sale ending and the price feeding back to normal (into L2.price).","aka":"13F = the quarterly SEC form institutions with over $100M must file listing their equity holdings — the public record of who owns what."},{"id":"R4.e_ff","label":"Fama-French crowded-unwind layer","archetype":null,"scc":"SCC-DELEV","level":"L3","kind":"state","what":"The contagion layer where names are neighbors iff they share FF6 style loadings. Funds with no common holdings co-move because they deleverage the same style simultaneously — the quant-quake mechanism. Empirically the factor layer is a standing (not stress-gated) channel; identification still being pinned down.","evidence":"EMP-S","status":"in_progress","research":[{"claim":"Factor-loading similarity predicts residual co-movement — a STANDING (not stress-gated) channel that survives PIT ex-ante betas, so it reflects latent factors beyond FF6. Among zero-owner pairs it carries momentum-drawdown stress specifically.","result":"load +0.029–0.037 (stress ≈ calm); zero-own load +0.023, perm p .003 under mom-drawdown; null under VIX","source":"Test 1 ex-ante · REAL_RUN_FINDINGS.md"}],"data_assets":["FF6 (canonical loader)","universe_prices_22m"],"lit":[{"ref":"Khandani-Lo 2011","finding":"funds with no common holdings but similar factor loadings co-moved violently in Aug-2007"},{"ref":"Daniel-Moskowitz 2016","finding":"momentum crashes in panic states — stress-conditioned factor behavior"}],"cluster":"DELEVERAGING","story":"Here two stocks are neighbors if they share the same style loadings — both cheap, both small, both high-momentum — even if no single fund owns both. When funds all deleverage the same style at once, these stocks crash together despite having zero common owners, purely because everyone was expressing the same factor bet. This is the pure mechanism of the quant quake: correlation without connection. The graph notes it's a standing channel, always live, not just a stress-time flare-up.","example":"August 2007 again is the textbook case — dozens of market-neutral funds independently loaded the same value and momentum factors, so when one unwound, every high-momentum stock and every cheap stock moved in lockstep across unrelated portfolios, a co-movement no ownership map could explain.","dilemma":"Factor investing wants everyone to harvest the same well-documented style premia, but the more crowded a factor gets, the more violently it unwinds when the crowd runs for the same exit — the premium and the crash risk are the same coin.","pushes_up":"Shared style loadings across books (from L1.loadings); crowding into popular factors; a synchronized style deleverage (from A3.unwind).","pushes_down":"Idiosyncratic positioning uncorrelated to standard factors; reduced factor crowding; the unwind completing and prices stabilizing (into L2.price).","aka":"FF6 = the six Fama-French factors (market, size, value, profitability, investment, momentum), the canonical academic style dimensions that quant books tilt on."},{"id":"R4.e_theme","label":"Latent-theme unwind layer","archetype":null,"scc":"SCC-DELEV","level":"L3","kind":"state","what":"The contagion layer of empirical co-movement clusters that standard factor models miss (e.g., small-cap short crowding in biotech/quantum/space/lidar). Transmits even among stocks orthogonal on FF6 and with zero common owners. Validated as the dominant residual channel in the real run.","evidence":"EMP-S","status":"validated","research":[{"claim":"Latent-theme membership predicts stress co-movement even among stocks sharing NO owners.","result":"theme +0.039 stress (inside Anton-Polk band); zero-common-ownership subset +0.036, perm p .003 (VIX)","source":"Test 1 zero-own · REAL_RUN_FINDINGS.md"}],"data_assets":["universe_prices_22m","FF6 residual clusters (calm-day)"],"lit":[{"ref":"Barberis-Shleifer 2003","finding":"style/habitat demand induces co-movement beyond fundamentals"}],"cluster":"DELEVERAGING","story":"This is the hidden contagion layer that standard factor models cannot see: clusters of stocks that co-move because of a shared narrative or a shared crowded short, not because of any textbook factor or common owner. Think small-cap short crowding in biotech, quantum, space, or lidar names — orthogonal on Fama-French, zero ownership overlap, yet they lurch together. The graph flags this as the dominant residual channel in the real run: the thing that actually moves when the official maps say nothing should.","example":"The 2021 meme-stock and SPAC era: heavily-shorted small caps in unrelated businesses — GameStop the struggling retailer, AMC the theater chain, a lidar SPAC — squeezed and crashed as a bloc whenever the retail crowd or a short-covering fund moved, bound only by the shared theme of being a crowded short.","dilemma":"A crowded short is where the easy alpha looks like it lives, but crowding into the same thematic bet means the exit is a single narrow door — the theme that made the trade obvious is exactly what makes the unwind synchronized and brutal.","pushes_up":"A thematic short-squeeze cluster forcing buy-ins (from SB.buyin); narrative-driven crowding; a theme-layer deleverage propagating (from A3.unwind).","pushes_down":"Genuinely idiosyncratic positioning outside any crowded theme; the squeeze or unwind resolving; diversification away from the crowded narrative (feeds into L2.price).","aka":"'Latent' = hidden/unobserved; a channel present in the data that standard published factor models don't capture."},{"id":"R4.e_barra","label":"Barra style/industry unwind layer","archetype":null,"scc":"SCC-DELEV","level":"L3","kind":"state","what":"A finer-grained factor contagion layer built from Barra style, industry and country loadings. Confirmed-core in the topology but not separately validated in the real run.","evidence":"EMP-S","status":"topological","cluster":"DELEVERAGING","story":"This is a higher-resolution version of the style-contagion layer, built from the commercial Barra model's finer breakdown of style, industry, and country loadings. Where the Fama-French layer sees six broad axes, Barra sees dozens — so it can route deleveraging pressure through, say, a specific industry or country exposure that the coarser model would blur. The graph marks it confirmed-core in the topology but not yet separately proven in the live run, so it's a real pipe whose independent contribution is still being isolated.","example":"In a factor unwind, a fund breaching its exposure to, say, semiconductors-in-Taiwan would transmit pressure through exactly that industry-country cell — the kind of surgical channel Barra resolves but a six-factor model would smear across all of tech.","dilemma":"A finer risk model gives a fund more precise control over its exposures, but the more granular the factor cells, the more distinct axes there are to breach — precision in measurement multiplies the number of ways to be forced to sell.","pushes_up":"Shared Barra style/industry/country loadings (from L1.loadings); crowding within a fine-grained factor cell; a Barra-layer deleverage (from A3.unwind).","pushes_down":"Positioning spread across many Barra cells so none dominates; the unwind completing; overlap with coarser layers being netted out (into L2.price).","aka":"Barra = the widely-used commercial multi-factor equity risk model (from MSCI) that decomposes returns into detailed style, industry, and country factors."},{"id":"R4.e_conc","label":"Concentration unwind layer","archetype":null,"scc":"SCC-DELEV","level":"L3","kind":"state","what":"A contagion layer keyed to a custom concentration/breadth factor — mega-cap vs. breadth-driven unwinds. Confirmed-core in the topology, topological status pending its own test.","evidence":"EMP-S","status":"topological","cluster":"DELEVERAGING","story":"This contagion layer is keyed to a custom concentration-versus-breadth factor: it separates the world into mega-cap-driven moves and broad-breadth moves. When a fund breaches this axis, the unwind sorts along the fault line between the handful of giant index-dominating names and the long tail of everything else. The graph lists it confirmed-core in the topology, with its own empirical test still pending.","example":"The 2023–2024 'Magnificent Seven' regime is the shape of this axis — a market where a few mega-caps carried everything while breadth was terrible; an unwind of that concentration would pit the giants against the neglected majority as distinct, oppositely-moving blocs.","dilemma":"Concentrating into the dominant mega-caps is where the momentum and safety seem to be, but a concentration-driven market is fragile precisely at the top — an unwind of the crowded few does far more index damage than a broad-breadth wobble.","pushes_up":"Shared concentration/breadth loadings across books (from L1.loadings); a market regime dominated by a few mega-caps; a concentration-axis deleverage (from A3.unwind).","pushes_down":"Broad market breadth with no single name dominating; balanced positioning across the cap spectrum; the unwind resolving (into L2.price).","aka":"'Conc' = concentration; breadth = how many stocks participate in a move versus a few mega-caps carrying it."},{"id":"R4.e_liq","label":"Liquidity-tier spillover layer","archetype":null,"scc":"SCC-DELEV","level":"L3","kind":"state","what":"The 'sell what's liquid, not what's related' contagion route, keyed to liquidity tier (ADV/float). A candidate/module layer, toggled per scenario.","evidence":"EMP-W","status":"topological","cluster":"DELEVERAGING","story":"This is the 'sell what you can, not what you should' channel — when a fund needs cash fast, it dumps its most liquid holdings regardless of whether they're the source of the problem, so pressure travels along liquidity tiers rather than any fundamental link. High-volume, easy-to-trade names get hit first and hardest simply because they're the ones you can actually sell in a panic. The graph treats it as a candidate module, switched on per scenario rather than always live.","example":"March 2020: as the COVID crash forced across-the-board deleveraging, funds sold the most liquid things they owned — even US Treasuries and blue-chip large caps got dumped in the 'dash for cash,' so the safest, most liquid assets fell alongside the risky ones, the opposite of what fundamentals implied.","dilemma":"A fund wants to sell its problem positions, but those are often illiquid and can't be moved without a catastrophic price hit — so it sells its healthy, liquid holdings instead, punishing its best assets to survive.","pushes_up":"An urgent need for cash meeting illiquid problem positions; a liquidity-tier deleverage (from A3.unwind); market-wide liquidity drying up.","pushes_down":"Ample liquidity that lets a fund sell the actual problem positions; patient funding that removes the fire-sale urgency; the cash need being met (into L2.price).","aka":"ADV = average daily volume; float = freely tradable shares — together the measures of how liquid (easily sellable) a stock is."},{"id":"R4.e_ctpy","label":"Counterparty / collateral cascade layer","archetype":null,"scc":"SCC-DELEV","level":"L3","kind":"state","what":"Margin cascades propagating across names sharing a prime broker. A candidate/module contagion layer keyed to the counterparty map.","evidence":"EMP-W","status":"topological","research":[{"claim":"Not yet testable at fidelity — we lack a prime-broker / collateral map.","result":"blocked","source":"literature_validation_map.md Area 8"}],"cluster":"DELEVERAGING","story":"This is the plumbing-level cascade: when a fund's positions are financed by a prime broker on margin, and it can't meet a margin call, the broker seizes and liquidates the collateral — pressuring every name that shared that prime broker or that collateral pool. Contagion here travels through the financing map, not the ownership or factor map, which makes it invisible until the broker starts selling. The graph lists it as a candidate module keyed to the counterparty network.","example":"The Archegos implosion in March 2021: Bill Hwang's family office defaulted on margin against its total-return swaps, and its prime brokers — Credit Suisse, Nomura, Morgan Stanley — dumped the underlying collateral, so names like ViacomCBS and Discovery collapsed within days as banks raced to unwind the same positions, costing Credit Suisse roughly $5.5 billion.","dilemma":"Prime-broker leverage lets a fund control far more exposure than its capital allows, but it hands the broker the right to liquidate everything at the worst moment — the same financing that magnifies gains hands control of the exit to your creditor.","pushes_up":"Concentrated positions financed through a shared prime broker; a margin call that can't be met; a counterparty-layer cascade firing (from A3.unwind).","pushes_down":"Lower leverage and bigger collateral buffers; diversified financing across brokers; the margin call cured before liquidation (into L2.price).","aka":"Counterparty = the broker/bank on the other side of a financed trade; prime broker = the bank that lends a fund the leverage and holds its collateral."},{"id":"SB.borrow_supply","label":"Lendable share availability","archetype":null,"scc":null,"level":"L2","kind":"constraint","what":"How many shares can be borrowed (general-collateral vs. hard-to-borrow). No locate means no short, so this gates the entire short book — the easy-to-borrow fidelity constraint.","evidence":"RULE","status":"topological","cluster":"BORROW","story":"Before you can sell a stock short, you have to borrow a real share from someone who owns it — a pension fund, an index fund, a custodian's securities-lending desk. Borrow supply is simply how many shares are actually available to rent. Abundant, cheap names are called 'general collateral'; scarce ones are 'hard-to-borrow.' This is the master gate on the entire short book: no locate means no short, full stop — the number of shortable shares is a hard ceiling that no amount of conviction can lift.","example":"Meme names like GameStop and AMC in 2021, and Beyond Meat and small biotechs before them, routinely hit near-zero availability — brokers like Fidelity would show no shares to borrow, so bearish traders were locked out of shorting exactly when they most wanted to.","dilemma":"Owners of stock want the extra yield from lending it out, but scarce float and recalls mean supply can evaporate precisely when shorts are most crowded and most desperate to stay in — the constraint is tightest at the worst moment.","pushes_up":"Large liquid floats, heavy institutional and index ownership willing to lend, low existing short demand, and active securities-lending programs that mobilize idle shares.","pushes_down":"Small or tightly-held floats, shares already heavily lent out, lender recalls pulling supply back, insider/founder lockups, and regulatory or broker restrictions on the name.","aka":"GC = general collateral, i.e. easy-to-borrow stock with a trivial fee; HTB = hard-to-borrow, scarce and expensive."},{"id":"SB.fee","label":"Borrow fee / cost of carry","archetype":null,"scc":null,"level":"L2","kind":"state","what":"The cost of borrowing a shortable name. Scarce borrow drives the fee up, creating negative carry that shrinks the viable short set.","evidence":"EMP-S","status":"topological","cluster":"BORROW","story":"The borrow fee is the rent you pay, annualized, to keep a short position alive — trivial (a few basis points) for general-collateral names, but it can explode to double or triple digits for hard-to-borrow ones. Scarcity is the driver: when everyone wants to short the same crowded name, the fee spikes and creates negative carry, meaning you bleed money every day just holding the position even before the price moves. That cost quietly amputates the short book, because a thesis that needs six months to play out dies if the borrow costs 80% a year.","example":"In mid-2019 Beyond Meat was the most expensive major U.S. stock to short, its annualized borrow fee blowing past 100% — you'd pay more than the share price per year just to stay short, so even when the stock later fell the carry could eat the whole profit. During GameStop's January 2021 squeeze the fee was actually more modest, roughly 25-30%, because lendable supply never fully vanished; the eye-watering triple-digit fees live in hard-to-borrow small-caps and freshly-IPO'd names.","dilemma":"Wants to short a mispriced name, but the higher the crowd's conviction the scarcer the borrow and the steeper the fee — the most obvious short is often the most expensive to hold, so being right isn't enough, you have to be right fast.","pushes_up":"Scarce borrow supply, surging short demand, hard-to-borrow status, and crowding into a popular bearish thesis.","pushes_down":"Ample lendable supply, falling short interest, general-collateral status, and new float coming to market (lockup expiries, secondary offerings) that loosens the rental market.","aka":"Cost of carry = the ongoing cost of holding a position; negative carry = the position bleeds cash every day just to stay open."},{"id":"SB.si","label":"Short interest / days-to-cover","archetype":null,"scc":null,"level":"L2","kind":"state","what":"Short-side crowding — how much of the float is sold short and how many days it would take to cover. High short interest with low days-to-cover is squeeze fragility.","evidence":"EMP-S","status":"topological","cluster":"BORROW","story":"Short interest measures how much of a stock's tradable float has been sold short — the crowd size on the bearish side. Days-to-cover translates that into time: at normal trading volume, how many days it would take every short to buy back and get out. The combination is a fragility gauge: high short interest with LOW days-to-cover is the dangerous setup, because a huge crowd is trapped in an exit too narrow to escape through, and any upward jolt can detonate a squeeze.","example":"GameStop entered January 2021 with reported short interest around 140% of float — more shares sold short than actually existed — which is the textbook powder keg that, once lit by retail call-buying, produced the most famous squeeze in market history.","dilemma":"A crowded short means many smart funds agree the stock should fall, but that very crowding is what makes the trade fragile — consensus conviction and squeeze risk are the same number read two ways.","pushes_up":"A widely-shared bearish thesis, fundamental deterioration attracting more shorts, thematic crowding (biotech/quantum/space/lidar clusters), and thin float that makes a given short size a bigger share of it.","pushes_down":"Shorts covering (voluntarily or via buy-in), rising borrow fees deterring new shorts, improving fundamentals, and rising volume that shrinks days-to-cover on the same short base.","aka":"SI = short interest, the fraction of float sold short; days-to-cover = short interest divided by average daily volume, the crowded-exit timer."},{"id":"SB.recall","label":"Lender recall event","archetype":null,"scc":null,"level":"L2","kind":"threshold","what":"A lender demanding its shares back, typically as price rises and stresses the short. Triggers a forced cover regardless of thesis.","evidence":"RULE","status":"topological","cluster":"BORROW","story":"A recall is the lender picking up the phone and demanding its shares back — usually because the stock is rising, the shares are suddenly valuable to sell or vote, or the lender simply wants out. It's a threshold event, not a gradual pressure: when it fires, the short must be closed regardless of whether the thesis is still perfectly intact. Recall is the tripwire that converts a paper drawdown into a forced, involuntary exit, and it tends to arrive at the worst possible moment because rising prices trigger it.","example":"During the October 2008 Volkswagen squeeze, Porsche's disclosure that it controlled roughly 74% of VW through shares and options — with Lower Saxony holding another 20% — meant the borrowable free float essentially vanished, and shorts (about 12-13% of the stock) were forced to cover into almost nothing. VW briefly became the world's most valuable company on the panic, spiking above 1,000 euros a share.","dilemma":"The short seller may be completely right about the company, but doesn't own the shares — the lender's right to recall overrides the borrower's thesis, so you can be correct and still be forced out at a loss.","pushes_up":"Rising price stressing the position, lenders wanting to sell or vote their shares, corporate actions (dividends, proxy votes), and tightening borrow supply that makes the shares more valuable elsewhere.","pushes_down":"Stable or falling prices, deep and stable borrow supply, term-locked borrow arrangements, and lenders content to keep earning the fee."},{"id":"SB.buyin","label":"Forced buy-in","archetype":null,"scc":null,"level":"L2","kind":"flow","what":"Involuntary covering — buying to close a short forced by margin pressure or recall, irrespective of view. Pushes price up further, and across a crowded-short cluster becomes short-side factor contagion.","evidence":"EMP-S","status":"topological","lit":[{"ref":"Engelberg-Reed-Ringgenberg 2018","finding":"recall/fee risk deters arbitrage; forced covers amplify"}],"data_assets":["finra_daily_short_volume · 2017+","squeeze_risk_panel_historical"],"cluster":"BORROW","story":"A buy-in is the involuntary cover — the broker or clearing system buys shares in the open market to close your short whether you like it or not, forced by margin pressure or a recall you can't satisfy. It's the mechanism that turns pressure into fuel: buying to close a short pushes the price UP, which stresses the next short, which triggers the next buy-in. That's the reinforcing short-squeeze loop (R7), the exact mirror-image of a long stampede but amplifying instead of self-correcting — and when a whole crowded-short cluster gets bought in together, it becomes short-side factor contagion, dragging thematically-linked names up in sympathy.","example":"The January 2021 GameStop squeeze was cascading buy-ins: as the price climbed, shorts were margin-called and forced to buy, driving the price higher and forcing the next wave — and it rippled across the crowded meme cluster (AMC, BlackBerry, Bed Bath & Beyond) as a thematic short unwind, compounded by dealers short gamma on the flood of retail call-buying.","dilemma":"The short seller wants to hold and be proven right, but margin math and recalls force buying at the worst price — and every forced buyer's cover becomes the next short's problem, so individual survival instinct collectively fuels the very squeeze everyone is fleeing.","pushes_up":"Rising price, margin calls, lender recalls, evaporating borrow supply, and crowded short interest that means many positions get forced at once (cluster-wide contagion), amplified when dealers are short gamma.","pushes_down":"Falling or stable prices that relieve margin, ample borrow keeping positions financeable, voluntary orderly covering ahead of the squeeze, and low short crowding so no cascade can chain.","aka":"Buy-in = forced buy-to-cover; R7 = the reinforcing short-squeeze feedback loop (price up -> recall/margin -> forced buying -> price up)."},{"id":"L3.idx_thresh","label":"Index-inclusion threshold crossing","archetype":null,"scc":"SCC-NAME","level":"L3","kind":"threshold","what":"The discrete step where crossing the inclusion boundary expands the eligible-buyer set. Below it, growth is suppressed because index-constrained capital cannot buy; above it a new demand pool unlocks.","evidence":"RULE","status":"topological","cluster":"PRICE","story":"The index-inclusion threshold is the precise trapdoor where a name crosses from 'index-invisible' to 'index-owned,' and the whole eligible-buyer set jumps in one step. Below it, a company's ascent is capped because the largest, most price-insensitive pool of capital is legally barred from touching it; above it, a brand-new demand pool unlocks all at once and the reinforcing inclusion loop (R1) ignites. It is the discrete nonlinearity that turns a smooth business story into a violent repricing — the market's version of a phase change.","example":"Between the November 2020 announcement that Tesla would join the S&P 500 and its actual December 21 inclusion, the stock ran up roughly 70% as everyone front-ran the forced index buying that the threshold crossing guaranteed. Russell's annual late-June reconstitution produces the same pattern every year — names crossing the size boundary see a scramble of forced flow around a single date.","dilemma":"The crossing is both a gift and a trap: it unlocks a wave of mechanical demand, but because the buying is predictable and rule-forced, opportunists front-run it, so the very step-change that should reward the company often gets captured by arbitrageurs and can reverse once the forced buying is done.","pushes_up":"Crossing size/liquidity/profitability inclusion criteria; index reconstitution dates; front-running anticipation of forced index buying; committee decisions to add a name.","pushes_down":"Failing or falling back below inclusion criteria; index deletion (the trapdoor in reverse, forcing mechanical selling); post-inclusion mean-reversion once forced buying is exhausted.","aka":"Reconstitution = the periodic re-drawing of index membership (e.g. the annual Russell rebuild); 'threshold crossing' = the moment a stock passes the inclusion line and the buyer pool steps up."},{"id":"L3.conc_cap","label":"Concentration-cap ceiling","archetype":null,"scc":"SCC-NAME","level":"L3","kind":"threshold","what":"The portfolio-weight ceiling ('the cup'): when a name grows past its concentration limit, holders must trim regardless of quality. The balancing force that caps inclusion ignition — the Nvidia-at-10% mechanic.","evidence":"RULE","status":"topological","cluster":"PRICE","story":"The concentration cap is 'the cup' that catches the melt-up: a hard ceiling on how much of any one name a portfolio or index is allowed to hold, so when a winner grows too dominant, holders must trim it regardless of how much they love it. This is the balancing force (B1) that finally caps the inclusion-ignition loop — the higher a megacap climbs, the more its own weight forces disciplined selling, a built-in brake on runaway concentration. It is quality-blind in the opposite direction from a buy signal: it sells the best-performing stock precisely because it performed too well.","example":"In July 2023 the Nasdaq-100 underwent a rare 'special rebalance' specifically to cut the combined weight of the Magnificent Seven — Apple, Microsoft, Nvidia and peers had grown so dominant that the index breached its diversification limits, forcing funds to trim the winners purely on concentration grounds. The same RIC rules (the ~5%/25% diversification tests) that the Nasdaq methodology is built to satisfy mean capped ETFs must repeatedly shave a stock like Nvidia as it swells toward the ceiling — the 'Nvidia-at-10%' mechanic.","dilemma":"The holder wants to ride its biggest winner, but the rulebook says a single name can't exceed its slice — so conviction runs headlong into a diversification limit, and the manager is forced to sell strength exactly when every instinct says hold, capping the upside of the very positions that are working.","pushes_up":"A dominant name's price/weight rising toward the ceiling (arms the cap); tighter diversification rules; capped-index or RIC-compliant fund structures; regulatory diversification tests.","pushes_down":"Forced distribution trades that trim the name back below the cap (this is the cap discharging); the winner's price falling on its own so weight drops below the ceiling; looser or uncapped mandates that let concentration run.","aka":"RIC = Regulated Investment Company, the tax structure whose ~5%/25% diversification rules force fund concentration limits; 'the cup' = the portfolio-weight ceiling that forces trimming."},{"id":"L3.regime","label":"Liquidity / rate regime state","archetype":null,"scc":null,"level":"L3","kind":"state","what":"The macro regime that switches the sign of several edges (notably rates->dollar and discount-rate effects). A conditioning state rather than a flow.","evidence":"EMP-W","status":"topological","cluster":"MACRO","story":"This is the market's master light-switch: the liquidity-and-rate backdrop that decides whether cheap money is flooding in or draining out. It doesn't push prices directly so much as flip the sign and strength of everything else — the same rate move can lift or crush the dollar, and the same earnings can be worth a fortune or a pittance depending on the discount rate the regime sets. When the regime turns, correlations you trusted for years quietly reverse.","example":"In 2021 near-zero rates made unprofitable growth stories priceless; when the Fed hiked from ~0% to a 5.25-5.5% terminal rate across 2022-2023, the exact same companies (ARKK, which fell roughly 80% from its Feb-2021 peak; meme stocks like GME and AMC) collapsed with almost no change in their underlying businesses — only the regime changed.","dilemma":"It is a conditioning state, not a force — the market wants a stable rulebook to price against, but the regime is exactly the thing that rewrites the rulebook, so anyone who hardcodes a relationship gets blindsided when it switches.","pushes_up":"Central-bank easing, QE and rate cuts, abundant credit, falling real yields — all push toward the 'risk-on / liquidity-rich' pole where discount rates are low and long-duration assets are prized.","pushes_down":"Rate hikes, quantitative tightening, credit crunches and inflation scares push toward the 'risk-off / liquidity-scarce' pole where cash is king and future cash flows get marked down hard.","aka":"Regime = the prevailing state of monetary conditions; 'discount rate' is the interest rate used to convert future profits into today's value — higher rate, lower value."},{"id":"L4.rates","label":"Policy / market interest rate","archetype":null,"scc":"SCC-MON","level":"L4","kind":"state","what":"The dominant hub of the macro layer — highest out-degree, on most loops. Drains liquidity, raises interest expense on floating debt, tightens credit, re-rates equity discount rates, and weakens buybacks.","evidence":"EMP-S","status":"topological","cluster":"MONETARY","story":"This is the market's master valve and the single busiest hub in the whole macro layer — when the price of money moves, everything downstream moves with it. A higher rate drains system liquidity, jacks up interest expense on floating-rate corporate debt, chokes off refinancing, makes cheap buybacks expensive, and — most importantly — raises the discount rate that every stock is valued against, so a dollar of future earnings is suddenly worth less today. It is the lever the central bank pulls to fight inflation, and the reason a long-duration tech stock and a boring utility can crash in unison even when nothing changed about their businesses.","example":"In 2022 the Fed hiked from ~0% to over 4% in a single year to break post-COVID inflation; the Nasdaq fell ~33% and previously untouchable names like Meta and Netflix lost more than half their value — not because they stopped making money, but because the discount rate on their far-off cash flows exploded.","dilemma":"The central bank wants rates high enough to crush inflation but low enough not to snap the credit system or trigger a recession — every hike that tames prices also tightens the noose on leveraged borrowers, banks holding long bonds (see SVB, 2023), and equity valuations.","pushes_up":"Rising inflation (the reaction-function feedback loop), a hot economy, central-bank tightening, heavy government borrowing, and term-premium demands from bond buyers.","pushes_down":"Falling inflation, recession fear, central-bank easing/QE, flight-to-safety bond buying, and slack in the labor market.","aka":"'Rates' = the policy and market interest rate — the Fed's overnight target plus the Treasury yield curve that prices all other borrowing."},{"id":"L4.liq","label":"System liquidity","archetype":null,"scc":"SCC-MON","level":"L4","kind":"state","what":"Aggregate liquidity in the financial system. Supports asset demand broadly; drained by higher rates, which is the transmission link in the monetary stabilizer loop.","evidence":"EMP-S","status":"topological","cluster":"MONETARY","story":"System liquidity is the total volume of ready money sloshing through the financial system looking for a home — bank reserves, money-market cash, central-bank balance-sheet size. When it's abundant, it lifts demand for almost every asset indiscriminately, which is why bull markets feel like 'a rising tide lifts all boats'; when it drains, the marginal buyer disappears and prices sag even on good news. It sits directly downstream of interest rates — hiking rates is the pump that sucks liquidity out — making it the crucial transmission belt in the monetary stabilizer loop.","example":"The 2020-2021 melt-up: the Fed's balance sheet doubled to ~$9 trillion and stimulus flooded accounts, and everything from the S&P 500 to meme stocks like GameStop to crypto to SPACs ripped higher together — then in 2022, quantitative tightening reversed the flood and the same assets deflated in lockstep.","dilemma":"Central banks want enough liquidity to keep credit flowing and markets orderly, but too much inflates asset bubbles and stokes inflation — draining it risks a funding seizure like the September 2019 repo-rate spike or a March-2020-style dash for cash.","pushes_up":"Quantitative easing, rate cuts, fiscal stimulus, a falling Treasury General Account, and central-bank repo backstops.","pushes_down":"Higher interest rates, quantitative tightening (balance-sheet runoff), heavy Treasury issuance draining reserves, and risk-off hoarding of cash.","aka":"'Liq' = aggregate financial-system liquidity — the pool of deployable money (bank reserves + money-market cash + central-bank balance sheet)."},{"id":"L4.infl","label":"Inflation","archetype":null,"scc":"SCC-MON","level":"L4","kind":"state","what":"The price level's rate of change, fed by commodity and supply-chain costs. Drives the central-bank reaction function that raises rates — the loop the central bank is trying to run.","evidence":"EMP-S","status":"topological","cluster":"MONETARY","story":"Inflation is the rate at which the general price level rises, fed from below by commodity prices and supply-chain costs — and it is the alarm bell that forces the central bank's hand. Its real market power is indirect: inflation is the input to the central bank's reaction function, so a hot CPI print doesn't just erode purchasing power, it telegraphs the rate hikes that will re-rate every asset. It's the villain the whole monetary loop is built to hunt — commodities and supply push it up, and the Fed raises rates until it comes back down.","example":"June 2022 US CPI hit 9.1%, a 40-year high driven by oil, food, and snarled post-COVID supply chains; that single number cemented the Fed's aggressive hiking path and was the proximate cause of the year's brutal repricing across stocks and bonds alike.","dilemma":"A little inflation greases growth and lets debtors repay in cheaper dollars, but too much destroys savings and forces punishing rate hikes — the bank must decide whether a given spike is 'transitory' supply noise or an entrenched wage-price spiral, and getting that call wrong (as in 2021) is costly.","pushes_up":"Rising commodity prices, supply-chain disruptions and shortages, wage growth, abundant liquidity/stimulus, and a weak currency raising import costs.","pushes_down":"Central-bank rate hikes cooling demand, healing supply chains, falling energy prices, a strong dollar, and recession/demand destruction.","aka":"'Infl' = inflation, the percentage rate of change in the overall price level (commonly measured as CPI, the Consumer Price Index)."},{"id":"L4.commod","label":"Commodity prices","archetype":null,"scc":null,"level":"L4","kind":"state","what":"Oil, metals and agricultural prices — a source node upstream of almost everything except true exogenous shocks. Feeds COGS directly and inflation broadly.","evidence":"MIXED","status":"topological","cluster":"MACRO","story":"Commodities are the raw feedstock of the whole economy — oil, copper, wheat, lithium — sitting upstream of almost everything that isn't a pure exogenous shock. When their prices move, they feed straight into companies' cost-of-goods and bleed broadly into inflation, so a single barrel of oil quietly touches airline margins, fertilizer costs, and your grocery bill. They're the market's rawest real-world input, the place where geopolitics turns into P&L.","example":"When Russia invaded Ukraine in February 2022, Brent crude spiked toward $139 a barrel and European natural gas (TTF) went parabolic — within months that raw-material shock had become 9%+ CPI inflation in the US (peaking at 9.1% that June) and double-digit inflation in the euro area, forcing the aggressive rate hikes that then reset the entire regime.","dilemma":"Producers want high prices, every downstream buyer wants low ones — and because commodities are both an inflation cause and a growth input, the same price rise that fattens Exxon's profits squeezes the margins of nearly everyone Exxon sells to.","pushes_up":"Supply disruptions (wars, OPEC cuts, droughts), booming global demand, a weak dollar (commodities are priced in dollars), and speculative/inventory hoarding.","pushes_down":"Recession-driven demand destruction, new supply coming online (shale, mines), a strong dollar, and demand substitution or efficiency gains.","aka":"COGS = cost of goods sold, the direct input costs a company pays to make its product; CPI = consumer price index, the standard inflation gauge."},{"id":"L4.supply","label":"Supply-chain cost / availability","archetype":null,"scc":null,"level":"L4","kind":"state","what":"Availability and cost of inputs (e.g., memory prices up 3x YoY). Feeds inflation even in goods 'nobody thought' — anything with memory in it — and stresses the capex-heavy firms driving that very demand.","evidence":"EMP-S","status":"topological","cluster":"MACRO","story":"This is the availability-and-cost of the physical and component inputs firms need — not the commodity itself but the finished feedstock: memory chips, GPUs, shipping containers, wire harnesses. When a critical input goes scarce, its price rips and the shock shows up in the cost of goods 'nobody thought' were exposed — anything with a memory chip in it — while simultaneously stressing the very capex-heavy firms whose spending created the shortage. It's the market's bottleneck detector: the choke point where a boom in one place becomes an inflation in another.","example":"The 2021 auto-chip shortage idled assembly lines at Ford and GM and cost the global industry an estimated 7-11 million vehicles of production; more recently, DRAM and HBM memory prices roughly doubled-to-tripled as the AI datacenter buildout vacuumed up fab capacity, pushing memory cost into everything from phones to PCs.","dilemma":"The same AI-capex demand that makes suppliers rich also strangles the supply of the parts those very hyperscalers need — a boom that feeds on and starves itself, so the shortage is both a profit engine and a self-inflicted cost bomb.","pushes_up":"Concentrated fab capacity, demand surges (AI buildout), just-in-time inventories with no slack, export controls and single-source dependencies, natural disasters hitting key plants.","pushes_down":"New capacity coming online, demand cooling, inventory rebuilds and double-ordering unwinding, diversification and reshoring of supply.","aka":"Capex = capital expenditure, big long-term spending on plants and equipment; DRAM/HBM = memory chips, the storage components whose prices spiked."},{"id":"L4.macro","label":"Macro state (unemployment, confidence, PMI)","archetype":null,"scc":null,"level":"L4","kind":"state","what":"The broad activity backdrop. Drives firm revenue through demand and shapes the intensity and skew of the news cycle.","evidence":"EMP-S","status":"topological","cluster":"MACRO","story":"This is the broad activity backdrop — jobs, consumer confidence, factory surveys — the ambient weather every company operates inside. It drives revenue through the plainest channel there is (people with jobs and confidence buy things) and it also sets the mood music of the news cycle, tilting whether coverage skews fearful or greedy. When the macro state deteriorates, it hits both the numerator (earnings) and the narrative at once.","example":"The August 2024 'Sahm rule' scare — the July jobs report (released Aug 2) showing unemployment ticking up to 4.3% — combined with a BOJ hike days earlier to trigger a violent global sell-off and yen-carry unwind that crashed the Nikkei ~12% on Aug 5, even though the underlying US economy barely moved, showing how a shift in the macro reading reprices everything through fear.","dilemma":"Good news is good for earnings but can be bad for markets (it means no rate cuts), so investors are perpetually torn between wanting a strong economy and wanting a weak-enough one to force easier policy — the 'good news is bad news' tug.","pushes_up":"Rising employment, strong consumer confidence, expansionary PMIs above 50, real wage growth, fiscal stimulus.","pushes_down":"Rising unemployment, collapsing confidence, contracting PMIs below 50, tightening credit, recessionary shocks.","aka":"PMI = Purchasing Managers' Index, a survey of business activity where above 50 signals expansion and below 50 contraction."},{"id":"L4.dollar","label":"Dollar value","archetype":null,"scc":null,"level":"L4","kind":"state","what":"The exchange value of the dollar. A stronger dollar compresses foreign-earned revenue on translation for exporters/multinationals. Its input sign from rates is genuinely regime-dependent and unresolved — the top verification item.","evidence":"EMP-W","status":"topological","cluster":"MACRO","story":"The dollar's exchange value is the invisible tax or subsidy on every multinational's foreign earnings: a strong dollar shrinks overseas revenue when it's translated back home, so the same sales in euros or yen are worth fewer dollars on the income statement. Because commodities and much of the world's debt are priced in dollars, its level also ripples into global inflation and financial conditions. In this map it's a genuine puzzle — the sign of its response to interest rates is regime-dependent and flagged as the top unresolved item to verify.","example":"In 2022 the dollar index (DXY) surged to a 20-year high near 114.8 as the Fed hiked hardest; that 'wrecking-ball' dollar gutted the reported earnings of multinationals like Microsoft and Apple on translation — while sterling separately crashed to a record ~1.035 low, driven mainly by the UK's Truss/Kwarteng mini-budget gilt crisis that the strong-dollar backdrop amplified — then reversed sharply as rate expectations shifted, exactly the ambiguous rates-to-dollar link the graph flags.","dilemma":"A strong dollar is a safe-haven vote of confidence yet it quietly kneecaps US exporters' foreign earnings and squeezes every emerging market that borrowed in dollars — strength abroad becomes weakness on the earnings line.","pushes_up":"Fed tightening / higher US real yields (usually), safe-haven flight to quality in crises, US growth outperforming the rest of the world.","pushes_down":"Fed easing, risk-on appetite that chases higher-yielding foreign assets, US underperformance, twin-deficit and de-dollarization worries — though the rates channel's sign is regime-dependent and unresolved here.","aka":"DXY = the dollar index, the dollar's value against a basket of major currencies; 'translation' = converting foreign-currency earnings back into dollars for reporting."},{"id":"L4.credit","label":"Corporate refinancing conditions","archetype":null,"scc":"SCC-CREDIT","level":"L4","kind":"state","what":"How hard and costly it is for firms to roll over debt. Tightens as rates rise, stressing rollover-dependent firms — the core of the refinancing spiral.","evidence":"EMP-S","status":"topological","cluster":"CREDIT","story":"This is the temperature of the refinancing window: how hard and how expensive it is for companies to roll maturing debt into fresh debt. It is not a company fact but a market-wide condition — the same firm can refinance effortlessly one quarter and be shut out the next, purely because the credit climate turned. When it tightens, every business that depends on borrowing new money to pay off old money — the classic house of cards — starts to wobble at once, which is why it sits at the core of the refinancing spiral.","example":"March 2020 froze the corporate bond market solid: even investment-grade giants like Boeing and Ford couldn't roll paper until the Fed announced on March 23 it would buy corporate bonds directly, instantly thawing the window. The mirror image was 2008, when the commercial-paper market seized and companies that had always rolled overnight funding suddenly couldn't, turning a housing problem into an everything problem.","dilemma":"Firms want permanently open, cheap refinancing so they can run thin liquidity and maximize leverage, but the window is set by lenders' fear and the central bank's rate stance — exactly when a borrower most needs to roll debt (a downturn), the window is most likely to be slammed shut.","pushes_up":"Falling rates, central-bank easing and backstops (QE, bond-buying facilities), abundant risk appetite, and tight credit spreads all make refinancing easy and cheap.","pushes_down":"Higher policy rates (L4.rates) directly tighten it, as do widening credit spreads, risk-off panics, bank-lending pullbacks, and a wall of maturities hitting a nervous market — each one raising the cost and lowering the odds of a clean rollover.","aka":"Refinancing / rollover = replacing a maturing loan or bond with a new one to push the repayment date out; 'the credit window' is the shorthand for how willing lenders are to let firms do that."},{"id":"L4.circ","label":"Circular-financing exposure","archetype":null,"scc":null,"level":"L4","kind":"state","what":"Exposure to forward/vendor-financed deals (Nvidia-CoreWeave-style). If rate-stressed, credit-funded counterparties cannot pay, forcing restatement of forward-booked revenue. Real mechanism, highly uncertain magnitude/timing — a toggleable module.","evidence":"EMP-W","status":"topological","cluster":"MACRO","story":"This is a company's exposure to circular, vendor-financed dealmaking — where a supplier effectively funds its own customers so they can buy its product, booking the sale as revenue today. It's a real mechanism that turns booming order books into fragile daisy-chains: if rates rise and the credit-funded counterparty can't pay, the forward-booked revenue has to be clawed back and restated. The magnitude and timing are highly uncertain, so in this map it's a toggleable module — a lurking tail risk rather than a settled fact.","example":"The Nvidia-CoreWeave-OpenAI arrangements of 2024-2025, where Nvidia holds a stake in CoreWeave and pledged to invest up to ~$100B in OpenAI — the very cloud players buying its GPUs — is the archetype, echoing the late-1990s Lucent/Nortel telecom bubble where equipment makers lent upstart carriers the money to buy their gear and the whole edifice unwound when the credit dried up.","dilemma":"Vendor financing manufactures explosive near-term growth and locks in customers, but it means the seller is really lending against its own demand — so a rate shock or a single weak counterparty can convert booked revenue into a restatement and expose the whole circle at once.","pushes_up":"Easy credit and low rates, a capex land-grab where growth-at-any-cost dealmaking is rewarded, concentrated ecosystems with a dominant supplier able to backstop buyers.","pushes_down":"Rising rates that stress the credit-funded counterparties, auditor/regulator scrutiny of round-trip revenue, counterparty defaults forcing restatement, and a general flight from speculative deal structures.","aka":"Circular financing / vendor financing = a supplier funds its customers' purchases of its own product; 'restatement' = officially correcting previously reported revenue that turned out to be uncollectible."},{"id":"L4.news_sent","label":"News / sentiment intensity & skew","archetype":null,"scc":null,"level":"L4","kind":"state","what":"The attention economy's coverage — over-covering the hot theme, under-covering the rest. Feeds retail sentiment; shaped by the macro state.","evidence":"EMP-W","status":"topological","cluster":"MACRO","story":"This is the attention economy's output — how intensely and how lopsidedly the media covers the market. It over-covers the hot theme and starves everything else of oxygen, then pipes that skewed coverage straight into retail sentiment, which trades on it. Shaped from above by the macro mood, it's the amplifier that turns a real story into a mania and an ignored corner into a bargain — the market's volume knob for narrative.","example":"Through 2023-2024 essentially every headline was 'AI,' with Nvidia's every earnings print treated as a national event, while equally profitable but boring sectors went uncovered — the coverage intensity itself fed the retail FOMO that pushed the Magnificent Seven to record index concentration.","dilemma":"Attention chases the exciting story, but the more coverage crowds into one theme the more overpriced it gets and the more overlooked (and cheap) everything else becomes — so the sentiment that feels most validated is often the most dangerous.","pushes_up":"A dramatic dominant narrative (AI, crypto), a fearful or euphoric macro backdrop that raises the emotional stakes, viral social-media loops, and a slow news environment concentrating attention.","pushes_down":"Narrative fatigue, competing stories diluting focus, a calm/steady macro state that lowers emotional intensity, and the eventual reality-check when covered results disappoint.","aka":"Sentiment = the aggregate emotional mood (fear vs. greed) of investors, especially retail; 'skew' here means coverage tilts toward some themes and away from others."},{"id":"MKT.narrative","label":"Narrative sentiment","archetype":null,"scc":null,"level":"L2","kind":"state","what":"The prevailing story about a name, shaped by issuer roadshows and contested by activists. Persuadable holders (A2 conviction, A4 sentiment) update on it; rule-bound trackers ignore it.","evidence":"EMP-W","status":"topological","cluster":"ALLOCATION","story":"This is the story a stock is wearing — the prevailing explanation of what a company is and where it's going, which trades almost independently of the numbers underneath. It's actively manufactured by the issuer through roadshows, guidance and investor days, and it's contested by activists who show up with a rival story. It matters because it is the channel through which persuadable money moves: benchmark-relative funds update their conviction on it and retail piles in on it, while rule-bound index trackers are completely deaf to it.","example":"Nvidia's transformation from 'gaming GPU maker' to 'the picks-and-shovels of the AI revolution' from 2023 onward is narrative doing heavy lifting — the story pulled a re-rating that took it past a $1 trillion market cap that year and ran ahead of, then justified itself through, the fundamentals. Contrast the activist counter-narrative: Nelson Peltz's Trian vs. Disney in 2023-24, where the whole proxy fight was a battle over which story about the company the persuadable holders would believe — a fight Peltz ultimately lost at the April 2024 annual meeting, with shareholders siding with Bob Iger's turnaround story.","dilemma":"A story wants to be self-fulfilling — a good enough narrative pulls in flows that push the price that seems to validate the narrative (loop B5) — but it lives on borrowed time, because when hard fundamentals finally dominate, the effect decays and the crowd that bought the story is left holding it.","pushes_up":"Issuer roadshows, guidance and IR spin (A0.roadshow, loop B5); a rising price that seems to prove the story true; media and influencer amplification; a persuasive management team with 'share price as currency.'","pushes_down":"Activists arriving with a contradicting story and a 13D; fundamentals reasserting themselves so the narrative premium fades; rule-bound trackers who never react to it, diluting its market-wide pull; guidance misses that break the spell.","aka":"'Narrative sentiment' — the market's working story about a stock (its 'thesis'), shaped by investor-relations (IR) messaging and fought over by activist investors."},{"id":"EXO.weather","label":"Weather / climate","archetype":null,"scc":null,"level":"L4","kind":"primitive","what":"An exogenous input shock, especially to agricultural commodity prices. In-degree zero — a true source of the graph.","evidence":"EMP-S","status":"topological","cluster":"EXO","story":"Weather and climate are the market's ultimate outsiders — pure exogenous shocks that no trader, central bank, or CEO can bargain with. A drought in Brazil or a hurricane in the Gulf doesn't care about the Fed; it simply reroutes billions of dollars by destroying a harvest or shutting a refinery. This node has in-degree zero: nothing in the market causes the weather, but the weather causes plenty, especially in agricultural and energy commodity prices, which then bleed into headline inflation and the macro state.","example":"In 2012 a brutal U.S. Midwest drought — the most extensive since the 1930s Dust Bowl — sent corn futures to an all-time high near $8.40/bushel, cascading into meat, ethanol, and global food prices. More recently, the February 2021 Texas winter storm Uri froze wellheads and shale gas gathering lines, sending regional spot natural gas to roughly $1,000/MMBtu; ERCOT booted power retailer Griddy from the market days later and it filed for Chapter 11 in March 2021.","dilemma":"It is the purest form of unhedgeable risk: real economic damage that arrives without warning and cannot be negotiated, litigated, or front-run — only insured against and diversified. The tension is that the very unpredictability that makes it dangerous also makes it a classic 'act of God' the whole system prices as noise until it isn't.","pushes_up":"Climate change increasing frequency and severity of extreme events; concentrated production geographies (a single drought region supplying a global crop); El Nino/La Nina cycles; hurricane season timing over Gulf energy infrastructure.","pushes_down":"Nothing in the market suppresses it (in-degree zero) — but its market IMPACT is dampened by geographic diversification of supply, buffer stocks and strategic reserves, crop insurance, improved forecasting, and drought-resistant technology."},{"id":"EXO.geopol","label":"Geopolitics","archetype":null,"scc":null,"level":"L4","kind":"primitive","what":"An exogenous shock source (conflict, trade policy) feeding commodities and the macro state. In-degree zero.","evidence":"EMP-S","status":"topological","cluster":"EXO","story":"Geopolitics is the market's other great outsider — wars, sanctions, coups, elections, and trade policy that erupt from the world of states, not the world of prices. Like weather, it has in-degree zero: the market can react to a Russian invasion or a new tariff, but it can't cause one. Its favorite transmission belt is commodities (oil, gas, wheat, semiconductors) and the broad macro state — a single decision in a capital can reprice risk assets globally overnight.","example":"When Russia invaded Ukraine in February 2022, Brent crude spiked to nearly $140 a barrel and European gas went parabolic, feeding the worst inflation shock in four decades — U.S. CPI peaked at 9.1% in June 2022, the highest since 1981 — and forcing the Fed and ECB into aggressive hikes. Earlier, the 1973 OPEC oil embargo roughly quadrupled crude (from about $3 to $12) and helped birth the era of stagflation.","dilemma":"It embodies the collision between the logic of power and the logic of profit: states pursue security and leverage, markets pursue return, and when they conflict, capital flees to safety (dollar, gold, Treasuries) even as the real economy absorbs the damage. The trap is that it's simultaneously the biggest tail risk and the hardest to price, so markets chronically under-discount it until the tanks roll.","pushes_up":"Great-power rivalry (U.S.-China), resource nationalism, protectionism and tariff regimes, energy-chokepoint conflicts (Strait of Hormuz, Taiwan), election-driven policy swings, sanctions escalation.","pushes_down":"Nothing in the market suppresses it (in-degree zero); its market IMPACT is dampened by diplomacy and de-escalation, diversified/friend-shored supply chains, strategic petroleum reserves, and safe-haven flows that cushion portfolios even as they signal fear."},{"id":"EXO.cust_opt_flow","label":"Customer option flow","archetype":null,"scc":"SCC-GAMMA","level":"L2","kind":"flow","what":"Net customer buying/selling of options. Customers buying options leave dealers short gamma; customers selling leave dealers long gamma — the exogenous driver that sets the gamma regime.","evidence":"RULE","status":"blocked_data","cluster":"GAMMA","story":"Customer option flow is the exogenous spark for the whole gamma system — the net of what the investing public (retail, funds, hedgers) buys and sells in options. Whatever customers do, dealers take the other side, so this flow directly sets the dealers' gamma sign: when customers buy options, dealers end up short gamma (fragile market); when customers sell options, dealers end up long gamma (calm market). It's the input knob that everything downstream in this cluster obeys.","example":"The 2020-2021 retail call-buying frenzy — Robinhood traders and SoftBank's 'Nasdaq whale' (revealed in September 2020 to have bought billions in call options on Apple, Amazon and other tech names) hoovering up short-dated calls —
