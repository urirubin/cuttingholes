flooded dealers with short-gamma positions and helped drive the summer 2020 melt-up and the meme-stock gamma squeezes that followed.","dilemma":"It's genuinely exogenous to the hedging machinery, yet it's driven by fickle human sentiment — greed piles into calls at tops, fear piles into puts at bottoms — so the flow that sets the regime is itself the least predictable and most reflexive part of the chain.","pushes_up":"Retail and institutional appetite for options — bull-market call manias, hedging demand during scares, the structural growth of zero-day and weekly options that has ballooned volumes.","pushes_down":"Yield-selling and covered-call programs that flip customers to net sellers, risk-off deleveraging that cuts option activity, and expiries that clear the book.","aka":"0DTE = zero-days-to-expiry options, the ultra-short-dated contracts whose explosive growth now dominates daily option volume."},{"id":"SOC.pop","label":"Population growth & decline","archetype":null,"scc":null,"level":"L5","kind":"state","what":"The size of a population and whether it's growing or shrinking — the raw base of every economy's workforce and consumer market.","evidence":"EMP-S","status":"topological","lit":[{"ref":"IMF 'Shrinkanomics' (2020)","finding":"Japan's working-age share peaked ~70% in 1991-93 and fell to ~59%; aging tied to structural deflation."}],"cluster":"SOCIETY","story":"Every economy starts with a headcount. People are the labour that produces output, the mouths that consume it, and the savers who fund investment. Whether that base is growing or shrinking sets the long-run trajectory before any policy is written — a growing population is a tailwind to GDP and demand; a shrinking one is a slow undertow that no central bank fully offsets.","example":"Japan is the cautionary tale: a shrinking, aging population sits underneath three decades of deflation and near-zero growth. India, by contrast, became the world's most populous country in 2023 with a young, still-growing base — the raw fuel for its demographic dividend.","dilemma":"Growth in headcount is not the same as growth in prosperity. A population can swell while GDP-per-capita stagnates (adding unskilled workers faster than capital and education). The investor's question is never just 'how many people' but 'people with what skills, earning what income.'","pushes_up":["SOC.age (a growing base feeds the working-age bulge)","DEV.gdp (more workers, more output)"],"pushes_down":["SOC.wages (a labour glut can suppress wages if capital doesn't keep pace)"],"aka":["headcount","population base","demographics"]},{"id":"SOC.age","label":"Age structure & the demographic dividend","archetype":null,"scc":null,"level":"L5","kind":"state","what":"How a population splits between children, working-age adults and the elderly — the dependency ratio and the one-time 'demographic dividend' window.","evidence":"EMP-S","status":"topological","lit":[{"ref":"Kopecky & Taylor, NBER w29944 (2022)","finding":"Aging raises the wealth/income ratio, pushes safe real rates below zero (2050), and keeps the equity risk premium elevated as the old crowd into bonds."},{"ref":"Indian state panel (2025)","finding":"+1 SD in working-age-ratio growth ≈ +1.9pp annual per-capita growth."}],"cluster":"SOCIETY","story":"The dependency ratio — how many children and elderly each working-age adult must support — is the single most powerful slow variable in macro. When a country's working-age share is high and rising, it enjoys a 'demographic dividend': lots of producers, few dependents, high savings, fast growth. When that share peaks and falls, the dividend reverses into a drag on growth, a bond-buying wave, and structural deflation pressure.","example":"India's demographic dividend is quantifiable: a one-standard-deviation rise in the growth of the working-age ratio is associated with ~1.9 percentage points higher annual per-capita growth (Indian state panel, 1981-2021). India's median age is ~29 vs the USA 40, Europe 46, Japan 47. Japan's working-age share peaked just under 70% in 1991-93 and fell to ~59% — the demographic core of 'Shrinkanomics.'","dilemma":"The dividend is a window, not a gift: it only pays off if the young cohort is educated and employed. A youth bulge with no jobs becomes youth unemployment and instability, not growth. And aging is a double bind for markets — older cohorts rotate out of equities into bonds, pushing safe real rates below zero (2050 projections) while keeping the equity risk premium elevated.","pushes_up":["DEV.gdp (a working-age bulge lifts output and savings)","SOC.labor (the dividend is a labour-supply surge)"],"pushes_down":["L4.rates (aging populations reallocate to bonds → lower safe real rates)"],"aka":["dependency ratio","demographic dividend","age structure","working-age share"]},{"id":"SOC.edu","label":"Education & human capital","archetype":null,"scc":null,"level":"L5","kind":"state","what":"The skills, knowledge and health embodied in a population — 'human capital' — the quality of the workforce, not just its size.","evidence":"EMP-S","status":"topological","lit":[{"ref":"IZA DP 7830","finding":"STEM graduates generate large positive wage spillovers to other workers in the same metro area."}],"cluster":"SOCIETY","story":"Human capital — the skills, knowledge and health embodied in people — is what separates a cheap-labour frontier economy from one that designs and owns the product. It decides where a country sits in the global division of labour: who assembles the phone versus who architects the chip inside it. Population size gets you volume; human capital gets you value.","example":"South Korea was poorer than Ghana in 1960 and built itself into a high-tech powerhouse through deliberate investment in education and institutions. STEM graduates in particular generate large positive wage externalities — they lift the earnings of other workers in the same metro area far more than non-STEM graduates (IZA), which is why China's build-out of millions of STEM graduates a year lets it contest the West in AI, EVs and chips rather than just supply cheap labour.","dilemma":"Human capital is slow to build and easy to lose to brain drain — the best-educated often leave for higher wages abroad, so the country pays to train talent that another country captures. And education only converts to growth if the economy has the jobs and institutions to absorb it, else you manufacture over-qualified, under-employed graduates (a classic pre-Arab-Spring pattern).","pushes_up":["SOC.wages (skills command a productivity premium)","DEV.gdp (human capital moves a country up the value chain)","DEV.institutions (an educated society demands better governance)"],"pushes_down":["SOC.unemp (a skilled workforce is more employable — if jobs exist)"],"aka":["human capital","education","STEM","skills","division of labour"]},{"id":"SOC.labor","label":"Labour force & the division of labour","archetype":null,"scc":null,"level":"L5","kind":"state","what":"The people available and willing to work and the mix of skilled vs unskilled — what an economy can produce and at what wage, and its rung on the global ladder.","evidence":"EMP-S","status":"topological","lit":[],"cluster":"SOCIETY","story":"The labour force is the people willing and able to work, and its composition — skilled vs unskilled, participating vs sidelined — is what an economy can actually produce. Who works, who owns, and who is idle determines both the supply side of output and the distribution of its rewards.","example":"A demographic dividend only becomes growth through the labour force: the working-age bulge has to actually participate and be productively employed. Where participation is low (e.g. women excluded) or the mix is all-unskilled, the headcount advantage never converts to output. Post-pandemic, real wage gains have concentrated in emerging-market labour forces (emerging G20 real wages +1.8% 2022, +6.0% 2023) while advanced G20 fell two years running.","dilemma":"There's a structural split between those who own capital and those who supply labour — and in a low-skill economy that gap widens, because unskilled labour is abundant and cheap while capital and skills are scarce and richly paid. The '$200-a-month' worker keeps the factory cheap but can't become the customer.","pushes_up":["DEV.gdp (employed labour is output)","SOC.wages (a tight or skilled labour force bids wages up)"],"pushes_down":["SOC.unemp (higher participation absorbs the idle)"],"aka":["labour force","participation","skilled vs unskilled","who owns vs who works"]},{"id":"SOC.unemp","label":"Youth & structural unemployment","archetype":null,"scc":null,"level":"L5","kind":"state","what":"The share of would-be workers who can't find jobs — especially youth unemployment, which is structurally distinct and socially explosive.","evidence":"EMP-S","status":"topological","lit":[{"ref":"IMF (MENA youth unemployment)","finding":"~27% youth unemployment in 2008; youth were 40-60% of the unemployed in several countries."},{"ref":"AfDB WP 171; 24-country panel","finding":"Youth unemployment significantly raises political-instability risk."}],"cluster":"SOCIETY","story":"Unemployment — especially youth unemployment — is a distinct and dangerous failure mode, not just a soft labour market. Idle young people are lost output today and, above a threshold, a source of political instability that can topple the whole investment case for a country. It's the point where economics becomes geopolitics.","example":"Pre-Arab-Spring MENA had the world's highest youth (15-24) unemployment — averaging 27% in 2008, with youth 40%+ of the unemployed in Jordan/Lebanon/Morocco/Tunisia and nearly 60% in Syria/Egypt — a material economic driver of the 2011 unrest, not merely political repression. The link is statistically robust: across 24 developing countries (1980-2010) and an IGAD five-country panel, a 1% rise in youth unemployment raises instability by ~1.43%.","dilemma":"A youth bulge is the demographic dividend's promise and its threat in the same population: educate and employ them and you get decades of growth; fail to and you get the instability that sends foreign capital fleeing. The same cohort is upside and tail risk depending on one variable — jobs.","pushes_up":["EXO.geopol (youth unemployment above threshold → instability, unrest)"],"pushes_down":["DEV.middleclass (the unemployed never cross into discretionary spending)","DEV.capital (instability repels foreign investors)"],"aka":["youth unemployment","structural unemployment","idle youth","Arab Spring"]},{"id":"SOC.wages","label":"Wages, incomes & productivity","archetype":null,"scc":null,"level":"L5","kind":"state","what":"What people actually earn, and its link to productivity — the bridge from a job to purchasing power and demand.","evidence":"EMP-S","status":"topological","lit":[{"ref":"ILO Global Wage Report 2024","finding":"Advanced-economy productivity +29% vs real wages +15% since 1999; recent real-wage gains concentrated in emerging markets."}],"cluster":"SOCIETY","story":"Wages are the bridge from having a job to having purchasing power — the mechanism that turns labour into demand. Their link to productivity matters enormously: when wages track productivity, workers become consumers and the domestic market grows; when they lag, output rises but the population can't buy it back, and growth leans on exports or credit.","example":"In high-income countries labour productivity rose 29% over 1999-2024 while real wages rose only 15% — most of the gap opening in 1999-2006 — so the fruits of productivity accrued to capital, not labour. Meanwhile emerging-market real wages have been rising (emerging G20 +6.0% in 2023), which is exactly what builds an EM middle class and its consumption.","dilemma":"For a multinational, cheap foreign wages are a cost advantage and a market limit at once — the same low wage that makes the factory profitable means the local worker can't afford the product. Rising wages erode the cost edge but create the customer. You can't have both cheap labour and a rich consumer in the same person.","pushes_up":["DEV.middleclass (rising real wages create discretionary spenders)","L0.rev (wages become consumer revenue)"],"pushes_down":["L0.margin (rising wages compress corporate margins)"],"aka":["wages","incomes","real wage growth","productivity-wage gap"]},{"id":"SOC.confidence","label":"Confidence & activity (ISM/PMI)","archetype":null,"scc":null,"level":"L5","kind":"state","what":"How optimistic households and firms feel — captured by consumer confidence and PMI/ISM surveys — a leading read on whether people will spend and firms will invest.","evidence":"EMP-W","status":"topological","lit":[],"cluster":"SOCIETY","story":"Confidence and activity surveys — consumer confidence, PMI/ISM — are the market's favourite leading indicators because they capture intentions before they show up in hard data. A PMI above 50 says managers are expanding; sentiment turning down flags spending pullbacks a quarter before the GDP print confirms them. Sentiment is soft, but it moves first.","example":"The ISM Manufacturing PMI and consumer confidence indices are watched precisely because they lead: a household that feels insecure defers the car and the appliance; a purchasing manager who sees demand softening trims orders now. That feeds through inventory and capex into the real economy and equity prices weeks-to-months ahead of the official statistics.","dilemma":"Sentiment is reflexive and self-fulfilling — pessimism can cause the slowdown it predicts, and confidence can be talked up or down by the very policymakers watching it. It's a leading indicator that is also an actor, so it whipsaws and gives false signals; it tells you the mood, not the destiny.","pushes_up":["L2.demand (confident households and firms spend and invest)","L0.rev (sentiment feeds real spending)"],"pushes_down":["MACRO.vol (collapsing confidence spikes uncertainty)"],"aka":["consumer confidence","PMI","ISM","business confidence","sentiment"]},{"id":"DEV.gdp","label":"GDP & GDP per capita","archetype":null,"scc":null,"level":"L5","kind":"state","what":"The total output of an economy (GDP) and output per person (GDP per capita) — headline size versus how rich the average person actually is.","evidence":"EMP-S","status":"topological","lit":[],"cluster":"DEVELOPMENT","story":"GDP is the headline size of an economy; GDP per capita is its prosperity per person — and the two can diverge sharply. A big economy with low per-capita income is a large pool of cheap labour; a smaller one with high per-capita income is a rich consumer market. Investors care about both: total GDP for the size of the opportunity, per-capita for what each person can actually buy.","example":"China has enormous total GDP but middling GDP per capita — which is why it's simultaneously the world's factory and an emerging consumer market still climbing the income ladder. The distinction is the whole ballgame for a consumer multinational deciding whether a country is a production base, a market, or both.","dilemma":"GDP growth flatters to deceive: it can be driven by cheap-labour volume, one-off commodity windfalls, or debt-funded investment that never earns its cost of capital. Headline growth without rising per-capita income or productivity is a treadmill — more activity, no more prosperity, and eventually a debt or currency reckoning.","pushes_up":["DEV.middleclass (per-capita growth builds the consuming class)","DEV.capital (growth attracts global capital)"],"aka":["GDP","GDP per capita","output","national income"]},{"id":"DEV.middleclass","label":"Purchasing power & the middle class","archetype":null,"scc":null,"level":"L5","kind":"state","what":"The real spending power of a population — how many have crossed from subsistence into discretionary consumption, measured in PPP terms.","evidence":"EMP-S","status":"topological","lit":[{"ref":"Brookings (2017; 2023 consumer-class update)","finding":"~3.2bn middle class by end-2016, ~140-170M added/yr, 88% of the next billion in Asia; ~$35tn spending ≈ one-third of world GDP."}],"cluster":"DEVELOPMENT","story":"Purchasing power — real income net of what it actually buys — is what converts a population from a labour pool into a market. The size of the middle class, the share who've crossed from subsistence into discretionary spending, is the direct driver of multinational revenue. This is the concrete answer to 'a $200-a-month economy cannot buy iPhones': demand is gated by real income, and a company's growth in an emerging market is a bet on that middle class forming.","example":"The world reached ~4 billion consumers in June 2023 and will add a billion more by 2031 — the fastest billion ever — with Asia contributing 81% of new consumers and India (33M/yr) overtaking China. Middle-class spending was ~$35 trillion in 2015 (2011 PPP), about a third of the global economy, ~140M people joining annually, 88% of the next billion in Asia. Every consumer multinational's EM growth thesis rides on this curve.","dilemma":"The middle-class bet is real but slow and reversible: it takes a generation of rising wages to build and a single currency crisis or recession to knock millions back below the discretionary line. Firms that price for a middle class that hasn't fully arrived — or that a devaluation erases — find the addressable market was smaller than the population suggested.","pushes_up":["L0.rev (discretionary spenders are multinational revenue)","L2.demand (purchasing power is demand)","DEV.capital (a growing consumer market attracts investment)"],"aka":["middle class","purchasing power","PPP","discretionary income","consuming class"]},{"id":"DEV.institutions","label":"Institutions & competitiveness","archetype":null,"scc":null,"level":"L5","kind":"state","what":"The rules of the game — rule of law, property rights, corruption, contract enforcement, infrastructure — that decide whether effort and capital are safe and productive.","evidence":"EMP-S","status":"topological","lit":[{"ref":"Acemoglu, Johnson & Robinson (2024 Nobel)","finding":"Institutions are a fundamental cause of long-run prosperity (the Korea natural experiment)."}],"cluster":"DEVELOPMENT","story":"Institutions — rule of law, property rights, contract enforcement, control of corruption — are the rules of the game that decide whether human capital and investment compound or get expropriated. Two countries with identical demographics and resources diverge for decades based on whether an investor's claim is safe. This is why institutional quality is a first-order determinant of both growth and the risk premium global capital demands.","example":"The 2024 Nobel (Acemoglu-Johnson-Robinson) formalised what Korea vs North Korea shows starkly: same people, same geography, opposite institutions, opposite outcomes. Strong institutions let South Korea's education and industrial policy compound into a high-tech economy; extractive ones trap resource-rich countries in stagnation despite the endowment.","dilemma":"Institutions are the slowest variable to change and the easiest to erode — a single populist turn, expropriation, or capital control can destroy investor trust built over decades, and rebuilding it takes far longer. Markets price institutional risk as a persistent discount, so a cheap-looking EM may be cheap for a permanent reason, not a temporary one.","pushes_up":["DEV.capital (strong institutions lower the risk premium, attract capital)","DEV.gdp (secure property rights compound investment)"],"pushes_down":["EXO.geopol (good institutions dampen instability risk)"],"aka":["institutions","rule of law","property rights","governance","competitiveness"]},{"id":"DEV.currency","label":"Currency & the real exchange rate","archetype":null,"scc":null,"level":"L5","kind":"state","what":"The value of a nation's money against others, and how far that sits from what it buys at home (its purchasing-power-parity value).","evidence":"EMP-W","status":"topological","lit":[],"cluster":"DEVELOPMENT","story":"A currency's value against others, and how far that sits from what it buys at home, encodes an economy's development stage. Developing-economy currencies are typically 'cheap' in purchasing-power terms — a dollar buys far more in Mumbai than New York — because low-productivity non-traded services (haircuts, housing) are cheap locally. As a country develops and productivity rises, its real exchange rate appreciates (Balassa-Samuelson). The currency is both a thermometer of development and a transmission channel for capital flows.","example":"The Big Mac index makes this visible: the same burger costs far less in developing economies, implying their currencies are 'undervalued' vs PPP — but that gap is largely structural (Balassa-Samuelson), not a mispricing. When capital floods in, the real exchange rate appreciates and can overshoot; when it flees, the currency collapses, as in the 1997 Asian crisis.","dilemma":"A cheap currency is an export weapon and an import tax and an inflation risk all at once — it makes the country's goods competitive but its imported inputs and dollar debts punishing. Development pressures the currency up (hurting the export edge) while capital flight can smash it down overnight (detonating dollar-denominated debt). The exchange rate the country wants and the one markets give it rarely agree.","pushes_up":["L2.price (a strengthening currency lifts local-asset value in dollar terms)"],"pushes_down":["L0.margin (a weak currency raises imported-input costs)","DEV.capital (currency risk deters foreign investors)"],"aka":["exchange rate","PPP","Balassa-Samuelson","Big Mac index","real exchange rate"]},{"id":"DEV.capital","label":"Global capital allocation (FDI, EM vs DM)","archetype":null,"scc":null,"level":"L5","kind":"flow","what":"The world's investable money — global funds, sovereign wealth, FDI, the World Bank/IMF — deciding which economies to pour into or pull out of, on growth, demographics, skills, institutions and returns.","evidence":"EMP-S","status":"topological","lit":[{"ref":"IMF (1997 Asian crisis)","finding":"Net private capital flows to Asia collapsed ~$100bn in one year — a classic sudden stop with contagion."}],"cluster":"DEVELOPMENT","story":"Global capital — pension and sovereign wealth funds, FDI, the World Bank/IMF, cross-border portfolio flows — is the world's investable money deciding where to go. It is drawn by the whole stack above it: growth, favourable demographics, human capital, strong institutions, and expected returns; and repelled by instability, weak governance and currency risk. This is the node where socioeconomic fundamentals convert into actual investment — and where the atlas's macro-root layer plugs into asset prices.","example":"China today attracts serious institutional capital because it built an educated society and scale that a cheap-labour frontier economy can't offer — capital chases the return-on-human-capital, not just cheap wages. But the flow is boom-bust: the 1997 Asian crisis was a classic 'sudden stop,' net private flows to Asia collapsing by nearly $100bn in a single year, spreading by contagion from Thailand's baht float to Korea, Brazil, Russia and Argentina.","dilemma":"Capital inflows are a blessing that becomes the risk: they fund development and lift asset prices on the way in, but they're reversible and herd-like, so the same flows that inflated the boom detonate the bust when sentiment turns — a sudden stop that crushes the currency and prices faster than any fundamental deteriorated. Countries crave the capital and fear its exit in equal measure.","pushes_up":["L2.demand (inflows buy assets and lift prices)","L2.price (foreign capital bids up local markets)"],"pushes_down":["DEV.currency (sudden capital flight collapses the exchange rate)"],"aka":["FDI","global capital","EM vs DM","sovereign wealth","sudden stop","capital flight"]}],"edges":[{"id":"e1","source":"L0.txn","target":"L0.rev","sign":"+","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"txn->rev","what":"Transactions post to the top line by cash/accrual accounting."},{"id":"e2","source":"L0.txn","target":"L0.cogs","sign":"+","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"txn->cogs","what":"Transactions post input costs to COGS."},{"id":"e3","source":"L0.txn","target":"L0.opex","sign":"+","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"txn->opex","what":"Transactions post operating expenses."},{"id":"e4","source":"L0.rev","target":"L0.earn","sign":"+","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"rev->earn","what":"Revenue raises earnings via the income-statement identity."},{"id":"e5","source":"L0.cogs","target":"L0.earn","sign":"-","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"cogs->earn","what":"COGS subtracts from earnings in the income-statement identity."},{"id":"e6","source":"L0.opex","target":"L0.earn","sign":"-","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"opex->earn","what":"Operating expenses subtract from earnings."},{"id":"e7","source":"L0.txn","target":"L0.cf","sign":"+","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"txn->cf","what":"Transactions produce operating/investing/financing cash flows."},{"id":"e8","source":"L0.earn","target":"L0.ratios","sign":"+","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"earn->ratios","what":"Earnings feed profitability and coverage ratios."},{"id":"e9","source":"L0.bs_assets","target":"L0.ratios","sign":"+","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"assets->ratios","what":"Assets feed return and leverage ratios."},{"id":"e10","source":"L0.bs_debt","target":"L0.ratios","sign":"+","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"debt->ratios","what":"Debt feeds leverage and coverage ratios."},{"id":"e11","source":"L0.cf","target":"L0.ratios","sign":"+","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"cf->ratios","what":"Cash flow feeds coverage/quality ratios."},{"id":"e12","source":"L0.bs_debt","target":"L0.opex","sign":"+","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"floating-debt->interest expense","what":"Interest on floating-rate debt flows to the P&L as operating expense — the hook macro rates grab."},{"id":"e13","source":"L0.ratios","target":"L1.rel_val","sign":"+","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"ratios->rank","what":"Firm ratios enter the cross-sectional ranking."},{"id":"e14","source":"L1.peer","target":"L1.rel_val","sign":"-","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"peers->rank","what":"Better peers mechanically lower the firm's relative rank — rank is a comparison."},{"id":"e15","source":"L0.bs_assets","target":"L1.elig","sign":"+","lag":"Q","evidence":"RULE","trigger":null,"writeback":false,"loop":null,"label":"size->eligible","what":"Firm size gates institutional/index eligibility as a step function."},{"id":"e16","source":"L1.liq","target":"L1.elig","sign":"+","lag":"Q","evidence":"RULE","trigger":null,"writeback":false,"loop":null,"label":"liquidity->eligible","what":"Liquidity gates eligibility — illiquid names are un-buyable by size-constrained capital."},{"id":"e17","source":"L1.elig","target":"A2.conviction","sign":"+","lag":"D","evidence":"RULE","trigger":null,"writeback":false,"loop":null,"label":"eligible->buyable","what":"Crossing into eligible makes a name newly buyable by benchmark-relative funds; ineligible means not bought."},{"id":"e18","source":"L1.rel_val","target":"A2.conviction","sign":"+","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"relval->tilt","what":"Funds tilt toward names with better relative value (stock-picking)."},{"id":"e19","source":"L0.txn","target":"A2.conviction","sign":"+","lag":"Q","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"governance-info->alloc","what":"Institutions act on proxy/earnings-call information — an informational advantage over retail."},{"id":"e20","source":"L1.elig","target":"A1.idx_hold","sign":"+","lag":"D","evidence":"RULE","trigger":null,"writeback":false,"loop":null,"label":"membership->tracker buy","what":"Index membership is binary and forcing: join the index and all trackers mechanically buy; drop out and they mechanically sell."},{"id":"e21","source":"L1.mkt_agg","target":"A1.idx_hold","sign":"+","lag":"D","evidence":"RULE","trigger":null,"writeback":false,"loop":null,"label":"benchmark-weight->tracker","what":"Trackers hold at benchmark weight; weight changes force rebalancing trades to avoid tracking error."},{"id":"e22","source":"L2.price","target":"A1.idx_hold","sign":"+","lag":"D","evidence":"RULE","trigger":null,"writeback":false,"loop":"R1","label":"cap-weight->more buying","what":"Cap-weighted indexes mechanically buy more of what rises (until reconstitution) — a reinforcing edge."},{"id":"e23","source":"L4.news_sent","target":"A4.sentiment","sign":"+","lag":"I","evidence":"EMP-W","trigger":null,"writeback":false,"loop":null,"label":"news->retail","what":"Retail flow responds to sentiment/news; direction supported, magnitude and price impact contested and regime-dependent."},{"id":"e24","source":"L2.price","target":"A4.sentiment","sign":"+","lag":"D","evidence":"EMP-W","trigger":null,"writeback":false,"loop":null,"label":"momentum->retail","what":"Momentum-chasing / extrapolative retail demand; contested magnitude."},{"id":"e25","source":"L4.rates","target":"A4.sentiment","sign":"-","lag":"D","evidence":"EMP-W","trigger":null,"writeback":false,"loop":null,"label":"rates->retail delever","what":"Rate hikes force retail deleveraging (margin/loan servicing) and selling; mechanism plausible, aggregate magnitude contested."},{"id":"e26","source":"A2.conviction","target":"L2.demand","sign":"+","lag":"I","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"inst->demand","what":"Benchmark-relative allocation flows sum into net demand."},{"id":"e27","source":"A1.idx_hold","target":"L2.demand","sign":"+","lag":"I","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"index->demand","what":"Tracker holdings flows sum into net demand."},{"id":"e28","source":"A4.sentiment","target":"L2.demand","sign":"+","lag":"I","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"retail->demand","what":"Retail flows sum into net demand."},{"id":"e29","source":"L2.demand","target":"L2.price","sign":"+","lag":"I","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"demand->price","what":"Net demand moves price via market impact; existence is identity-like, the impact-function shape is empirical."},{"id":"e30","source":"L1.elig","target":"L3.idx_thresh","sign":"+","lag":"D","evidence":"RULE","trigger":null,"writeback":false,"loop":null,"label":"eligible->threshold","what":"Eligibility feeds the discrete index-inclusion threshold crossing."},{"id":"e31","source":"L3.idx_thresh","target":"A1.idx_hold","sign":"+","lag":"D","evidence":"RULE","trigger":null,"writeback":false,"loop":"R1","label":"inclusion->index buy","what":"Crossing the inclusion threshold discretely expands the eligible-buyer set, unlocking a new index-buying pool."},{"id":"e32","source":"L3.idx_thresh","target":"A2.conviction","sign":"+","lag":"D","evidence":"RULE","trigger":null,"writeback":false,"loop":"R1","label":"inclusion->inst buy","what":"Inclusion also unlocks index-constrained institutional capital that could not previously buy the name."},{"id":"e33","source":"L2.price","target":"L3.conc_cap","sign":"+","lag":"D","evidence":"RULE","trigger":null,"writeback":false,"loop":"B1","label":"price->weight->cap","what":"Rising price lifts a name's portfolio weight toward the concentration-cap ceiling."},{"id":"e34","source":"L3.conc_cap","target":"A2.conviction","sign":"-","lag":"D","evidence":"RULE","trigger":null,"writeback":false,"loop":"B1","label":"cap breach->trim","what":"Breaching the concentration cap forces trimming regardless of quality — the 'cup' that caps inclusion ignition."},{"id":"e35","source":"L4.rates","target":"L3.regime","sign":"±","lag":"D","evidence":"EMP-W","trigger":null,"writeback":false,"loop":null,"label":"rates->regime","what":"Rate/liquidity conditions set the regime state that switches the sign of several downstream edges (dollar, discount-rate)."},{"id":"e36","source":"L4.rates","target":"L4.liq","sign":"-","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":"B2","label":"rates->liquidity","what":"Higher rates drain system liquidity."},{"id":"e37","source":"L4.liq","target":"L2.demand","sign":"+","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":"B2","label":"liquidity->demand","what":"System liquidity supports asset demand broadly."},{"id":"e38","source":"L4.rates","target":"L0.opex","sign":"+","lag":"D","evidence":"IDENT","trigger":null,"writeback":false,"loop":"R2","label":"rates->interest expense","what":"Higher rates raise interest expense via floating debt, lowering earnings — identity given floating debt."},{"id":"e39","source":"L4.rates","target":"L4.credit","sign":"-","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":"R2","label":"rates->credit tighten","what":"Higher rates make refinancing harder and costlier."},{"id":"e40","source":"L4.credit","target":"L0.bs_debt","sign":"-","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":"R2","label":"credit->rollover stress","what":"Tight refinancing conditions stress rollover; firms relying on new debt to service old debt fall into distress — the house-of-cards mechanism."},{"id":"e41","source":"L4.rates","target":"L2.price","sign":"-","lag":"D","evidence":"EMP-W","trigger":null,"writeback":false,"loop":"B3","label":"rates->discount-rate reset","what":"A higher risk-free rate re-rates the equity risk premium (discount-rate channel), lowering present value all else equal; net equity effect contested because it interacts with growth."},{"id":"e42","source":"L4.rates","target":"L4.circ","sign":"+","lag":"D","evidence":"EMP-W","trigger":null,"writeback":false,"loop":null,"label":"rates->counterparty stress","what":"Rising rates stress PE/credit-funded buyers of forward deals — raising circular-financing exposure."},{"id":"e43","source":"L4.circ","target":"L0.rev","sign":"-","lag":"Q","evidence":"EMP-W","trigger":null,"writeback":false,"loop":null,"label":"circ->restatement","what":"If a counterparty cannot pay, forward-booked sales get restated; mechanism real, magnitude/timing highly uncertain (module)."},{"id":"e44","source":"L0.rev","target":"L2.price","sign":"-","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"restatement->multiple compression","what":"A revenue restatement reprices the name as a multiple of the revised forward, so the derating overshoots the raw revenue loss — amplification via multiple."},{"id":"e45","source":"L4.commod","target":"L0.cogs","sign":"+","lag":"Q","evidence":"IDENT","trigger":null,"writeback":false,"loop":null,"label":"commod->cogs","what":"Commodity input costs hit COGS directly."},{"id":"e46","source":"L4.supply","target":"L4.infl","sign":"+","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":"R3","label":"supply->inflation","what":"Supply-chain cost spikes (e.g., memory 3x YoY) feed inflation, including in goods that embed the scarce input."},{"id":"e47","source":"L4.commod","target":"L4.infl","sign":"+","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"la ge→labour supply","what":"The working-age share sets how much of the population can actually work."},{"id":"e118","source":"SOC.age","target":"L4.rates","sign":"-","lag":"Y","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"aging→lower real rates","what":"As populations age and retirees pile into bonds, safe real interest rates are pushed down."},{"id":"e119","source":"SOC.edu","target":"SOC.labor","sign":"+","lag":"Y","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"education→skilled labour","what":"Education upgrades the workforce from unskilled toward skilled."},{"id":"e120","source":"SOC.edu","target":"SOC.wages","sign":"+","lag":"Y","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"human capital→wages","what":"Skills and human capital raise productivity and sustainable wages."},{"id":"e121","source":"SOC.labor","target":"SOC.wages","sign":"±","lag":"Q","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"labour supply→wages","what":"The supply and skill of labour set the going wage; scarce skills bid pay up."},{"id":"e122","source":"SOC.unemp","target":"SOC.confidence","sign":"-","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"joblessness→confidence","what":"High (youth) unemployment crushes household confidence."},{"id":"e123","source":"SOC.unemp","target":"SOC.wages","sign":"-","lag":"Q","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"slack→wages","what":"A slack labour market suppresses wage growth."},{"id":"e124","source":"SOC.wages","target":"SOC.confidence","sign":"+","lag":"D","evidence":"EMP-W","trigger":null,"writeback":false,"loop":null,"label":"incomes→confidence","what":"Rising incomes lift how confident households feel."},{"id":"e125","source":"SOC.unemp","target":"EXO.geopol","sign":"+","lag":"Y","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"youth unemployment→instability","what":"A generation shut out of work is a statistically robust driver of political instability (Arab Spring)."},{"id":"e126","source":"SOC.labor","target":"DEV.gdp","sign":"+","lag":"Y","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"labour→output","what":"Labour is a core input to national output."},{"id":"e127","source":"SOC.wages","target":"DEV.gdp","sign":"+","lag":"Y","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"incomes→output","what":"Wages and productivity translate into GDP."},{"id":"e128","source":"SOC.wages","target":"DEV.middleclass","sign":"+","lag":"Y","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"incomes→middle class","what":"Rising real incomes lift people into discretionary consumption."},{"id":"e129","source":"SOC.confidence","target":"L4.macro","sign":"+","lag":"D","evidence":"EMP-W","trigger":null,"writeback":false,"loop":null,"label":"confidence→activity","what":"Confidence and PMI/ISM lead real spending and hiring — the macro/demand state."},{"id":"e130","source":"DEV.gdp","target":"DEV.middleclass","sign":"+","lag":"Y","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"output→purchasing power","what":"Higher output per capita is what turns a population into a market."},{"id":"e131","source":"DEV.middleclass","target":"L0.rev","sign":"+","lag":"Q","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"purchasing power→firm revenue","what":"A population's real spending power drives multinational revenue — a $200/month economy can't buy iPhones."},{"id":"e132","source":"DEV.middleclass","target":"L4.macro","sign":"+","lag":"Q","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"consumption→demand","what":"Middle-class consumption is a huge share of end demand."},{"id":"e133","source":"DEV.institutions","target":"DEV.capital","sign":"+","lag":"Y","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"institutions→capital","what":"Rule of law and competitiveness attract global capital; money flees where the rules can change overnight."},{"id":"e134","source":"DEV.gdp","target":"DEV.capital","sign":"+","lag":"Y","evidence":"EMP-S","trigger":null,"writeback":false,"loop":"R9","label":"growth→capital","what":"Growth draws investors."},{"id":"e135","source":"DEV.middleclass","target":"DEV.currency","sign":"+","lag":"Y","evidence":"EMP-W","trigger":null,"writeback":false,"loop":null,"label":"development→real FX","what":"As a country develops, its real exchange rate tends to rise (Balassa-Samuelson)."},{"id":"e136","source":"DEV.capital","target":"DEV.currency","sign":"+","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":null,"label":"inflows→currency","what":"Capital inflows strengthen the currency; outflows sink it."},{"id":"e137","source":"DEV.capital","target":"L2.demand","sign":"+","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":"R9","label":"capital→asset demand","what":"Foreign capital buys assets, adding to net demand."},{"id":"e138","source":"DEV.currency","target":"L4.dollar","sign":"±","lag":"D","evidence":"EMP-W","trigger":null,"writeback":false,"loop":null,"label":"relative FX","what":"A country's currency strength is relative — its mirror is the dollar."},{"id":"e139","source":"L2.price","target":"DEV.capital","sign":"+","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":"R9","label":"returns→more capital","what":"Strong returns attract still more global capital — a self-feeding EM boom."},{"id":"e140","source":"DEV.currency","target":"L2.price","sign":"+","lag":"D","evidence":"EMP-S","trigger":null,"writeback":false,"loop":"B7","label":"currency→asset value","what":"For foreign investors a falling currency drags local asset values, accelerating the exit."}],"loops":[{"id":"R1","label":"Inclusion ignition","type":"reinforcing","routes_through":"price","node_path":["L1.elig","L3.idx_thresh","A1.idx_hold","L2.demand","L2.price"],"mechanism":"Crossing the inclusion threshold unlocks index and institutional buying; price rises and cap-weighting mechanically buys more, feeding further ascent. The nonlinear runway of a single name."},{"id":"B1","label":"Concentration ceiling","type":"balancing","routes_through":"price","node_path":["L2.price","L3.conc_cap","A2.conviction","L2.demand"],"mechanism":"Rising price lifts portfolio weight until it breaches the concentration cap, forcing distribution that pressures price back down — the 'cup' that caps R1."},{"id":"R2","label":"Refinancing spiral","type":"reinforcing","routes_through":"fundamentals","node_path":["L4.rates","L4.credit","L0.bs_debt","L0.opex","L0.earn"],"mechanism":"Higher rates make refinancing harder; rollover-dependent firms fall into distress, repricing risk and tightening conditions further — the bust/house-of-cards mechanism."},{"id":"B2","label":"Monetary stabilizer","type":"balancing","routes_through":"macro","node_path":["L4.infl","L4.rates","L4.liq","L2.demand"],"mechanism":"Inflation lifts rates, which drain liquidity and demand, which cools inflation — the central bank's reaction function."},{"id":"R3","label":"Cost-push tech supply","type":"reinforcing","routes_through":"macro","node_path":["L4.supply","L4.infl","L4.rates","L4.credit","L0.bs_debt"],"mechanism":"Supply scarcity lifts inflation and rates, stressing the very capex-heavy tech firms driving demand for that supply. Speculative/flagged."},{"id":"B3","label":"Discount-rate valve","type":"balancing","routes_through":"price","node_path":["L4.rates","L2.price","L2.demand"],"mechanism":"Higher rates re-rate the equity risk premium, lowering present value and demand — the equity re-rating valve."},{"id":"R4-own","label":"Deleveraging contagion — ownership fire-sale","type":"reinforcing","routes_through":"exposure","node_path":["L2.price","A3.pnl","A3.E","A3.unwind","R4.e_own"],"mechanism":"A loss consumes a fund's ownership budget; it fire-sells its 13F book, pressuring co-held names; if peers hold them too, they breach and unwind in turn — the shared-owner cascade. Validated as stress-concentrated."},{"id":"R4-ff","label":"Deleveraging contagion — crowded FF unwind","type":"reinforcing","routes_through":"exposure","node_path":["L2.price","A3.pnl","A3.E","A3.unwind","R4.e_ff"],"mechanism":"Funds deleverage a shared FF6 style simultaneously, so names with no common holders co-move — the quant-quake mechanism. Empirically a standing (not stress-gated) channel; identification in progress."},{"id":"R4-theme","label":"Deleveraging contagion — latent theme","type":"reinforcing","routes_through":"exposure","node_path":["L2.price","A3.pnl","A3.E","A3.unwind","R4.e_theme"],"mechanism":"A thematic cluster (e.g., small-cap short crowding) unwinds together even when FF6 loadings look orthogonal and owners are disjoint — validated as the dominant residual channel, and can be driven by short buy-ins."},{"id":"R4-barra","label":"Deleveraging contagion — Barra unwind","type":"reinforcing","routes_through":"exposure","node_path":["L2.price","A3.pnl","A3.E","A3.unwind","R4.e_barra"],"mechanism":"Finer-grained Barra style/industry crowding unwinds along shared loadings. Confirmed-core in the topology, not separately validated."},{"id":"R4-conc","label":"Deleveraging contagion — concentration unwind","type":"reinforcing","routes_through":"exposure","node_path":["L2.price","A3.pnl","A3.E","A3.unwind","R4.e_conc"],"mechanism":"Mega-cap / breadth crowding unwinds along the concentration factor. Confirmed-core in the topology."},{"id":"B4","label":"Window-dressing pulse","type":"balancing","routes_through":"price","node_path":["A2.report_cosmetics","L2.price"],"mechanism":"Quarter/year-end reporting fires cosmetic trades (buy winners, dump losers) that build into the date and mean-revert after it — a calendar pulse, not a step."},{"id":"B5","label":"Roadshow persuasion","type":"reinforcing","routes_through":"price","node_path":["A0.roadshow","MKT.narrative","A2.conviction","L2.demand","L2.price"],"mechanism":"The issuer's narrative lifts persuadable holders' conviction and price, lowering its cost of capital; strategic and asymmetric (works better in easy-liquidity regimes)."},{"id":"R5","label":"Gamma amplification","type":"reinforcing","routes_through":"price","node_path":["A5.gex","A5.hedge","L2.price"],"mechanism":"In a short-gamma regime, dealers hedge with the move (buy up, sell down), amplifying the price move and forcing yet more hedging — the gamma-squeeze / vol-expansion regime."},{"id":"B6","label":"Gamma damping","type":"balancing","routes_through":"price","node_path":["A5.gex","A5.hedge","L2.price"],"mechanism":"In a long-gamma regime, dealers hedge against the move (sell up, buy down), suppressing volatility and pinning price — the sign-flip counterpart to R5, crossing at the zero-gamma flip."},{"id":"R6","label":"Buyback-EPS-price","type":"reinforcing","routes_through":"fundamentals","node_path":["L2.price","A0.buyback","L0.share_count","L0.ratios","L1.rel_val","L2.demand"],"mechanism":"Rising price / incentives drive more buyback authorization, adding demand and cutting share count so EPS rises, lifting relative value and price. Reinforcing and pro-cyclical — a fundamentals-routed writeback loop."},{"id":"R7","label":"Short squeeze","type":"reinforcing","routes_through":"borrow","node_path":["L2.price","SB.recall","SB.buyin"],"mechanism":"Rising price triggers margin pressure and lender recall, forcing covers that buy regardless of thesis and push price up further. Couples to R5 (call-buying -> short gamma) and to R4-theme (crowded-short cluster squeeze)."},{"id":"R8","label":"Activist writeback","type":"reinforcing","routes_through":"fundamentals","node_path":["L2.price","A6.accumulate","A6.disclose","A6.intervene","L0.bs_debt","L1.rel_val"],"mechanism":"Undervaluation attracts an activist whose intervention edits L0 (buybacks, spinoffs, leverage, strategy), re-rating relative value and price. A slow, high-leverage fundamentals-routed loop — reinforcing if the intervention creates value, balancing if it destroys it."},{"id":"R9","label":"Global capital attraction","type":"reinforcing","routes_through":"price","node_path":["DEV.capital","L2.demand","L2.price"],"mechanism":"Growth and strong fundamentals attract global capital; the inflows buy assets and lift prices; rising returns attract still more capital — an emerging-market boom that feeds on itself."},{"id":"B7","label":"Sudden stop / capital flight","type":"balancing","routes_through":"price","node_path":["DEV.capital","DEV.currency","L2.price"],"mechanism":"When returns or the currency turn, foreign capital flees; the outflow weakens the currency and drops asset prices, triggering more flight — a brutal stabilizer that violently ends an over-attracted boom (the 1997-style sudden stop)."}],"clusters":[{"id":"SOCIETY","label":"Society & people","order":-2,"summary":"The deepest root: people themselves — how many, how old, how educated, how skilled, how confident. Demographics and human capital set an economy's labour, demand and long-run growth before any market opens.","n":7,"status":{"validated":0,"in_progress":0,"blocked_data":0,"topological":7}},{"id":"DEVELOPMENT","label":"Development & global capital","order":-1,"summary":"How a society's people translate into economic development — GDP per capita, purchasing power, institutions and currency — and how that draws or repels the global capital (FDI, EM-vs-DM allocation, sovereign funds) that prices its assets.","n":5,"status":{"validated":0,"in_progress":0,"blocked_data":0,"topological":5}},{"id":"EXO","label":"Exogenous shocks","order":0,"summary":"True sources with no upstream cause — weather, geopolitics, customer option flow.","n":2,"status":{"validated":0,"in_progress":0,"blocked_data":0,"topological":2}},{"id":"MACRO","label":"Macro drivers","order":1,"summary":"Commodities, supply chain, growth, the dollar and the news cycle that feed the firm and sentiment.","n":7,"status":{"validated":0,"in_progress":0,"blocked_data":0,"topological":7}},{"id":"MONETARY","label":"Monetary core","order":2,"summary":"SCC-MON: rates ↔ inflation ↔ liquidity — the balancing loop the central bank runs.","n":3,"status":{"validated":0,"in_progress":0,"blocked_data":0,"topological":3}},{"id":"CREDIT","label":"Credit / refinancing","order":2,"summary":"SCC-CREDIT: rates ↔ refinancing ↔ distress — the reinforcing debt spiral.","n":2,"status":{"validated":0,"in_progress":0,"blocked_data":0,"topological":2}},{"id":"FIRM","label":"Firm & cross-section","order":3,"summary":"L0 accounting primitives, derived ratios, factor loadings and relative-value ranking.","n":14,"status":{"validated":0,"in_progress":0,"blocked_data":0,"topological":14},"link":{"label":"Open the Accounting & XBRL Explorer","url":"accounting.html"}},{"id":"ISSUER","label":"Issuer","order":4,"summary":"The company as an agent — roadshow persuasion and buybacks that edit share count.","n":2,"status":{"validated":0,"in_progress":0,"blocked_data":0,"topological":2}},{"id":"ALLOCATION","label":"Allocation & sentiment","order":4,"summary":"Benchmark-relative funds, retail sentiment and the narrative they act on.","n":4,"status":{"validated":0,"in_progress":0,"blocked_data":0,"topological":4},"link":{"label":"Market Backstage: who the players are","url":"backstage.html"}},{"id":"ACTIVIST","label":"Activist","order":4,"summary":"Stake accumulation, 13D disclosure and intervention that writes back to fundamentals.","n":3,"status":{"validated":0,"in_progress":0,"blocked_data":0,"topological":3}},{"id":"PRICE","label":"Price & indexing","order":5,"summary":"SCC-NAME: demand → price → cap-weight → concentration cap. The hub and the ascent/ceiling loops.","n":6,"status":{"validated":0,"in_progress":0,"blocked_data":1,"topological":5}},{"id":"DELEVERAGING","label":"Deleveraging contagion","order":6,"summary":"SCC-DELEV multiplex: a P&L shock breaches an exposure sleeve and unwinds it across every name sharing that layer (ownership / factor / theme).","n":10,"status":{"validated":2,"in_progress":1,"blocked_data":0,"topological":7}},{"id":"GAMMA","label":"Dealer gamma","order":6,"summary":"SCC-GAMMA: net dealer gamma ↔ hedging ↔ price, flipping between amplify (R5) and damp (B6).","n":5,"status":{"validated":0,"in_progress":0,"blocked_data":5,"topological":0},"link":{"label":"Open the Dealer Gamma explainer (interactive)","url":"backstage.html"}},{"id":"BORROW","label":"Short / borrow","order":6,"summary":"Borrow supply, fees, short interest and the forced-cover squeeze loop.","n":6,"status":{"validated":0,"in_progress":0,"blocked_data":0,"topological":6},"link":{"label":"Market Backstage: short/borrow mechanics","url":"backstage.html"}}],"acct_url":"accounting.html","backstage_url":"backstage.html","top_story":"Every price in the market begins as one of two things: a shock nobody chose, or a slow fact on a company's books. Weather and geopolitics — the graph's true sources, with nothing upstream of them — jolt commodities; commodities and stressed supply chains feed inflation; inflation summons the central bank, and interest rates, the single most-connected lever in the whole system, ripple outward — draining liquidity, raising the interest bill on floating-rate debt, tightening credit, and re-pricing every future dollar of earnings. Meanwhile the firm grinds on as an accounting machine: transactions become revenue and costs, revenue minus costs becomes earnings, earnings become ratios, and ratios become a rank against peers. None of this is price yet. Price appears only when players act on it.\n\nA cast of agents turns those facts into flows, each bound by a different constraint. Rule-forced index funds must buy whatever crosses into the benchmark. Benchmark-relative funds tilt toward relative winners and can be talked into a story. Retail chases momentum and headlines. Levered funds size to a risk budget and dump a whole sleeve the instant it breaches. Dealers hedge options and take no view at all. Companies bid for their own shares and stage roadshows; activists buy in and rewrite the company from the inside. All of this buying and selling sums into net demand, and net demand moves price. Price is the hub — the output of the forward machine and the input to every loop that bends back on it.\n\nThose loops are the whole drama. Reinforcing loops amplify: a stock crosses into the index and cap-weighting buys more of it precisely because it rose (Nvidia's runway); buybacks cut the share count and lift EPS, which lifts price, which funds more buybacks (Apple); a crowded short gets recalled and forced buy-ins drive it higher (GameStop, Volkswagen); a levered fund's loss forces it to fire-sell an exposure sleeve, breaking every name that shares it (the 2007 quant quake, Archegos). Balancing loops fight back: rate hikes cool the boom, a name hitting its ~10% concentration cap forces holders to trim it no matter how good it is, long-gamma dealers pin the tape. The market booms when the amplifiers dominate and busts when a shock flips a balancing loop into a reinforcing one — when the same rate hike meant to stabilize instead detonates the refinancing spiral and the deleveraging cascade. That is the entire atlas: shocks and fundamentals, routed through players into price, then bent back on themselves by loops that either steady the system or run away with it.","systemStories":{"EXO":{"id":"EXO","story":"The unmoved movers — weather, climate and geopolitics — the only nodes with nothing pointing into them. They are pure sources: a drought or a war moves commodity prices with no market cause, and that jolt then travels down every channel the market has. Everything downstream is, in some sense, the market metabolizing shocks it never chose.","tension":"The dilemma is that these shocks are un-hedgeable and un-forecastable by construction — the system can only absorb them after the fact, never head them off. A shock is simultaneously a random accident and, because it feeds inflation and rates, the trigger that ends whatever calm regime the boom machinery was relying on.","example":"Russia's February 2022 invasion of Ukraine spiked oil past $120 and sent wheat limit-up overnight — an in-degree-zero event that within months showed up as ~9% CPI, a global hiking cycle, and re-priced equities on the other side of the world.","aligns_with":["MACRO","MONETARY","CREDIT"],"opposes":["ISSUER"]},"MACRO":{"id":"MACRO","story":"The weather system of fundamentals — commodities, supply-chain cost and availability, growth and confidence, the dollar, and the attention economy's news cycle. It is the belt that carries exogenous shocks into the firm (commodities into COGS, demand into revenue, a strong dollar into shrunken foreign earnings) and into inflation, and it feeds the retail crowd's mood through the news it over-covers on the hot theme.","tension":"Growth is the friend that becomes the enemy: the same booming demand that lifts revenue also tightens supply and lifts commodity prices, feeding the inflation that summons the rate hikes that end the expansion. The dollar makes it worse — its response to rates is genuinely regime-dependent (the atlas's top unresolved sign), so a strong-dollar 'good news' rate move can quietly carve billions off multinationals' translated sales.","example":"2022 — war-driven energy and food plus post-COVID supply snarls (memory and chips scarce, freight blown out) drove CPI to ~9%, while a surging dollar simultaneously forced Microsoft and Apple to warn on FX-translated revenue: cost-push and dollar-drag hitting the P&L at once.","aligns_with":["EXO","MONETARY","FIRM","CREDIT","ALLOCATION"],"opposes":["ISSUER"]},"MONETARY":{"id":"MONETARY","story":"The central bank's control loop — rates, inflation and system liquidity locked in a balancing cycle (inflation lifts rates, rates drain liquidity and demand, which cools inflation). Rates are the highest-out-degree node in the entire graph: one lever that drains liquidity, raises floating interest expense, tightens credit, re-rates the equity discount, and shrinks buybacks all at once.","tension":"It is a stabilizer built to end booms, but its only tool is a blunt one — the same rate hike that cools prices also detonates the credit spiral and forces the deleveraging cascade. The cure and the crash come out of the same instrument, and the bank can never tell in advance which it just administered.","example":"The Fed's 2022–23 hiking cycle (roughly 0% to 5.5%) did cool inflation, but it also crushed long-duration tech multiples and snapped Silicon Valley Bank, whose duration-loaded balance sheet couldn't survive the very rates meant to restore order.","aligns_with":["EXO","MACRO","CREDIT","DELEVERAGING"],"opposes":["PRICE","ISSUER","ALLOCATION"]},"CREDIT":{"id":"CREDIT","story":"The refinancing spiral — corporate debt (fixed vs. the live-wire floating tranche) and the conditions under which it can be rolled over. When rates rise and credit tightens, firms that borrow to service old debt can't roll it; distress reprices risk, which tightens conditions further, which distresses more firms. It is the market's house-of-cards mechanism, and unlike most loops it is reinforcing on the way down.","tension":"Leverage is cheap rocket fuel in easy money and a noose in tight money — the exact same debt that juiced returns on the way up becomes the detonator on the way down. The floating tranche is the trap door: it looks identical to fixed debt until the day rates reprice it against you.","example":"March 2023 — Silicon Valley Bank and the regional-bank run: a pure rate-driven rollover/duration break where losses on 'safe' assets forced a fire-sale, and fear alone tightened funding for every peer that shared the profile.","aligns_with":["MONETARY","MACRO","DELEVERAGING"],"opposes":["ISSUER","PRICE"]},"FIRM":{"id":"FIRM","story":"The engine room — the accounting graph where transactions become revenue and costs, earnings fall out of the income-statement identity, and ratios and factor loadings turn a single company's books into a rank against its peers. This rank, not the raw fundamentals, is the signal allocation actually trades on; the loadings computed here also secretly define the wiring of the contagion network.","tension":"Fundamentals move on a quarterly clock while price moves every second, so the whole market is a running bet on whether price will reconnect to this substrate or float free of it. Worse, the substrate isn't even fixed — rank is relative (a firm can improve and still fall if peers improve more), and the writeback loops let buybacks and activists edit the very object being priced.","example":"Nvidia through 2023–24: the price ran on the AI story well ahead of the books, then the accounting engine actually delivered — data-center revenue tripling — and fundamentals sprinted to catch a price that had been called a bubble.","aligns_with":["MACRO","ALLOCATION","ISSUER","ACTIVIST","PRICE"],"opposes":["MONETARY","CREDIT"]},"ISSUER":{"id":"ISSUER","story":"The company as an agent rather than a priced object — persuading the market through guidance and roadshows, and bidding for its own shares. Buybacks are a persistent pro-cyclical demand source that also cut the share count by identity, mechanically lifting EPS even with flat earnings — a rare channel that reaches back and edits the fundamentals.","tension":"It is the ultimate fair-weather bid: buybacks are largest exactly when price is high and money is cheap, and they shrink or pause (rate hikes, earnings blackouts) precisely when the stock most needs support. The company buys high and vanishes low — and the roadshow can inflate a narrative well past what the books justify.","example":"Apple returning roughly $90B a year via buybacks through the late 2010s, mechanically lifting EPS and reliably bidding its own stock — then buyback authorizations pulling back across the market when rates spiked in 2022 and the fair-weather bid went quiet.","aligns_with":["PRICE","FIRM","ALLOCATION","ACTIVIST"],"opposes":["MONETARY","CREDIT"]},"ALLOCATION":{"id":"ALLOCATION","story":"The persuadable money — benchmark-relative funds that tilt toward relative winners and can be moved by a story, plus extrapolative retail that chases momentum and headlines, all acting on the prevailing narrative. This is where stories become flows; a quarter-end window-dressing pulse adds a calendar wobble as funds buy recent winners to 'look smart' and dump losers before the photo.","tension":"It is permanently torn between conviction (buy cheap relative value) and momentum (chase what's already rising) — value versus trend inside the same book. It amplifies enthusiastically on the way up, yet is force-sold when a rate shock stresses leverage servicing, and trimmed against its will when a winner breaches the concentration cap.","example":"2020–21 — ARK/Cathie Wood inflows and a retail army chasing pandemic-era winners and meme names on pure momentum and narrative, then the brutal 2022 reversal when rising rates forced the whole extrapolative trade to unwind.","aligns_with":["PRICE","FIRM","ISSUER","MACRO","GAMMA"],"opposes":["MONETARY"]},"ACTIVIST":{"id":"ACTIVIST","story":"The intervention money — quietly accumulate a stake below the 5% line, fire the mandatory 13D on crossing it, then edit the company directly: force buybacks, spinoffs, added leverage, or management change. With buybacks, it is one of only two channels that write back to the fundamentals level; the disclosure alone moves price as the market prices the expected value of the intervention before anything is actually done.","tension":"The same tool re-rates or wrecks — the loop is reinforcing when the intervention creates value and balancing when it destroys it, and which one you get isn't known until years later. The 13D also mobilizes every other holder into a proxy fight, so the campaign's outcome hinges on persuasion as much as on being right.","example":"Carl Icahn's 2013 Apple stake and very public push for a far larger buyback — a disclosure that jolted the stock and directly reshaped Apple's capital-return policy, activism reaching through the issuer to rewrite the books.","aligns_with":["ISSUER","FIRM","PRICE","ALLOCATION"],"opposes":[]},"PRICE":{"id":"PRICE","story":"The hub and the output. Every player's flow sums into net demand here, demand moves price, and then price feeds back on itself: cap-weighted indexers mechanically buy more of what rises (the reinforcing inclusion-ignition runway) until a name grows past its portfolio-weight ceiling, at which point holders must trim it regardless of quality (the balancing concentration cap). One node contains both the accelerator and the brake of the single-name story.","tension":"A civil war lives inside this system — reinforcing R1 says success breeds buying, balancing B1 says success breeds forced selling, and the very same cap-weight logic that ignites a winner is what ultimately caps it. Passive indexing is thus simultaneously the market's biggest momentum amplifier and its hard ceiling.","example":"Nvidia's 2023–24 ascent into cap-weighted index and institutional ignition, followed by the S&P and Nasdaq-100 concentration-cap rebalances that forced mechanical trims as its weight blew through the limits — R1's runway meeting B1's cup in one name.","aligns_with":["ISSUER","ALLOCATION","FIRM","GAMMA","BORROW"],"opposes":["MONETARY","DELEVERAGING","CREDIT"]},"DELEVERAGING":{"id":"DELEVERAGING","story":"The crash-propagation machine — a multiplex of coupled networks over the same stocks. A price drop hits a levered fund's book, consumes the risk budget on the specific exposure that lost, and forces it to dump that whole sleeve, pressuring every name sharing that dimension — co-owners (13F), factor twins (FF6/Barra), thematic cousins — whose own holders then breach and dump in turn. It is k separate graphs, not one blended adjacency, and the ownership and latent-theme layers are empirically validated as stress-concentrated channels.","tension":"Diversification is the trap: the shared exposures that looked prudent in calm are the exact transmission wires in a panic. It is nearly silent day-to-day and violent in stress, because funds sell what they can, not what they should — so a shock lands hardest on the most liquid, most crowded, most 'sensible' positions.","example":"August 2007 quant quake — funds with no common holdings crashed together purely because they shared factor loadings and deleveraged the same styles at once; 2021 Archegos repeated it through ownership and counterparty, one book's forced liquidation cascading through every swap-held name.","aligns_with":["MONETARY","CREDIT","BORROW","GAMMA"],"opposes":["PRICE","ISSUER"]},"GAMMA":{"id":"GAMMA","story":"The dealer-hedging machine sitting right on top of the price sink. Dealers stay delta-neutral against customer option flow and take no view; the sign of their aggregate gamma decides whether their hedging pours fuel on moves (short gamma: buy up, sell down) or smothers them (long gamma: sell up, buy down, pinning price toward high-open-interest strikes). It flips at the zero-gamma level.","tension":"It is Jekyll and Hyde around a single threshold — a volatility-suppressing stabilizer on one side of the flip, a squeeze accelerant on the other, and the flip can happen intraday. Worse, from the outside you often can't tell which regime you're in without the options chain, so the same machinery is quietly pinning one week and violently amplifying the next.","example":"January 2021 GameStop — a wall of retail call-buying left dealers deeply short gamma, forcing them to buy into every up-tick and pour fuel on the melt-up; its mirror image is the quiet long-gamma 'pinning' that glues indices to round strikes into monthly options expiry.","aligns_with":["PRICE","BORROW","ALLOCATION","DELEVERAGING"],"opposes":[]},"BORROW":{"id":"BORROW","story":"The short-side plumbing — lendable-share availability gates whether a short can exist at all (no locate, no short), fees are the negative carry that shrinks the viable short set, and short interest with days-to-cover measures squeeze fragility. When price rises, lender recalls and margin force buy-ins that purchase the stock regardless of thesis, and across a crowded-short cluster those forced covers become short-side factor contagion.","tension":"Shorts are the market's skeptics — they lean against overvaluation and pull price back toward fundamentals — yet the borrow mechanics can flip them into the most violent UP-amplifier the market has. Betting against a stock can force you to buy it: the bear becomes the bull's fuel the moment the recall notice arrives.","example":"Volkswagen, October 2008 — short interest exceeded the borrowable float, and recalls plus forced buy-ins briefly made VW the most valuable company on earth; GameStop 2021 rhymed with short interest north of 100% of float, its squeeze coupled to the dealer gamma squeeze for a compound melt-up.","aligns_with":["GAMMA","DELEVERAGING","PRICE"],"opposes":["ISSUER"]},"SOCIETY":{"id":"SOCIETY","story":"The root layer: people. Before any factor return or central-bank decision, an economy is a population with an age structure, a set of skills, a labour force, wages, and a mood. This system holds the slowest, most powerful variables in the whole atlas — demographics and human capital move over decades but set the ceiling everything above them operates under. It answers the question the macro layer takes as given: why does this economy grow, consume and save the way it does?","tension":"These are the slowest variables meeting the fastest market. Demographics and education shift over generations, yet they underlie asset prices that reprice in milliseconds — so the market chronically under-weights them until a Japan-style aging or an India-style dividend becomes impossible to ignore. Society sets the tide; the market trades the waves and forgets the tide is there.","example":"Japan's aging population underneath three decades of deflation, and the pre-Arab-Spring youth-unemployment bulge that turned into 2011 political upheaval, are both cases where the 'soft' society layer was the hard driver the macro models missed.","aligns_with":["DEVELOPMENT","MACRO"],"opposes":[]},"DEVELOPMENT":{"id":"DEVELOPMENT","story":"How the society layer converts into prosperity and into a magnet (or repellent) for global capital. GDP and per-capita income, the middle class and its purchasing power, institutions and the rule of law, the currency, and ultimately global capital allocation — this system is the bridge from 'who the people are' to 'what the economy produces and who invests in it.' It's where demographics and human capital become the concrete numbers an allocator underwrites, and where the atlas's root layer plugs into asset demand and prices.","tension":"Development is a boom-bust attractor. Rising fundamentals draw capital, which lifts prices and validates the thesis — until the flows overshoot, the currency over-appreciates, and a shock triggers a sudden stop that reverses everything faster than the fundamentals changed. The same openness that funds growth is the channel for capital flight; countries want the inflow and dread the exit.","example":"The 1997 Asian crisis: years of attracted capital reversed in a single year (~$100bn collapse in flows to Asia), spreading by contagion across regions — development-as-magnet flipping to development-as-victim overnight.","aligns_with":["SOCIETY","PRICE"],"opposes":[]}},"archetypeSketches":{"A0":{"id":"A0","who":"The company itself, wearing its market face: the CEO, the CFO, and the Investor Relations team. Not the object being priced but a player that talks back — the firm as an agent that stands on stage and argues for its own valuation.","wants":"A low cost of capital and a high share price, because the share price is a currency it spends — on acquisitions paid in stock, on employee comp, on cheap debt collateralized by a rich equity. It doesn't chase a return; it chases a re-rating of itself.","constrained_by":"Cost of capital, with its own stock price as the binding currency. Every move is judged by whether it makes the firm's paper cheaper to raise and richer to spend.","behavior":"Two signature moves. First, persuasion: roadshows, guidance, investor days — deliberately shaping the narrative to move the persuadable holders (A2 and A4), a strategic edge it actively optimizes. Second, direct buying: it bids for its own shares. Buybacks put a persistent floor under the price AND shrink share count, mechanically lifting EPS even with flat earnings — the reinforcing R6 buyback-EPS loop. It buys most aggressively at highs (pro-cyclical, the opposite of value timing) and goes dark in earnings blackout windows, punching a calendar hole in its own bid.","famous_example":"Apple, the buyback colossus — well over $700B repurchased across the 2010s-2020s, steadily retiring shares to compound EPS. On the persuasion side, Tesla under Elon Musk, whose narrative and guidance became a price driver in their own right.","dilemma":"Its bid is fair-weather. The R6 buyback loop is pro-cyclical — it buys high and shrinks purchases exactly when rates rise and credit tightens (the SCC-CREDIT core), so its price support evaporates at the precise moment the market needs a buyer. And its persuasion only works in easy-liquidity regimes; when fundamentals dominate, the roadshow stops moving anyone. It is loudest when it matters least."},"A1":{"id":"A1","who":"The passive giants — Vanguard, BlackRock's iShares, State Street. Trillions of dollars run by a rulebook, not a view. The purest rule-forced money in the market: it holds what the index says to hold, in the weight the index says to hold it.","wants":"Not to win — to match. Its entire goal is to replicate a benchmark's return as closely as possible. 'Success' is invisibility: zero daylight between the fund and the index.","constrained_by":"Tracking error versus its benchmark. Any deviation from index weights is a failure by definition, so it has no discretion to buy cheap or sell dear.","behavior":"It mechanically buys what rises and sells what falls, because cap-weighting means a rising stock's index weight rises and the tracker must buy more to stay matched — the reinforcing R1 'inclusion ignition' loop, a momentum machine with no opinion and no brakes. Index inclusion is a binary, forcing event: cross the threshold and every tracker on Earth must buy you at once; get deleted and they must all sell. Reconstitution days concentrate these forced trades onto the calendar.","famous_example":"Tesla's December 2020 addition to the S&P 500 — roughly $80B of purely mechanical, price-insensitive buying forced by index rules on a single day. The annual Russell reconstitution is the same effect on a clock.","dilemma":"It is structurally condemned to buy high and sell low. Having no judgment, it amplifies every bubble it cannot recognize and dumps every fallen name at the bottom. Worse, its forced trades are perfectly predictable, so faster players front-run reconstitution and inclusion — the rule that guarantees fidelity to the index also guarantees it gets picked off at the turn. It only stops feeding R1 when concentration caps (B1) finally bite at the very top."},"A2":{"id":"A2","who":"The long-only active manager and the real-money institution behind him — the big mutual fund stock-picker, the pension and insurance allocators. Paid to beat a benchmark, terrified of trailing it. The persuadable holder at the center of the market's opinion.","wants":"Relative outperformance — to finish the year ahead of the index it's measured against — while keeping the assets from walking out the door. Its return target is always relative, never absolute.","constrained_by":"Relative performance versus benchmark, coupled to redemption flow. Underperform and money flees; the fear of both governs every position.","behavior":"It closet-indexes — hugging the benchmark it's paid to beat — then tilts toward relative winners to eke out an edge. At quarter- and year-end it window-dresses: buying up the recent winners so they appear in the holdings report ('look how smart we are') and dumping the losers before the snapshot — the transient B4 pulse that builds into the reporting date and reverses after. It is the prime target of A0's roadshow, updating its conviction on the story because it needs a justification for what it holds.","famous_example":"The generation of active managers who sat out Nvidia or the mega-cap tech leaders and bled redemptions for it — the textbook 'career risk' of deviating from the index. Window dressing is a documented quarter-end footprint across the mutual-fund complex.","dilemma":"Career risk is its cage. Adding real value requires deviating from the benchmark — but deviating is exactly what risks the underperformance that triggers redemptions. So the player hired to beat the index spends its life clinging to it, and window-dresses into the winners at quarter-end precisely when they are most extended and most likely to reverse."},"A3":{"id":"A3","who":"The levered hedge fund — the multi-strat pod shops and long/short equity desks. Millennium, Citadel, the Balyasny-style platforms; the quants at AQR and the old Goldman GEO. Smart, sophisticated, and — the crucial fact — running other people's money on borrowed money against a hard risk budget.","wants":"Absolute return per unit of risk — Sharpe, not beta. It wants uncorrelated alpha it can lever up, extracting return from spreads while staying dollar-neutral to the market.","constrained_by":"VaR, margin, and drawdown limits — a whole exposure vector, one budget per risk dimension (ownership, factor, theme, liquidity, counterparty). It doesn't carry one risk number; it carries many, and a loss lands on specific ones.","behavior":"It sizes every trade to the risk budget. When a shock breaches one component of the exposure vector, it doesn't trim the book uniformly — it deleverages the specific breaching sleeve, dumping every name that loads on that dimension. That forced selling pressures other funds crowded on the same sleeve, breaching THEIR budget, triggering THEIR unwind — the reinforcing R4 deleveraging-contagion family. Contagion travels through shared ownership (13F fire-sale) OR through shared factor loadings even between funds with zero common holdings.","famous_example":"The August 2007 Quant Quake — AQR, Goldman's Global Equity Opportunities and a dozen quant funds unwound the same crowded factor book in the same 72 hours despite holding different stocks, because they shared loadings, not positions. LTCM in 1998 and Archegos in 2021 are the counterparty-cascade (e_ctpy) versions of the same wound.","dilemma":"The risk system that keeps each fund alive individually is the exact wiring that synchronizes the crash collectively. Deleveraging on a breach is rational — mandatory, even — for one fund; when every crowded fund does it at once it becomes the fire-sale. And a fund can look perfectly diversified on its holdings while being lethally crowded on a factor it can't see — so the very act of prudent, individual risk control manufactures systemic contagion."},"A4":{"id":"A4","who":"The crowd — retail. The Robinhood account, the WallStreetBets thread, the buy-and-hold saver and the leveraged day-trader (who differ only by turnover and whether they hold overnight). Sentiment-driven money with the highest emotional beta in the market and, at the levered end, a debt payment due.","wants":"To ride the move — momentum, the story, the lottery ticket. It buys what's going up because it's going up, chasing the extrapolation rather than the value.","constrained_by":"Sentiment on the way in, and leverage servicing on the way out. Its demand is set by the mo
