od; its forced selling is set by margin and rate shocks that make it liquidate regardless of conviction.","behavior":"Extrapolative, momentum-chasing demand — it piles in as price rises, updates hard on news and narrative (the target of A0's roadshow), and is strongest exactly at tops. Then a rate shock or margin call flips it: it's forced to sell to service debt, dumping at the bottom. Its call-buying is the fuel that hands options dealers (A5) short gamma and lights short squeezes (A3 shorts forced to cover).","famous_example":"GameStop, January 2021 — the WallStreetBets retail crowd buying shares and calls in a coordinated frenzy, igniting one of history's great squeezes. The broader 2021 retail call-buying wave is the same signature at market scale.","dilemma":"It is pro-cyclical on both ends: strongest as a buyer at the top, weakest and force-liquidated at the bottom — buying high and selling low as a structural feature, not a mistake. And its enthusiasm is not self-contained; the call-buying that expresses its optimism is precisely what tips dealers short-gamma and squeezes the shorts, so the crowd unknowingly builds the amplifier that later blows up on it."},"A5":{"id":"A5","who":"The options market maker — Citadel Securities, Susquehanna (SIG), Optiver, Wolverine. The house that takes the other side of everyone's option trade. It is not betting on direction; it is a plumbing operation earning the spread and immediately hedging away any view.","wants":"The bid-ask spread and nothing else — to make markets in options and pocket the edge while carrying zero directional exposure. It genuinely does not care where the stock goes, only that it stays hedged.","constrained_by":"Delta-neutrality. It must continuously hedge the directional risk of the options it's been forced to warehouse from customer flow, buying or selling the underlying to stay flat — it has no choice about hedging, only about which way.","behavior":"Its hedging flow flips sign on its aggregate gamma (GEX). When customers are net buyers of options, dealers are short gamma: they must buy as price rises and sell as it falls — hedging WITH the move — the reinforcing R5 amplification that produces squeezes and vol explosions. When dealers are long gamma (typical of index put-hedging in calm markets), they sell rallies and buy dips — hedging AGAINST the move — the balancing B6 that pins price to high-open-interest strikes and suppresses volatility. Crossing the zero-gamma flip level switches the whole regime.","famous_example":"GameStop and the 2021 meme complex — retail call-buying drove dealers deeply short gamma, and their forced hedging (buy higher, buy higher) compounded the squeeze (R5 stacking on the R7 short-cover). The mirror image is a calm SPX expiration week, where dealer long gamma pins the index to the big strikes.","dilemma":"The player with no opinion is the single largest amplifier — or damper — in the market, and which one it is depends entirely on which side of the zero-gamma line it happens to sit. When short gamma, it is forced to buy strength and sell weakness, pouring fuel on a fire it never chose to light; its rigorous neutrality at the position level produces violent destabilization at the market level."},"A6":{"id":"A6","who":"The activist — Elliott Management (Paul Singer), Carl Icahn, Pershing Square (Bill Ackman), Third Point (Dan Loeb), Trian (Nelson Peltz). Usually an A3 hedge fund in a special mode: instead of trading the gap between price and value, it buys a stake and then forces the firm to change so the gap closes.","wants":"Return through intervention, not relative value. It doesn't wait for the market to re-rate a cheap company; it accumulates enough ownership to reach in and rewrite the company so the re-rating is forced.","constrained_by":"That its return must come from successfully editing the firm rather than from a valuation view — an intervention that fails destroys the thesis, because there's no passive margin of safety underneath it.","behavior":"It accumulates quietly, often below the 5% line, then discloses on the 13D crossing — an event trigger that pops the stock as the market prices in expected intervention value. Then comes its unique move: it edits Layer-0 fundamentals directly — forcing buybacks, spinoffs, added leverage, a strategy pivot, a CEO's head — a WRITEBACK that changes the object being priced, not just the price (the slow, quarters-long R8 loop routing feedback through fundamentals). It mobilizes A2 holders and proxy advisors to win the vote, and fights the issuer (A0), whose roadshow counter-messages against it.","famous_example":"Elliott's relentless campaign machine (AT&T, Twitter, and dozens more); Icahn's proxy wars; Ackman's public brawls; Trian pushing P&G. Third Point's 2012 campaign at Yahoo — replacing the CEO and reshaping the board — is a clean picture of the writeback in action.","dilemma":"It is the only player that changes the company rather than the quote — but that same power cuts both ways: the R8 writeback loop is reinforcing if the intervention creates value and balancing (destructive) if it doesn't, and the outcome isn't settled by markets but by a proxy fight it can lose. It operates on a quarters-long fundamentals clock while everyone else trades on price in real time, and it must win a public narrative war against the very management it's trying to overrule."}},"loopStories":{"R1":{"id":"R1","framing":"AMPLIFIER (reinforcing): a self-feeding runway where a name's own rise recruits more forced buyers, with no internal brake until it slams into the concentration ceiling (B1).","example":"Tesla's December 2020 S&P 500 inclusion. Four profit quarters cleared the eligibility gate; S&P's November announcement unlocked a captive pool of index and closet-index buyers who HAD to own it, forcing roughly $80B of mechanical purchases into a single settlement. Cap-weighting then bought more of what was rising, and Tesla ran about +70% from announcement to inclusion day on flows that had nothing to do with cars sold. This is the same ignition that lifts any name crossing into the S&P/Nasdaq-100 or up a liquidity tier."},"B1":{"id":"B1","framing":"STABILIZER (balancing): the 'cup' that caps R1 — the bigger a winner gets, the harder rule-bound holders are forced to sell it, converting size itself into a headwind regardless of quality.","example":"The Nasdaq-100 'special rebalance' of July 2023. The Magnificent Seven (Apple, Microsoft, Nvidia, Amazon, Alphabet, Meta, Tesla) had swollen so far that the fund had breached diversification limits (the top holdings collectively near the 48% cap), and Nasdaq forced an off-cycle trim of the megacaps' weights. Same mechanic constrains Apple and Nvidia against the RIC 25%/5% diversification rules inside S&P 500 funds: past a weight ceiling, holders distribute into strength. It is the exact opposing force to R1's ascent."},"R2":{"id":"R2","framing":"AMPLIFIER (reinforcing): the 'house of cards' — each firm that can't roll its debt defaults, which reprices risk and tightens credit for the next borrower, so distress feeds distress through the fundamentals level.","example":"The 2008 short-term funding freeze. Lehman Brothers and countless firms lived by rolling overnight repo and commercial paper; when rates and risk-aversion spiked, the CP market seized, rollover failed, and forced fire-sales repriced everyone still dependent on the same window. The milder 2022-23 version buried the zombies that had feasted on zero rates — Bed Bath & Beyond and WeWork both died unable to refinance once the cost of carry jumped. This is the bust engine that the monetary stabilizer (B2) sets off as collateral damage."},"B2":{"id":"B2","framing":"STABILIZER (balancing): the central bank's own reaction function — inflation lifts rates, rates drain liquidity and demand, demand cools inflation — a deliberate, long-lagged thermostat, not a market accident.","example":"The Volcker disinflation, 1979-1982. Facing ~14% inflation, the Fed drove the funds rate toward 20%, crushed liquidity and demand into a deep recession, and pulled inflation back under 3%. The 2022-23 hiking cycle (0 to 5.25%) ran the identical loop against post-COVID inflation. Its side effect — draining the liquidity that fed asset demand — is exactly what ignites the refinancing spiral (R2) and re-rates equities through B3."},"R3":{"id":"R3","framing":"AMPLIFIER (reinforcing, speculative/flagged): a cost-push squeeze where scarce inputs lift inflation and rates, and the higher rates then punish the very capex-heavy firms whose buildout created the scarcity.","example":"The AI memory/HBM shortage of 2024-2026 (memory prices roughly 3x year-on-year). Hyperscaler and AI-datacenter demand drained the supply of high-bandwidth memory, pushing input costs — and inflation in anything with a chip in it — higher, which pressures rates, which raises the financing cost of the same debt-funded GPU buildout. The 2021 pandemic auto-chip shortage was the earlier rhyme: scarcity feeding goods inflation. The graph flags this loop as real in mechanism but unconfirmed in magnitude."},"B3":{"id":"B3","framing":"STABILIZER (balancing): the discount-rate valve — a higher risk-free rate mechanically shrinks the present value of future cash flows, capping valuations without anyone deciding to sell.","example":"The 2022 duration repricing. As the 10-year yield climbed from ~1.5% toward ~4%, the longest-duration equities — unprofitable tech, ARKK-style growth, the far-off-cash-flow names — were re-rated hardest, and the Nasdaq fell about 33% on the year with barely any change to near-term earnings. The move was arithmetic, not sentiment: the same rate hikes that B2 uses to fight inflation flow straight into the equity discount rate here."},"R4-own":{"id":"R4-own","framing":"AMPLIFIER (reinforcing): the shared-owner cascade — a levered fund's loss forces it to dump its actual book, and every name it co-holds gets pressured together; empirically stress-concentrated (own coefficient higher in stress than calm).","example":"The Archegos implosion, March 2021. Bill Hwang's hyper-levered swaps book (ViacomCBS, Discovery, Baidu, GSX, Tencent Music, Farfetch) took a mark-to-market hit, and prime brokers — Credit Suisse and Nomura eating billions, Morgan Stanley and Goldman escaping faster — liquidated the concentrated positions into the same days. Names with no fundamental link fell together purely because one blown-up holder owned them all. This is the 13F-overlap channel the project validated as its strongest stress-gated result."},"R4-ff":{"id":"R4-ff","framing":"AMPLIFIER (reinforcing): the quant-quake mechanism — funds sharing no positions but the same factor loadings delever the same style at once, so 'unrelated' stocks co-move; empirically a standing channel, present even in calm.","example":"The Quant Quake of August 6-9, 2007. Statistical-arb books at Goldman's Global Equity Opportunities, AQR and peers held largely different names but the same value/momentum bets; when one giant started delevering, the shared factor got hammered, forcing others to delever the same factor in a doom loop — then it violently snapped back within days once the forced selling exhausted. Khandani and Lo's canonical case: the pain traveled through shared loadings, not shared tickers."},"R4-theme":{"id":"R4-theme","framing":"AMPLIFIER (reinforcing): the latent-theme unwind — a crowded cluster invisible to standard factor models moves as one, even among stocks orthogonal on FF6 with zero common owners; the project's dominant residual channel.","example":"The January 2021 crowded-short unwind. GameStop's squeeze didn't stay contained: AMC, BlackBerry, Bed Bath & Beyond, Koss — the whole heavily-shorted small-cap basket — ripped together as funds covered the shared 'crowded short' theme, and the reflex bled into other high-short-interest names no factor sheet grouped together. The same latent-theme co-movement shows up across biotech, quantum, space and lidar small-cap short crowding, and it can be lit by short buy-ins (couples to R7)."},"R4-barra":{"id":"R4-barra","framing":"AMPLIFIER (reinforcing): a finer-grained crowded unwind along Barra style/industry loadings; confirmed-core in the topology but not separately validated in the real run.","example":"The momentum crash of March-April 2009. As the market bottomed and violently rebounded, the most-shorted, high-momentum-loser names rocketed while momentum winners lagged, blowing up funds crowded into the same Barra momentum tilt — a co-move driven by shared style loading, not shared holdings. The September 2020 megacap-tech air-pocket rhymed at the industry-loading level. It is the same family as the FF quant quake, one resolution finer."},"R4-conc":{"id":"R4-conc","framing":"AMPLIFIER (reinforcing): the megacap-versus-breadth unwind, keyed to a concentration factor — when everyone crowds the same handful of index-dominating names, their simultaneous exit is its own contagion layer.","example":"The August 5, 2024 yen-carry / megacap unwind. A stronger yen and a soft US jobs print triggered a global de-risking; the crowded Magnificent Seven concentration trade unwound together (Nvidia and peers gapping down, the VIX spiking above 60 intraday) even as breadth names held up better — the concentration sleeve breaching in unison. The September 2020 'Nasdaq whale' SoftBank options unwind was an earlier version of the same concentrated-megacap fragility."},"B4":{"id":"B4","framing":"STABILIZER (balancing): a mean-reverting calendar pulse, not a trend — cosmetic quarter-end trades build into the reporting date and reverse right after, so the distortion self-erases.","example":"Quarter- and year-end window dressing, documented across the fund industry (Carhart et al.'s turn-of-quarter markups). Benchmark-relative managers buy the quarter's winners and dump its losers in the last days so their 13F/holdings snapshot 'looks smart,' inflating the winners into December 31, then unwinding in early January (a slice of the January reversal). Unlike index inclusion (R1), it moves nothing durably — it is a tide that comes in and goes back out on the calendar clock."},"B5":{"id":"B5","framing":"AMPLIFIER (reinforcing, but asymmetric and regime-gated): the issuer talks its own price up, lowering its cost of capital — self-reinforcing when liquidity is easy and the story lands, but it misfires badly in skeptical regimes.","example":"The tale of two roadshows. Nvidia's GTC keynotes repeatedly turned narrative into conviction into a lower cost of capital during the easy-money AI boom — persuasion compounding into price. WeWork's 2019 IPO roadshow is the counter-case: the same machinery hit a suddenly skeptical, tightening market, the story collapsed under scrutiny of the S-1, the valuation cratered from ~$47B toward single digits, and the IPO was pulled. The loop only runs when persuadable holders (A2, A4) are in a mood to be persuaded; rule-bound trackers ignore it entirely."},"R5":{"id":"R5","framing":"AMPLIFIER (reinforcing): the short-gamma squeeze — dealers hedging a book they're short gamma on must buy as price rises and sell as it falls, magnifying every move and forcing still more hedging, a vol-expansion regime.","example":"The GameStop gamma squeeze, late January 2021. Retail piled into short-dated call options; the dealers who sold those calls were left massively short gamma, and to stay delta-neutral they had to buy GME stock as it climbed — which pushed it higher, forcing them to buy even more. Stacked on top of the borrow-driven short squeeze (R7), it drove GME from ~$20 to an intraday ~$483 in days. This is the fast, high-frequency loop living right next to the price hub."},"B6":{"id":"B6","framing":"STABILIZER (balancing): the long-gamma pin — the sign-flipped twin of R5 across the zero-gamma flip; dealers hedge against the move (sell rallies, buy dips), suppressing volatility and gluing price to high-open-interest strikes.","example":"The 2017 low-vol grind and routine monthly OpEx pinning. Through much of 2017 dealers sat long gamma as investors sold options for yield; their hedging leaned against every wiggle, and realized vol collapsed to record lows while the S&P ground quietly higher. The same mechanism pins SPX near big open-interest strikes into monthly expirations ('max pain' gravity). Identical wiring to R5 — only the sign of dealer gamma differs, and it flips at the zero-gamma level."},"R6":{"id":"R6","framing":"AMPLIFIER (reinforcing, pro-cyclical): the buyback writeback — the firm bids for its own shares, adding demand and shrinking the share count so EPS mechanically rises, lifting relative value and price; but it's a fair-weather bid that withdraws exactly when stress hits.","example":"Apple's buyback machine. Since 2012 Apple has repurchased over $600B of its own stock, cutting shares outstanding by roughly 40% and lifting EPS even in flat-earnings quarters — a persistent, price-supporting bid that reflexively grows as the stock and cash flow rise. The pro-cyclicality is the tell: aggregate S&P buybacks peaked near the 2018 and 2021 highs and were slashed in the March 2020 crash, pulling the bid precisely when it was needed most. It's one of the rare loops that reaches back and edits the L0 fundamentals being priced."},"R7":{"id":"R7","framing":"AMPLIFIER (reinforcing): the borrow-driven squeeze — a rising price triggers margin calls and lender recalls, forcing shorts to buy-in regardless of thesis, which lifts price further; couples into the gamma squeeze (R5) and the crowded-short theme (R4-theme).","example":"The Volkswagen squeeze of October 2008. Porsche disclosed it had cornered ~74% of VW via options and Lower Saxony held ~20%, leaving almost no free float against a heavily-shorted name. Recalls and forced buy-ins sent VW from ~€200 to over €1,000 in two days, briefly making it the most valuable company on earth — pure borrow mechanics, no fundamentals. GameStop 2021 fused this borrow squeeze with the gamma squeeze (R5) for a double-barreled version."},"R8":{"id":"R8","framing":"AMPLIFIER when the intervention creates value, STABILIZER when it destroys it: a slow, high-leverage writeback — the activist edits the firm's actual capital structure and strategy (L0), re-rating relative value and price from the fundamentals up.","example":"Carl Icahn's Apple campaign, 2013. Icahn accumulated a stake, went public pushing for a far larger buyback, and helped move Apple toward hundreds of billions in repurchases — editing the share count and capital structure directly (feeding straight into R6), and the stock re-rated. Value-destroying campaigns run the same wiring in reverse (over-levering or breaking up a firm badly), which is why the loop's sign depends on whether the intervention helped. It's the only other feedback besides buybacks that reaches all the way back to the accounting primitives."},"R9":{"id":"R9","framing":"The virtuous inflow spiral. Strong fundamentals — growth, demographics, institutions — attract global capital; the inflows buy assets and lift prices; the rising returns and appreciating currency attract still more capital. A reinforcing loop that manufactures an emerging-market boom feeding on itself, and the up-leg of every EM cycle.","example":"The pre-1997 Asian boom: capital poured into the 'tiger' economies chasing high growth, bidding up assets and currencies, which drew in yet more foreign money — a textbook R9 spiral, right up until it wasn't."},"B7":{"id":"B7","framing":"The sudden-stop stabiliser — brutal but self-correcting. When returns or the currency turn, foreign capital flees; the outflow weakens the currency and drops asset prices, which triggers still more flight. A balancing loop that violently ends an over-attracted boom, overshooting on the way down as savagely as R9 overshot on the way up.","example":"1997 again, in reverse: Thailand's baht float on 2 July 1997 triggered successive regional depreciations and a ~$100bn single-year collapse in flows, contagion carrying it from Bangkok to Seoul, Moscow, Brasília and Buenos Aires — R9 running backwards as B7."}},"firmLinks":{"L0.rev":{"node_id":"L0.rev","acct_sector":"standard","acct_stmt":"income","acct_line":"revenue","summary":"The atlas's top-line state IS the income statement's Net sales line (Apple FY2025 $416.2B, RevenueFromContractWithCustomerExcludingAssessedTax). It is the accounting graph's entry point for macro demand (L4.macro), dollar translation for exporters (L4.dollar) and forward-deal restatements (L4.circ), all of which flow down to earnings and out to the cross-sectional rank."},"L0.cogs":{"node_id":"L0.cogs","acct_sector":"standard","acct_stmt":"income","acct_line":"cogs","summary":"Maps to Cost of goods and services sold (Apple FY2025 $221.0B, CostOfGoodsAndServicesSold). This is the hook through which commodity and memory/supply-chain price shocks (L4.commod, L4.supply) reach the P&L, subtracting from revenue to set gross profit."},"L0.opex":{"node_id":"L0.opex","acct_sector":"standard","acct_stmt":"income","acct_line":"operating_expenses","summary":"Maps to Total operating expenses (R&D + SG&A, Apple FY2025 $62.2B, OperatingExpenses). In the atlas this node also carries floating-rate interest expense, making it the mechanical point where policy rates (L4.rates) bite into earnings — the R2 refinancing-spiral transmission into the P&L."},"L0.earn":{"node_id":"L0.earn","acct_sector":"standard","acct_stmt":"income","acct_line":"net_income","summary":"The atlas Earnings node is the income statement's bottom line, Net income (Apple FY2025 $112.0B, NetIncomeLoss) — a derived quantity (revenue minus COGS minus opex minus tax) that then feeds the derived ratios and becomes the starting line of the indirect cash-flow reconciliation."},"L0.bs_assets":{"node_id":"L0.bs_assets","acct_sector":"standard","acct_stmt":"balance","acct_line":"total_assets","summary":"Maps to the balance-sheet Total assets line (Apple FY2025 $359.2B, Assets). Its size is what gates institutional/index eligibility (L1.elig, L3.idx_thresh) as a step function and feeds the return and leverage ratios."},"L0.cf":{"node_id":"L0.cf","acct_sector":"standard","acct_stmt":"cashflow","acct_line":"cfo","summary":"The atlas Cash-flow node's representative line is Net cash from operating activities (Apple FY2025 $111.5B, NetCashProvidedByUsedInOperatingActivities). Sitting just below net income, it signals earnings quality and funds the issuer buybacks (A0.buyback) that write back to share count."},"L0.ratios":{"node_id":"L0.ratios","acct_sector":"standard","acct_stmt":"income","acct_line":"gross_profit","summary":"The derived-ratios node is represented by Gross profit (Apple FY2025 $195.2B, a 46.9% margin, GrossProfit) — the first computed subtotal and the kind of second-order accounting quantity that the cross-sectional ranking (L1.rel_val) and factor loadings (L1.loadings) actually operate on."},"L0.share_count":{"node_id":"L0.share_count","acct_sector":"standard","acct_stmt":"income","acct_line":"eps_diluted","summary":"The atlas Share-count node surfaces on the statements through Diluted EPS (EarningsPerShareDiluted), whose denominator is the diluted weighted-average share count. Buybacks (A0.buyback, in SCC-WRITEBACK) shrink that denominator by identity, lifting EPS on flat earnings — the writeback channel that lets an issuer edit the very object being priced."}},"glossary":{"GEX":{"full":"Gamma Exposure (net dealer gamma)","def":"The signed pile of gamma that options dealers are stuck holding from customer flow — when it's positive their hedging leans against moves and pins the tape, when it's negative they chase moves and pour fuel on a squeeze, which is the whole switch inside the dealer-gamma core (SCC-GAMMA) that flips at the zero-gamma level."},"AFUDC":{"full":"Allowance for Funds Used During Construction","def":"A non-cash accounting credit that regulated utilities book on a half-built power plant, letting them report earnings on projects that haven't produced a single watt yet — a big reason a capex-heavy utility's accounting profit can look healthier than its cash."},"CET1":{"full":"Common Equity Tier 1","def":"The highest-quality capital cushion a bank must hold against its risk-weighted assets; when the ratio thins, the bank throttles back buybacks and lending, so it is effectively the governor on how much demand the whole banking sector can supply."},"RPO":{"full":"Remaining Performance Obligations","def":"Contracted revenue a company has signed but not yet delivered — the backlog a cloud vendor like Microsoft or Salesforce points to as a forward-revenue promise, and which investors mine for growth visibility."},"SBC":{"full":"Stock-Based Compensation","def":"Paying employees in shares rather than cash — a non-cash expense that quietly swells the share count and dilutes EPS, the exact opposite of the buyback (R6) that shrinks it, and a favorite item bulls add back and bears refuse to."},"13F":{"full":"SEC Form 13F","def":"The quarterly filing in which every institution managing over $100M discloses its US equity holdings — the raw material for the ownership-overlap contagion layer (R4.e_own), since it reveals exactly which funds co-hold which names and would dump them together in a fire-sale."},"VaR":{"full":"Value at Risk","def":"The dollar loss a levered fund expects not to exceed on a normal bad day; it's the risk limit whose breach triggers the forced deleveraging unwind that sits at the heart of the deleveraging-contagion core (SCC-DELEV)."},"NII":{"full":"Net Interest Income","def":"A bank's profit from lending at higher rates than it pays depositors — the main earnings lever that makes bank profits swing directly with the Fed's rate path, for better on the way up and worse when deposits reprice."},"PPNR":{"full":"Pre-Provision Net Revenue","def":"A bank's core earnings before it sets aside money for bad loans — the cleanest read on underlying franchise profitability, stripped of the loan-loss reserving that whipsaws reported earnings across the cycle."},"FFO":{"full":"Funds From Operations","def":"The REIT world's stand-in for earnings, adding property depreciation back to net income because buildings don't really wear out like machines do; it's the number a REIT's dividend is judged sustainable against."},"ROTCE":{"full":"Return on Tangible Common Equity","def":"Profit as a percentage of hard, goodwill-stripped equity — the yardstick banks live or die by in cross-sectional ranking, since it measures how well they compound the capital that actually absorbs losses."},"NPL":{"full":"Non-Performing Loans","def":"Loans on which the borrower has stopped paying; a rising NPL ratio is the early smoke of the credit/refinancing spiral (SCC-CREDIT) showing up on bank balance sheets before it becomes a fire."},"CECL":{"full":"Current Expected Credit Losses","def":"The accounting rule forcing banks to reserve for a loan's lifetime expected losses up front — which front-loads earnings pain the moment the macro outlook darkens, making bank profits jerk down at the first hint of recession."},"DSO":{"full":"Days Sales Outstanding","def":"The average number of days a firm waits to collect cash after a sale; a sudden spike warns that revenue is being booked far faster than customers actually pay, one of the tell-tales of the circular / vendor-financing risk (L4.circ) that can force a restatement."},"DIO":{"full":"Days Inventory Outstanding","def":"The average number of days goods sit in inventory before selling; rising DIO flags softening demand or an inventory glut that will soon pressure margins and markdowns."},"DPO":{"full":"Days Payable Outstanding","def":"The average number of days a firm takes to pay its own suppliers; stretching it is a quiet way to finance operations on vendors' balance sheets, which flatters cash flow until suppliers push back."},"CCC":{"full":"Cash Conversion Cycle","def":"DSO plus DIO minus DPO — the number of days a firm's cash is trapped in the operating cycle before it comes back; a compact one-number health check on working-capital efficiency."},"CWIP":{"full":"Construction Work In Progress","def":"The balance-sheet bucket holding half-finished plant and equipment that isn't earning yet; heavy CWIP marks a firm in the middle of a big build-out — think the current AI-datacenter capex wave — carrying cost today for revenue tomorrow."},"ARO":{"full":"Asset Retirement Obligation","def":"The estimated future cost of decommissioning an asset — plugging an oil well, tearing down a plant, cleaning a mine — booked as a long-dated liability that sits on the books for decades before the cash goes out."},"AFS":{"full":"Available-For-Sale securities","def":"Bonds a bank marks to market with the gains and losses flowing through equity (OCI) rather than earnings; this is the Silicon Valley Bank trap, where a rate spike quietly craters the marks until a forced sale drags the loss into plain view."},"HTM":{"full":"Held-To-Maturity securities","def":"Bonds a bank carries at cost and refuses to mark, hiding underwater losses as long as it never has to sell — the other half of the SVB story, where a deposit run turned invisible paper losses into realized capital holes."},"ETF":{"full":"Exchange-Traded Fund","def":"A basket of securities that trades intraday like a single stock; passive ETFs are the rule-forced trackers (archetype A1) whose cap-weighted buying mechanically buys more of whatever rises, feeding the inclusion-ignition loop (R1)."},"OpEx":{"full":"Operating Expenses","def":"The running costs of the business, including interest on floating-rate debt — and that interest line is the precise spot where central-bank rate hikes mechanically reach the income statement (edge e38) and eat earnings."},"EPS":{"full":"Earnings Per Share","def":"Profit divided by share count — the number a buyback juices by shrinking the denominator even when earnings are flat, which is exactly the writeback loop (R6) that lets a company edit the object being priced."},"D&A":{"full":"Depreciation & Amortization","def":"The non-cash charge that spreads an asset's cost over its useful life; it's added back to reach cash flow and EBITDA, and it's the reason capex-heavy firms can show thin accounting earnings while gushing cash."},"FF6":{"full":"Fama-French 6-factor model","def":"The canonical set of systematic return drivers — market, size, value, profitability, investment and momentum — that the contagion test residualizes returns on, so only excess co-movement beyond mechanical factor structure is left to measure."},"Barra":{"full":"Barra risk model (MSCI)","def":"A commercial factor system that slices returns into finer style, industry and country exposures than Fama-French; its loadings define the adjacency of the e_barra contagion layer, where funds crowded into the same Barra style unwind it together."},"13D":{"full":"SEC Schedule 13D","def":"The filing an activist must make within days of crossing 5% ownership with intent to influence; the disclosure event itself (A6.disclose) jolts the price by pricing in the expected value of the coming intervention and rallies other holders into a proxy fight."},"ADV":{"full":"Average Daily Volume","def":"How many shares a name typically trades per day; it's the liquidity gate that decides what constrained institutions can even buy, and it's why in a fire-sale funds 'sell what's liquid, not what's related' (the e_liq spillover)."},"COGS":{"full":"Cost of Goods Sold","def":"The direct cost of the things a firm sells; it's the income-statement hook through which commodity and memory-price shocks enter earnings (edge e45), turning a supply-chain squeeze into a margin hit."},"VIX":{"full":"CBOE Volatility Index","def":"The market's 'fear gauge,' derived from S&P 500 option prices as expected 30-day volatility; its top-decile days define the stress regime in which the contagion test looks for concentrated co-movement."},"PMI":{"full":"Purchasing Managers' Index","def":"A survey-based pulse of manufacturing and services activity that reads expansion above 50 and contraction below; a leading indicator of the macro demand backdrop (L4.macro) that ultimately drives firm revenue."},"IR":{"full":"Investor Relations","def":"The corporate function that runs roadshows, investor days and guidance (the A0.roadshow flow) to shape a company's narrative and lower its cost of capital — persuasion that works best in easy-liquidity regimes."},"OI":{"full":"Open Interest","def":"The number of option contracts outstanding at a given strike; strikes with very high OI become the 'gamma walls' toward which dealer hedging drags the price as expiry approaches."},"SCC":{"full":"Strongly Connected Component","def":"A graph-theory term for a cluster in which every node can reach every other — i.e., a genuine feedback loop; the atlas uses it to label its self-reinforcing engines (monetary, credit, dealer-gamma, single-name ascent, deleveraging)."},"2SLS":{"full":"Two-Stage Least Squares","def":"An instrumental-variables regression technique used (as in Anton-Polk) to argue that common ownership causes excess co-movement rather than merely correlating with it — the kind of identification the contagion program is trying to earn."},"P&L":{"full":"Profit and Loss","def":"The running mark-to-market gain or loss on a fund's book; in the deleveraging core it's the state where a price shock first lands (A3.pnl) before it consumes the risk budget and forces an unwind."},"PIT":{"full":"Point-In-Time","def":"Using only information actually knowable on a given date — for example trailing-252-day betas instead of full-sample ones — the discipline that keeps a backtest honest and blocks look-ahead bias from smuggling in the answer."},"MTM":{"full":"Mark-to-Market","def":"Valuing a position at today's market price rather than its purchase cost; it's the mechanism that turns a mere price drop into an instant, budget-consuming realized-feeling loss for a levered fund, kicking off deleveraging."},"DTC":{"full":"Days-to-Cover","def":"Short interest divided by average daily volume — how many days of normal buying it would take shorts to close out; a high short interest with low days-to-cover is precisely the squeeze fragility that R7 detonates."},"max-pain":{"full":"Maximum Pain","def":"The strike price at which the largest dollar amount of options expires worthless; folklore says gamma-wall pinning drags price toward it at expiry, though the atlas flags its predictive power as genuinely contested."},"ERP":{"full":"Equity Risk Premium","def":"The extra return investors demand for holding stocks over the risk-free rate; when rates rise the discount rate resets and present values compress across the market (the discount-rate valve, loop B3)."},"HTB":{"full":"Hard-To-Borrow (vs. General Collateral)","def":"The scarce tier of short-borrow, opposite cheap and abundant general collateral; HTB names carry punishing borrow fees that create negative carry and shrink the set of stocks worth shorting at all."},"locate":{"full":"Short-sale locate","def":"A broker's confirmation that shares can actually be borrowed before you sell them short; no locate means no short, so it is the hard gate on the entire short book (SB.borrow_supply)."},"quant-quake":{"full":"Quant Quake (August 2007)","def":"The episode where quant funds sharing no holdings but identical factor bets all deleveraged the same styles at once and cratered together — the founding example of the e_ff crowded-unwind contagion layer (Khandani-Lo)."},"capex":{"full":"Capital Expenditure","def":"Spending on long-lived assets like factories, fabs and datacenters; heavy capex builds up CWIP and future D&A and marks out exactly the firms most exposed to rate and supply-chain stress in the cost-push loop (R3)."},"YoY":{"full":"Year-over-Year","def":"A comparison of a metric to the same period one year earlier (e.g., 'memory prices up 3x YoY'), the standard way to strip out seasonality and read the true rate of change."},"NAV":{"full":"Net Asset Value","def":"The per-share worth of a fund's underlying holdings; it's the anchor ETF arbitrage trades against and the value benchmark-relative funds face redemptions relative to (archetype A2)."},"OCI":{"full":"Other Comprehensive Income","def":"The equity bucket where unrealized gains and losses on AFS securities park without touching reported earnings — until a forced sale realizes them and drags them into the P&L."},"PP&E":{"full":"Property, Plant & Equipment","def":"The hard-asset base on the balance sheet, built up by capex and worn down by D&A; it's where CWIP lands when a project finishes and where AFUDC-capitalized costs eventually come to rest."},"EBITDA":{"full":"Earnings Before Interest, Taxes, Depreciation & Amortization","def":"A cash-proxy profit measure that strips out capital structure and non-cash charges; it's the multiple that M&A deals and leveraged buyouts are struck on, and the denominator in leverage ratios like Net Debt/EBITDA."},"FCF":{"full":"Free Cash Flow","def":"Operating cash flow minus capital expenditure — the cash actually left over to fund buybacks, dividends and debt paydown, and thus the real fuel behind the pro-cyclical buyback bid (A0.buyback)."},"PPP":{"full":"Purchasing Power Parity","def":"Adjusts incomes/prices for what money actually buys locally, so a $ in Mumbai and New York are comparable. Reveals EM currencies as 'cheap' vs market rates — largely structural (Balassa-Samuelson), not mispricing."},"FDI":{"full":"Foreign Direct Investment","def":"Cross-border investment into productive assets (factories, subsidiaries) rather than passive securities — 'sticky' capital that signals long-run confidence in a country's fundamentals and institutions."},"GDP":{"full":"Gross Domestic Product","def":"Total value of goods and services an economy produces. GDP = size of the opportunity; GDP per capita = prosperity per person, i.e. what each person can actually buy."},"ISM":{"full":"Institute for Supply Management (PMI)","def":"Publisher of the closely-watched US Manufacturing/Services PMI diffusion indices. A reading above 50 = expansion, below 50 = contraction — a leading indicator of activity."},"EM":{"full":"Emerging Markets","def":"Developing economies (e.g. India, Brazil, Indonesia) offering higher growth and higher risk — where the middle-class and demographic-dividend stories live, and where capital flows boom and bust."},"DM":{"full":"Developed Markets","def":"Mature, high-per-capita economies (US, Europe, Japan) — lower growth, deeper institutions, aging demographics, the 'safe' pole global capital rotates toward in a risk-off sudden stop."},"dependency ratio":{"full":"Dependency Ratio","def":"Children + elderly per working-age adult. A low, falling ratio = the 'demographic dividend' (many producers, few dependents, high savings); a rising ratio = the aging drag."},"demographic dividend":{"full":"Demographic Dividend","def":"The growth boost when a country's working-age share is large and rising. Quantified for India at ~1.9pp higher annual per-capita growth per SD of working-age-ratio growth — but only if the young are educated and employed."},"human capital":{"full":"Human Capital","def":"The skills, knowledge and health embodied in people — the quality dimension of a population. Determines where a country sits in the global division of labour (designs/owns vs assembles). STEM graduates create the largest local wage spillovers."},"Balassa-Samuelson":{"full":"Balassa-Samuelson Effect","def":"Why richer economies have stronger real exchange rates: high traded-sector productivity pulls up wages economy-wide, making non-traded services (and the price level) expensive. Explains why developing-country currencies look 'cheap' vs PPP."},"sudden stop":{"full":"Sudden Stop","def":"An abrupt reversal of foreign capital inflows. Outflows crush the currency and asset prices, triggering more flight — the balancing crash that ends an over-attracted EM boom. The 1997 Asian crisis: ~$100bn collapse in flows to Asia in one year."},"TFR":{"full":"Total Fertility Rate","def":"Average children per woman. ~2.1 = replacement (stable population). Below → shrinking, aging society (Japan, much of Europe); well above → youth bulge (sub-Saharan Africa). India hit replacement 2.1 in 2020."}}};
(function(){
"use strict";
if(!GRAPH){document.getElementById('inspector').innerHTML='<div class="insp-pad">No graph data.</div>';return;}
const SVGNS="http://www.w3.org/2000/svg";
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
function mk(t){return document.createElementNS(SVGNS,t);}
function el(t,a){const e=mk(t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function esc(s){return(s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

// ---- data ----
const nodes=(GRAPH.nodes||[]).map(n=>({...n}));
const edges=(GRAPH.edges||[]).map(e=>({...e}));
const loops=GRAPH.loops||[], sccs=GRAPH.sccs||[], clusters=GRAPH.clusters||[];
const levels=(GRAPH.levels||[]).slice().sort((a,b)=>a.order-b.order);
const byId=new Map(nodes.map(n=>[n.id,n]));
edges.forEach(e=>{e.s=byId.get(e.source);e.t=byId.get(e.target);});
const E=edges.filter(e=>e.s&&e.t);
const outAdj=new Map(nodes.map(n=>[n.id,[]])),inAdj=new Map(nodes.map(n=>[n.id,[]]));
E.forEach(e=>{outAdj.get(e.source).push(e);inAdj.get(e.target).push(e);});
const loopOfNode=new Map();
loops.forEach(lp=>(lp.node_path||[]).forEach(id=>{(loopOfNode.get(id)||loopOfNode.set(id,[]).get(id)).push(lp.id);}));
const clById=new Map(clusters.map(c=>[c.id,c]));
const levelIdx=new Map(levels.map((l,i)=>[l.id,i]));
const statusColor={validated:'var(--ok)',in_progress:'var(--warn)',topological:'var(--idle)',blocked_data:'var(--lock)'};
const evLabel={IDENT:'Identity',RULE:'Rule',"EMP-S":'Empirical · strong',"EMP-W":'Empirical · weak',MIXED:'Mixed'};
const stLabel={validated:'Validated',in_progress:'In progress',topological:'Topological',blocked_data:'Blocked · needs data'};

// ---- narrative enrichment (authored by the workflow; merged at build) ----
const TOPSTORY=GRAPH.top_story||'', SYS=GRAPH.systemStories||{}, ARCH=GRAPH.archetypeSketches||{},
      LOOPSTORY=GRAPH.loopStories||{}, FIRMLINKS=GRAPH.firmLinks||{}, GLOSS=GRAPH.glossary||{},
      ACCTURL=GRAPH.acct_url||'', BACKSTAGE=GRAPH.backstage_url||'';
const archById=new Map((GRAPH.archetypes||[]).map(a=>[a.id,a]));
// glossary tooltips: wrap known acronyms/jargon in <abbr title="full — def">
const _glTerms=Object.keys(GLOSS).sort((a,b)=>b.length-a.length);
const _glRe=_glTerms.length?new RegExp('(?<![A-Za-z0-9])('+_glTerms.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')(?![A-Za-z0-9])','g'):null;
function glossify(raw){
  if(raw==null)return '';raw=String(raw);
  if(!_glRe)return esc(raw);
  let out='',last=0,m;_glRe.lastIndex=0;
  while((m=_glRe.exec(raw))){const g=GLOSS[m[1]];out+=esc(raw.slice(last,m.index));
    out+=`<abbr class="gl" title="${esc((g.full?g.full+' — ':'')+(g.def||''))}">${esc(m[1])}</abbr>`;last=m.index+m[1].length;}

function fitTo(b,pad){pad=pad||0.95;const r=svg.getBoundingClientRect();const bw=b.x1-b.x0,bh=b.y1-b.y0;
  T.k=Math.max(.15,Math.min(2.7,Math.min(r.width/bw,r.height/bh)*pad));
  T.x=(r.width-bw*T.k)/2-b.x0*T.k;T.y=(r.height-bh*T.k)/2-b.y0*T.k;applyT();}

function nrad(n){return n.kind==='agent'?14:n.kind==='threshold'?12:n.kind==='primitive'?9:11;}
// greedy word-wrap to a target line width (chars); never leaves a >max word un-split
function wrapLabel(txt,max){const words=String(txt).split(/\s+/);const out=[];let cur='';
  words.forEach(w=>{if(!cur){cur=w;}else if((cur+' '+w).length<=max){cur+=' '+w;}else{out.push(cur);cur=w;}});
  if(cur)out.push(cur);return out.length?out.slice(0,3):[txt];}
let cur={nodeEls:new Map(),edgeEls:[],boxEls:new Map()};
function nodeGlyph(n){
  const g=el('g',{class:'node','data-id':n.id,tabindex:'0',role:'button','aria-label':n.label||n.id});
  const r=nrad(n),st=n.status||'topological';
  g.appendChild(el('circle',{class:'ring',r:r+4,cx:0,cy:0,stroke:statusColor[st],
    'stroke-width':st==='topological'?1.1:2,'stroke-dasharray':st==='blocked_data'?'2 2.5':st==='in_progress'?'3.5 2.5':'0',
    'stroke-opacity':st==='topological'?.5:1}));
  const body=el('circle',{class:'body',r,cx:0,cy:0,fill:n.kind==='agent'?'var(--panel2)':'var(--panel)',
    stroke:st==='validated'?'var(--ok)':'var(--line)'});
  g.appendChild(body);
  // attached label chip — monospace lets us size the plate exactly without a DOM measure;
  // wrap long labels to 2-3 lines so the chip stays narrow enough not to collide with neighbours
  const lines=wrapLabel(n.label||n.id,22);
  const CW=7.35,LH=16.5,pad=8;
  const chW=Math.max(...lines.map(s=>s.length))*CW+pad*2;
  const chH=lines.length*LH+7,chY=r+7;
  const lw=el('g',{class:'lblwrap'});
  lw.appendChild(el('rect',{class:'lblbg',x:-chW/2,y:chY,width:chW,height:chH,rx:7}));
  const lbl=el('text',{class:'lbl',x:0,y:chY+13.5,'text-anchor':'middle'});
  lines.forEach((s,i)=>{const ts=el('tspan',{x:0,dy:i?LH:0});ts.textContent=s;lbl.appendChild(ts);});
  lw.appendChild(lbl);g.appendChild(lw);

}
let nodeDragMoved=false,dragState=null;
function addDrag(g,n){
  g.addEventListener('pointerdown',ev=>{ev.stopPropagation();nodeDragMoved=false;
    dragState={g,n,sx:ev.clientX,sy:ev.clientY,ox:n.x,oy:n.y};g.setPointerCapture(ev.pointerId);});
  g.addEventListener('pointermove',ev=>{if(!dragState||dragState.g!==g)return;
    const dx=(ev.clientX-dragState.sx)/T.k,dy=(ev.clientY-dragState.sy)/T.k;
    if(Math.abs(dx)+Math.abs(dy)>2)nodeDragMoved=true;n.x=dragState.ox+dx;n.y=dragState.oy+dy;
    g.setAttribute('transform',`translate(${n.x},${n.y})`);redrawIncident(n.id);});
  g.addEventListener('pointerup',()=>{dragState=null;});
}
function edgeGeom(s,t){const x1=s.x,y1=s.y,x2=t.x,y2=t.y,mx=(x1+x2)/2,my=(y1+y2)/2;
  const dx=x2-x1,dy=y2-y1,d=Math.hypot(dx,dy)||1,curv=Math.min(34,d*0.14);
  const cx=mx-dy/d*curv,cy=my+dx/d*curv;const r1=nrad(s)+3,r2=nrad(t)+7;
  const a1=Math.atan2(cy-y1,cx-x1),a2=Math.atan2(cy-y2,cx-x2);
  const sx=x1+Math.cos(a1)*r1,sy=y1+Math.sin(a1)*r1,ex=x2+Math.cos(a2)*r2,ey=y2+Math.sin(a2)*r2;
  return {d:`M${sx},${sy} Q${cx},${cy} ${ex},${ey}`,sx,sy,cx,cy,ex,ey};}
function lagDash(l){return l==='D'?'6 4':l==='Q'?'1.5 4':l==='Y'?'11 6':'0';}
function evOpacity(ev){return ev==='IDENT'||ev==='RULE'?.9:ev==='EMP-S'?.66:.4;}
function evWidth(ev){return ev==='IDENT'||ev==='RULE'?1.9:ev==='EMP-S'?1.4:1.05;}
function polColor(s){return s==='+'?'var(--pos)':s==='-'?'var(--neg)':'var(--amb)';}
function polKey(s){return s==='+'?'pos':s==='-'?'neg':'amb';}
function edgeGlyph(e,hiddenByDefault){

    'stroke-width':evWidth(e.evidence),'stroke-dasharray':lagDash(e.lag),'stroke-opacity':evOpacity(e.evidence),
    'marker-end':`url(#arw-${polKey(e.sign)})`,'stroke-linecap':'round'});
  p.style.setProperty('--baseop',evOpacity(e.evidence));
  cur.edgeEls.push({e,p,base:evOpacity(e.evidence)});
  return p;
}

// ---- layered helper: level→column (left→right), crossing-reduced, tall columns
//      WRAP into sub-columns so labels never pile up. Returns {bb, levelX}. ----
function layerLayout(list,x0,y0,colW,rowH,maxRows){
  maxRows=maxRows||99;const inSet=new Set(list);
  const cols=new Map();list.forEach(n=>{const li=levelIdx.has(n.level)?levelIdx.get(n.level):levels.length;
    (cols.get(li)||cols.set(li,[]).get(li)).push(n);});
  const order=[...cols.keys()].sort((a,b)=>a-b);
  cols.forEach(arr=>arr.forEach((n,i)=>n._row=i));
  // one barycenter pass to reduce crossings
  order.forEach(li=>{const arr=cols.get(li);arr.forEach(n=>{
    const nb=[...outAdj.get(n.id),...inAdj.get(n.id)].map(e=>e.source===n.id?e.t:e.s).filter(x=>inSet.has(x));
    n._bary=nb.length?nb.reduce((s,m)=>s+(m._row!=null?m._row:0),0)/nb.length:n._row;});
    arr.sort((a,b)=>a._bary-b._bary);arr.forEach((n,i)=>n._row=i);});
  let colCursor=0;const levelX=new Map();
  order.forEach(li=>{const arr=cols.get(li);const sub=Math.ceil(arr.length/maxRows);
    const perCol=Math.ceil(arr.length/sub);
    arr.forEach((n,i)=>{const sc=Math.floor(i/perCol),row=i%perCol;
      const colCount=Math.min(perCol,arr.length-sc*perCol);
      n.x=x0+(colCursor+sc)*colW;n.y=y0+row*rowH-((colCount-1)*rowH)/2;});
    levelX.set(li,x0+(colCursor+(sub-1)/2)*colW);colCursor+=sub;});
  const xs=list.map(n=>n.x),ys=list.map(n=>n.y);
  return {bb:{x0:Math.min(...xs)-80,y0:Math.min(...ys)-50,x1:Math.max(...xs)+80,y1:Math.max(...ys)+50},levelX};
}

function renderLoopCycle(id){
  clearGraph();const lp=loops.find(l=>l.id===id);if(!lp){renderMechGallery();return;}
  const path=(lp.node_path||[]).map(nid=>byId.get(nid)).filter(Boolean);
  const cxp=0,cyp=0,R=Math.max(150,path.length*46);
  path.forEach((n,i)=>{const a=-Math.PI/2+i/path.length*Math.PI*2;n.x=cxp+Math.cos(a)*R;n.y=cyp+Math.sin(a)*R;});
  const seq=[];
  for(let i=0;i<path.length;i++){const a=path[i].id,b=path[(i+1)%path.length].id;
    const e=outAdj.get(a).find(x=>x.target===b)||E.find(x=>x.source===a&&x.target===b);if(e)seq.push(e);}
  seq.forEach(e=>gEdge.appendChild(edgeGlyph(e,false)));

  curBBox={x0:cxp-R-90,y0:cyp-R-70,x1:cxp+R+90,y1:cyp+R+70};fitView();applyLens();
  if(!reduce)animatePulses(seq.concat(seq));

}

// ---- highlight, contagion, pulses ----
function hoverNode(id){
  const keep=new Set([id]),keepE=new Set();
  outAdj.get(id).forEach(e=>{keep.add(e.target);keepE.add(e.id);});
  inAdj.get(id).forEach(e=>{keep.add(e.source);keepE.add(e.id);});
  cur.nodeEls.forEach((o,nid)=>{o.g.classList.toggle('dim',!keep.has(nid));if(keep.has(nid))o.g.classList.add('hl');});
  cur.edgeEls.forEach(o=>{const on=keepE.has(o.e.id);o.p.classList.toggle('hidden',!on&&state.view==='flow');
    o.p.classList.toggle('dim',!on&&state.view!=='flow');});
}
function downstream(id){const seen=new Set([id]),seq=[],q=[id];
  while(q.length){const c=q.shift();(outAdj.get(c)||[]).forEach(e=>{seq.push(e);if(!seen.has(e.target)){seen.add(e.target);q.push(e.target);}});}
  return {seen,seq};}
function contagionHi(id){
  const {seen,seq}=downstream(id);const keepE=new Set(seq.map(e=>e.id));
  cur.nodeEls.forEach((o,nid)=>o.g.classList.toggle('dim',!seen.has(nid)));
  cur.edgeEls.forEach(o=>{const on=keepE.has(o.e.id)&&cur.nodeEls.has(o.e.source)&&cur.nodeEls.has(o.e.target);
    o.p.classList.toggle('hidden',!on);o.p.classList.remove('dim');});
  const so=cur.nodeEls.get(id);if(so)so.g.classList.add('sel');
  if(!reduce)animatePulses(seq.filter(e=>cur.nodeEls.has(e.source)&&cur.nodeEls.has(e.target)));
}
let pulseRAF=null;
function animatePulses(seq){
  gPulse.replaceChildren();if(pulseRAF)cancelAnimationFrame(pulseRAF);
  const dots=seq.slice(0,80).map((e,i)=>{const d=el('circle',{class:'pulse',r:3.1,cx:e.s.x,cy:e.s.y,fill:polColor(e.sign)});
    d.style.opacity=0;gPulse.appendChild(d);return {e,d,t:-(i*0.1)};});
  function step(){let alive=false;
    dots.forEach(o=>{o.t+=0.016/1.1;let tt=o.t%1.7;if(tt<0||tt>1){o.d.style.opacity=0;alive=true;return;}
      const g=edgeGeom(o.e.s,o.e.t),mt=1-tt;
      o.d.setAttribute('cx',mt*mt*g.sx+2*mt*tt*g.cx+tt*tt*g.ex);
      o.d.setAttribute('cy',mt*mt*g.sy+2*mt*tt*g.cy+tt*tt*g.ey);
      o.d.style.opacity=Math.sin(tt*Math.PI)*.95;alive=true;});
    if(alive)pulseRAF=requestAnimationFrame(step);}
  step();
}

// ---- lens recolor ----
function applyLens(){
  cur.edgeEls.forEach(o=>{let op=o.base;
    if(state.lens==='evidence')op=(o.e.evidence==='IDENT'||o.e.evidence==='RULE')?.95:(o.e.evidence==='EMP-S'?.5:.16);
    o.p.style.setProperty('--baseop',op);o.base=state.view==='flow'?o.base:op;
    if(!o.p.classList.contains('hidden')&&!o.p.classList.contains('dim'))o.p.setAttribute('stroke-opacity',op);});
  cur.nodeEls.forEach((o,id)=>{o.g.style.opacity=(state.lens==='status'&&(o.n.status||'topological')==='topological')?.4:1;});
}

// ---- selection dispatch ----
function select(id){
  state.selected=id;clearHi();
  if(!id){if(state.view==='systems'&&!state.cluster)renderOverviewInspector();
    else if(state.view==='mechanisms'&&!state.mech)renderMechInspector();
    else if(state.view==='mechanisms'&&state.mech)renderLoopInspector(loops.find(l=>l.id===state.mech));
    else if(state.view==='systems'&&state.cluster)renderClusterInspector(clById.get(state.cluster));
    else renderOverviewInspector();return;}
  const n=byId.get(id);if(!n)return;
  if(cur.nodeEls.has(id)){if(state.contagion)contagionHi(id);else hoverNode(id);cur.nodeEls.get(id).g.classList.add('sel');}
  renderNode(n);
  if(innerWidth<=1080)$('#inspector').classList.add('open');
}

function compose(n,kind){const txt=kind==='expand'
  ?`Expand the "${n.label}" node (id ${n.id}) in the Market Mechanics Atlas: deepen the mechanism, add missing sub-nodes / edges / loops, cite the relevant literature, then update topology_graph.json and rebuild.`

  tray.push({kind,id:n.id,label:n.label,txt});saveTray();flashHint(`Added ${kind} request for “${n.label}”`);$('#traypanel').classList.add('open');}
function renderTray(){$('#traycnt').textContent=tray.length;const p=$('#traypanel');
  if(!tray.length){p.innerHTML='<div class="empty">Select a node → Expand or Validate to queue a request for the next session.</div>';return;}
  p.innerHTML=tray.map((t,i)=>`<div class="trayitem"><span class="x" data-del="${i}">✕</span><span class="tag">${t.kind} · ${esc(t.id)}</span>${esc(t.txt)}</div>`).join('')

  $('#copyall').onclick=()=>{copy(tray.map((t,i)=>`${i+1}. [${t.kind}] ${t.txt}`).join('\n\n'));flashHint('Copied '+tray.length+' request(s)');};

function copy(s){navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(s).catch(()=>fb(s)):fb(s);

function initFromHash(){
  const h=(location.hash||'').replace(/^#/,'');if(!h)return;
  if(h.startsWith('node:')){const id=h.slice(5);const n=byId.get(id);if(n){state.view='systems';state.cluster=n.cluster;_pendingNode=id;}}
  else if(h.startsWith('sys:')){state.view='systems';state.cluster=h.slice(4);}
  else if(h.startsWith('loop:')){state.view='mechanisms';state.mech=h.slice(5);}
  else if(h==='flow'||h==='mechanisms'||h==='systems'){state.view=h;}
  $$('.seg [data-view]').forEach(b=>b.setAttribute('aria-pressed',b.dataset.view===state.view));
}
initFromHash();
// init
render();renderTray();
if(_pendingNode)select(_pendingNode);
setTimeout(()=>flashHint('Systems view — click a box to open it, or try Mechanisms'),700);
})();
</script>
</body></html>
