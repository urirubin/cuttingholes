rchaseOfCommonStock) — roughly 81% of net income returned via repurchases, the driver of its negative retained earnings.","redflag":"Buying back stock to hit EPS targets (shrinking the denominator) regardless of valuation; debt-funded buybacks that boost EPS and ROE while quietly increasing leverage — the headline metric improves for a financial-engineering reason, not an operating one.","value":90711000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The cash outflow to reacquire common stock during the period.","xbrl_label":"Payments for Repurchase of Common Stock"},{"id":"dividends_paid","label":"Dividends paid","tag":"PaymentsOfDividends","statement":"cashflow","parent":"cff","weight":-1,"kind":"line","def":"Cash paid to shareholders as dividends.","goes_in":"Quarterly common-stock dividend payments declared by the board.","gaap_ifrs":"Financing outflow under US GAAP; IFRS permits classifying dividends paid in operating or financing.","agg_note":"Outflow within cff (weight -1); reduces retained_earnings.","sector_note":"","example":"Apple FY2025 dividends paid were $15,421,000,000 (PaymentsOfDividends); combined with $90.7B buybacks, total capital returned was ~$106B.","redflag":"Maintaining or raising the dividend while free cash flow falls (funding it with debt or asset sales) signals an unsustainable payout; less easily gamed than buybacks but a fixed dividend can pressure real investment.","value":15421000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Cash outflow in the form of capital distributions and dividends to common shareholders, preferred shareholders and noncontrolling interests.","xbrl_label":"Payments of Dividends"},{"id":"debt_financing","label":"Net debt issuance / (repayment)","tag":"RepaymentsOfLongTermDebt","statement":"cashflow","parent":"cff","weight":-1,"kind":"line","def":"Cash from issuing term debt less cash used to repay maturing debt (and net commercial-paper flows).","goes_in":"Proceeds from new note issuance, repayments of maturing term notes, and net commercial-paper issuance/repayment.","gaap_ifrs":"Financing section; comparable under IFRS.","agg_note":"Net financing item within cff; shown here as the repayment leg (weight -1), netted against issuance and CP flows.","sector_note":"","example":"Apple FY2025 repaid $10,932,000,000 of long-term debt (RepaymentsOfLongTermDebt) against $4,481,000,000 issued (ProceedsFromIssuanceOfLongTermDebt) and net -$2,032,000,000 commercial paper (ProceedsFromRepaymentsOfCommercialPaper) — modest net deleveraging.","redflag":"Issuing debt in the same year as large buybacks (levering up the equity) while pointing to gross cash reserves; netting issuance and repayment into one line can hide the true rollover/refinancing scale.","value":10932000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The cash outflow for debt initially having maturity due after one year or beyond the normal operating cycle, if longer.","xbrl_label":"Repayments of Long-term Debt"},{"id":"net_change_cash","label":"Net change in cash","tag":"CashCashEquivalentsRestrictedCashAndRestrictedCashEquivalentsPeriodIncreaseDecreaseIncludingExchangeRateEffect","statement":"cashflow","parent":null,"weight":0,"kind":"total","def":"The period change in cash and equivalents, tying the three cash-flow sections to the balance-sheet cash movement.","goes_in":"Operating plus investing plus financing cash flows, including FX effect on cash.","gaap_ifrs":"ASC 230 / IAS 7 reconciling total; both require it to tie to the balance-sheet cash change.","agg_note":"cfo + cfi + cff (+ FX); reconciles to the movement in the balance-sheet cash line.","sector_note":"","example":"Apple FY2025 net increase in cash was $5,991,000,000 = CFO $111.482B + CFI $15.195B + CFF -$120.686B (CashCashEquivalents...PeriodIncreaseDecreaseIncludingExchangeRateEffect).","redflag":"A small net change can hide enormous gross flows (here $111B in, $121B out) — reading only the net movement misses that Apple returns nearly all its cash generation to shareholders.","value":5991000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of increase (decrease) in cash, cash equivalents, and cash and cash equivalents restricted to withdrawal or usage; including effect from exchange rate change. Cash includes, but is not limited to, currency on hand, demand deposits with banks or financial institutions, and other accounts with general characteristics of demand deposits. Cash equivalents include, but are not limited to, short-","xbrl_label":"Cash, Cash Equivalents, Restricted Cash and Restricted Cash Equivalents, Period Increase (Decrease), Including Exchange Rate Effect"},{"id":"free_cash_flow","label":"Free cash flow (derived)","tag":"","statement":"cashflow","parent":null,"weight":0,"kind":"total","def":"A non-GAAP derived metric: operating cash flow less capital expenditures — cash available after maintaining the asset base.","goes_in":"Net cash from operating activities minus payments to acquire PP&E; some definitions also deduct capitalized intangibles.","gaap_ifrs":"Not a defined GAAP or IFRS line — a computed/non-GAAP measure; no single authoritative definition, so cross-company comparisons require checking the formula used.","agg_note":"Derived from cfo (+1) and capex (-1); not part of the statutory roll-up.","sector_note":"","example":"Apple FY2025 free cash flow was about $98,767,000,000 = CFO $111,482,000,000 - capex $12,715,000,000; nearly all of it was returned via buybacks and dividends.","redflag":"Because it is non-GAAP, firms tailor the definition — excluding certain capex, or adding back 'one-time' cash costs — to present a flattering FCF; stretched payables can inflate the CFO input, so a rising FCF built on working-capital timing is not durable."}],"anchor_company":"Apple Inc."},"bank":{"id":"bank","label":"Bank / financial","anchor":"JPMorgan Chase & Co.","summary":"A bank has no COGS and no gross margin: its 'product' is money, so the core P&L is Net Interest Income (interest earned on loans and securities minus interest paid on deposits and debt), and the balance sheet is dominated by loans (assets) and deposits (liabilities) rather than inventory or PP&E. Credit risk is expensed through a loan-loss provision, and fee/trading revenue arrives as 'noninterest income' rather than sales.","flow":[{"step":"A customer deposits cash / the bank issues debt","note":"The deposit is a LIABILITY (Deposits), not revenue — the bank owes it back. Interest the bank pays on it becomes InterestExpense on the income statement."},{"step":"The bank lends that funding out or buys securities","note":"The loan is an ASSET (loans receivable); the yield it earns is InterestAndDividendIncomeOperating. This maturity/rate transformation — borrow short and cheap, lend long and dearer — is the whole business."},{"step":"Interest income minus interest expense = Net Interest Income","note":"InterestIncomeExpenseNet is the signature bank subtotal, the analog of gross profit. Divided by average earning assets it is the Net Interest Margin (NIM)."},{"step":"Set aside a reserve for loans that may not be repaid","note":"Under CECL the bank books a forward-looking ProvisionForLoanLeaseAndOtherLosses that flows through the P&L and builds the allowance (a contra-asset) on the balance sheet, long before any loan actually defaults."},{"step":"Add fee, trading and investment-banking revenue","note":"NoninterestIncome (card/asset-management fees, PrincipalTransactionsRevenue from trading, InvestmentBankingRevenue) is added; it needs no funding and diversifies away from rate risk."},{"step":"Subtract the cost of running the bank","note":"NoninterestExpense (compensation, technology, occupancy, legal) is deducted. NoninterestExpense / total net revenue is the efficiency ratio — lower is better."},{"step":"Tax the result to get net income, then reconcile capital","note":"After income tax, NetIncomeLoss accrues to StockholdersEquity via retained earnings. Regulators separately test whether that equity (especially CET1) is thick enough versus risk-weighted assets."}],"line_items":[{"id":"interest_income","label":"Interest & dividend income","tag":"InterestAndDividendIncomeOperating","statement":"income","parent":"nii","weight":1,"kind":"line","def":"Total interest and dividend income (incl. amortization/accretion of premiums and discounts) earned from loans and leases, investment securities, federal funds sold, securities purchased under resale agreements, and interest-bearing deposits.","goes_in":"The positive leg of Net interest income.","gaap_ifrs":"IFRS 9 reports the bulk as 'interest revenue calculated using the effective interest method'; scope is broadly comparable but IFRS separates EIR interest from other.","agg_note":"Sum of the yield on every earning-asset class — loans, AFS/HTM securities, trading book, resale agreements, cash at the Fed.","sector_note":"This is the gross yield on earning assets; its ratio to average earning assets is the asset-yield component of Net Interest Margin (NIM). Rate-sensitive: rises and falls with the Fed funds rate.","example":"JPM InterestAndDividendIncomeOperating = $61.29B (FY2011 anchor); the loans-and-leases slice alone (InterestAndFeeIncomeLoansAndLeases) was $93.84B in FY2025 as rates peaked.","redflag":"'Reaching for yield' — pumping reported interest income by loading the book with high-rate subprime or long-duration paper whose credit/rate risk is not yet reflected in the provision.","value":61293000000,"value_fy":2011,"value_end":"2011-12-31","xbrl_desc":"Represents the total of interest and dividend income, including any amortization and accretion (as applicable) of discounts and premiums, earned from (1) loans and leases whether held-for-sale or held-in-portfolio; (2) investment securities; (3) federal funds sold; (4) securities purchased under agreements to resell; (5) investments in banker's acceptances, commercial paper, or certificates of dep","xbrl_label":"Interest and Dividend Income, Operating"},{"id":"interest_income_loans","label":"of which: interest & fees on loans","tag":"InterestAndFeeIncomeLoansAndLeases","statement":"income","parent":"interest_income","weight":1,"kind":"line","def":"Interest and fee income generated by loans and leases the entity intends to hold — commercial, consumer, real-estate, credit-card and lease financing.","goes_in":"The largest component of interest & dividend income.","gaap_ifrs":"IFRS 9 EIR interest on loans at amortized cost; substantially comparable.","agg_note":"Disaggregation line — already contained within interest_income, shown to expose loan-book yield separately from securities yield.","sector_note":"Loan yield vs. deposit cost is the pure lending spread; a widening gap signals pricing power, a narrowing one signals deposit-beta pressure.","example":"JPM InterestAndFeeIncomeLoansAndLeases = $93.84B (FY2025).","redflag":"Capitalizing or accruing interest on loans that are actually non-performing (should be on non-accrual) inflates this line and hides deterioration.","value":93843000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The aggregate interest and fee income generated by: (1) loans the Entity has positive intent and ability to hold for the foreseeable future, or until maturity or payoff, including commercial and consumer loans, whether domestic or foreign, which may consist of: (a) industrial and agricultural; (b) real estate; and (c) real estate construction loans; (d) trade financing; (e) lease financing; (f) ho","xbrl_label":"Interest and Fee Income, Loans and Leases"},{"id":"interest_expense","label":"Interest expense","tag":"InterestExpense","statement":"income","parent":"nii","weight":-1,"kind":"line","def":"The cost of borrowed funds accounted for as interest — interest paid on deposits, short-term borrowings, and long-term debt.","goes_in":"The negative leg of Net interest income.","gaap_ifrs":"IFRS 9 'interest expense'; comparable, with EIR treatment of debt issuance costs.","agg_note":"Sum of interest paid across every interest-bearing funding source — deposits dominate for a deposit-rich bank like JPM.","sector_note":"Divided by interest-bearing liabilities gives funding cost; the sensitivity of that cost to rising rates is the 'deposit beta' — a low, sticky deposit beta is a durable competitive advantage.","example":"JPM InterestExpense = $81.32B (FY2023), of which InterestExpenseDeposits was $45.11B (FY2025) — deposits are the single biggest cost.","redflag":"A jump in deposit beta or heavy reliance on hot brokered/wholesale funding signals a franchise losing cheap sticky deposits — often masked when NII is reported net.","value":81321000000,"value_fy":2023,"value_end":"2023-12-31","xbrl_desc":"Amount of the cost of borrowed funds accounted for as interest expense.","xbrl_label":"Interest Expense"},{"id":"interest_expense_deposits","label":"of which: interest on deposits","tag":"InterestExpenseDeposits","statement":"income","parent":"interest_expense","weight":1,"kind":"line","def":"Aggregate interest expense on all deposit liabilities (interest-bearing checking, savings, money-market and time deposits).","goes_in":"The largest component of interest expense.","gaap_ifrs":"Comparable under IFRS.","agg_note":"Disaggregation line within interest_expense, isolating the cost of the core deposit franchise.","sector_note":"Deposit cost / average interest-bearing deposits = deposit rate paid; the gap to Fed funds is the value of the deposit franchise.","example":"JPM InterestExpenseDeposits = $45.11B (FY2025).","redflag":"Rapidly rising deposit interest with flat deposit balances means the bank is paying up to retain flighty money — margin compression ahead.","value":45112000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Aggregate amount of interest expense on all deposits.","xbrl_label":"Interest Expense, Deposits"},{"id":"nii","label":"Net interest income","tag":"InterestIncomeExpenseNet","statement":"income","parent":"total_net_revenue","weight":1,"kind":"subtotal","def":"The net amount of operating interest income (expense) — interest and dividend income minus interest expense.","goes_in":"One of the two pillars of total net revenue (with noninterest income).","gaap_ifrs":"IFRS presents 'net interest income' identically as a defined subtotal on bank income statements.","agg_note":"interest_income minus interest_expense. This is the bank's answer to 'gross profit' — but there is NO cost of goods sold and NO gross margin line.","sector_note":"NII / average earning assets = Net Interest Margin (NIM), the headline profitability gauge. NIM expands when the yield curve steepens and contracts when short rates catch up to asset yields.","example":"JPM InterestIncomeExpenseNet = $95.44B (FY2025) — the largest single revenue pillar.","redflag":"Reporting only NET interest income hides whether a good number came from higher asset yield (healthy) or from an unsustainable lag in repricing deposits (fragile).","value":95443000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The net amount of operating interest income (expense).","xbrl_label":"Interest Income (Expense), Net"},{"id":"noninterest_income","label":"Noninterest income","tag":"NoninterestIncome","statement":"income","parent":"total_net_revenue","weight":1,"kind":"subtotal","def":"Total non-spread income: fees and commissions, asset-management fees, card income, trading gains, investment banking, and gains on asset sales.","goes_in":"The second pillar of total net revenue.","gaap_ifrs":"IFRS 15 governs most fee revenue; trading gains sit under IFRS 9 fair value — comparable but disaggregated differently.","agg_note":"Sum of all fee, trading and other non-interest revenue lines; requires no funding, so it is prized for diversifying away from rate risk.","sector_note":"A high noninterest-income share lowers NIM dependence and rate sensitivity; trading-heavy income (see principal transactions) is more volatile than recurring asset-management fees.","example":"JPM NoninterestIncome = $87.00B (FY2025) — nearly as large as net interest income, reflecting JPM's markets and asset-management scale.","redflag":"Backfilling a weak-NII quarter with one-off securities/asset sale gains or aggressive Level-3 fair-value marks dressed up as recurring fee income.","value":87004000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The total amount of noninterest income which may be derived from: (1) fees and commissions; (2) premiums earned; (3) insurance policy charges; (4) the sale or disposal of assets; and (5) other sources not otherwise specified.","xbrl_label":"Noninterest Income"},{"id":"investment_banking_rev","label":"of which: investment banking revenue","tag":"InvestmentBankingRevenue","statement":"income","parent":"noninterest_income","weight":1,"kind":"line","def":"Underwriting spreads on new securities issues plus advisory fees for M&A, divestitures and restructurings.","goes_in":"A component of noninterest income.","gaap_ifrs":"IFRS 15 point-in-time / over-time recognition; comparable.","agg_note":"Disaggregation of the fee book, highly cyclical with capital-markets activity.","sector_note":"Fee-based and capital-light, but pro-cyclical — collapses in risk-off markets; a differentiator for money-center banks vs. pure lenders.","example":"JPM InvestmentBankingRevenue = $9.62B (FY2025).","redflag":"Pulling forward deal fees or booking contingent advisory fees before deals close overstates a volatile line.","value":9615000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Includes (1) underwriting revenue (the spread between the resale price received and the cost of the securities and related expenses) generated through the purchasing, distributing and reselling of new issues of securities (alternatively, could be a secondary offering of a large block of previously issued securities); and (2) fees earned for mergers, acquisitions, divestitures, restructurings, and ","xbrl_label":"Investment Banking Revenue"},{"id":"principal_transactions","label":"of which: principal transactions (trading)","tag":"PrincipalTransactionsRevenue","statement":"income","parent":"noninterest_income","weight":1,"kind":"line","def":"Realized and unrealized gains/losses from the difference between acquisition and fair/sale value of trading assets and liabilities, plus the firm's direct (principal) investing.","goes_in":"A component of noninterest income.","gaap_ifrs":"IFRS 9 fair-value-through-P&L; comparable.","agg_note":"Mark-to-market trading result — the most volatile revenue line; includes unrealized marks that have not been monetized.","sector_note":"Directly tied to Value-at-Risk and trading-book size; big swings here signal risk appetite, not franchise strength.","example":"JPM PrincipalTransactionsRevenue = $27.21B (FY2025).","redflag":"Unrealized gains on hard-to-value Level-3 positions can be manager-estimated; a rising share of income from marks (not cash) is a classic earnings-quality warning.","value":27212000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of realized and unrealized gain (loss) resulting from the difference between acquisition price and selling price or fair value of trading assets and trading liabilities, and from the firm's direct investment activity, conducted separately from customer trading activities, including, but not limited to, investments in private equity, alternative investment products, real estate, and exchange","xbrl_label":"Principal Transactions Revenue, Net"},{"id":"total_net_revenue","label":"Total net revenue","tag":"RevenuesNetOfInterestExpense","statement":"income","parent":"pretax_income","weight":1,"kind":"total","def":"Total revenue net of interest expense — net interest income plus noninterest income — the bank's top line.","goes_in":"The revenue base from which provisions, expenses and tax are subtracted.","gaap_ifrs":"IFRS banks present an equivalent 'total operating income' / 'net revenue' subtotal.","agg_note":"nii + noninterest_income. Note: revenue is stated NET of interest expense — unlike an industrial, there is no gross 'sales' line above it.","sector_note":"The denominator of the efficiency ratio (NoninterestExpense / total net revenue) and of pre-provision net revenue (PPNR), the pre-credit earnings power analysts watch through the cycle.","example":"JPM RevenuesNetOfInterestExpense = $182.45B (FY2025) = $95.44B NII + $87.00B noninterest income.","redflag":"Netting choices (e.g. reporting trading revenue net of funding cost) can shift the same economics between NII and noninterest income, distorting NIM and efficiency-ratio comparisons.","value":182447000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of revenue recognized from goods sold, services rendered, insurance premiums, or other activities that constitute an earning process. Includes, but is not limited to, investment and interest income after deduction of interest expense when recognized as a component of revenue, and sales and trading gain (loss).","xbrl_label":"Revenues, Net of Interest Expense"},{"id":"provision","label":"Provision for credit losses","tag":"ProvisionForLoanLeaseAndOtherLosses","statement":"income","parent":"pretax_income","weight":-1,"kind":"line","def":"Expense for loan, lease and other credit losses based on the assessment of uncollectibility — the P&L charge that builds (or releases) the balance-sheet allowance.","goes_in":"A charge subtracted between total net revenue and pretax income.","gaap_ifrs":"US GAAP uses CECL (lifetime expected loss booked day one); IFRS 9 uses a 3-stage ECL model (12-month loss until credit deteriorates) — the single biggest GAAP/IFRS difference for banks, making provisions non-comparable across regimes.","agg_note":"Forward-looking estimate, not a realized loss — a management judgment driven by macro forecasts, loan growth and portfolio mix. Can be negative (a reserve release) in improving conditions.","sector_note":"The swing factor in bank earnings. Reserve builds crush EPS in downturns; releases flatter it in recoveries. Allowance coverage = allowance / gross loans (ACL ratio) tracks the balance-sheet stock this feeds.","example":"JPM ProvisionForLoanLeaseAndOtherLosses = $14.21B (FY2025); by contrast it was a NEGATIVE $9.07B reserve release in FY2021 (ProvisionForLoanLossesExpensed) as pandemic reserves unwound — showing how the sign flips across the cycle.","redflag":"Under-provisioning to boost earnings, or day-2 CECL 'smoothing' — timing releases/builds to hit EPS targets rather than to reflect true credit deterioration. The most-gamed line in bank accounting.","value":14212000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of expense related loan transactions, lease transactions, credit loss from transactions other than loan and lease transactions, and other loss based on assessment of uncollectability from the counterparty to reduce the account to their net realizable value.","xbrl_label":"Provision for Loan, Lease, and Other Losses"},{"id":"noninterest_expense","label":"Noninterest expense","tag":"NoninterestExpense","statement":"income","parent":"pretax_income","weight":-1,"kind":"line","def":"Total operating expense: compensation and benefits, technology, occupancy, professional/legal, marketing and other non-credit costs.","goes_in":"The operating-cost charge subtracted to reach pretax income.","gaap_ifrs":"IFRS presents equivalent operating-expense lines; comparable.","agg_note":"Sum of all running costs of the bank — there is no COGS, so this is effectively the entire cost base outside credit and funding.","sector_note":"NoninterestExpense / total net revenue = the efficiency ratio (JPM ~52% = $95.6B / $182.4B); best-in-class universal banks run low-50s. Rising efficiency ratio signals cost creep or revenue erosion.","example":"JPM NoninterestExpense = $95.64B (FY2025), an efficiency ratio of ~52.4% against $182.45B net revenue.","redflag":"Parking recurring costs in 'special items' or capitalizing software/legal to flatter the efficiency ratio; large recurring legal reserves that keep being labeled one-time.","value":95640000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Total aggregate amount of all noninterest expense.","xbrl_label":"Noninterest Expense"},{"id":"pretax_income","label":"Income before income taxes","tag":"IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest","statement":"income","parent":"net_income","weight":1,"kind":"total","def":"Pretax income from continuing operations — total net revenue less provision for credit losses and noninterest expense.","goes_in":"The base on which income tax is levied.","gaap_ifrs":"Comparable 'profit before tax' subtotal under IFRS.","agg_note":"total_net_revenue − provision − noninterest_expense. Pre-provision net revenue (PPNR = revenue − expense, before provision) is the version analysts isolate to see earnings power stripped of credit-cycle noise.","sector_note":"Pretax pre-provision earnings show franchise strength; the gap to reported pretax income is entirely the credit provision — the cyclical variable.","example":"JPM pretax income = $72.60B (FY2025) = $182.45B revenue − $14.21B provision − $95.64B expense.","redflag":"A pretax number propped up by a reserve RELEASE rather than by PPNR is low quality — always decompose.","value":72595000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of income (loss) from continuing operations, including income (loss) from equity method investments, before deduction of income tax expense (benefit), and income (loss) attributable to noncontrolling interest.","xbrl_label":"Income (Loss) from Continuing Operations before Income Taxes, Noncontrolling Interest"},{"id":"income_tax","label":"Income tax expense","tag":"IncomeTaxExpenseBenefit","statement":"income","parent":"net_income","weight":-1,"kind":"line","def":"Current and deferred income tax expense (or benefit) on pretax income.","goes_in":"Subtracted from pretax income to reach net income.","gaap_ifrs":"IAS 12 vs. ASC 740 — broadly comparable, some deferred-tax and uncertain-position differences.","agg_note":"Effective tax rate = tax / pretax income; banks carry large deferred tax assets and tax-advantaged municipal securities and affordable-housing credits that lower the rate.","sector_note":"Tax-equivalent adjustments are often made to NII to compare taxable vs. tax-exempt securities yields on a like-for-like basis.","example":"JPM IncomeTaxExpenseBenefit = $15.55B (FY2025), an effective rate of ~21.4% on $72.60B pretax.","redflag":"Cherry-picked discrete tax benefits or DTA valuation-allowance releases that lift net income without any operating improvement.","value":15547000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of current income tax expense (benefit) and deferred income tax expense (benefit) pertaining to continuing operations.","xbrl_label":"Income Tax Expense (Benefit)"},{"id":"net_income","label":"Net income","tag":"NetIncomeLoss","statement":"income","parent":null,"weight":0,"kind":"total","def":"Net income attributable to the parent after tax — the bottom line that flows into retained earnings and equity.","goes_in":"Terminal income total; accrues to StockholdersEquity via retained earnings (net of preferred dividends for EPS).","gaap_ifrs":"Comparable 'profit for the year' under IFRS.","agg_note":"pretax_income − income_tax. For common-shareholder metrics, subtract preferred dividends before dividing by tangible common equity.","sector_note":"Net income to common / average tangible common equity = ROTCE, the premier bank return metric (JPM targets ~17%+). ROTCE, not ROE, because goodwill-heavy equity flatters plain ROE.","example":"JPM NetIncomeLoss = $57.05B (FY2025).","redflag":"A record bottom line driven by reserve releases, securities gains or tax items rather than PPNR is not repeatable — judge banks on ROTCE through a full credit cycle.","value":57048000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The portion of profit or loss for the period, net of income taxes, which is attributable to the parent.","xbrl_label":"Net Income (Loss) Attributable to Parent"},{"id":"cash_due","label":"Cash & due from banks","tag":"CashAndDueFromBanks","statement":"balance","parent":"assets","weight":1,"kind":"line","def":"Vault cash, cash items in process of collection, and non-interest balances due from other banks.","goes_in":"A liquid-asset component of total assets.","gaap_ifrs":"Comparable; IFRS 'cash and balances with central banks'.","agg_note":"Smallest, most liquid tier of the asset stack — shown separately from interest-bearing balances at central banks.","sector_note":"Part of High-Quality Liquid Assets used in the LCR (Liquidity Coverage Ratio) regulatory liquidity test.","example":"JPM CashAndDueFromBanks = $21.74B (FY2025).","redflag":"Minimal risk here; but a bank shrinking cash while growing illiquid loans is stretching liquidity.","value":21742000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"For banks and other depository institutions: Includes cash on hand (currency and coin), cash items in process of collection, noninterest bearing deposits due from other financial institutions (including corporate credit unions), and noninterest bearing balances with the Federal Reserve Banks, Federal Home Loan Banks and central banks.","xbrl_label":"Cash and Due from Banks"},{"id":"interest_bearing_deposits","label":"Interest-bearing deposits with banks","tag":"InterestBearingDepositsInBanks","statement":"balance","parent":"assets","weight":1,"kind":"line","def":"Interest-bearing balances placed with other financial institutions and central banks (e.g. reserves at the Fed, short-term CDs).","goes_in":"A liquid, earning-asset component of total assets.","gaap_ifrs":"Comparable.","agg_note":"Often the largest single liquidity buffer for a money-center bank — reserves parked at the Fed earn interest (IORB).","sector_note":"Core High-Quality Liquid Assets for LCR; a swing here reflects excess deposits not yet deployed into loans (low loan-to-deposit ratio).","example":"JPM InterestBearingDepositsInBanks = $321.60B (FY2025) — a huge liquidity cushion.","redflag":"None per se, but very high balances signal weak loan demand and NIM drag from low-yielding cash.","value":321596000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"For banks and other depository institutions (including Federal Reserve Banks, if applicable): Interest-bearing deposits in other financial institutions for relatively short periods of time including, for example, certificates of deposits, which are presented separately from cash on the balance sheet.","xbrl_label":"Interest-bearing Deposits in Banks and Other Financial Institutions"},{"id":"fed_funds_resell","label":"Fed funds sold & resale agreements","tag":"FederalFundsSoldAndSecuritiesPurchasedUnderAgreementsToResell","statement":"balance","parent":"assets","weight":1,"kind":"line","def":"Funds lent to other institutions as federal funds sold, plus securities purchased under agreements to resell (reverse repos) — short-term, collateralized lending.","goes_in":"A collateralized short-term earning asset in total assets.","gaap_ifrs":"Comparable ('reverse repurchase agreements').","agg_note":"Secured financing book — low credit risk (collateralized) but sizable, and often nets against repo liabilities.","sector_note":"A core money-markets funding tool; gross vs. net presentation (offsetting under ASC 210-20) materially changes reported total assets and leverage ratios.","example":"JPM FederalFundsSoldAndSecuritiesPurchasedUnderAgreementsToResell = $336.43B (FY2025).","redflag":"Aggressive netting to shrink reported assets/leverage; 'window-dressing' repo books down at quarter-end reporting dates.","value":336426000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Includes: (1) the amount outstanding of funds lent to other depository institutions, securities brokers, or securities dealers in the form of Federal Funds sold; for example, immediately available funds lent under agreements or contracts that mature in one business day or roll over under a continuing contract, regardless of the nature of the transaction or the collateral involved, excluding overni","xbrl_label":"Federal Funds Sold and Securities Purchased under Agreements to Resell"},{"id":"afs_securities","label":"Available-for-sale securities","tag":"DebtSecuritiesAvailableForSaleExcludingAccruedInterest","statement":"balance","parent":"assets","weight":1,"kind":"line","def":"Debt securities classified available-for-sale, carried at fair value with unrealized gains/losses in other comprehensive income (OCI).","goes_in":"The investment-securities component of total assets.","gaap_ifrs":"IFRS 9 'fair value through OCI (FVOCI)'; economically similar but different reclassification rules.","agg_note":"Marked to fair value each period; unrealized losses hit equity through AOCI even though they bypass net income.","sector_note":"The epicenter of 2023's bank stress: rising rates pushed AFS (and especially HTM) bond values down, creating large unrealized losses that erode tangible equity when marked. Watch AFS mark vs. CET1.","example":"JPM DebtSecuritiesAvailableForSaleExcludingAccruedInterest = $507.20B (FY2025).","redflag":"Shifting securities from AFS to HTM to stop marking them to market (freezing unrealized losses out of the balance sheet) masks true economic capital — the SVB warning.","value":507198000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"","xbrl_label":null},{"id":"htm_securities","label":"Held-to-maturity securities","tag":"HeldToMaturitySecurities","statement":"balance","parent":"assets","weight":1,"kind":"line","def":"Debt securities the bank intends and is able to hold to maturity, carried at amortized cost (NOT fair value).","goes_in":"The investment-securities component of total assets.","gaap_ifrs":"IFRS 9 'amortized cost' category; comparable intent-based classification.","agg_note":"Held at cost — unrealized losses are disclosed only in footnotes, never on the face of the balance sheet unless sold.","sector_note":"The HTM 'unrealized loss' footnote is a key hidden-risk gauge: a large gap between HTM carrying value and fair value is embedded capital risk if the bank is ever forced to sell for liquidity.","example":"JPM HeldToMaturitySecurities = $201.90B (FY2020 anchor).","redflag":"Over-stuffing HTM to avoid AFS marks, then being forced to sell (which taints the whole HTM portfolio and crystallizes losses) — the exact mechanism of the 2023 regional-bank failures.","value":201899000000,"value_fy":2020,"value_end":"2020-12-31","xbrl_desc":"Amount of investment in debt security measured at amortized cost (held-to-maturity).","xbrl_label":"Debt Securities, Held-to-maturity"},{"id":"gross_loans","label":"Loans (gross, before allowance)","tag":"FinancingReceivableExcludingAccruedInterestBeforeAllowanceForCreditLoss","statement":"balance","parent":"net_loans","weight":1,"kind":"line","def":"Amortized-cost basis of loans and leases held for investment before deducting the allowance for credit losses.","goes_in":"The gross leg of net loans.","gaap_ifrs":"Comparable gross carrying amount under IFRS 9.","agg_note":"The bank's core earning asset — commercial, consumer, card and real-estate loans — before the reserve is netted off.","sector_note":"Denominator of allowance coverage (ACL / gross loans) and of the NPL ratio (nonperforming loans / gross loans). Loans / Deposits = loan-to-deposit ratio, a funding-intensity gauge (JPM runs well below 100%, i.e. deposit-funded).","example":"JPM gross loans (FinancingReceivableExcludingAccruedInterestBeforeAllowanceForCreditLoss) = $1,408.9B (FY2025).","redflag":"Rapid loan growth that outpaces peers usually means looser underwriting; a growing book with a shrinking allowance ratio is a classic pre-loss warning.","value":1408905000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"","xbrl_label":null},{"id":"allowance","label":"Allowance for credit losses (contra)","tag":"FinancingReceivableAllowanceForCreditLossExcludingAccruedInterest","statement":"balance","parent":"net_loans","weight":-1,"kind":"line","def":"The balance-sheet reserve (contra-asset) held against expected credit losses on the loan portfolio, built by the P&L provision.","goes_in":"Deducted from gross loans to yield net loans (a contra-asset, hence weight −1).","gaap_ifrs":"US GAAP CECL lifetime expected loss vs. IFRS 9 staged ECL — the same non-comparability as the provision line; CECL reserves are structurally larger.","agg_note":"Stock counterpart to the flow 'provision'. Rollforward = beginning allowance + provision − charge-offs + recoveries. Charge-offs reduce it; provisions replenish it.","sector_note":"Allowance / gross loans = the ACL coverage ratio (JPM ~1.8%); allowance / nonperforming loans = the NPL coverage ratio. Both gauge whether reserves are adequate for the risk on the book.","example":"JPM FinancingReceivableAllowanceForCreditLossExcludingAccruedInterest = $25.77B (FY2025), ~1.8% of gross loans.","redflag":"A falling coverage ratio while charge-offs or delinquencies rise = under-reserving to flatter earnings. Day-1 CECL setup and later releases are prime smoothing tools.","value":25765000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"","xbrl_label":null},{"id":"net_loans","label":"Loans, net of allowance","tag":"LoansAndLeasesReceivableNetReportedAmount","statement":"balance","parent":"assets","weight":1,"kind":"subtotal","def":"Loans and leases held in portfolio after the allowance and net of deferred fees, costs, premiums and discounts.","goes_in":"The largest earning-asset component of total assets.","gaap_ifrs":"Comparable 'loans at amortized cost, net' under IFRS 9.","agg_note":"gross_loans − allowance. This net figure is what carries onto the asset total.","sector_note":"The dominant asset for a traditional bank; its yield vs. deposit cost drives NII. For JPM, trading/securities and cash are large enough that net loans are less than a quarter of the $4.4T balance sheet — a hallmark of a universal bank vs. a plain lender.","example":"JPM LoansAndLeasesReceivableNetReportedAmount = $823.74B (FY2015 anchor); using the FY2025 gross book it is ~$1,383B net ($1,408.9B − $25.8B).","redflag":"Loans reclassified as 'held for sale' or moved off-book (securitized) can shrink reported credit risk while the exposure survives via retained tranches or recourse.","value":823744000000,"value_fy":2015,"value_end":"2015-12-31","xbrl_desc":"Amount after allowance and deduction of deferred interest and fees, unamortized costs and premiums and discounts from face amounts, of loans and leases held in portfolio, including but not limited to, commercial and consumer loans. Excludes loans and leases covered under loss sharing agreements and loans held for sale.","xbrl_label":"Loans and Leases Receivable, Net Amount"},{"id":"goodwill","label":"Goodwill","tag":"Goodwill","statement":"balance","parent":"assets","weight":1,"kind":"line","def":"Excess of purchase price over the fair value of net assets acquired in past acquisitions.","goes_in":"An intangible component of total assets.","gaap_ifrs":"Both GAAP and IFRS carry goodwill at cost with annual impairment testing (no amortization).","agg_note":"Non-earning intangible; deducted (with other intangibles) from common equity to derive tangible common equity.","sector_note":"Goodwill is fully subtracted from CET1 regulatory capital and from tangible common equity — so it does NOT count toward loss absorption. That is exactly why ROTCE (tangible) is the preferred return metric over plain ROE.","example":"JPM Goodwill = $52.73B (FY2025).","redflag":"Deferred goodwill impairment when an acquired unit is clearly underperforming overstates both equity and book value per share.","value":52731000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount after accumulated impairment loss of an asset representing future economic benefits arising from other assets acquired in a business combination that are not individually identified and separately recognized.","xbrl_label":"Goodwill"},{"id":"other_assets","label":"Other assets","tag":"OtherAssets","statement":"balance","parent":"assets","weight":1,"kind":"line","def":"Assets not separately classified — premises and equipment, MSRs, derivatives receivable, deferred tax assets, accrued interest and miscellaneous.","goes_in":"A residual component of total assets.","gaap_ifrs":"Comparable residual line.","agg_note":"Catch-all; for a large dealer bank this includes sizeable derivative fair-value receivables and mortgage-servicing rights.","sector_note":"Watch for large deferred tax assets (limited CET1 recognition) and Level-3 derivative marks buried here.","example":"JPM OtherAssets = $198.78B (FY2025).","redflag":"A ballooning 'other assets' line can hide hard-to-value Level-3 positions and DTAs that regulators haircut from capital.","value":198775000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of assets classified as other.","xbrl_label":"Other Assets"},{"id":"assets","label":"Total assets","tag":"Assets","statement":"balance","parent":null,"weight":0,"kind":"total","def":"Sum of the carrying amounts of all recognized assets as of the balance-sheet date.","goes_in":"Top of the balance sheet; equals total liabilities plus equity.","gaap_ifrs":"Comparable.","agg_note":"Sum of cash, interest-bearing balances, resale agreements, AFS/HTM securities, net loans, goodwill and other assets. For a bank, loans and securities — not inventory/PP&E — dominate.","sector_note":"Denominator of return-on-assets (banks run ~1% ROA, far below industrials because of high leverage) and of the supplementary leverage ratio (SLR = Tier 1 / total leverage exposure).","example":"JPM Assets = $4,424.9B (FY2025) against just $362.4B equity — ~12x leverage, structurally far higher than any non-financial.","redflag":"Quarter-end 'window dressing' — temporarily shrinking repo/trading books on reporting dates to flatter leverage and SLR.","value":4424900000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Sum of the carrying amounts as of the balance sheet date of all assets that are recognized. Assets are probable future economic benefits obtained or controlled by an entity as a result of past transactions or events.","xbrl_label":"Assets"},{"id":"deposits","label":"Deposits","tag":"Deposits","statement":"balance","parent":"liabilities","weight":1,"kind":"line","def":"Aggregate deposit liabilities — domestic and foreign, interest and non-interest bearing (demand, savings, NOW and time deposits).","goes_in":"The largest component of total liabilities.","gaap_ifrs":"Comparable 'customer deposits' under IFRS.","agg_note":"The bank's cheapest and stickiest funding — for JPM the single largest line on the whole balance sheet. It is a LIABILITY, never revenue.","sector_note":"Loans / Deposits = loan-to-deposit ratio (funding intensity); the mix of non-interest vs. interest-bearing and insured vs. uninsured deposits drives both funding cost and run-risk. Uninsured-deposit concentration was the 2023 failure trigger.","example":"JPM Deposits = $2,559.3B (FY2025) — the funding engine behind the whole book.","redflag":"Heavy reliance on uninsured or brokered/hot deposits, or a spike in deposit rates to retain balances, signals franchise fragility and run vulnerability.","value":2559320000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The aggregate of all deposit liabilities held by the entity, including foreign and domestic, interest and noninterest bearing; may include demand deposits, saving deposits, Negotiable Order of Withdrawal (NOW) and time deposits among others.","xbrl_label":"Deposits"},{"id":"short_term_borrowings","label":"Short-term borrowings","tag":"ShortTermBorrowings","statement":"balance","parent":"liabilities","weight":1,"kind":"line","def":"Borrowings with original maturities of one year or less — commercial paper, federal funds purchased, repos and other wholesale short-term funding.","goes_in":"A wholesale-funding component of total liabilities.","gaap_ifrs":"Comparable.","agg_note":"Market-based funding that reprices fast — more expensive and flightier than core deposits.","sector_note":"A rising share of wholesale short-term funding vs. deposits raises liquidity risk (fails the spirit of the LCR/NSFR stable-funding tests).","example":"JPM ShortTermBorrowings = $64.78B (FY2025).","redflag":"Growing short-term wholesale reliance to fund long-dated assets = maturity-mismatch / liquidity risk, the classic bank-run setup.","value":64776000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Reflects the total carrying amount as of the balance sheet date of debt having initial terms less than one year or the normal operating cycle, if longer.","xbrl_label":"Short-term Debt"},{"id":"trading_liabilities","label":"Trading liabilities","tag":"TradingLiabilities","statement":"balance","parent":"liabilities","weight":1,"kind":"line","def":"Obligations from the trading book — securities sold not yet purchased (short positions) and derivative liabilities carried at fair value.","goes_in":"A fair-value component of total liabilities.","gaap_ifrs":"IFRS 9 fair-value-through-P&L liabilities; comparable.","agg_note":"Mark-to-market each period; the mirror of trading assets and largely a dealer-bank feature.","sector_note":"Tied to VaR and market-risk RWA; big for universal banks, near-zero for a plain community lender.","example":"JPM TradingLiabilities = $216.02B (FY2025).","redflag":"Level-3 derivative liabilities marked with unobservable inputs; own-credit (DVA) gains that boost income when the bank's own spread widens are non-economic.","value":216019000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The carrying amount of liabilities as of the balance sheet date that pertain to principal and customer trading transactions, or which may be incurred with the objective of generating a profit from short-term fluctuations in price as part of an entity's market-making, hedging and proprietary trading. Examples include short positions in securities, derivatives and commodities, obligations under repu","xbrl_label":"Trading Liabilities"},{"id":"long_term_debt","label":"Long-term debt","tag":"LongTermDebt","statement":"balance","parent":"liabilities","weight":1,"kind":"line","def":"Borrowings with maturities beyond one year — senior and subordinated notes, including holding-company debt.","goes_in":"A term-funding component of total liabilities.","gaap_ifrs":"Comparable; IFRS 9 amortized-cost measurement.","agg_note":"Stable term funding; senior holdco debt also counts toward TLAC (total loss-absorbing capacity) for G-SIBs.","sector_note":"Part of the TLAC/MREL stack that must be bailed in before deposits in resolution; a deliberate buffer, not a weakness.","example":"JPM LongTermDebt = $267.89B (FY2013 anchor).","redflag":"Refinancing walls concentrated in a tightening window, or structured notes with embedded optionality mismarked in the fair-value option.","value":267889000000,"value_fy":2013,"value_end":"2013-12-31","xbrl_desc":"Amount, after unamortized (discount) premium and debt issuance costs, of long-term debt. Includes, but not limited to, notes payable, bonds payable, debentures, mortgage loans and commercial paper. Excludes capital lease obligations.","xbrl_label":"Long-term Debt"},{"id":"liabilities","label":"Total liabilities","tag":"Liabilities","statement":"balance","parent":null,"weight":0,"kind":"total","def":"Sum of the carrying amounts of all recognized liabilities as of the balance-sheet date.","goes_in":"Total assets minus total liabilities equals stockholders' equity.","gaap_ifrs":"Comparable.","agg_note":"Deposits + short-term borrowings + trading liabilities + long-term debt + other. Deposits dominate for a deposit-funded bank.","sector_note":"The thin sliver between total liabilities and total assets is equity — banks are the most leveraged of all sectors, which is exactly why capital-adequacy regulation exists.","example":"JPM Liabilities = $4,062.5B (FY2025) — 92% of the $4,424.9B balance sheet.","redflag":"Off-balance-sheet exposures (loan commitments, guarantees, VIE/conduit sponsorship) are NOT in this total but can pull losses back on-balance-sheet in stress — read the commitments footnote.","value":4062462000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Sum of the carrying amounts as of the balance sheet date of all liabilities that are recognized. Liabilities are probable future sacrifices of economic benefits arising from present obligations of an entity to transfer assets or provide services to other entities in the future.","xbrl_label":"Liabilities"},{"id":"preferred_stock","label":"Preferred stock","tag":"PreferredStockLiquidationPreferenceValue","statement":"balance","parent":"equity","weight":1,"kind":"line","def":"Liquidation preference value of issued preferred shares — senior to common in the capital structure.","goes_in":"A component of total stockholders' equity, senior to common.","gaap_ifrs":"IFRS may classify some preferred as liability vs. equity depending on terms; GAAP presentation differs.","agg_note":"Preferred (and qualifying AT1) sits between debt and common equity; its dividends are subtracted from net income before computing income to common.","sector_note":"Perpetual non-cumulative preferred and AT1/CoCo instruments count toward Additional Tier 1 capital but NOT CET1 — the highest-quality capital that matters most in stress tests.","example":"JPM PreferredStockLiquidationPreferenceValue = $20.10B (FY2025).","redflag":"Leaning on AT1/preferred to hit total-capital ratios while CET1 (true common loss absorption) stays thin; AT1 coupons can be skipped, surprising investors.","value":20100000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Value of the difference between preference in liquidation and the par or stated values of the preferred shares.","xbrl_label":"Preferred Stock, Liquidation Preference, Value"},{"id":"common_stock","label":"Common stock (par)","tag":"CommonStockValue","statement":"balance","parent":"equity","weight":1,"kind":"line","def":"Par value of issued common shares (paid-in capital above par sits in additional paid-in capital).","goes_in":"A component of total stockholders' equity.","gaap_ifrs":"Comparable 'share capital'.","agg_note":"Small nominal figure; the economic common equity is dominated by retained earnings and paid-in capital.","sector_note":"Common equity, net of goodwill/intangibles, is tangible common equity — the base for CET1 and ROTCE.","example":"JPM CommonStockValue = $4.11B (FY2025).","redflag":"Not a red-flag line by itself; watch share issuance/dilution trends in the fuller equity rollforward.","value":4105000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Aggregate par or stated value of issued nonredeemable common stock (or common stock redeemable solely at the option of the issuer). This item includes treasury stock repurchased by the entity. Note: elements for number of nonredeemable common shares, par value and other disclosure concepts are in another section within stockholders' equity.","xbrl_label":"Common Stock, Value, Issued"},{"id":"retained_earnings","label":"Retained earnings","tag":"RetainedEarningsAccumulatedDeficit","statement":"balance","parent":"equity","weight":1,"kind":"line","def":"Cumulative net income retained after dividends and buybacks — the largest component of common equity.","goes_in":"The largest component of total stockholders' equity.","gaap_ifrs":"Comparable.","agg_note":"Prior retained earnings + net income − common and preferred dividends. The link between the income statement and the balance sheet.","sector_note":"Organic capital generation = retained earnings growth; it funds CET1 buildup, buybacks and loan growth without external raises — the mark of a self-funding franchise.","example":"JPM RetainedEarningsAccumulatedDeficit = $416.06B (FY2025).","redflag":"AOCI (unrealized AFS losses) sits in equity alongside retained earnings and can quietly erode tangible book value even when retained earnings rise — read total equity, not just retained earnings.","value":416055000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The cumulative amount of the reporting entity's undistributed earnings or deficit.","xbrl_label":"Retained Earnings (Accumulated Deficit)"},{"id":"equity","label":"Total stockholders' equity","tag":"StockholdersEquity","statement":"balance","parent":null,"weight":0,"kind":"total","def":"Total stockholders' equity attributable to the parent — preferred, common par, paid-in capital, retained earnings and accumulated OCI.","goes_in":"Balancing item: total assets minus total liabilities.","gaap_ifrs":"Comparable.","agg_note":"The residual claim. From it, deduct goodwill/intangibles and preferred to reach tangible common equity, then apply regulatory adjustments to reach CET1.","sector_note":"CET1 capital ratio = CET1 / risk-weighted assets is THE binding regulatory constraint (JPM CET1 ~15%, well above the ~11-12% requirement). Net income to common / tangible common equity = ROTCE. Equity is a thin ~8% of assets — the leverage that makes capital rules existential for banks.","example":"JPM StockholdersEquity = $362.44B (FY2025) supporting $4,424.9B of assets — an ~8.2% equity-to-assets ratio.","redflag":"Reported equity flattered by unmarked HTM losses, goodwill, and DTAs; the regulator's CET1 strips all of these out, so book equity can materially overstate true loss-absorbing capital.","value":362438000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Total of all stockholders' equity (deficit) items, net of receivables from officers, directors, owners, and affiliates of the entity which are attributable to the parent. The amount of the economic entity's stockholders' equity attributable to the parent excludes the amount of stockholders' equity which is allocable to that ownership interest in subsidiary equity which is not attributable to the p","xbrl_label":"Stockholders' Equity Attributable to Parent"}],"anchor_company":"JPMORGAN CHASE & CO"},"utility":{"id":"utility","label":"Utility / regulated","anchor":"NextEra Energy, Inc.","summary":"A regulated utility does not price freely: a regulator lets it earn a fixed allowed ROE on the depreciated capital it has sunk into plant (the rate base), so its statements are dominated by a massive net PP&E base, large long-term debt funding it, and two line items almost unique to the sector — regulatory assets/liabilities (costs the regulator lets it defer and recover, or over-collections it must refund) and AFUDC (financing cost capitalized into plant during construction). Earnings are engineered around timing (deferral, AFUDC, depreciation) rather than volume, and the business is free-cash-flow negative by design because annual capex to grow rate base dwarfs operating cash flow.","flow":[{"step":"Capital is invested in plant (rate base)","note":"The utility funds power plants, wires, and pipes with debt + equity; the depreciated cost of that used-and-useful plant becomes the rate base — for NextEra, regulated net PP&E of ~$54.9B (PublicUtilitiesPropertyPlantAndEquipmentNet) is the working proxy."},{"step":"Regulator sets the allowed return","note":"The commission multiplies rate base by an allowed weighted cost of capital (an allowed ROE on the equity slice, e.g. ~10-11%) to produce the return the utility is permitted to earn — rate base × allowed ROE = the equity return baked into revenue."},{"step":"Revenue requirement is built","note":"Allowed return + recoverable operating costs (fuel & purchased power, O&M, depreciation, non-income taxes) = the total revenue requirement the regulator authorizes the utility to collect."},{"step":"Tariffs bill customers for kWh sold","note":"The revenue requirement is divided by forecast sales to set per-kWh tariffs; actual billed electricity + gas sales become operating revenues (RegulatedAndUnregulatedOperatingRevenue $27.4B, regulated + competitive-generation segments)."},{"step":"Recoverable costs flow through to operating income","note":"Fuel, O&M, depreciation and property taxes are deducted; many volatile costs (fuel, storm restoration) are pass-throughs deferred as regulatory assets rather than hitting earnings — OperatingIncomeLoss $8.28B."},{"step":"Heavy interest and AFUDC shape net income","note":"Interest on ~$93B of debt is subtracted (in NonoperatingIncomeExpense), while AFUDC and regulatory deferrals add non-cash earnings — consolidated ProfitLoss $5.33B, $6.84B attributable to the parent."},{"step":"Capex outruns cash — fund the gap, pay the dividend","note":"Operating cash flow ($12.5B) covers only part of the multi-tens-of-billions capex program, so the utility perpetually issues debt ($23.4B) and equity to fund growth while still paying a rising dividend ($4.68B) — negative free cash flow is the normal steady state."}],"line_items":[{"id":"rate_base","label":"Rate base (regulated net PP&E proxy)","tag":"PublicUtilitiesPropertyPlantAndEquipmentNet","statement":"balance","parent":null,"weight":0,"kind":"memo","def":"Period-end total net regulated PP&E — the working proxy for rate base, the depreciated capital on which the regulator lets the utility earn its allowed return. Rate base is not a single GAAP line; it is regulated net plant adjusted by the commission for working capital, deferred taxes and CWIP conventions.","goes_in":"The regulatory return calculation, not a statement subtotal","gaap_ifrs":"US-GAAP utility-specific tag; IFRS (IFRS 14 Regulatory Deferral Accounts) has no direct rate-base concept and rate regulation is disclosed rather than measured.","agg_note":"$54.9B regulated net PP&E vs $156.2B total net PP&E — the rest is competitive (unregulated) generation not in any rate base. Rate base × allowed ROE, not sales volume, is what actually drives regulated earnings.","sector_note":"The single most important number a utility analyst tracks: rate-base growth (target ~% CAGR) times allowed ROE is the earnings engine. Compare allowed ROE to earned ROE to see if the utility is under-earning its authorization.","example":"NextEra regulated net PP&E $54,918,000,000. At an illustrative ~10.5% allowed ROE on the equity-funded share, this base is what converts into the authorized return embedded in tariffs.","redflag":"Padding rate base by capitalizing costs that are really O&M, or leaving completed plant in CWIP to keep earning AFUDC, inflates the base ratepayers must fund a return on.","value":54918000000,"value_fy":2021,"value_end":"2021-03-31","xbrl_desc":"Period end amount of total net PPE.","xbrl_label":"Public Utilities, Property, Plant and Equipment, Net"},{"id":"rev_operating","label":"Operating revenues (regulated + unregulated)","tag":"RegulatedAndUnregulatedOperatingRevenue","statement":"income","parent":"op_income","weight":1,"kind":"revenue","def":"Total operating revenues recognized during the period, combining tariff-based regulated utility sales with revenue from competitive/unregulated generation and energy marketing segments.","goes_in":"Operating income","gaap_ifrs":"US-GAAP; recognition under ASC 606, though regulated tariff revenue and alternative-revenue programs have utility-specific guidance (ASC 980) with no clean IFRS equivalent.","agg_note":"Blends two very different businesses: a rate-regulated utility (FPL) whose revenue is set to recover a revenue requirement, and NextEra Energy Resources' contracted/merchant renewables whose revenue is market- and PPA-driven.","sector_note":"Split regulated vs unregulated revenue: regulated dollars carry an allowed ROE and low risk; unregulated dollars carry merchant/PPA risk and deserve a different multiple.","example":"NextEra operating revenues $27,412,000,000 for the year.","redflag":"Pulling forward alternative-revenue-program or decoupling true-ups to smooth a soft quarter; watch large swings in unbilled or contract-asset revenue not backed by delivered energy.","value":27412000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The total amount of operating revenues recognized during the period.","xbrl_label":"Regulated and Unregulated Operating Revenue"},{"id":"opex_om","label":"O&M expense (operations & maintenance)","tag":"UtilitiesOperatingExpenseMaintenanceAndOperations","statement":"income","parent":"opex_total","weight":1,"kind":"expense","def":"Operating expense for routine plant maintenance, repairs and operations of the regulated business — the recurring cost of running and maintaining the grid and generation fleet.","goes_in":"Total operating expenses","gaap_ifrs":"US-GAAP; broadly comparable to IFRS operating expense but the O&M-vs-capital boundary is regulator-influenced.","agg_note":"A recoverable cost in the revenue requirement — prudently incurred O&M is passed through to customers, so O&M discipline mostly affects timing and regulatory lag, not long-run margin.","sector_note":"Track O&M per customer and the ratio of O&M to rate base; rising O&M with flat rate base signals cost pressure the utility must file a rate case to recover.","example":"NextEra maintenance & operations expense $5,399,000,000.","redflag":"The signature utility abuse: reclassifying recurring O&M as capital so it enters rate base (earns a return + is depreciated slowly) instead of hitting current expense — flatters earnings and quietly raises customer bills.","value":5399000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of operating expense for routine plant maintenance, repairs and operations of regulated operation.","xbrl_label":"Utilities Operating Expense, Maintenance and Operations"},{"id":"dep_amort","label":"Depreciation & amortization","tag":"DepreciationAndAmortization","statement":"income","parent":"opex_total","weight":1,"kind":"expense","def":"Current-period charge allocating the cost of long-lived physical plant over its regulator-approved useful life.","goes_in":"Total operating expenses","gaap_ifrs":"US-GAAP; depreciation rates are set by the regulator (not purely GAAP), so book depreciation ties to authorized rates rather than a free management estimate.","agg_note":"A recoverable cost — depreciation is a dollar-for-dollar component of the revenue requirement, so it is simultaneously an expense and a return of (not on) capital collected from ratepayers.","sector_note":"Depreciation as a % of gross plant reveals the authorized asset lives; lengthening lives lowers current expense and boosts near-term EPS — a lever to watch.","example":"NextEra depreciation & amortization $6,580,000,000.","redflag":"Extending depreciable lives or lowering depreciation rates to reduce current expense; also over-depreciating early to build a regulatory liability that flatters later periods.","value":6580000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The current period expense charged against earnings on long-lived, physical assets not used in production, and which are not intended for resale, to allocate or recognize the cost of such assets over their useful lives; or to record the reduction in book value of an intangible asset over the benefit period of such asset; or to reflect consumption during the period of an asset that is not used in p","xbrl_label":"Depreciation, Depletion and Amortization, Nonproduction"},{"id":"taxes_other","label":"Taxes other than income","tag":"TaxesExcludingIncomeAndExciseTaxes","statement":"income","parent":"opex_total","weight":1,"kind":"expense","def":"All taxes unrelated to income and excluding excise/sales taxes on revenue — principally property taxes on the enormous physical plant base, plus payroll and franchise taxes.","goes_in":"Total operating expenses","gaap_ifrs":"US-GAAP; comparable line exists under IFRS.","agg_note":"Large for utilities precisely because they own so much taxable physical plant; also a recoverable pass-through in most rate structures.","sector_note":"Property-tax growth roughly tracks gross-plant growth — a cross-check on stated rate-base expansion.","example":"NextEra taxes other than income $2,469,000,000.","redflag":"Deferring property-tax true-ups into regulatory assets to smooth the expense line across quarters.","value":2469000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"All taxes not related to income of the entity or excise or sales taxes levied on the revenue of the entity that are not reported elsewhere. These taxes could include production, real estate, personal property, and pump tax.","xbrl_label":"Taxes, Miscellaneous"},{"id":"opex_total","label":"Total operating expenses","tag":"OperatingExpenses","statement":"income","parent":"op_income","weight":-1,"kind":"subtotal","def":"Aggregate recurring operating costs deducted from operating revenues — including fuel & purchased power, O&M, depreciation and non-income taxes.","goes_in":"Operating income","gaap_ifrs":"US-GAAP aggregate.","agg_note":"The itemized children above (O&M $5.40B + D&A $6.58B + other taxes $2.47B = $14.45B) do not sum to the $19.39B total: the ~$4.9B gap is fuel & purchased power (and other operating costs) which NextEra does not break out to a separate us-gaap fuel tag in this filing — fuel is a pure pass-through recovered dollar-for-dollar via fuel clauses.","sector_note":"Because fuel is a pass-through, gross margin is a poor lens for utilities — judge them on rate base and allowed vs earned ROE instead.","example":"NextEra total operating expenses $19,392,000,000.","redflag":"Shifting the fuel/O&M/capital boundary to move recurring costs off this line and into rate base.","value":19392000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Generally recurring costs associated with normal operations except for the portion of these expenses which can be clearly related to production and included in cost of sales or services. Includes selling, general and administrative expense.","xbrl_label":"Operating Expenses"},{"id":"op_income","label":"Operating income","tag":"OperatingIncomeLoss","statement":"income","parent":"profit_loss","weight":1,"kind":"total","def":"Operating revenues minus operating expenses — the return the utility earns from delivering energy before financing costs and taxes.","goes_in":"Consolidated net income (before interest & tax)","gaap_ifrs":"US-GAAP; comparable to IFRS operating profit.","agg_note":"For the regulated segment this figure is engineered to approximate rate base × allowed return; for the unregulated segment it reflects merchant/PPA economics and can be lumpy.","sector_note":"Divide operating income (regulated portion) by rate base to back into earned ROE and compare to the authorized ROE.","example":"NextEra operating income $8,280,000,000 ($27.41B revenue − $19.39B operating expenses).","redflag":"Regulatory deferrals and AFUDC can lift operating income without any cash changing hands — reconcile it to operating cash flow.","value":8280000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The net result for the period of deducting operating expenses from operating revenues.","xbrl_label":"Operating Income (Loss)"},{"id":"nonop","label":"Non-operating income / (expense), incl. interest","tag":"NonoperatingIncomeExpense","statement":"income","parent":"profit_loss","weight":1,"kind":"expense","def":"Aggregate income/expense from ancillary activities outside normal operations — for a utility this is dominated by interest expense on its large debt load, net of interest income and investment results.","goes_in":"Consolidated net income","gaap_ifrs":"US-GAAP; IFRS presents finance costs separately but the economics match.","agg_note":"Large and negative because utilities are among the most leveraged non-financial issuers; capitalized interest and AFUDC-debt offset a slice of gross interest.","sector_note":"Interest coverage and FFO/debt live here — a utility's investment-grade rating (and thus its cost of the debt that funds rate base) hinges on this line.","example":"NextEra non-operating income/(expense) $(3,750,000,000); operating income $8.28B − $3.75B = $4.53B pre-tax income.","redflag":"Capitalizing an outsized share of interest (or booking large AFUDC-debt) to keep interest out of the P&L — boosts reported earnings while cash interest is unchanged.","value":-3750000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The aggregate amount of income or expense from ancillary business-related activities (that is to say, excluding major activities considered part of the normal operations of the business).","xbrl_label":"Nonoperating Income (Expense)"},{"id":"tax","label":"Income tax expense / (benefit)","tag":"IncomeTaxExpenseBenefit","statement":"income","parent":"profit_loss","weight":1,"kind":"expense","def":"Current + deferred income tax pertaining to continuing operations. Shown as a benefit here (negative), driven by production/investment tax credits on renewables and accelerated tax depreciation.","goes_in":"Consolidated net income","gaap_ifrs":"US-GAAP; the credit-driven negative rate is unusually large for NextEra given its renewables tax-credit generation.","agg_note":"A tax benefit of $802M against $4.53B pre-tax income means a negative effective rate — renewable PTCs/ITCs and bonus depreciation, some monetized via tax-equity partnerships (which also drive the large noncontrolling interest).","sector_note":"Deferred taxes from accelerated depreciation are a huge, cheap financing source that also reduces rate base (a regulatory offset) — watch the deferred-tax liability trajectory.","example":"NextEra income tax benefit $(802,000,000); pre-tax $4.53B + $0.80B benefit = $5.33B consolidated profit.","redflag":"Reliance on tax credits and deferred-tax benefits to hit EPS; a change in tax law or credit phase-out can swing the effective rate violently.","value":-802000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of current income tax expense (benefit) and deferred income tax expense (benefit) pertaining to continuing operations.","xbrl_label":"Income Tax Expense (Benefit)"},{"id":"profit_loss","label":"Consolidated net income (incl. noncontrolling interest)","tag":"ProfitLoss","statement":"income","parent":null,"weight":0,"kind":"total","def":"Consolidated profit for the period, net of income taxes, including the portion attributable to noncontrolling interests (here, large tax-equity partners in the renewables business).","goes_in":"Bottom line — split between parent and noncontrolling interests","gaap_ifrs":"US-GAAP; equals IFRS profit for the period.","agg_note":"$5.33B consolidated; noncontrolling interests absorb a large negative allocation (tax-equity HLBV accounting), so net income attributable to the NextEra parent is actually higher at $6.84B (NetIncomeLoss).","sector_note":"For utilities with tax-equity structures, always read parent-attributable net income and the NCI allocation together — consolidated profit can badly mislead on the equity holder's true earnings.","example":"NextEra consolidated ProfitLoss $5,332,000,000; parent-attributable net income $6,835,000,000.","redflag":"HLBV swings in the noncontrolling-interest allocation can move consolidated vs parent earnings in opposite directions quarter to quarter — a common source of confusion and occasional manipulation.","value":5332000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The consolidated profit or loss for the period, net of income taxes, including the portion attributable to the noncontrolling interest.","xbrl_label":"Net Income (Loss), Including Portion Attributable to Noncontrolling Interest"},{"id":"afudc_income","label":"AFUDC — allowance for funds used during construction","tag":"PublicUtilitiesAllowanceForFundsUsedDuringConstructionAdditions","statement":"income","parent":null,"weight":0,"kind":"memo","def":"Total increase in earnings representing the cost of equity (assumed return) and borrowed funds used to finance construction of regulated assets — a non-cash credit that capitalizes financing cost into plant during the build.","goes_in":"A non-cash credit to earnings and to the plant balance (not a cash inflow)","gaap_ifrs":"US-GAAP utility-specific (ASC 980); IFRS capitalizes only borrowing costs (IAS 23) and does NOT permit capitalizing an equity return — the AFUDC-equity component has no IFRS analog.","agg_note":"Splits into AFUDC-debt (offsets interest) and AFUDC-equity ($181M this period, PublicUtilitiesAllowanceForFundsUsedDuringConstructionCapitalizedCostOfEquity) — the equity piece is pure non-cash income booked before the asset ever earns a dime of cash.","sector_note":"AFUDC as a % of net income measures how much reported earnings are non-cash construction accruals — high during heavy build cycles; it reverses into higher depreciation and rate base once the plant goes in service.","example":"NextEra total AFUDC additions $74,000,000; AFUDC-equity (capitalized cost of equity) $181,000,000.","redflag":"Heavy AFUDC (especially the equity component) inflates non-cash earnings quality and can mask that projects are chronically stuck in construction; parking finished plant in CWIP to keep accruing AFUDC is a classic abuse.","value":74000000,"value_fy":2012,"value_end":"2012-12-31","xbrl_desc":"Total increase in earnings in the period representing the cost of equity (based on assumed rate of return) and/or borrowed funds (based on interest rate) used to finance construction of regulated assets, which is expected to be recovered through rate adjustments.","xbrl_label":"Public Utilities, Allowance for Funds Used During Construction, Additions"},{"id":"ppe_gross","label":"Property, plant & equipment, gross","tag":"PropertyPlantAndEquipmentGross","statement":"balance","parent":"ppe_net","weight":1,"kind":"asset","def":"Total cost of physical plant — generation, transmission, distribution, and nuclear — before accumulated depreciation.","goes_in":"Net property, plant & equipment","gaap_ifrs":"US-GAAP; IFRS allows a revaluation model, but utilities under both regimes overwhelmingly use historical cost, which is also the regulatory basis.","agg_note":"The dominant asset of any utility; its growth is literally rate-base growth, the core of the equity story.","sector_note":"Gross-plant additions per year are the leading indicator of future rate base and thus future allowed earnings.","example":"NextEra gross PP&E $196,711,000,000.","redflag":"Capitalizing soft costs, overheads or O&M into gross plant to grow rate base; aggressive interest/AFUDC capitalization also swells this line.","value":196711000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount before accumulated depreciation, depletion and amortization of physical assets used in the normal conduct of business and not intended for resale. Examples include, but are not limited to, land, buildings, machinery and equipment, office equipment, and furniture and fixtures.","xbrl_label":"Property, Plant and Equipment, Gross"},{"id":"cwip","label":"Construction work in progress (CWIP)","tag":"ConstructionInProgressGross","statement":"balance","parent":"ppe_net","weight":0,"kind":"memo","def":"Cost of plant under construction not yet placed in service — the renewables and grid projects currently accruing AFUDC and not yet in rate base.","goes_in":"Included within gross PP&E (shown as a memo of the build pipeline)","gaap_ifrs":"US-GAAP; comparable to IFRS assets under construction.","agg_note":"$24.6B of CWIP signals an enormous ongoing build — this is the pipeline that converts into rate base (and depreciation, and returns) as projects energize.","sector_note":"CWIP as a % of gross plant gauges how much future rate-base growth is already funded and under construction; whether CWIP earns a cash return now vs AFUDC-only depends on the regulator (CWIP-in-rate-base rulings).","example":"NextEra CWIP $24,556,000,000.","redflag":"Completed projects left in CWIP to keep accruing AFUDC instead of being placed in service; chronically rising CWIP with slow transfers can signal project delays or cost overruns being deferred.","value":24556000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of structure or a modification to a structure under construction. Includes recently completed structures or modifications to structures that have not been placed into service.","xbrl_label":"Construction in Progress, Gross"},{"id":"ppe_net","label":"Net property, plant & equipment","tag":"PropertyPlantAndEquipmentNet","statement":"balance","parent":"assets_total","weight":1,"kind":"total","def":"Physical plant after accumulated depreciation — the depreciated cost of the utility's generation, transmission and distribution system plus unregulated generation.","goes_in":"Total assets","gaap_ifrs":"US-GAAP; IFRS equivalent, historical-cost basis in practice.","agg_note":"$156.2B net, of which $54.9B is the regulated rate base and the balance is competitive/renewable generation — the largest number on the balance sheet by far.","sector_note":"Net PP&E / total assets is typically 70-80% for a utility — the asset-heaviness that defines the sector and its capital intensity.","example":"NextEra net PP&E $156,197,000,000.","redflag":"Failure to write down uneconomic or stranded plant (e.g., early-retired fossil units) keeps net PP&E — and the return earned on it — artificially high.","value":156197000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount after accumulated depreciation, depletion and amortization of physical assets used in the normal conduct of business to produce goods and services and not intended for resale. Examples include, but are not limited to, land, buildings, machinery and equipment, office equipment, and furniture and fixtures.","xbrl_label":"Property, Plant and Equipment, Net"},{"id":"reg_assets","label":"Regulatory assets (noncurrent)","tag":"RegulatoryAssetsNoncurrent","statement":"balance","parent":"assets_total","weight":1,"kind":"asset","def":"Capitalized costs of a regulated entity that the regulator has agreed can be recovered from future customers — deferred storm/fuel costs, pension shortfalls, deferred income taxes, etc. — not expected to be recovered within one year.","goes_in":"Total assets","gaap_ifrs":"US-GAAP ASC 980 — almost unique to rate-regulated entities; under IFRS these exist only via the optional IFRS 14 regulatory deferral accounts, otherwise they cannot be recognized as assets at all.","agg_note":"An asset that exists only because a regulator granted a right to bill future ratepayers — it converts a past cost into a future receivable from customers.","sector_note":"Watch the trend: growing regulatory assets mean the utility is deferring more cost recovery into the future; recoverability hinges on continued regulatory support.","example":"NextEra noncurrent regulatory assets $5,639,000,000 (plus $433M current).","redflag":"Aggressive cost deferral — pushing current costs into regulatory assets to flatter today's earnings while relying on the regulator to let them bill future customers; a denied recovery forces a sudden write-off.","value":5639000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Carrying amount as of the balance sheet date of capitalized costs of regulated entities that are not expected to be recovered through revenue sources within one year or the normal operating cycle if longer.","xbrl_label":"Regulatory Assets, Noncurrent"},{"id":"decomm_trust","label":"Nuclear decommissioning trust assets","tag":"DecommissioningTrustAssetsAmount","statement":"balance","parent":"assets_total","weight":1,"kind":"asset","def":"Fair value of investments held in a dedicated trust to fund the future cost of decontami
