<style>
:root{
  --bg:#eef1f5;--bg2:#e7ebf1;--panel:#fff;--panel2:#f6f8fb;--line:#d3dae3;--line2:#e4e9ef;
  --text:#16202c;--muted:#5a6a7b;--faint:#8a97a8;
  --accent:#0e7fb0;--accent-ink:#0a5b80;--accent-soft:rgba(14,127,176,.12);
  --pos:#127e57;--neg:#c23a55;--amb:#b3730d;--flag:#b3730d;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --r:10px;--shadow:0 1px 3px rgba(16,28,44,.08),0 10px 34px rgba(16,28,44,.07);
}
@media (prefers-color-scheme:dark){:root{
  --bg:#080b11;--bg2:#0a0e15;--panel:#111826;--panel2:#0d1420;--line:#1f2937;--line2:#172131;
  --text:#dfe6f0;--muted:#8896a9;--faint:#5b6b80;
  --accent:#5cc8ff;--accent-ink:#a7e0ff;--accent-soft:rgba(92,200,255,.14);
  --pos:#3ecf8e;--neg:#ff6b81;--amb:#f5b74e;--flag:#f5b74e;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 14px 44px rgba(0,0,0,.4);
}}
:root[data-theme="light"]{--bg:#eef1f5;--bg2:#e7ebf1;--panel:#fff;--panel2:#f6f8fb;--line:#d3dae3;--line2:#e4e9ef;--text:#16202c;--muted:#5a6a7b;--faint:#8a97a8;--accent:#0e7fb0;--accent-ink:#0a5b80;--accent-soft:rgba(14,127,176,.12);--pos:#127e57;--neg:#c23a55;--amb:#b3730d;--flag:#b3730d;--shadow:0 1px 3px rgba(16,28,44,.08),0 10px 34px rgba(16,28,44,.07)}
:root[data-theme="dark"]{--bg:#080b11;--bg2:#0a0e15;--panel:#111826;--panel2:#0d1420;--line:#1f2937;--line2:#172131;--text:#dfe6f0;--muted:#8896a9;--faint:#5b6b80;--accent:#5cc8ff;--accent-ink:#a7e0ff;--accent-soft:rgba(92,200,255,.14);--pos:#3ecf8e;--neg:#ff6b81;--amb:#f5b74e;--flag:#f5b74e;--shadow:0 1px 2px rgba(0,0,0,.4),0 14px 44px rgba(0,0,0,.4)}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}
.app{display:grid;grid-template-rows:auto 1fr;height:100vh}
header{display:flex;align-items:center;gap:14px;padding:11px 18px;border-bottom:1px solid var(--line);background:var(--panel2);z-index:20;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:1px;margin-right:4px}
.brand .kick{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.brand h1{font-family:var(--mono);font-size:15px;font-weight:600;margin:0}
.seg{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:3px}
.seg button{font-family:var(--mono);font-size:11px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);background:none;border:0;padding:6px 12px;border-radius:7px;cursor:pointer;transition:.15s;white-space:nowrap}
.seg button:hover{color:var(--text)}
.seg button[aria-pressed="true"]{background:var(--accent-soft);color:var(--accent-ink)}
.seg.sectors button[aria-pressed="true"]{background:var(--accent);color:#04121b}
:root[data-theme="light"] .seg.sectors button[aria-pressed="true"]{color:#fff}
.spacer{flex:1}
.hbtn{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:7px 11px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s;text-decoration:none}
.hbtn:hover{color:var(--text);border-color:var(--accent)}
main{display:grid;grid-template-columns:232px 1fr 372px;min-height:0}
.rail{border-right:1px solid var(--line);background:var(--panel2);overflow-y:auto;padding:16px}
.inspector{border-left:1px solid var(--line);background:var(--panel2);overflow-y:auto}
.canvas{position:relative;min-width:0;overflow-y:auto;background:radial-gradient(1100px 600px at 60% -12%,var(--bg2),var(--bg) 72%)}
.canvas-pad{padding:22px 30px 60px;max-width:920px;margin:0 auto}
.grouplabel{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:18px 0 9px}
.grouplabel:first-child{margin-top:0}
.legrow{display:flex;align-items:center;gap:9px;padding:3px 0;font-size:12px;color:var(--muted)}
.legrow .sw{font-family:var(--mono);font-weight:600;width:16px;text-align:center}
.anchornote{font-size:12px;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 11px;line-height:1.5}
.anchornote b{color:var(--text)}
.subtabs{display:flex;gap:3px;margin-bottom:18px;flex-wrap:wrap}
.subtab{font-family:var(--mono);font-size:11px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 12px;cursor:pointer;transition:.14s}
.subtab:hover{color:var(--text)}
.subtab[aria-pressed="true"]{background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 40%,transparent);color:var(--accent-ink)}
.viewtitle{font-family:var(--mono);font-size:18px;font-weight:600;margin:0 0 3px;letter-spacing:-.01em}
.viewsub{color:var(--muted);font-size:13px;margin:0 0 22px;line-height:1.55}
/* statement outline */
.stmt{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border-left:2px solid transparent;transition:.1s;position:relative}
.row:hover{background:var(--panel2)}
.row.sel{background:var(--accent-soft);border-left-color:var(--accent)}
.row .lhs{display:flex;align-items:center;gap:9px;min-width:0}
.row .sign{font-family:var(--mono);font-size:12px;width:13px;flex:none;text-align:center}
.row .sign.pos{color:var(--pos)}.row .sign.neg{color:var(--neg)}
.row .sign.eq{color:var(--text);font-weight:700}
.row .tw{font-family:var(--mono);font-size:8px;width:14px;flex:none;color:var(--faint);text-align:center;display:inline-block;transition:transform .12s;transform:rotate(0deg)}
.row .tw.open{transform:rotate(90deg)}
.row .tw.ph{visibility:hidden}
.row.has:hover .tw{color:var(--accent)}
.row.has .name{font-weight:500}
.row .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .flag{color:var(--flag);font-size:11px;flex:none}
.row .val{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--muted);white-space:nowrap}
.row.total{background:var(--panel2);border-top:1px solid var(--line)}
.row.total .name{font-weight:600;color:var(--text);font-family:var(--mono);font-size:13px}
.row.total .val{color:var(--text);font-weight:600;font-size:13px}
.row.subtotal .name{font-weight:600}
.tagchip{font-family:var(--mono);font-size:9.5px;color:var(--faint);border:1px solid var(--line2);border-radius:5px;padding:1px 5px;flex:none}
/* flow */
.flowsteps{display:flex;flex-direction:column;gap:0}
.fstep{display:grid;grid-template-columns:32px 1fr;gap:14px}
.fstep .rail{border:0;background:none;padding:0;display:flex;flex-direction:column;align-items:center;overflow:visible}
.fstep .dot{width:26px;height:26px;border-radius:50%;background:var(--accent-soft);border:1.5px solid var(--accent);color:var(--accent-ink);font-family:var(--mono);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex:none}
.fstep .conn{width:2px;flex:1;background:var(--line);min-height:14px}
.fstep .body{padding-bottom:20px}
.fstep .st{font-weight:600;font-size:14px;margin-bottom:3px}
.fstep .nt{color:var(--muted);font-size:13px;line-height:1.55}
/* cards (ratios / redflags) */
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:8px}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.card h3{font-size:13.5px;margin:0;font-weight:600;line-height:1.25}
.card .cat{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.card .f{font-family:var(--mono);font-size:11px;color:var(--accent-ink);opacity:.95;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .m{font-size:12px;color:var(--muted);line-height:1.5}
.catband{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:24px 0 11px;display:flex;align-items:center;gap:8px}
.catband:first-child{margin-top:0}
.catband::after{content:"";flex:1;height:1px;background:var(--line2)}
.pill{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:4px;border:1px solid var(--line);color:var(--muted)}
.card[aria-selected="true"]{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
/* ratio component map */
.mapcommon{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:14px}
.mapcommon .mch{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-right:4px}
.mchip{font-family:var(--mono);font-size:11px;color:var(--text);background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:5px 9px;cursor:pointer;transition:.13s}
.mchip:hover{border-color:var(--accent)} .mchip b{color:var(--accent-ink)}
.mapwrap{position:relative;border:1px solid var(--line);border-radius:12px;background:var(--panel2);overflow:hidden}
#rmap{width:100%;height:720px;display:block;touch-action:none;cursor:grab}
#rmap:active{cursor:grabbing}
.medge{stroke-width:1;stroke-opacity:.16;transition:stroke-opacity .15s}
.medge.hot{stroke-opacity:.85;stroke-width:1.6} .medge.dim{stroke-opacity:.04}
.mnode{cursor:pointer}
.mnode .mc{transition:.15s} .mnode.comp:hover .mc,.mnode.comp.hot .mc{stroke:var(--accent);stroke-width:2}
.mnode.ratio:hover .mr,.mnode.ratio.hot .mr{stroke:var(--text);stroke-width:1.5}
.mnode.dim{opacity:.2}
.mnode text.ml{font-family:var(--mono);font-size:10px;fill:var(--muted);pointer-events:none;transition:.15s}
.mnode.comp text.ml{fill:var(--text);font-size:10.5px}
.mnode.ratio text.rl,.mnode text.ml.hov{opacity:0}
.mnode.ratio:hover text.rl,.mnode.ratio.hot text.rl,.mnode:hover text.ml.hov,.mnode.hot text.ml.hov{opacity:1;fill:var(--text)}
.mnode.hot text.ml{fill:var(--text)}
.maplegend{position:absolute;left:12px;bottom:10px;display:flex;flex-wrap:wrap;gap:12px;font-family:var(--mono);font-size:10px;color:var(--muted);background:color-mix(in srgb,var(--panel) 80%,transparent);border:1px solid var(--line);border-radius:8px;padding:7px 11px;backdrop-filter:blur(4px)}
.maplegend .mlg{display:flex;align-items:center;gap:5px}
.maplegend .dot{width:9px;height:9px;border-radius:50%}
/* ratio build-up panel */
.ratio-detail{margin-top:28px;border-top:1px solid var(--line);padding-top:22px;scroll-margin-top:12px}
.rd-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
.rd-title{font-family:var(--mono);font-size:17px;font-weight:600;margin:5px 0 0;letter-spacing:-.01em}
.rd-formula{font-family:var(--mono);font-size:13.5px;color:var(--accent-ink);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin:13px 0 2px;line-height:1.5}
.rd-inputs-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:20px 0 11px}
.rd-inputs{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:13px}
.rd-input{border:1px solid var(--line);border-radius:12px;padding:13px 14px;background:var(--panel)}
.rd-in-head{display:flex;align-items:center;gap:9px}
.rd-in-name{font-weight:600;font-size:13.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stmt-chip{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--accent-ink);border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);background:var(--accent-soft);border-radius:5px;padding:2px 6px;flex:none}
.stmt-chip.na{color:var(--faint);border-color:var(--line);background:none}
.rd-in-val{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:13px;color:var(--text);flex:none}
.rd-in-tag{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rd-flag{font-size:12px;color:var(--flag);line-height:1.5;margin-top:10px;border-top:1px dashed color-mix(in srgb,var(--flag) 30%,transparent);padding-top:8px}
.rd-tree{margin-top:11px}
.rd-tree .stmt{border-radius:8px}
.rd-tree .row{padding:6px 10px}
.rd-tree .row .val{font-size:11.5px}
.rd-tree .tagchip{display:none}
.rd-tree .row .name{font-weight:400}
.rd-also{margin-top:11px;font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.rd-also>span{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.rd-also-chip{font-family:var(--mono);font-size:10px;color:var(--accent-ink);background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:5px;padding:2px 7px;cursor:pointer}
.rd-also-chip:hover{border-color:var(--accent)}
.rd-cook{margin-top:18px;font-size:12.5px;color:var(--text);line-height:1.6;border:1px solid color-mix(in srgb,var(--flag) 35%,transparent);background:color-mix(in srgb,var(--flag) 8%,transparent);border-radius:10px;padding:13px 14px}
.rd-cook-h{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--flag);margin-bottom:6px}
.rd-artic{margin-top:15px;font-size:12px;color:var(--muted);line-height:1.65;border-left:2px solid var(--accent);padding:2px 0 2px 13px}
.rd-artic b{color:var(--text)}
.pill.pro{color:var(--accent-ink);border-color:color-mix(in srgb,var(--accent) 40%,transparent);background:var(--accent-soft)}
/* liquidity ladder */
.ladder{display:flex;flex-direction:column;gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px;overflow:hidden}
.rung{display:grid;grid-template-columns:26px 1fr auto;gap:12px;align-items:center;padding:11px 12px;border-radius:8px;cursor:pointer;transition:.12s}
.rung:hover{background:var(--panel2)}
.rung .r{font-family:var(--mono);color:var(--faint);font-size:12px;text-align:center}
.rung .barwrap{grid-column:1/-1;height:4px;border-radius:3px;background:linear-gradient(90deg,var(--pos),var(--amb));margin-top:2px;opacity:.5}
.ccc{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0}
.ccc .leg{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px}
.ccc .leg .k{font-family:var(--mono);font-size:11px;color:var(--accent-ink);margin-bottom:4px}
.ccc .leg .d{font-size:12px;color:var(--muted);line-height:1.5}
.cccsum{background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:10px;padding:14px;font-size:13px;color:var(--text);line-height:1.6}
/* inspector */
.insp-head{padding:18px 18px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel2);z-index:2}
.insp-kind{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:7px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.insp-title{font-family:var(--mono);font-size:17px;font-weight:600;margin:0;letter-spacing:-.01em;line-height:1.25;text-wrap:balance}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.badge{font-family:var(--mono);font-size:10px;letter-spacing:.03em;text-transform:uppercase;padding:3px 8px;border-radius:5px;border:1px solid var(--line);color:var(--muted);background:var(--panel);display:inline-flex;gap:5px;align-items:center}
.badge.val{color:var(--text);font-variant-numeric:tabular-nums}
.badge.pro{color:var(--accent-ink);border-color:color-mix(in srgb,var(--accent) 40%,transparent);background:var(--accent-soft)}
.insp-body{padding:16px 18px 30px}
.insp-pad{padding:20px 18px}
.lead{color:var(--muted);font-size:13px;line-height:1.6}
.sec{margin-top:19px}
.sec>.h{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.sec>.h::after{content:"";flex:1;height:1px;background:var(--line2)}
.sec p{margin:0;font-size:13px;line-height:1.6;color:var(--text)}
.sec.flagbox{border:1px solid color-mix(in srgb,var(--flag) 35%,transparent);background:color-mix(in srgb,var(--flag) 8%,transparent);border-radius:10px;padding:12px 13px}
.sec.flagbox>.h{color:var(--flag)}.sec.flagbox>.h::after{background:color-mix(in srgb,var(--flag) 30%,transparent)}
.formula{font-family:var(--mono);font-size:13px;color:var(--accent-ink);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px 12px;line-height:1.5}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.datachip{font-family:var(--mono);font-size:10.5px;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:4px 7px;display:inline-flex;gap:6px;align-items:center}
.datachip b{color:var(--text);font-variant-numeric:tabular-nums}
.xbrldesc{font-size:12px;color:var(--muted);line-height:1.55;font-style:italic;border-left:2px solid var(--line);padding-left:11px}
.empty{color:var(--faint);font-size:12.5px;font-style:italic}
@media (max-width:1100px){main{grid-template-columns:1fr}.rail,.inspector{display:none}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

      <button data-view="flow" aria-pressed="false">Flow</button>

      <button data-view="redflags" aria-pressed="false">Red flags</button>
      <button data-view="liquidity" aria-pressed="false">Liquidity</button>
    </div>
    <a class="hbtn" id="atlasLink" style="display:none" target="_blank" rel="noopener">↩ Atlas</a>
    <button class="hbtn" id="themeBtn"><span id="themeLbl">Theme</span></button>

<script>
const DATA = {"sectors":{"standard":{"id":"standard","label":"Standard / industrial","anchor":"Apple Inc.","summary":"A classic three-statement product company: a multi-step income statement (revenue less COGS to gross profit, less operating expenses to operating income, then non-operating items and tax to net income), a classified balance sheet split into current vs. non-current on both sides, and an indirect-method cash flow statement that reconciles net income to operating cash and then shows investing and financing. All figures below are Apple's real us-gaap XBRL facts for fiscal year 2025 (period end 2025-09-27).","flow":[{"step":"A customer buys an iPhone from Apple (or a carrier/reseller channel)","note":"At the point control of the device transfers, Apple books a journal entry: debit Cash or Accounts Receivable, credit Revenue (RevenueFromContractWithCustomerExcludingAssessedTax); a portion tied to future software/services is deferred (credit Contract-with-Customer Liability) rather than recognized now."},{"step":"The sale is invoiced and the cost of the unit is released from inventory","note":"A paired entry debits Cost of Goods and Services Sold and credits Inventory, matching the product's cost to the revenue in the same period; the invoice that is not yet paid sits in Accounts Receivable."},{"step":"Thousands of these entries post to the general ledger and aggregate into line items","note":"The GL sums every revenue entry into the Revenue line and every cost-release into the COGS line on the income statement — the raw transactions become one number each per reporting period."},{"step":"Revenue minus COGS forms the first subtotal, gross profit","note":"Gross profit is a computed subtotal (weight-driven roll-up), not a posted account; operating expenses (R&D, SG&A) then subtract to reach operating income."},{"step":"Operating income flows down through interest/other and tax to net income","note":"Non-operating income/expense and income tax are subtracted to yield NetIncomeLoss, the bottom line and the top line of the indirect cash-flow reconciliation."},{"step":"Net income is reconciled to cash: add back non-cash D&A and SBC, adjust for working-capital swings","note":"Because revenue was booked when earned (not when collected), the change in AR/inventory/AP is added back or subtracted to convert accrual profit into Net Cash From Operating Activities."},{"step":"Operating cash funds capex, buybacks and dividends; the residual moves the cash balance","note":"CFO + CFI + CFF equals the period change in cash on the balance sheet, closing the loop from a single product sale back to the cash line."}],"line_items":[{"id":"revenue","label":"Net sales / revenue","tag":"RevenueFromContractWithCustomerExcludingAssessedTax","statement":"income","parent":"gross_profit","weight":1,"kind":"input","def":"Consideration Apple expects for goods/services under customer contracts, excluding sales taxes collected on behalf of governments.","goes_in":"Products revenue (iPhone, Mac, iPad, Wearables) plus Services revenue (App Store, cloud, licensing, AppleCare), net of returns and price concessions; amounts tied to undelivered elements are carved out into deferred revenue.","gaap_ifrs":"ASC 606 / IFRS 15 five-step model — recognize as control transfers; the two standards are largely converged, though IFRS 15 can differ on license timing and the definition of a distinct performance obligation.","agg_note":"Top line; feeds gross_profit with +1 weight, offset by cogs.","sector_note":"","example":"Apple FY2025 revenue was $416,161,000,000 (RevenueFromContractWithCustomerExcludingAssessedTax, period end 2025-09-27).","redflag":"Channel-stuffing — pushing product into distributor/carrier channels near quarter-end to pull sales forward; also aggressive bundling that under-defers the services portion to inflate current revenue and gross margin.","value":416161000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount, excluding tax collected from customer, of revenue from satisfaction of performance obligation by transferring promised good or service to customer. Tax collected from customer is tax assessed by governmental authority that is both imposed on and concurrent with specific revenue-producing transaction, including, but not limited to, sales, use, value added and excise.","xbrl_label":"Revenue from Contract with Customer, Excluding Assessed Tax"},{"id":"cogs","label":"Cost of goods and services sold","tag":"CostOfGoodsAndServicesSold","statement":"income","parent":"gross_profit","weight":-1,"kind":"input","def":"Aggregate cost of products produced/sold and services rendered during the period.","goes_in":"Direct materials and components, contract-manufacturing/assembly labor, freight, warranty accruals, and manufacturing overhead including depreciation of production tooling.","gaap_ifrs":"Matched to the revenue it generates; inventory costed FIFO/average. US GAAP permits LIFO (IFRS prohibits it) — Apple uses FIFO so the difference is moot here.","agg_note":"Subtracts from revenue (weight -1) inside the gross_profit roll-up.","sector_note":"","example":"Apple FY2025 COGS was $220,960,000,000; revenue $416.161B less this equals gross profit of $195.201B.","redflag":"Under-accruing warranty/reserve costs or reclassifying recurring production costs into 'other/operating' buckets to flatter reported gross margin; capitalizing costs into inventory to defer them off the P&L.","value":220960000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The aggregate costs related to goods produced and sold and services rendered by an entity during the reporting period. This excludes costs incurred during the reporting period related to financial services rendered and other revenue generating activities.","xbrl_label":"Cost of Goods and Services Sold"},{"id":"gross_profit","label":"Gross profit","tag":"GrossProfit","statement":"income","parent":"operating_income","weight":1,"kind":"subtotal","def":"Revenue less cost of goods and services directly attributable to generating that revenue.","goes_in":"A computed subtotal: revenue minus COGS. Nothing posts directly to it.","gaap_ifrs":"Presentation subtotal under both frameworks; there is no single recognition rule beyond its two constituents.","agg_note":"Sum of revenue (+1) and cogs (-1); rolls into operating_income with +1.","sector_note":"","example":"Apple FY2025 gross profit was $195,201,000,000 (GrossProfit), a 46.9% gross margin on $416.161B revenue.","redflag":"Managers steer the COGS/opex boundary to hit a headline gross-margin target — e.g. classifying support or fulfillment costs below the gross-profit line so the ratio looks structurally higher than peers'.","value":195201000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Aggregate revenue less cost of goods and services sold or operating expenses directly attributable to the revenue generation activity.","xbrl_label":"Gross Profit"},{"id":"rnd","label":"Research and development","tag":"ResearchAndDevelopmentExpense","statement":"income","parent":"operating_expenses","weight":1,"kind":"line","def":"Costs of researching and developing new products, silicon, and technologies.","goes_in":"Engineering salaries and stock comp, prototype and tooling costs, third-party engineering, and allocated facilities for R&D functions.","gaap_ifrs":"US GAAP expenses R&D as incurred. Key IFRS difference: IAS 38 requires capitalizing development costs once technical/commercial feasibility is met — so an identical firm can show higher assets and profit under IFRS.","agg_note":"Adds into operating_expenses (+1), which then subtracts from gross_profit.","sector_note":"","example":"Apple FY2025 R&D expense was $34,550,000,000 (ResearchAndDevelopmentExpense), about 8.3% of revenue.","redflag":"Under US GAAP the abuse is the reverse of capitalization — but firms can shift the timing of grants/contractor spend across period-ends to smooth the R&D line, or relabel R&D as capitalized software (an asset) to lift current operating income.","value":34550000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The aggregate costs incurred (1) in a planned search or critical investigation aimed at discovery of new knowledge with the hope that such knowledge will be useful in developing a new product or service, a new process or technique, or in bringing about a significant improvement to an existing product or process; or (2) to translate research findings or other knowledge into a plan or design for a n","xbrl_label":"Research and Development Expense"},{"id":"sga","label":"Selling, general & administrative","tag":"SellingGeneralAndAdministrativeExpense","statement":"income","parent":"operating_expenses","weight":1,"kind":"line","def":"Selling, marketing, and general/administrative operating costs not in COGS.","goes_in":"Advertising and marketing, retail and sales staff, corporate G&A, legal, and administrative stock compensation.","gaap_ifrs":"Expensed as incurred; largely identical under IFRS (which often labels it 'administrative expenses' and may split selling out separately).","agg_note":"Adds into operating_expenses (+1).","sector_note":"","example":"Apple FY2025 SG&A was $27,601,000,000 (SellingGeneralAndAdministrativeExpense); with R&D it forms operating expenses of $62.151B.","redflag":"Cutting advertising/maintenance discretionary spend at quarter-end to manufacture an earnings beat (real-activities earnings management), or dumping one-off costs into a 'restructuring/other' line so recurring SG&A looks leaner.","value":27601000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The aggregate total costs related to selling a firm's product and services, as well as all other general and administrative expenses. Direct selling expenses (for example, credit, warranty, and advertising) are expenses that can be directly linked to the sale of specific products. Indirect selling expenses are expenses that cannot be directly linked to the sale of specific products, for example te","xbrl_label":"Selling, General and Administrative Expense"},{"id":"operating_expenses","label":"Total operating expenses","tag":"OperatingExpenses","statement":"income","parent":"operating_income","weight":-1,"kind":"subtotal","def":"Sum of operating cost categories below gross profit (here R&D + SG&A).","goes_in":"Research and development plus selling, general and administrative expense.","gaap_ifrs":"Presentation subtotal; composition varies by filer. Both frameworks allow function- or nature-based expense presentation.","agg_note":"Sum of rnd (+1) and sga (+1); subtracts from gross_profit (weight -1) to yield operating_income.","sector_note":"","example":"Apple FY2025 operating expenses were $62,151,000,000 (OperatingExpenses) = R&D $34.550B + SG&A $27.601B.","redflag":"Reclassifying recurring operating costs as 'non-operating' or 'special items' so the operating-expense subtotal — and thus operating margin — appears more favorable than economics warrant.","value":62151000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Generally recurring costs associated with normal operations except for the portion of these expenses which can be clearly related to production and included in cost of sales or services. Includes selling, general and administrative expense.","xbrl_label":"Operating Expenses"},{"id":"operating_income","label":"Operating income","tag":"OperatingIncomeLoss","statement":"income","parent":"pretax_income","weight":1,"kind":"total","def":"Net result of deducting operating expenses from operating revenues; profit from core operations before financing and tax.","goes_in":"Gross profit minus total operating expenses.","gaap_ifrs":"A defined subtotal; IFRS did not historically mandate it but IAS 1 amendments now require an 'operating profit' subtotal, narrowing what firms can push in or out of it.","agg_note":"gross_profit (+1) less operating_expenses (-1); rolls into pretax_income with +1.","sector_note":"","example":"Apple FY2025 operating income was $133,050,000,000 (OperatingIncomeLoss) = gross profit $195.201B - opex $62.151B; 32.0% operating margin.","redflag":"'Below-the-line' classification games — routing impairments, litigation, or restructuring beneath operating income to protect the operating-margin metric analysts anchor on.","value":133050000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The net result for the period of deducting operating expenses from operating revenues.","xbrl_label":"Operating Income (Loss)"},{"id":"nonoperating_income","label":"Other income / (expense), net","tag":"NonoperatingIncomeExpense","statement":"income","parent":"pretax_income","weight":1,"kind":"line","def":"Net non-operating items: interest income on investments, interest expense on debt, and other gains/losses.","goes_in":"Interest and dividend income on Apple's large marketable-securities portfolio, interest expense on term debt and commercial paper, and FX/other gains and losses.","gaap_ifrs":"Recognized on an accrual/effective-interest basis; IFRS presentation of finance income vs. finance cost can differ but recognition is similar.","agg_note":"Adds (net, here negative) into pretax_income (+1).","sector_note":"","example":"Apple FY2025 other income/(expense), net was -$321,000,000 (NonoperatingIncomeExpense) — interest income nearly offset by interest expense.","redflag":"Parking recurring interest expense or realized investment losses in 'other' to keep operating income clean; timing security sales to harvest gains into a soft quarter.","value":-321000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The aggregate amount of income or expense from ancillary business-related activities (that is to say, excluding major activities considered part of the normal operations of the business).","xbrl_label":"Nonoperating Income (Expense)"},{"id":"pretax_income","label":"Income before income taxes","tag":"IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest","statement":"income","parent":"net_income","weight":1,"kind":"subtotal","def":"Pre-tax profit from continuing operations, before income tax and non-controlling interest.","goes_in":"Operating income plus net non-operating income/expense.","gaap_ifrs":"Standard subtotal under both frameworks.","agg_note":"operating_income (+1) plus nonoperating_income (+1); feeds net_income (+1) before tax subtracts.","sector_note":"","example":"Apple FY2025 pre-tax income was $132,729,000,000 = operating income $133.050B - $0.321B other expense.","redflag":"Same below-the-line reclassification risk aggregates here; also a spot where discontinued-operations carve-outs can shift losses out of the continuing-ops narrative.","value":132729000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of income (loss) from continuing operations, including income (loss) from equity method investments, before deduction of income tax expense (benefit), and income (loss) attributable to noncontrolling interest.","xbrl_label":"Income (Loss) from Continuing Operations before Income Taxes, Noncontrolling Interest"},{"id":"income_tax","label":"Provision for income taxes","tag":"IncomeTaxExpenseBenefit","statement":"income","parent":"net_income","weight":-1,"kind":"line","def":"Current plus deferred income tax expense for the period.","goes_in":"Current federal/state/foreign tax payable plus the change in deferred tax assets/liabilities (timing differences, credits, valuation allowances).","gaap_ifrs":"ASC 740 vs. IAS 12 — both use the liability method, but differ on uncertain-tax-position mechanics and on recognizing deferred tax on intra-group transfers.","agg_note":"Subtracts from pretax_income (weight -1) to reach net_income.","sector_note":"","example":"Apple FY2025 tax provision was $20,719,000,000 (IncomeTaxExpenseBenefit) on $132.729B pre-tax — a 15.6% effective rate.","redflag":"Managing the effective rate via discrete items, releasing/building deferred-tax valuation allowances, or shifting profit to low-tax jurisdictions; a low ETR that reverses later can flatter EPS temporarily.","value":20719000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of current income tax expense (benefit) and deferred income tax expense (benefit) pertaining to continuing operations.","xbrl_label":"Income Tax Expense (Benefit)"},{"id":"net_income","label":"Net income","tag":"NetIncomeLoss","statement":"income","parent":null,"weight":0,"kind":"total","def":"Bottom-line profit attributable to the parent's shareholders after all expenses and taxes.","goes_in":"Pre-tax income minus the income tax provision.","gaap_ifrs":"Final income-statement total; converged concept, though the specific reconciling items above it can differ US GAAP vs. IFRS.","agg_note":"pretax_income (+1) less income_tax (-1). Also the starting line of the indirect cash-flow statement (feeds cfo).","sector_note":"","example":"Apple FY2025 net income was $112,010,000,000 (NetIncomeLoss); a 26.9% net margin on $416.161B revenue.","redflag":"The target of most manipulation upstream (revenue timing, reserve releases, tax discretes); watch for net income that consistently exceeds operating cash flow — an accrual-quality warning.","value":112010000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The portion of profit or loss for the period, net of income taxes, which is attributable to the parent.","xbrl_label":"Net Income (Loss) Attributable to Parent"},{"id":"eps_diluted","label":"Diluted earnings per share","tag":"EarningsPerShareDiluted","statement":"income","parent":null,"weight":0,"kind":"line","def":"Net income attributable to common shareholders divided by the diluted weighted-average share count.","goes_in":"Net income in the numerator; diluted shares (basic shares plus dilutive RSUs/options) in the denominator.","gaap_ifrs":"ASC 260 / IAS 33 — both use the treasury-stock method for dilution; largely converged.","agg_note":"Derived from net_income and the diluted share count; not a roll-up total. (The per-share tag is not carried in this anchor fact set.)","sector_note":"","example":"Apple FY2025 net income $112.010B over roughly 14.9B diluted shares implies diluted EPS of about $7.51 (per-share value approximate — computed from NetIncomeLoss, as the EPS tag is outside this anchor set).","redflag":"Treasury-stock/buyback EPS management — repurchasing shares to shrink the denominator and manufacture EPS growth even when net income is flat; well-timed buybacks near period-end can nudge EPS over a consensus line."},{"id":"cash","label":"Cash and cash equivalents","tag":"CashAndCashEquivalentsAtCarryingValue","statement":"balance","parent":"current_assets","weight":1,"kind":"input","def":"Cash on hand and highly liquid investments with original maturities of three months or less.","goes_in":"Bank balances, money-market funds, and near-cash instruments carried at fair value approximating cost.","gaap_ifrs":"Recognized at carrying value; definition of 'cash equivalents' is essentially identical under IAS 7.","agg_note":"First component of current_assets (+1).","sector_note":"","example":"Apple FY2025 cash and equivalents were $35,934,000,000 (CashAndCashEquivalentsAtCarryingValue) at 2025-09-27.","redflag":"'Window dressing' — drawing commercial paper or delaying payments right before period-end to show a higher cash balance; or classifying restricted/trapped foreign cash as freely available.","value":35934000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of currency on hand as well as demand deposits with banks or financial institutions. Includes other kinds of accounts that have the general characteristics of demand deposits. Also includes short-term, highly liquid investments that are both readily convertible to known amounts of cash and so near their maturity that they present insignificant risk of changes in value because of changes in ","xbrl_label":"Cash and Cash Equivalents, at Carrying Value"},{"id":"st_investments","label":"Short-term marketable securities","tag":"MarketableSecuritiesCurrent","statement":"balance","parent":"current_assets","weight":1,"kind":"input","def":"Marketable debt/equity securities expected to be sold or maturing within one year.","goes_in":"Current portion of Apple's investment portfolio — short-dated government and corporate debt and similar instruments.","gaap_ifrs":"ASC 320/321 fair-value measurement; IFRS 9 classifies by business model (amortized cost / FVOCI / FVTPL), which can change where unrealized gains land.","agg_note":"Adds to current_assets (+1).","sector_note":"","example":"Apple FY2025 current marketable securities were $18,763,000,000 (MarketableSecuritiesCurrent).","redflag":"Classifying securities as current vs. non-current to manage the current ratio; parking losing positions in held-to-maturity/OCI buckets to keep mark-to-market losses out of net income.","value":18763000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of investment in marketable security, classified as current.","xbrl_label":"Marketable Securities, Current"},{"id":"accounts_receivable","label":"Accounts receivable, net","tag":"AccountsReceivableNetCurrent","statement":"balance","parent":"current_assets","weight":1,"kind":"input","def":"Amounts due from customers for goods/services delivered, net of the allowance for credit losses.","goes_in":"Trade invoices to carriers, resellers and enterprise/direct customers, less the CECL allowance for expected uncollectible amounts.","gaap_ifrs":"ASC 326 (CECL, expected-loss) vs. IFRS 9 expected-credit-loss — both forward-looking but differ in staging and measurement mechanics.","agg_note":"Adds to current_assets (+1). Its period change flows into operating cash (change_ar).","sector_note":"","example":"Apple FY2025 trade receivables were $39,777,000,000 net (AccountsReceivableNetCurrent).","redflag":"Under-reserving the allowance to lift net income; letting DSO creep up (recognizing revenue on generous terms/channel loading); or factoring/securitizing receivables at period-end to move them off the balance sheet.","value":39777000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount, after allowance for credit loss, of right to consideration from customer for product sold and service rendered in normal course of business, classified as current.","xbrl_label":"Accounts Receivable, after Allowance for Credit Loss, Current"},{"id":"inventory","label":"Inventories","tag":"InventoryNet","statement":"balance","parent":"current_assets","weight":1,"kind":"input","def":"Goods held for sale and their components, net of obsolescence reserves.","goes_in":"Finished goods, work-in-process, and raw materials/components, less write-downs to net realizable value.","gaap_ifrs":"Lower of cost and NRV; US GAAP prohibits reversing prior write-downs, whereas IFRS (IAS 2) requires reversal if NRV recovers.","agg_note":"Adds to current_assets (+1); its change feeds operating cash (change_inventory).","sector_note":"","example":"Apple FY2025 net inventory was $5,718,000,000 (InventoryNet) — strikingly lean versus $220.96B COGS (~9 days), reflecting its supply chain.","redflag":"Under-reserving for obsolescence to avoid a COGS hit; building inventory to absorb fixed overhead into the balance sheet (deferring it out of COGS) and inflate gross margin.","value":5718000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount after valuation and LIFO reserves of inventory expected to be sold, or consumed within one year or operating cycle, if longer.","xbrl_label":"Inventory, Net"},{"id":"nontrade_receivables","label":"Vendor non-trade receivables","tag":"NontradeReceivablesCurrent","statement":"balance","parent":"current_assets","weight":1,"kind":"line","def":"Amounts receivable other than from customers — chiefly from component vendors/contract manufacturers.","goes_in":"Reimbursements due from suppliers/manufacturing partners to whom Apple sells components that they assemble back into finished products.","gaap_ifrs":"Recognized as a current receivable; treatment is comparable under IFRS.","agg_note":"Adds to current_assets (+1).","sector_note":"","example":"Apple FY2025 vendor non-trade receivables were $33,180,000,000 (NontradeReceivablesCurrent) — nearly as large as trade AR, a hallmark of its buy-sell manufacturing model.","redflag":"Because these ride the supplier-financing web, aggressive terms can obscure true working-capital strain; large swings here can mask a deteriorating cash-conversion cycle.","value":33180000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The sum of amounts currently receivable other than from customers. For classified balance sheets, represents the current amount receivable, that is amounts expected to be collected within one year or the normal operating cycle, if longer.","xbrl_label":"Nontrade Receivables, Current"},{"id":"other_current_assets","label":"Other current assets","tag":"OtherAssetsCurrent","statement":"balance","parent":"current_assets","weight":1,"kind":"line","def":"Current assets not separately captioned — prepaids and miscellaneous receivables.","goes_in":"Prepaid expenses, prepaid taxes, deposits, and sundry current assets expected to be realized within a year.","gaap_ifrs":"Recognized as incurred/prepaid; IFRS comparable.","agg_note":"Adds to current_assets (+1).","sector_note":"","example":"Apple FY2025 other current assets were $14,585,000,000 (OtherAssetsCurrent).","redflag":"A catch-all where deferred costs can be parked to keep them off the income statement; a swelling 'other' line with no disclosure is a common analyst flag.","value":14585000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of current assets classified as other.","xbrl_label":"Other Assets, Current"},{"id":"current_assets","label":"Total current assets","tag":"AssetsCurrent","statement":"balance","parent":"total_assets","weight":1,"kind":"subtotal","def":"Assets expected to be converted to cash or consumed within one year/operating cycle.","goes_in":"Cash, short-term investments, trade and vendor non-trade receivables, inventory, and other current assets.","gaap_ifrs":"Classified balance-sheet subtotal; IAS 1 uses the same current/non-current split.","agg_note":"Sum of the six current-asset lines above; rolls into total_assets (+1).","sector_note":"","example":"Apple FY2025 total current assets were $147,957,000,000 (AssetsCurrent) = 35.934 + 18.763 + 39.777 + 5.718 + 33.180 + 14.585 (all $B).","redflag":"Classification shifts between current and non-current to manage the current/quick ratio covenants lenders monitor.","value":147957000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Sum of the carrying amounts as of the balance sheet date of all assets that are expected to be realized in cash, sold, or consumed within one year (or the normal operating cycle, if longer). Assets are probable future economic benefits obtained or controlled by an entity as a result of past transactions or events.","xbrl_label":"Assets, Current"},{"id":"lt_investments","label":"Long-term marketable securities","tag":"MarketableSecuritiesNoncurrent","statement":"balance","parent":"total_assets","weight":1,"kind":"line","def":"Marketable securities with maturities beyond one year.","goes_in":"The long-dated portion of Apple's corporate/government debt investment portfolio.","gaap_ifrs":"ASC 320 fair value (unrealized gains/losses in OCI for AFS debt) vs. IFRS 9 FVOCI/amortized cost by business model.","agg_note":"Adds to total_assets (+1) in the non-current block.","sector_note":"","example":"Apple FY2025 non-current marketable securities were $77,723,000,000 (MarketableSecuritiesNoncurrent) — the bulk of its investment war chest.","redflag":"Holding underwater long-dated bonds at amortized cost or in OCI keeps unrealized losses out of net income (the mechanism behind bank-style rate risk sitting quietly on a balance sheet).","value":77723000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of investment in marketable security, classified as noncurrent.","xbrl_label":"Marketable Securities, Noncurrent"},{"id":"ppe_net","label":"Property, plant & equipment, net","tag":"PropertyPlantAndEquipmentNet","statement":"balance","parent":"total_assets","weight":1,"kind":"line","def":"Land, buildings, machinery, tooling, and leasehold improvements, net of accumulated depreciation.","goes_in":"Gross PP&E (data centers, retail buildout, manufacturing tooling, equipment) less accumulated depreciation.","gaap_ifrs":"Historical cost less depreciation under US GAAP; IFRS (IAS 16) additionally permits a revaluation model, so PP&E can be marked up under IFRS.","agg_note":"Adds to total_assets (+1); its gross additions come from capex, and depreciation flows back through D&A in operating cash.","sector_note":"","example":"Apple FY2025 net PP&E was $49,834,000,000 (PropertyPlantAndEquipmentNet) — light relative to a $359B balance sheet because manufacturing is outsourced.","redflag":"Capitalizing costs that should be expensed and stretching useful lives to slow depreciation (both lift current earnings); delaying impairment of idle tooling.","value":49834000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount after accumulated depreciation, depletion and amortization of physical assets used in the normal conduct of business to produce goods and services and not intended for resale. Examples include, but are not limited to, land, buildings, machinery and equipment, office equipment, and furniture and fixtures.","xbrl_label":"Property, Plant and Equipment, Net"},{"id":"other_noncurrent_assets","label":"Other non-current assets","tag":"OtherAssetsNoncurrent","statement":"balance","parent":"total_assets","weight":1,"kind":"line","def":"Long-term assets not separately captioned — includes goodwill, acquired intangibles, deferred tax assets, and long-term deposits.","goes_in":"Goodwill and intangibles from acquisitions, capitalized software, deferred tax assets, and long-term receivables/deposits — Apple bundles these rather than breaking out separate goodwill/intangible lines.","gaap_ifrs":"Goodwill is not amortized under either framework; US GAAP tests it annually for impairment (one-step quantitative test), IFRS uses a cash-generating-unit test — both one-directional (no goodwill reversal).","agg_note":"Adds to total_assets (+1).","sector_note":"","example":"Apple FY2025 other non-current assets were $83,727,000,000 (OtherAssetsNoncurrent); Apple's minimal acquisition history means little of this is goodwill versus deferred tax and deposits.","redflag":"A dumping ground where soft assets (capitalized development, deferred costs, thinly supported deferred tax assets) accumulate; deferring a goodwill impairment that the market has already priced is a classic earnings-protection move.","value":83727000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of noncurrent assets classified as other.","xbrl_label":"Other Assets, Noncurrent"},{"id":"total_assets","label":"Total assets","tag":"Assets","statement":"balance","parent":null,"weight":0,"kind":"total","def":"Sum of all current and non-current assets; the resources the entity controls.","goes_in":"Total current assets plus long-term investments, net PP&E, and other non-current assets.","gaap_ifrs":"Balance-sheet total; must equal total liabilities plus equity under both frameworks.","agg_note":"current_assets (+1) plus the three non-current asset lines; equals LiabilitiesAndStockholdersEquity.","sector_note":"","example":"Apple FY2025 total assets were $359,241,000,000 (Assets) = current $147.957B + non-current $211.284B.","redflag":"Off-balance-sheet structures (operating leases pre-ASC 842, supplier-finance/reverse-factoring arrangements) that keep obligations and the assets they fund off the reported total, understating leverage ratios.","value":359241000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Sum of the carrying amounts as of the balance sheet date of all assets that are recognized. Assets are probable future economic benefits obtained or controlled by an entity as a result of past transactions or events.","xbrl_label":"Assets"},{"id":"accounts_payable","label":"Accounts payable","tag":"AccountsPayableCurrent","statement":"balance","parent":"current_liabilities","weight":1,"kind":"input","def":"Amounts owed to suppliers for goods/services received but not yet paid.","goes_in":"Trade payables to component suppliers and contract manufacturers, on standard commercial terms.","gaap_ifrs":"Recognized when the obligation is incurred; comparable under IFRS.","agg_note":"First component of current_liabilities (+1); its change feeds operating cash (change_ap).","sector_note":"","example":"Apple FY2025 accounts payable were $69,860,000,000 (AccountsPayableCurrent) — larger than inventory + trade AR combined, a source of negative-working-capital funding.","redflag":"Stretching payables (extending days-payable) to flatter the cash-conversion cycle and boost operating cash flow; reverse-factoring/supplier finance can hide what is effectively debt inside AP.","value":69860000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Carrying value as of the balance sheet date of liabilities incurred (and for which invoices have typically been received) and payable to vendors for goods and services received that are used in an entity's business. Used to reflect the current portion of the liabilities (due within one year or within the normal operating cycle if longer).","xbrl_label":"Accounts Payable, Current"},{"id":"accrued_other_current","label":"Other current liabilities","tag":"OtherLiabilitiesCurrent","statement":"balance","parent":"current_liabilities","weight":1,"kind":"line","def":"Accrued and miscellaneous current obligations not separately captioned.","goes_in":"Accrued compensation, income and other taxes payable, warranty reserves, and other accrued operating liabilities due within a year.","gaap_ifrs":"Accrued when the obligating event occurs; IFRS comparable (IAS 37 for provisions).","agg_note":"Adds to current_liabilities (+1).","sector_note":"","example":"Apple FY2025 other current liabilities were $66,387,000,000 (OtherLiabilitiesCurrent).","redflag":"'Cookie-jar' reserves — over-accruing in good quarters and releasing accruals in weak ones to smooth earnings; opaque 'other accrued' lines make this hard to detect.","value":66387000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of liabilities classified as other, due within one year or the normal operating cycle, if longer.","xbrl_label":"Other Liabilities, Current"},{"id":"deferred_revenue_current","label":"Deferred revenue (current)","tag":"ContractWithCustomerLiabilityCurrent","statement":"balance","parent":"current_liabilities","weight":1,"kind":"line","def":"Consideration received/receivable for goods or services not yet delivered, due within a year.","goes_in":"Unearned AppleCare, iCloud, and other services/software obligations bundled with hardware, plus prepaid subscriptions.","gaap_ifrs":"ASC 606 / IFRS 15 contract liability; recognized into revenue as the performance obligation is satisfied — converged.","agg_note":"Adds to current_liabilities (+1); recognition into revenue reduces it over time.","sector_note":"","example":"Apple FY2025 current contract liability (deferred revenue) was $9,055,000,000 (ContractWithCustomerLiabilityCurrent).","redflag":"Under-deferring at sale (allocating too little of a bundle to undelivered services) accelerates revenue; conversely, over-deferring can build a 'reserve' of future revenue to pull into weak quarters.","value":9055000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of obligation to transfer good or service to customer for which consideration has been received or is receivable, classified as current.","xbrl_label":"Contract with Customer, Liability, Current"},{"id":"commercial_paper","label":"Commercial paper","tag":"CommercialPaper","statement":"balance","parent":"current_liabilities","weight":1,"kind":"line","def":"Short-term unsecured promissory notes issued to fund working capital and general corporate needs.","goes_in":"Outstanding CP borrowings, typically maturing in days to a few months, carried at face less unamortized discount.","gaap_ifrs":"Current borrowing; comparable under IFRS.","agg_note":"Adds to current_liabilities (+1); net CP issuance/repayment appears in financing cash flow.","sector_note":"","example":"Apple FY2025 commercial paper outstanding was $7,979,000,000 (CommercialPaper).","redflag":"Rolling short-term CP to fund long-term needs understates refinancing risk; drawing CP right at period-end to prop up the cash balance ('window dressing') then repaying after.","value":7979000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Carrying value as of the balance sheet date of short-term borrowings using unsecured obligations issued by banks, corporations and other borrowers to investors. The maturities of these money market securities generally do not exceed 270 days.","xbrl_label":"Commercial Paper"},{"id":"current_lt_debt","label":"Current portion of long-term debt","tag":"LongTermDebtCurrent","statement":"balance","parent":"current_liabilities","weight":1,"kind":"line","def":"Principal on term notes maturing within the next twelve months.","goes_in":"The near-term maturities of Apple's fixed-rate term-debt program.","gaap_ifrs":"Reclassified from non-current as maturity approaches; IFRS comparable (with stricter rules on covenant-breach reclassification).","agg_note":"Adds to current_liabilities (+1); repayment shows in financing cash flow.","sector_note":"","example":"Apple FY2025 current maturities of long-term debt were $12,350,000,000 (LongTermDebtCurrent).","redflag":"Failing to reclassify debt as current when a covenant is breached (keeping it non-current to protect the current ratio) is a recognized red flag.","value":12350000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount, after unamortized (discount) premium and debt issuance costs, of long-term debt, classified as current. Includes, but not limited to, notes payable, bonds payable, debentures, mortgage loans and commercial paper. Excludes capital lease obligations.","xbrl_label":"Long-term Debt, Current Maturities"},{"id":"current_liabilities","label":"Total current liabilities","tag":"LiabilitiesCurrent","statement":"balance","parent":"total_liabilities","weight":1,"kind":"subtotal","def":"Obligations due within one year or the operating cycle.","goes_in":"Accounts payable, other current liabilities, current deferred revenue, commercial paper, and current maturities of long-term debt.","gaap_ifrs":"Classified subtotal; IAS 1 same split.","agg_note":"Sum of the five current-liability lines; rolls into total_liabilities (+1).","sector_note":"","example":"Apple FY2025 total current liabilities were $165,631,000,000 (LiabilitiesCurrent) = 69.860 + 66.387 + 9.055 + 7.979 + 12.350 (all $B).","redflag":"Note Apple's current liabilities ($165.6B) exceed current assets ($148.0B) — a sub-1.0 current ratio that for most firms signals stress but for Apple reflects supplier-financed negative working capital; the metric can be gamed both ways via classification.","value":165631000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Total obligations incurred as part of normal operations that are expected to be paid during the following twelve months or within one business cycle, if longer.","xbrl_label":"Liabilities, Current"},{"id":"long_term_debt","label":"Long-term debt (non-current)","tag":"LongTermDebtNoncurrent","statement":"balance","parent":"total_liabilities","weight":1,"kind":"line","def":"Principal on notes and bonds maturing beyond one year, excluding current maturities.","goes_in":"Apple's fixed-rate senior unsecured term notes, net of unamortized discount and issuance costs.","gaap_ifrs":"Carried at amortized cost using the effective-interest method under both ASC 470 and IFRS 9.","agg_note":"Adds to total_liabilities (+1); issuance/repayment flows through financing cash.","sector_note":"","example":"Apple FY2025 non-current long-term debt was $78,328,000,000 (LongTermDebtNoncurrent); total term debt (incl. current) was $90,678,000,000 (LongTermDebt).","redflag":"Structuring obligations as leases or supplier finance to keep them out of reported debt; issuing debt to fund buybacks (levering equity) while the headline cash pile masks rising net leverage.","value":78328000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount after unamortized (discount) premium and debt issuance costs of long-term debt classified as noncurrent and excluding amounts to be repaid within one year or the normal operating cycle, if longer. Includes, but not limited to, notes payable, bonds payable, debentures, mortgage loans and commercial paper. Excludes capital lease obligations.","xbrl_label":"Long-term Debt, Excluding Current Maturities"},{"id":"other_noncurrent_liabilities","label":"Other non-current liabilities","tag":"OtherLiabilitiesNoncurrent","statement":"balance","parent":"total_liabilities","weight":1,"kind":"line","def":"Long-term obligations not separately captioned.","goes_in":"Long-term deferred tax liabilities, non-current tax payable (e.g. transition tax), long-term deferred revenue, and lease and other long-term liabilities.","gaap_ifrs":"Recognized under respective standards (IAS 12 tax, IFRS 16 leases); measurement can differ but classification is comparable.","agg_note":"Adds to total_liabilities (+1).","sector_note":"","example":"Apple FY2025 other non-current liabilities were $41,549,000,000 (OtherLiabilitiesNoncurrent).","redflag":"A catch-all that can house understated tax and environmental/legal provisions; thin disclosure lets firms under-provide for long-dated obligations.","value":41549000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of liabilities classified as other, due after one year or the normal operating cycle, if longer.","xbrl_label":"Other Liabilities, Noncurrent"},{"id":"total_liabilities","label":"Total liabilities","tag":"Liabilities","statement":"balance","parent":null,"weight":0,"kind":"total","def":"Sum of all current and non-current obligations.","goes_in":"Total current liabilities plus non-current long-term debt and other non-current liabilities.","gaap_ifrs":"Balance-sheet total; with equity it equals total assets under both frameworks.","agg_note":"current_liabilities (+1) plus the two non-current liability lines; with stockholders_equity equals total_assets.","sector_note":"","example":"Apple FY2025 total liabilities were $285,508,000,000 (Liabilities) = current $165.631B + non-current $119.877B; that is 79% of the $359.241B balance sheet.","redflag":"Off-balance-sheet financing (supplier finance, unconsolidated entities) understates this total and every leverage ratio derived from it — the single most consequential place to hide obligations.","value":285508000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Sum of the carrying amounts as of the balance sheet date of all liabilities that are recognized. Liabilities are probable future sacrifices of economic benefits arising from present obligations of an entity to transfer assets or provide services to other entities in the future.","xbrl_label":"Liabilities"},{"id":"common_stock_apic","label":"Common stock & additional paid-in capital","tag":"CommonStocksIncludingAdditionalPaidInCapital","statement":"balance","parent":"stockholders_equity","weight":1,"kind":"line","def":"Par value of issued common shares plus amounts paid in excess of par.","goes_in":"Proceeds from share issuance and, importantly, cumulative stock-based compensation credited to equity as awards vest.","gaap_ifrs":"Recognized at issuance/vesting; broadly comparable to IFRS share capital plus share premium.","agg_note":"Adds to stockholders_equity (+1).","sector_note":"","example":"Apple FY2025 common stock plus APIC was $93,568,000,000 (CommonStocksIncludingAdditionalPaidInCapital).","redflag":"Heavy stock-comp inflates this line while diluting owners; firms emphasizing 'non-GAAP' EPS that excludes SBC understate the real cost accumulating here.","value":93568000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of par value plus amounts in excess of par value or issuance value for common stock issued.","xbrl_label":"Common Stocks, Including Additional Paid in Capital"},{"id":"retained_earnings","label":"Retained earnings / (accumulated deficit)","tag":"RetainedEarningsAccumulatedDeficit","statement":"balance","parent":"stockholders_equity","weight":1,"kind":"line","def":"Cumulative undistributed earnings less cumulative dividends and share-retirement charges.","goes_in":"Prior + current net income, minus dividends declared, minus the excess of buyback price over par when repurchased shares are retired.","gaap_ifrs":"Comparable concept under IFRS; both reduce it for dividends and, when shares are retired, for repurchase premiums.","agg_note":"Adds to stockholders_equity (+1); net_income accretes it, dividends and retirements deplete it.","sector_note":"","example":"Apple FY2025 retained earnings were NEGATIVE $14,264,000,000 (RetainedEarningsAccumulatedDeficit) — an accumulated deficit despite $112B of annual profit, because $90.7B of buybacks are charged here as shares are retired.","redflag":"Aggressive buyback-and-retire programs can drive retained earnings and even total equity negative, engineering a very high (or undefined) ROE; a negative equity book from buybacks is financial engineering, not distress.","value":-14264000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The cumulative amount of the reporting entity's undistributed earnings or deficit.","xbrl_label":"Retained Earnings (Accumulated Deficit)"},{"id":"treasury_stock","label":"Treasury stock","tag":"TreasuryStockValueAcquiredCostMethod","statement":"balance","parent":"stockholders_equity","weight":-1,"kind":"line","def":"Cost of the company's own shares repurchased and held (not retired), a contra-equity account.","goes_in":"Cost of reacquired shares held in treasury; carried as a negative within equity.","gaap_ifrs":"Contra-equity under both frameworks; IFRS 'treasury shares' behave the same way.","agg_note":"Subtracts from stockholders_equity (weight -1).","sector_note":"","example":"For Apple this balance is effectively nil: Apple RETIRES repurchased shares (StockRepurchasedAndRetiredDuringPeriodValue) rather than holding them in treasury, so the FY2025 $90.7B of buybacks hits retained earnings/APIC directly instead of a treasury-stock contra account.","redflag":"Treasury-stock/EPS management — the classic mechanism where firms buy back shares (holding them in treasury) to shrink the share count and lift EPS; timing repurchases to hit per-share targets is the abuse regulators watch.","value":45000000000,"value_fy":2014,"value_end":"2014-09-27","xbrl_desc":"Equity impact of the cost of common and preferred stock that were repurchased during the period. Recorded using the cost method.","xbrl_label":"Treasury Stock, Value, Acquired, Cost Method"},{"id":"aoci","label":"Accumulated other comprehensive income / (loss)","tag":"AccumulatedOtherComprehensiveIncomeLossNetOfTax","statement":"balance","parent":"stockholders_equity","weight":1,"kind":"line","def":"Cumulative gains/losses recorded in equity that bypass net income — FX translation, AFS-securities marks, and cash-flow-hedge gains/losses, net of tax.","goes_in":"Net-of-tax unrealized gains/losses on available-for-sale debt securities, foreign-currency translation, and derivative cash-flow hedges.","gaap_ifrs":"ASC 220 vs. IAS 1 — both route these to OCI; a difference is which items may recycle into net income (e.g. AFS debt recycles; some IFRS FVOCI equity gains never recycle).","agg_note":"Adds to stockholders_equity (+1), typically small and volatile.","sector_note":"","example":"Apple FY2025 AOCI was NEGATIVE $5,571,000,000 (AccumulatedOtherComprehensiveIncomeLossNetOfTax) — net unrealized losses on securities/hedges/FX.","redflag":"OCI is where mark-to-market losses on bonds and hedges can sit quietly outside net income; a large negative AOCI signals economic losses that never touched reported earnings (the bucket that surprised bank investors in 2023).","value":-5571000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Accumulated change in equity from transactions and other events and circumstances from non-owner sources, net of tax effect, at period end. Excludes Net Income (Loss), and accumulated changes in equity from transactions resulting from investments by owners and distributions to owners. Includes foreign currency translation items, certain pension adjustments, unrealized gains and losses on certain i","xbrl_label":"Accumulated Other Comprehensive Income (Loss), Net of Tax"},{"id":"stockholders_equity","label":"Total shareholders' equity","tag":"StockholdersEquity","statement":"balance","parent":null,"weight":0,"kind":"total","def":"Residual interest of shareholders: assets minus liabilities.","goes_in":"Common stock & APIC, plus retained earnings (or deficit), plus AOCI, less treasury stock.","gaap_ifrs":"Balance-sheet total; with liabilities equals total assets under both frameworks.","agg_note":"Sum of common_stock_apic (+1), retained_earnings (+1), aoci (+1), treasury_stock (-1); with total_liabilities equals total_assets.","sector_note":"","example":"Apple FY2025 shareholders' equity was $73,733,000,000 (StockholdersEquity) = 93.568 - 14.264 - 5.571 ($B); liabilities $285.508B + equity $73.733B = total assets $359.241B.","redflag":"A thin or negative equity base driven by buybacks (not losses) makes leverage and ROE ratios look extreme; always separate buyback-driven from loss-driven equity erosion before reading solvency.","value":73733000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Total of all stockholders' equity (deficit) items, net of receivables from officers, directors, owners, and affiliates of the entity which are attributable to the parent. The amount of the economic entity's stockholders' equity attributable to the parent excludes the amount of stockholders' equity which is allocable to that ownership interest in subsidiary equity which is not attributable to the p","xbrl_label":"Stockholders' Equity Attributable to Parent"},{"id":"cfo","label":"Net cash from operating activities","tag":"NetCashProvidedByUsedInOperatingActivities","statement":"cashflow","parent":null,"weight":0,"kind":"total","def":"Cash generated by core operations, reconciled from net income under the indirect method.","goes_in":"Net income, plus non-cash add-backs (depreciation/amortization, share-based comp), plus/minus changes in working-capital accounts (receivables, inventory, payables, deferred revenue).","gaap_ifrs":"ASC 230 / IAS 7 — both allow the indirect method; a difference is interest/dividend classification flexibility under IFRS (US GAAP fixes interest paid in operating).","agg_note":"Starts from net_income; D&A (+1) and SBC (+1) add back, working-capital changes adjust; the total is the anchor of the cash-flow statement.","sector_note":"","example":"Apple FY2025 operating cash flow was $111,482,000,000 (NetCashProvidedByUsedInOperatingActivities) — just below $112.010B net income, a sign of high earnings quality.","redflag":"Boosting CFO by stretching payables, securitizing receivables, or reclassifying financing outflows (e.g. supplier-finance repayments) into other categories; compare CFO to net income over time to catch accrual games.","value":111482000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of cash inflow (outflow) from operating activities, including discontinued operations. Operating activity cash flows include transactions, adjustments, and changes in value not defined as investing or financing activities.","xbrl_label":"Net Cash Provided by (Used in) Operating Activities"},{"id":"dep_amort","label":"Depreciation & amortization","tag":"DepreciationDepletionAndAmortization","statement":"cashflow","parent":"cfo","weight":1,"kind":"line","def":"Non-cash allocation of the cost of PP&E and intangibles over their useful lives, added back to net income.","goes_in":"Depreciation of PP&E/tooling plus amortization of acquired and capitalized intangibles.","gaap_ifrs":"Systematic allocation under both; IFRS component depreciation and revaluation can change the amount.","agg_note":"Non-cash add-back to cfo (+1).","sector_note":"","example":"Apple FY2025 D&A was $11,698,000,000 (DepreciationDepletionAndAmortization), added back in the CFO reconciliation.","redflag":"Extending useful lives slows depreciation (lifts net income) yet the add-back shrinks — a divergence between earnings and cash quality worth flagging.","value":11698000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The aggregate expense recognized in the current period that allocates the cost of tangible assets, intangible assets, or depleting assets to periods that benefit from use of the assets.","xbrl_label":"Depreciation, Depletion and Amortization"},{"id":"sbc","label":"Share-based compensation","tag":"ShareBasedCompensation","statement":"cashflow","parent":"cfo","weight":1,"kind":"line","def":"Non-cash expense for equity awards (mostly RSUs), added back to net income in operating cash.","goes_in":"Grant-date fair value of RSUs and options recognized over the vesting period.","gaap_ifrs":"ASC 718 vs. IFRS 2 — both fair-value awards; IFRS 2 requires graded (accelerated) vesting expense and differs on tax and social-charge treatment.","agg_note":"Non-cash add-back to cfo (+1); the credit side accretes common_stock_apic.","sector_note":"","example":"Apple FY2025 share-based comp was $12,863,000,000 (ShareBasedCompensation) — larger than D&A, and a real economic cost despite being non-cash.","redflag":"Adding SBC back to reach 'adjusted' cash/EPS while ignoring the dilution it causes overstates value delivered to shareholders; buybacks are often used to mop up SBC dilution, blurring the cost.","value":12863000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of noncash expense for share-based payment arrangement.","xbrl_label":"Share-based Payment Arrangement, Noncash Expense"},{"id":"change_ar","label":"Change in accounts receivable","tag":"IncreaseDecreaseInAccountsReceivable","statement":"cashflow","parent":"cfo","weight":-1,"kind":"line","def":"Working-capital adjustment: an increase in receivables is a use of cash (revenue booked but not yet collected).","goes_in":"Period-over-period change in trade (and related) receivable balances.","gaap_ifrs":"Standard indirect-method working-capital line under both frameworks.","agg_note":"Reduces cfo when receivables rise (weight -1 on the reported increase).","sector_note":"","example":"Apple FY2025 receivables rose $6,682,000,000 (IncreaseDecreaseInAccountsReceivable), a $6.682B use of operating cash.","redflag":"Rising AR that outpaces revenue can mean channel-loading or looser terms propping up sales — earnings without cash behind them; this line is where that shows up as a cash drain.","value":6682000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The increase (decrease) during the reporting period in amount due within one year (or one business cycle) from customers for the credit sale of goods and services.","xbrl_label":"Increase (Decrease) in Accounts Receivable"},{"id":"cfi","label":"Net cash from investing activities","tag":"NetCashProvidedByUsedInInvestingActivities","statement":"cashflow","parent":null,"weight":0,"kind":"total","def":"Cash used in or provided by investments in long-term assets and securities.","goes_in":"Capital expenditures and business acquisitions (outflows), net of purchases, sales, and maturities of marketable securities.","gaap_ifrs":"ASC 230 / IAS 7 investing section; comparable.","agg_note":"Capex (-1) and acquisitions (-1) are components; net securities activity (not separately modeled) dominates the total.","sector_note":"","example":"Apple FY2025 investing cash flow was POSITIVE $15,195,000,000 (NetCashProvidedByUsedInInvestingActivities) — net inflow because maturities/sales of marketable securities exceeded purchases plus $12.7B capex.","redflag":"A positive CFI from liquidating the securities portfolio can flatter total cash generation and mask that the investment war chest is shrinking to fund buybacks; separate operating capex from portfolio churn.","value":15195000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of cash inflow (outflow) from investing activities, including discontinued operations. Investing activity cash flows include making and collecting loans and acquiring and disposing of debt or equity instruments and property, plant, and equipment and other productive assets.","xbrl_label":"Net Cash Provided by (Used in) Investing Activities"},{"id":"capex","label":"Capital expenditures","tag":"PaymentsToAcquirePropertyPlantAndEquipment","statement":"cashflow","parent":"cfi","weight":-1,"kind":"line","def":"Cash paid to acquire property, plant, and equipment.","goes_in":"Spending on data centers, manufacturing tooling, retail/facility buildout, and equipment.","gaap_ifrs":"Investing outflow under both frameworks.","agg_note":"Outflow within cfi (weight -1); subtracted from cfo to derive free_cash_flow.","sector_note":"","example":"Apple FY2025 capex was $12,715,000,000 (PaymentsToAcquirePropertyPlantAndEquipment) — modest versus $111.5B CFO, reflecting its asset-light, outsourced-manufacturing model.","redflag":"Under-investing in capex to inflate near-term free cash flow (starving future capacity), or reclassifying maintenance capex as R&D/opex; watch capex trending below depreciation over multiple years.","value":12715000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"The cash outflow associated with the acquisition of long-lived, physical assets that are used in the normal conduct of business to produce goods and services and not intended for resale; includes cash outflows to pay for construction of self-constructed assets.","xbrl_label":"Payments to Acquire Property, Plant, and Equipment"},{"id":"acquisitions","label":"Acquisitions, net of cash acquired","tag":"PaymentsToAcquireBusinessesNetOfCashAcquired","statement":"cashflow","parent":"cfi","weight":-1,"kind":"line","def":"Cash paid for business combinations, net of any cash held by the acquired entity.","goes_in":"Purchase consideration for acquired businesses, less cash on their balance sheets at close.","gaap_ifrs":"ASC 805 / IFRS 3 acquisition method — both allocate purchase price to identifiable assets/liabilities with the residual to goodwill; measurement-period and contingent-consideration mechanics differ slightly.","agg_note":"Outflow within cfi (weight -1).","sector_note":"","example":"Apple's acquisition spend is small and 'tuck-in' by design — e.g. $306,000,000 in FY2022 (PaymentsToAcquireBusinessesNetOfCashAcquired); this anchor set has no material FY2025 acquisition figure, consistent with Apple's build-not-buy strategy.","redflag":"Serial acquirers can flatter 'organic' growth by folding acquired revenue into the base; over-allocating purchase price to goodwill (vs. amortizable intangibles) avoids future amortization and props up earnings.","value":306000000,"value_fy":2022,"value_end":"2022-09-24","xbrl_desc":"The cash outflow associated with the acquisition of a business, net of the cash acquired from the purchase.","xbrl_label":"Payments to Acquire Businesses, Net of Cash Acquired"},{"id":"cff","label":"Net cash from financing activities","tag":"NetCashProvidedByUsedInFinancingActivities","statement":"cashflow","parent":null,"weight":0,"kind":"total","def":"Cash from/returned to capital providers — equity buybacks, dividends, and debt.","goes_in":"Share repurchases and dividends (outflows), net of debt issued less repaid and net commercial-paper activity.","gaap_ifrs":"ASC 230 / IAS 7 financing section; IFRS allows more flexibility on interest/dividends-paid classification.","agg_note":"Buybacks (-1) and dividends (-1) are components; net debt flows complete the total.","sector_note":"","example":"Apple FY2025 financing cash flow was NEGATIVE $120,686,000,000 (NetCashProvidedByUsedInFinancingActivities) — a massive net return of capital, dominated by $90.7B buybacks and $15.4B dividends.","redflag":"Funding buybacks with new debt while reporting large gross cash keeps the payout looking self-funded; netting issuance against repayment can obscure how much of the return of capital is leverage-financed.","value":-120686000000,"value_fy":2025,"value_end":"2025-09-27","xbrl_desc":"Amount of cash inflow (outflow) from financing activities, including discontinued operations. Financing activity cash flows include obtaining resources from owners and providing them with a return on, and a return of, their investment; borrowing money and repaying amounts borrowed, or settling the obligation; and obtaining and paying for other resources obtained from creditors on long-term credit.","xbrl_label":"Net Cash Provided by (Used in) Financing Activities"},{"id":"buybacks","label":"Repurchases of common stock","tag":"PaymentsForRepurchaseOfCommonStock","statement":"cashflow","parent":"cff","weight":-1,"kind":"line","def":"Cash paid to repurchase the company's own shares.","goes_in":"Open-market and accelerated share-repurchase (ASR) program spending.","gaap_ifrs":"Financing outflow; the retirement charge hits equity (retained earnings/APIC) since Apple retires the shares.","agg_note":"Outflow within cff (weight -1); depletes retained_earnings/APIC on the balance sheet.","sector_note":"","example":"Apple FY2025 buybacks were $90,711,000,000 (PaymentsForRepu
