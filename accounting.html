to common shareholders during the period.","goes_in":"Cash used in financing","gaap_ifrs":"Converged.","agg_note":"A new dividend is a maturity signal for SaaS — the business is generating more cash than it can reinvest.","sector_note":"Dividends are a recent phenomenon for large SaaS (Salesforce initiated one in FY2025), marking the shift from pure growth to capital return.","example":"$1,605M FY2025 — Salesforce's first-era dividend, funded easily by $14.4B FCF.","redflag":"Initiating/raising a dividend and buybacks while organic growth decelerates can signal management has run out of high-return reinvestment ideas — read it alongside RPO growth.","value":1605000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount of paid and unpaid common stock dividends declared with the form of settlement in cash.","xbrl_label":"Dividends, Common Stock, Cash"}],"anchor_company":"Salesforce, Inc."}},"ratios":[{"id":"current_ratio","label":"Current ratio","category":"liquidity","formula":"Current assets / Current liabilities","inputs":["AssetsCurrent","LiabilitiesCurrent"],"measures":"Ability to cover short-term obligations due within 12 months with all current assets.","interpretation":"1.5-3.0 is generally healthy; below 1.0 signals a possible working-capital squeeze; very high (>4) can mean idle cash or bloated inventory/receivables rather than strength. Read alongside the cash cycle — a high ratio built on slow inventory is weak.","manipulation":"Window-dressing near quarter-end: delay payables, factor receivables, or classify a revolver draw as long-term to shrink current liabilities. Inventory carried at cost that won't sell inflates AssetsCurrent.","pro":false,"sectors":["standard","saas","utility"]},{"id":"quick_ratio","label":"Quick (acid-test) ratio","category":"liquidity","formula":"(Current assets − Inventory − Prepaid expenses) / Current liabilities, or (Cash + Marketable securities + Receivables) / Current liabilities","inputs":["AssetsCurrent","InventoryNet","PrepaidExpenseCurrent","LiabilitiesCurrent","CashAndCashEquivalentsAtCarryingValue","AccountsReceivableNetCurrent"],"measures":"Short-term coverage using only assets convertible to cash quickly, stripping out inventory that may be slow or unsellable.","interpretation":"≥1.0 is the classic comfort line. The gap between current and quick ratio tells you how inventory-dependent the liquidity is — wide gap in a fashion/tech-hardware name is a warning.","manipulation":"Receivables kept in the numerator can be stuffed or aged; a channel-stuffed AR balance flatters quick ratio even as real collectibility falls. Reclassifying inventory to 'other current assets' can sneak it back in.","pro":false,"sectors":["standard","saas"]},{"id":"cash_ratio","label":"Cash ratio","category":"liquidity","formula":"(Cash & equivalents + Short-term marketable securities) / Current liabilities","inputs":["CashAndCashEquivalentsAtCarryingValue","ShortTermInvestments","LiabilitiesCurrent"],"measures":"Most conservative liquidity test — coverage from cash and near-cash alone, no reliance on collecting receivables or selling inventory.","interpretation":"Rarely above 1.0 and doesn't need to be; used to judge survival under a credit freeze. Meaningful for stress scenarios and for firms with volatile receivables.","manipulation":"Trapped foreign cash or cash pledged as collateral is counted at face value though it isn't freely available; quarter-end 'round-tripping' of a loan into cash inflates the balance for one day.","pro":false,"sectors":["all"]},{"id":"defensive_interval","label":"Defensive interval ratio","category":"liquidity","formula":"(Cash + Marketable securities + Receivables) / (Daily operating cash expenses), where daily opex ≈ (Operating expenses − non-cash charges) / 365","inputs":["CashAndCashEquivalentsAtCarryingValue","ShortTermInvestments","AccountsReceivableNetCurrent","OperatingExpenses","DepreciationDepletionAndAmortization"],"measures":"Number of days a firm can fund its operating cash burn from liquid assets without new revenue or financing — a runway metric.","interpretation":"Read as days of runway; especially useful for pre-profit / cash-burning firms (biotech, SaaS). More informative than the current ratio because it anchors to the actual burn rate.","manipulation":"Understating the true cash burn (capitalizing opex, pushing costs to 'restructuring') lengthens the apparent runway; excluding a large recurring cash cost from the denominator flatters it.","pro":false,"sectors":["standard","saas"]},{"id":"debt_to_equity","label":"Debt-to-equity","category":"solvency","formula":"Total debt (short-term + long-term borrowings) / Total shareholders' equity","inputs":["DebtCurrent","LongTermDebtNoncurrent","StockholdersEquity"],"measures":"Financial leverage — how much of the capital structure is creditor-funded versus owner-funded.","interpretation":"Sector-dependent: <1.0 conservative for industrials; banks and utilities run structurally higher. Rising D/E with falling coverage is the danger combination. Watch negative equity from buybacks masking real leverage.","manipulation":"Off-balance-sheet SPEs, operating leases (pre-ASC 842), and supply-chain financing keep debt off the balance sheet. Buyback-driven negative equity makes the ratio meaningless — switch to debt/assets.","pro":false,"sectors":["standard","saas"]},{"id":"net_debt_to_ebitda","label":"Net debt / EBITDA","category":"solvency","formula":"(Total debt − Cash & equivalents) / EBITDA, where EBITDA = Operating income + Depreciation & amortization","inputs":["LongTermDebtNoncurrent","DebtCurrent","CashAndCashEquivalentsAtCarryingValue","OperatingIncomeLoss","DepreciationDepletionAndAmortization"],"measures":"Leverage in years — how many years of cash earnings it would take to repay net borrowings; the core covenant metric.","interpretation":"<3x investment-grade comfort, 3-4x leveraged, >5-6x distressed. Loan covenants are usually set here. Compare to the covenant threshold, not just an abstract benchmark.","manipulation":"'Adjusted EBITDA' inflated with add-backs (SBC, 'one-time' costs that recur, run-rate synergies) shrinks the ratio; excluding leases or factored AR from net debt understates it.","pro":false,"sectors":["standard","saas"]},{"id":"interest_coverage","label":"Interest coverage (times interest earned)","category":"solvency","formula":"EBIT / Interest expense, where EBIT = Operating income","inputs":["OperatingIncomeLoss","InterestExpense"],"measures":"How many times operating earnings cover the interest bill — cushion before debt service is at risk.","interpretation":">3x comfortable, <1.5x fragile, <1x means operating profit doesn't cover interest. Use EBITDA/interest as a cash-flavored cross-check for capital-heavy firms.","manipulation":"Capitalized interest is excluded from the expense line, flattering coverage; using EBITDA instead of EBIT ignores real maintenance capex needed to sustain earnings.","pro":false,"sectors":["standard","utility"]},{"id":"debt_to_assets","label":"Debt-to-assets","category":"solvency","formula":"Total debt / Total assets","inputs":["DebtCurrent","LongTermDebtNoncurrent","Assets"],"measures":"Share of the asset base financed by debt; robust even when equity is negative from buybacks.","interpretation":"Lower is safer; useful precisely when D/E breaks down (negative equity). Compare across peers with similar asset intensity.","manipulation":"Asset base inflated by unimpaired goodwill or capitalized soft costs lowers the ratio without any real deleveraging; off-balance-sheet debt understates the numerator.","pro":false,"sectors":["standard"]},{"id":"equity_multiplier","label":"Equity multiplier","category":"solvency","formula":"Total assets / Total shareholders' equity","inputs":["Assets","StockholdersEquity"],"measures":"Leverage factor — the multiplier that turns ROA into ROE; how many dollars of assets each equity dollar supports.","interpretation":"Higher magnifies both returns and losses. It is the leverage leg of the DuPont identity; a rising multiplier driving ROE is 'financially engineered' return, not operating improvement.","manipulation":"Buybacks shrink the denominator and inflate ROE via leverage rather than performance — decompose with DuPont to expose it.","pro":false,"sectors":["standard","bank"]},{"id":"gross_margin","label":"Gross margin","category":"profitability","formula":"(Revenue − Cost of goods sold) / Revenue","inputs":["Revenues","CostOfGoodsAndServicesSold"],"measures":"Pricing power and unit economics after direct production costs.","interpretation":"Stability and trend matter more than the level; a durable, expanding gross margin signals moat. Compare within industry — software runs 70-90%, retail 20-40%.","manipulation":"Shifting costs out of COGS into opex (reclassifying) or capitalizing production costs inflates gross margin; under-provisioning for inventory obsolescence keeps COGS artificially low.","pro":false,"sectors":["standard","saas"]},{"id":"operating_margin","label":"Operating margin","category":"profitability","formula":"Operating income / Revenue","inputs":["OperatingIncomeLoss","Revenues"],"measures":"Profitability of core operations before financing and taxes — the cleanest read on operating efficiency.","interpretation":"Trend and peer comparison; watch for margin held up only by non-recurring gains booked in operating income. GAAP operating margin vs 'adjusted' gap flags add-back reliance.","manipulation":"Capitalizing operating costs (WorldCom) moves expense off the income statement; cookie-jar reserve releases and gains-on-sale parked in operating income inflate it.","pro":false,"sectors":["standard","saas","utility"]},{"id":"net_margin","label":"Net profit margin","category":"profitability","formula":"Net income / Revenue","inputs":["NetIncomeLoss","Revenues"],"measures":"Bottom-line profitability after all costs, interest, and taxes.","interpretation":"Useful but noisy — tax items, one-timers, and financing distort it. Reconcile to cash flow: net margin rising while CFO stalls is an earnings-quality red flag.","manipulation":"Tax-rate games, discrete tax benefits, big-bath then reversal, and below-the-line gains dressed as recurring all move net income without operating improvement.","pro":false,"sectors":["standard","saas"]},{"id":"ebitda_margin","label":"EBITDA margin","category":"profitability","formula":"EBITDA / Revenue, where EBITDA = Operating income + Depreciation & amortization","inputs":["OperatingIncomeLoss","DepreciationDepletionAndAmortization","Revenues"],"measures":"Cash-operating profitability before capital-structure and non-cash charges; used for cross-capital-structure comparison.","interpretation":"Good for comparing peers with different D&A and leverage, but it ignores real capex — a high EBITDA margin in a capital-intensive firm can mask thin true cash generation. Bridge to FCF.","manipulation":"'Adjusted EBITDA' with aggressive add-backs (recurring SBC, perpetual restructuring, pro-forma synergies) is the single most abused pro-forma metric.","pro":false,"sectors":["standard","saas"]},{"id":"roa","label":"Return on assets","category":"profitability","formula":"Net income / Average total assets","inputs":["NetIncomeLoss","Assets"],"measures":"How efficiently the total asset base generates profit, independent of financing mix.","interpretation":"Compare within industry; asset-light models show high ROA. A falling ROA with flat ROE means leverage is doing the work. Use NOPAT/assets to strip financing effects.","manipulation":"Write-offs that shrink the asset base (big bath) inflate subsequent ROA; off-balance-sheet assets understate the denominator.","pro":false,"sectors":["standard"]},{"id":"roe","label":"Return on equity","category":"profitability","formula":"Net income / Average shareholders' equity","inputs":["NetIncomeLoss","StockholdersEquity"],"measures":"Return generated on owners' capital — the headline profitability metric.","interpretation":"15%+ sustained is strong, but decompose via DuPont: high ROE from leverage or share shrinkage is not the same as high ROE from margins. Negative-equity firms make ROE meaningless.","manipulation":"Buybacks and dividends shrink equity to lift ROE without operating gains; big-bath write-downs reset the equity base lower to flatter future ROE.","pro":false,"sectors":["standard","bank"]},{"id":"roic","label":"Return on invested capital","category":"profitability","formula":"NOPAT / Invested capital, where NOPAT = Operating income × (1 − effective tax rate) and Invested capital = Total debt + Equity − Cash & equivalents","inputs":["OperatingIncomeLoss","IncomeTaxExpenseBenefit","IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest","LongTermDebtNoncurrent","DebtCurrent","StockholdersEquity","CashAndCashEquivalentsAtCarryingValue"],"measures":"After-tax operating return on the capital actually deployed in the business; the truest test of value creation versus the cost of capital (WACC).","interpretation":"ROIC > WACC = value creation; ROIC < WACC destroys value regardless of growth. The single best moat/quality metric. Watch the spread and its persistence, not the level alone.","manipulation":"Excluding goodwill or operating leases from invested capital inflates ROIC; acquirers who write off in-process assets shrink the capital base to show phantom high returns.","pro":true,"sectors":["standard","saas"]},{"id":"asset_turnover","label":"Asset turnover","category":"efficiency","formula":"Revenue / Average total assets","inputs":["Revenues","Assets"],"measures":"Revenue generated per dollar of assets — the efficiency leg of DuPont ROE.","interpretation":"High in retail/distribution, low in utilities/telecom. Declining turnover signals overinvestment or a stalling top line relative to the asset build.","manipulation":"Front-loading revenue (channel stuffing) inflates the numerator; sale-leaseback removes assets from the denominator to flatter turnover.","pro":false,"sectors":["standard"]},{"id":"inventory_turnover","label":"Inventory turnover → DIO","category":"efficiency","formula":"Inventory turnover = COGS / Average inventory; DIO = 365 / Inventory turnover","inputs":["CostOfGoodsAndServicesSold","InventoryNet"],"measures":"How fast inventory sells; DIO expresses it as days of stock on hand.","interpretation":"Higher turnover / lower DIO is better but too high can mean stockouts. Rising DIO ahead of a writedown is a classic obsolescence tell — cross-check with the reserve trend.","manipulation":"Under-reserving for obsolete/slow inventory keeps InventoryNet high and COGS low; bill-and-hold shifts goods off the balance sheet prematurely to flatter turnover.","pro":false,"sectors":["standard"]},{"id":"receivables_turnover","label":"Receivables turnover → DSO","category":"efficiency","formula":"Receivables turnover = Revenue / Average accounts receivable; DSO = 365 / Receivables turnover","inputs":["Revenues","AccountsReceivableNetCurrent"],"measures":"How fast credit sales are collected; DSO is the average collection period in days.","interpretation":"Stable-to-falling DSO is healthy; DSO rising faster than sales signals stuffed channels or deteriorating credit quality. Compare to peers and to the firm's stated terms.","manipulation":"Channel stuffing inflates AR and DSO; factoring/securitizing receivables removes them from the balance sheet to artificially cut DSO while real collection risk persists.","pro":false,"sectors":["standard"]},{"id":"payables_turnover","label":"Payables turnover → DPO","category":"efficiency","formula":"Payables turnover = COGS / Average accounts payable; DPO = 365 / Payables turnover","inputs":["CostOfGoodsAndServicesSold","AccountsPayableCurrent"],"measures":"How long the firm takes to pay suppliers; a lever on working capital and cash conversion.","interpretation":"Longer DPO conserves cash but stretched too far strains suppliers and can signal distress. A sudden DPO jump often masks a one-time CFO boost that reverses.","manipulation":"Reverse-factoring / supply-chain financing lets a firm stretch payables while the debt sits in AP (or 'other liabilities') rather than borrowings — flatters both CCC and CFO.","pro":false,"sectors":["standard"]},{"id":"cash_conversion_cycle","label":"Cash conversion cycle","category":"efficiency","formula":"CCC = DSO + DIO − DPO","inputs":["Revenues","AccountsReceivableNetCurrent","CostOfGoodsAndServicesSold","InventoryNet","AccountsPayableCurrent"],"measures":"Net days cash is tied up in operations from paying suppliers to collecting from customers.","interpretation":"Lower is better; negative CCC (Amazon, Dell) means suppliers finance growth. Track the trend — a lengthening CCC drains cash even if the P&L looks fine.","manipulation":"Cut artificially by factoring AR (lowers DSO) and stretching AP via supply-chain finance (raises DPO); both move cash timing without any operating improvement and can reverse abruptly.","pro":true,"sectors":["standard"]},{"id":"fcf_conversion","label":"FCF conversion","category":"efficiency","formula":"Free cash flow / Net income, where FCF = Cash from operations − Capital expenditures","inputs":["NetCashProvidedByUsedInOperatingActivities","PaymentsToAcquirePropertyPlantAndEquipment","NetIncomeLoss"],"measures":"How much reported profit actually converts to spendable cash after capex — a core earnings-quality gauge.","interpretation":"Persistently near or above 100% signals clean, cash-backed earnings; chronically below ~80% means profits aren't turning into cash (working-capital build, aggressive accruals, heavy maintenance capex).","manipulation":"CFO inflated by stretching payables, factoring receivables, or reclassifying capex as operating cash; understating maintenance capex (capitalizing to 'growth') flatters FCF.","pro":true,"sectors":["standard","saas"]},{"id":"piotroski_f_score","label":"Piotroski F-score","category":"quality-pro","formula":"0-9 points, +1 each: positive net income; positive CFO; rising ROA; CFO > net income (accrual check); falling long-term debt/assets; rising current ratio; no new shares issued; rising gross margin; rising asset turnover","inputs":["NetIncomeLoss","NetCashProvidedByUsedInOperatingActivities","Assets","LongTermDebtNoncurrent","AssetsCurrent","LiabilitiesCurrent","CommonStockSharesOutstanding","CostOfGoodsAndServicesSold","Revenues"],"measures":"Composite fundamental-strength score across profitability, leverage/liquidity, and operating efficiency; strongest as a value-stock quality filter.","interpretation":"8-9 = fundamentally strong, 0-2 = weak/deteriorating. Designed to separate improving from decaying firms within cheap (low P/B) names.","manipulation":"Individual legs are gameable (a buyback removes the share-issuance penalty; a reserve release lifts ROA), but the CFO>NI accrual leg makes the composite harder to fake wholesale.","pro":true,"sectors":["standard"]},{"id":"beneish_m_score","label":"Beneish M-score","category":"quality-pro","formula":"M = −4.84 + 0.92·DSRI + 0.528·GMI + 0.404·AQI + 0.892·SGI + 0.115·DEPI − 0.172·SGAI + 4.679·TATA − 0.327·LVGI (eight manipulation indices)","inputs":["AccountsReceivableNetCurrent","Revenues","CostOfGoodsAndServicesSold","AssetsCurrent","PropertyPlantAndEquipmentNet","Assets","DepreciationDepletionAndAmortization","SellingGeneralAndAdministrativeExpense","NetCashProvidedByUsedInOperatingActivities","NetIncomeLoss","LongTermDebtNoncurrent"],"measures":"Probability that a firm is manipulating earnings, built from receivables growth, margin erosion, asset-quality shifts, sales growth, and total accruals.","interpretation":"M > −1.78 flags likely manipulation. Famously would have flagged Enron. Best as a screen to prioritize forensic review, not a verdict.","manipulation":"It is the anti-manipulation detector, but sophisticated fraud that keeps ratios smooth (e.g., matching fake revenue with fake cash) can slip through; pair with CFO/NI and DSO trends.","pro":true,"sectors":["standard"]},{"id":"altman_z_score","label":"Altman Z-score","category":"quality-pro","formula":"Z = 1.2·(Working capital/Assets) + 1.4·(Retained earnings/Assets) + 3.3·(EBIT/Assets) + 0.6·(Market value of equity/Total liabilities) + 1.0·(Sales/Assets)","inputs":["AssetsCurrent","LiabilitiesCurrent","Assets","RetainedEarningsAccumulatedDeficit","OperatingIncomeLoss","Liabilities","Revenues"],"measures":"Bankruptcy/distress probability composite for manufacturers (variants exist for private and non-manufacturing firms).","interpretation":"Z > 2.99 safe, 1.81-2.99 grey zone, < 1.81 distress. Use the Z''-score variant for services/EM. Trend into the grey zone is the actionable signal.","manipulation":"Inflated retained earnings or asset base (unimpaired goodwill) lifts Z; market-cap term makes it partly a market signal that lags fundamentals.","pro":true,"sectors":["standard"]},{"id":"sloan_accruals","label":"Sloan accruals ratio","category":"quality-pro","formula":"Accruals ratio = (Net income − Cash from operations − Cash from investing) / Average total assets; simple version = (Net income − CFO) / Average total assets","inputs":["NetIncomeLoss","NetCashProvidedByUsedInOperatingActivities","NetCashProvidedByUsedInInvestingActivities","Assets"],"measures":"Share of earnings coming from accruals rather than cash; high accruals predict lower future returns and earnings reversal (the 'accruals anomaly').","interpretation":"Low/negative accruals = cash-backed, high-quality earnings; high positive accruals = earnings likely to mean-revert down. Rank cross-sectionally within sector.","manipulation":"Aggressive revenue recognition and reserve games pump the accrual component; the ratio is specifically designed to surface exactly that gap between profit and cash.","pro":true,"sectors":["standard"]},{"id":"cfo_to_ni","label":"Cash-flow-to-net-income (earnings quality)","category":"quality-pro","formula":"Cash from operations / Net income","inputs":["NetCashProvidedByUsedInOperatingActivities","NetIncomeLoss"],"measures":"The most direct earnings-quality ratio — how much of reported profit is backed by operating cash.","interpretation":"Sustained ≥1.0 is healthy; persistently <1.0, or a widening gap versus rising net income, signals accrual-heavy or fabricated earnings. Watch multi-year divergence.","manipulation":"CFO can be temporarily inflated (stretch payables, factor AR, classify financing inflows as operating), so read the components; NI can be inflated by non-cash gains, widening the true gap that this ratio should catch.","pro":true,"sectors":["standard","saas"]},{"id":"rule_of_40","label":"Rule of 40 (SaaS)","category":"quality-pro","formula":"Revenue growth rate (%) + Profitability margin (%), where margin is typically FCF margin or EBITDA margin","inputs":["Revenues","NetCashProvidedByUsedInOperatingActivities","PaymentsToAcquirePropertyPlantAndEquipment"],"measures":"Balance between growth and profitability for subscription software — a firm should sum to ≥40%.","interpretation":"≥40% healthy; a hyper-growth name can score via growth alone, a mature one via margin. Below 40% consistently means the growth isn't paying for itself. Specify which margin is used.","manipulation":"Growth pulled forward with discounting or bookings-vs-revenue confusion; FCF margin flattered by stretching payables or capitalizing R&D/commissions inflates the profitability leg.","pro":true,"sectors":["saas"]},{"id":"dupont_roe","label":"DuPont ROE decomposition","category":"quality-pro","formula":"ROE = Net margin × Asset turnover × Equity multiplier = (Net income/Revenue) × (Revenue/Assets) × (Assets/Equity); 5-step adds tax burden × interest burden × operating margin × turnover × leverage","inputs":["NetIncomeLoss","Revenues","Assets","StockholdersEquity","OperatingIncomeLoss","IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest"],"measures":"Attributes ROE to its drivers — operating margin, asset efficiency, and leverage — so you can see whether returns are earned or engineered.","interpretation":"Two firms with identical ROE differ entirely if one is margin-driven and the other leverage-driven. Rising equity multiplier carrying ROE = financial engineering; rising margin/turnover = real improvement.","manipulation":"Buyback-driven equity multiplier inflates ROE while masking flat or falling operating quality — the decomposition is the tool that exposes it.","pro":true,"sectors":["standard","bank"]},{"id":"net_interest_margin","label":"Net interest margin (bank)","category":"profitability","formula":"(Interest income − Interest expense) / Average interest-earning assets","inputs":["InterestAndDividendIncomeOperating","InterestExpense","InterestAndFeeIncomeLoansAndLeases"],"measures":"Spread a bank earns between the yield on loans/securities and its cost of funding — core banking profitability.","interpretation":"3-4% typical for US commercial banks; rate-cycle sensitive. Compare to peers and track the trend; NIM compression signals funding-cost pressure or asset-yield decline.","manipulation":"Reaching for yield (riskier loans) inflates NIM while hiding credit risk that surfaces later as charge-offs; deferring loan-loss provisions props up net interest income.","pro":false,"sectors":["bank"]},{"id":"efficiency_ratio_bank","label":"Efficiency ratio (bank)","category":"efficiency","formula":"Non-interest expense / (Net interest income + Non-interest income)","inputs":["NoninterestExpense","InterestIncomeExpenseNet","NoninterestIncome"],"measures":"Cost to generate a dollar of revenue at a bank — lower is more efficient (it is a cost ratio, so inverted vs the name).","interpretation":"<50% is excellent, 50-60% good, >70% bloated. Best-in-class banks run in the 40s. Track alongside revenue growth to avoid cost-cutting that starves the franchise.","manipulation":"Excluding costs as 'non-recurring' or capitalizing tech spend lowers the numerator; one-time revenue gains in the denominator flatter it temporarily.","pro":false,"sectors":["bank"]},{"id":"cet1_ratio","label":"CET1 / capital adequacy (bank)","category":"solvency","formula":"Common Equity Tier 1 capital / Risk-weighted assets","inputs":["TierOneRiskBasedCapitalToRiskWeightedAssets","CommonEquityTierOneCapital","RiskWeightedAssets"],"measures":"Loss-absorbing capital cushion relative to risk-weighted exposures — the central Basel III solvency gauge for banks.","interpretation":"Regulatory minimum ~4.5% plus buffers; well-capitalized banks run 11-14%. Compare to the bank's own regulatory requirement and buffer, not an abstract number.","manipulation":"Optimizing risk-weights (internal-model RWA reductions) shrinks the denominator without reducing real risk; sovereign/AAA holdings weighted at zero can understate true exposure.","pro":true,"sectors":["bank"]},{"id":"npl_coverage","label":"NPL / allowance coverage (bank)","category":"quality-pro","formula":"Allowance for loan losses / Non-performing loans; also NPL ratio = Non-performing loans / Total loans","inputs":["FinancingReceivableAllowanceForCreditLosses","FinancingReceivableRecordedInvestmentNonaccrualStatus","NotesReceivableNet"],"measures":"Whether reserves are adequate to cover problem loans, and how large the problem-loan book is.","interpretation":"Coverage >100% is conservative; a falling coverage ratio while NPLs rise is a classic under-reserving warning. Under CECL, watch reserve build/release timing versus the credit cycle.","manipulation":"Under-provisioning (releasing reserves to boost EPS late-cycle) understates NPLs and inflates earnings just before losses hit — the core banking earnings-management lever.","pro":true,"sectors":["bank"]},{"id":"rotce","label":"Return on tangible common equity (bank)","category":"profitability","formula":"Net income to common / Average tangible common equity, where tangible common equity = Common equity − Goodwill − Intangibles","inputs":["NetIncomeLoss","StockholdersEquity","Goodwill","IntangibleAssetsNetExcludingGoodwill","PreferredStockDividendsIncomeStatementImpact"],"measures":"Bank profitability on tangible capital, stripping acquisition goodwill — the metric bank investors actually price on.","interpretation":"12-15%+ is strong for a large bank. Preferred to ROE because it removes goodwill from serial acquirers, making capital-return capacity comparable.","manipulation":"Goodwill from overpaying on acquisitions distorts plain ROE; ROTCE removes it, but a bank can still flatter it via reserve releases and buybacks shrinking tangible equity.","pro":true,"sectors":["bank"]},{"id":"ffo_to_debt","label":"FFO / debt (utility)","category":"solvency","formula":"Funds from operations / Total debt, where FFO ≈ Net income + Depreciation & amortization + deferred taxes + other non-cash items","inputs":["NetIncomeLoss","DepreciationDepletionAndAmortization","DeferredIncomeTaxExpenseBenefit","LongTermDebtNoncurrent","DebtCurrent"],"measures":"Cash-flow-based leverage metric the rating agencies use to rate regulated utilities and infrastructure issuers.","interpretation":"The key rating trigger: agencies map FFO/debt bands to ratings (e.g., mid-teens % for BBB utilities). A downgrade threshold breach raises the cost of capital directly.","manipulation":"Including non-recurring items in FFO or using regulatory-asset accounting to defer costs can flatter it; watch the treatment of deferred taxes and securitization debt.","pro":true,"sectors":["utility"]},{"id":"allowed_vs_earned_roe","label":"Allowed vs earned ROE (utility)","category":"profitability","formula":"Earned ROE (Net income / regulated equity) compared to the regulator-authorized allowed ROE from the last rate case","inputs":["NetIncomeLoss","StockholdersEquity"],"measures":"Whether a regulated utility is actually earning the return regulators permit on its rate base — the gap signals regulatory lag or cost over/under-recovery.","interpretation":"Earning at or near the allowed ROE (e.g., ~9-10%) is healthy; a persistent under-earning gap flags regulatory lag, cost disallowances, or a needed rate case. Over-earning invites regulatory clawback.","manipulation":"Rider/tracker mechanisms and regulatory-asset deferrals shift costs across periods to smooth the earned ROE toward the allowed level; non-regulated earnings can blur the regulated read.","pro":true,"sectors":["utility"]},{"id":"rate_base_growth","label":"Rate-base growth (utility)","category":"efficiency","formula":"Year-over-year growth in regulated rate base (net utility PP&E on which the allowed return is earned)","inputs":["PublicUtilitiesPropertyPlantAndEquipmentNet","PropertyPlantAndEquipmentNet"],"measures":"The primary earnings-growth engine for a regulated utility — allowed return × rate base drives regulated income.","interpretation":"Mid-single-digit rate-base CAGR underpins a utility's EPS-growth guidance. Growth funded by approved capex (grid, renewables) is the durable driver; check it is regulator-approved, not speculative.","manipulation":"Capitalizing costs into rate base that regulators may later disallow inflates the base; construction-work-in-progress and AFUDC accounting can front-load reported returns before assets are in service.","pro":true,"sectors":["utility"]}],"redflags":[{"id":"channel_stuffing","label":"Channel stuffing / bill-and-hold revenue","mechanism":"Push excess product to distributors near period-end (or book 'sold' goods still sitting in the company's warehouse) to pull future revenue into the current quarter, inflating sales and receivables.","distorts":["Revenues","AccountsReceivableNetCurrent","receivables_turnover","asset_turnover","net_margin"],"detect":"DSO rising faster than revenue; receivables growth outpacing sales; a spike in period-end shipments then next-quarter returns/reserves; bill-and-hold criteria (SAB 101/104) not met in the revenue-recognition footnote.","example":"Sunbeam under Al Dunlap (bill-and-hold); Bristol-Myers Squibb channel-stuffing to distributors."},{"id":"capitalizing_opex","label":"Capitalizing operating costs","mechanism":"Record ordinary operating expenses as capital assets so they hit the balance sheet and depreciate slowly instead of expensing immediately — inflating current earnings, EBITDA, and operating cash flow.","distorts":["OperatingIncomeLoss","PropertyPlantAndEquipmentNet","operating_margin","ebitda_margin","fcf_conversion"],"detect":"Capex growing far faster than revenue; capitalized software/labor costs rising; CFO inflated because the cost moved to investing; gap between reported earnings and cash from operations minus capex.","example":"WorldCom capitalized ~$3.8B of line costs as capital expenditures."},{"id":"aggressive_poc_revenue","label":"Aggressive percentage-of-completion / over-time revenue","mechanism":"On long-term contracts (ASC 606 over-time recognition), overstate the estimated completion percentage or total contract profit to book revenue and margin ahead of actual performance.","distorts":["Revenues","ContractWithCustomerAssetNet","gross_margin","operating_margin"],"detect":"Unbilled receivables / contract assets growing faster than billings and cash; frequent estimate revisions and cost-to-complete true-ups; margin volatility on completed contracts versus recognized.","example":"Toshiba's multi-year percentage-of-completion overstatement (~¥150B accounting scandal)."},{"id":"deferred_revenue_drawdown","label":"Deferred-revenue drawdown masking a slowdown","mechanism":"Recognize revenue from the deferred-revenue balance faster than new bookings replenish it, so the income statement looks stable while forward demand is actually falling.","distorts":["Revenues","ContractWithCustomerLiabilityCurrent","DeferredRevenueCurrent"],"detect":"Deferred-revenue / billings (revenue + change in deferred) declining while reported revenue holds; RPO (remaining performance obligations) shrinking; current-vs-long-term deferred mix deteriorating.","example":"Subscription/software names where reported revenue held up on a draining deferred balance as new bookings stalled."},{"id":"cookie_jar_bigbath","label":"Cookie-jar reserves / big-bath restructuring","mechanism":"Over-accrue reserves (restructuring, warranty, litigation) in good or already-bad years, then release them into earnings later to smooth results and beat estimates.","distorts":["OperatingIncomeLoss","NetIncomeLoss","RestructuringReserve","net_margin","roe"],"detect":"Large restructuring charges followed by later reversals; reserve balances that swing counter-cyclically; 'other income' boosted by reserve releases; earnings that are suspiciously smooth versus cash flow.","example":"Microsoft's 1990s deferred-revenue smoothing (SEC settlement); Freddie Mac's earnings-smoothing reserve manipulation; W.R. Grace cookie-jar reserves."},{"id":"factoring_receivables","label":"Factoring receivables to hide rising DSO","mechanism":"Sell or securitize receivables for cash before period-end, removing them from the balance sheet so DSO and the receivables balance look healthy while true collection periods are lengthening.","distorts":["AccountsReceivableNetCurrent","receivables_turnover","cash_conversion_cycle","NetCashProvidedByUsedInOperatingActivities"],"detect":"Footnote disclosure of receivables sold/factored; CFO boosted by a one-time balance-sheet reduction; DSO that jumps if you add factored receivables back; recourse-vs-non-recourse terms in the notes.","example":"Various suppliers using trade-receivables securitization; scrutiny of factoring programs at firms like Carillion pre-collapse."},{"id":"supply_chain_financing","label":"Stretching payables / supply-chain financing","mechanism":"Use reverse factoring so a bank pays suppliers early while the company pays the bank much later — stretching effective DPO and boosting operating cash flow, with the obligation buried in payables rather than reported as debt.","distorts":["AccountsPayableCurrent","payables_turnover","cash_conversion_cycle","NetCashProvidedByUsedInOperatingActivities","net_debt_to_ebitda"],"detect":"Sudden DPO extension; 'other payables' or supplier-finance program disclosures (now required under ASU 2022-04); CFO growth that reverses when the program unwinds; auditor commentary on trade-payable classification.","example":"Carillion and Abengoa used reverse factoring to disguise debt as trade payables before collapsing."},{"id":"inventory_obsolescence_hidden","label":"Channel/inventory obsolescence hidden","mechanism":"Under-reserve for slow-moving or obsolete inventory to keep it on the balance sheet at cost, avoiding a COGS hit and inflating gross margin and current assets until a forced writedown.","distorts":["InventoryNet","CostOfGoodsAndServicesSold","gross_margin","inventory_turnover","current_ratio"],"detect":"DIO rising while sales soften; inventory reserve as a % of gross inventory falling; a growing gap between inventory growth and revenue growth that precedes a big writedown.","example":"Cisco's ~$2.2B inventory writedown in 2001 after the dot-com demand collapse."},{"id":"off_balance_sheet_spe","label":"Off-balance-sheet SPEs","mechanism":"Move debt and losing assets into special-purpose entities/VIEs that escape consolidation, so leverage and losses stay off the parent's balance sheet while the parent retains the real economic risk.","distorts":["Liabilities","LongTermDebtNoncurrent","debt_to_equity","debt_to_assets","roic"],"detect":"Guarantees, VIE disclosures, and related-party transactions in the footnotes; unconsolidated entities with heavy parent involvement; consolidation-policy changes; large 'equity method' or 'variable interest' notes.","example":"Enron's LJM and Raptor special-purpose entities hid billions in debt and losses."},{"id":"operating_lease_games","label":"Operating-lease games (pre/post ASC 842)","mechanism":"Historically structured leases as 'operating' to keep the obligation off-balance-sheet; even post-ASC 842, classification and discount-rate choices shift lease liabilities and expense geography (rent in opex vs interest+amortization).","distorts":["OperatingLeaseLiabilityNoncurrent","debt_to_equity","ebitda_margin","interest_coverage","roic"],"detect":"Pre-2019 compare capitalized-lease-adjusted leverage; post-842 check ROU asset/liability, weighted-average discount rate, and finance-vs-operating classification; EBITDA that improves purely from lease geography.","example":"Pre-ASC 842 retailers/airlines carrying vast off-balance-sheet operating-lease commitments (e.g., legacy retail chains)."},{"id":"non_gaap_addback_abuse","label":"Non-GAAP add-back abuse","mechanism":"Define 'adjusted' earnings/EBITDA that add back recurring stock-based compensation, perpetual 'one-time' restructuring, or pro-forma synergies to manufacture profitability the GAAP statements don't show.","distorts":["ebitda_margin","net_debt_to_ebitda","operating_margin","cfo_to_ni"],"detect":"GAAP-to-non-GAAP reconciliation with large, recurring SBC and 'one-time' add-backs; widening GAAP vs adjusted gap over multiple years; SEC non-GAAP comment letters; add-backs that never actually turn into cash.","example":"WeWork's 'Community Adjusted EBITDA' add-backs; broad adjusted-EBITDA inflation flagged by the SEC across tech."},{"id":"goodwill_non_impairment","label":"Goodwill non-impairment","mechanism":"Avoid writing down goodwill from overpriced acquisitions despite clear deterioration, keeping assets and equity inflated and ROA/ROE artificially supported.","distorts":["Goodwill","Assets","StockholdersEquity","roa","roe","debt_to_assets"],"detect":"Goodwill large relative to assets and market cap; market value of equity below book while no impairment taken; qualitative 'step-zero' impairment testing that always passes; reporting-unit fair-value assumptions in the notes.","example":"AOL–Time Warner's ~$54B goodwill writedown after the merger; General Electric's delayed goodwill impairments."},{"id":"pension_assumptions","label":"Pension discount-rate / return assumptions","mechanism":"Assume a high expected return on plan assets or a favorable discount rate to lower reported pension expense and inflate the funded status, boosting operating income.","distorts":["DefinedBenefitPlanFundedStatusOfPlan","OperatingIncomeLoss","net_margin","roe"],"detect":"Expected-return-on-assets assumption well above peers or realized returns; discount-rate choices that flatter the obligation; sensitivity disclosures showing large swings; pension income propping up operating profit.","example":"General Motors and legacy industrials using aggressive expected-return-on-plan-asset assumptions to lower pension expense."},{"id":"bank_under_provisioning","label":"Bank under-provisioning (loan-loss reserves)","mechanism":"Set loan-loss provisions too low (or release reserves) to boost net interest income and EPS, deferring recognition of credit deterioration until charge-offs force it.","distorts":["FinancingReceivableAllowanceForCreditLosses","npl_coverage","net_interest_margin","NetIncomeLoss","roe"],"detect":"Provision/charge-off ratio below 1.0 late-cycle; allowance coverage of NPLs falling while non-accruals rise; reserve releases driving EPS beats; CECL reserve-build lagging peers and macro deterioration.","example":"Countrywide and IndyMac under-reserving before the 2008 mortgage collapse; Lehman/Washington Mutual credit-loss deferral."}],"liquidity_ladder":[{"rank":1,"item":"Cash & equivalents","tag":"CashAndCashEquivalentsAtCarryingValue","note":"Immediate liquidity, carried at face. Soft spots: cash trapped in foreign subsidiaries (repatriation tax), cash pledged/restricted as collateral, and quarter-end round-tripping that inflates the balance for one day."},{"rank":2,"item":"Short-term marketable securities","tag":"ShortTermInvestments","note":"Days-to-cash; T-bills and money-market funds are near-cash. Softness rises with illiquid or Level 3 holdings, mark-to-model valuations, and auction-rate/structured paper that can freeze (2008)."},{"rank":3,"item":"Accounts receivable","tag":"AccountsReceivableNetCurrent","note":"Cash in 30-90 days if collectible. Carrying value soft when the allowance for doubtful accounts is understated, receivables are channel-stuffed/aged, or concentrated in a few shaky customers; factoring hides the true collection period."},{"rank":4,"item":"Inventory","tag":"InventoryNet","note":"Must be sold then collected — slowest working-capital asset. Value overstated by under-reserved obsolescence, LIFO/FIFO cost distortions, and finished goods that won't move; often the first big writedown in a downturn."},{"rank":5,"item":"Prepaid expenses & other current assets","tag":"PrepaidExpenseCurrent","note":"Not convertible to cash — they are future expenses already paid, only 'liquid' in that they avoid a future outflow. A dumping ground where capitalized costs can be parked to flatter current assets and margins."},{"rank":6,"item":"Property, plant & equipment (net)","tag":"PropertyPlantAndEquipmentNet","note":"Illiquid; monetized only via sale or sale-leaseback, often below book. Carrying value soft from slow/under-depreciation, capitalized operating costs (WorldCom), and specialized assets with thin resale markets."},{"rank":7,"item":"Intangible assets (ex-goodwill)","tag":"IntangibleAssetsNetExcludingGoodwill","note":"Rarely separately saleable; value hinges on continued use. Soft when amortization periods are stretched, in-process R&D and customer lists are aggressively valued at acquisition, or impairment is deferred as fundamentals fade."},{"rank":8,"item":"Goodwill","tag":"Goodwill","note":"Least liquid — a plug equal to acquisition premium, not saleable and generating no cash. Value is soft by construction: inflated by overpaying on M&A and propped up by avoided impairment even when the acquired business is clearly worth less."}],"cash_cycle":{"dso":"Days Sales Outstanding — average days to collect cash after a credit sale. DSO = (Average accounts receivable / Revenue) × 365, i.e. 365 / receivables turnover. Rising DSO means slower collection or pulled-forward/uncollectible sales.","dio":"Days Inventory Outstanding — average days inventory sits before it is sold. DIO = (Average inventory / COGS) × 365, i.e. 365 / inventory turnover. Rising DIO signals weakening demand or an impending obsolescence writedown.","dpo":"Days Payables Outstanding — average days the firm takes to pay suppliers. DPO = (Average accounts payable / COGS) × 365, i.e. 365 / payables turnover. Higher DPO conserves cash but stretched too far strains the supply chain.","ccc":"CCC = DSO + DIO − DPO — the net number of days cash is tied up in operations between paying suppliers and collecting from customers. Lower is better; a negative CCC means suppliers and customers finance the business (Amazon, Dell). It is the working-capital heartbeat: the trend matters more than the level.","note":"Sales convert to cash along the chain buy/build inventory (DIO) → sell on credit (DSO) → minus the free financing from paying suppliers late (DPO). Each leg is dressed up differently: factoring or securitizing AR artificially cuts DSO (and boosts CFO) while true collectibility worsens; reverse-factoring/supply-chain financing stretches DPO to slash CCC and inflate operating cash flow, with the obligation hidden in payables rather than debt; channel stuffing inflates AR and revenue by pushing product to distributors near period-end; and under-reserving obsolete inventory keeps DIO and gross margin flattered until a forced writedown. Always reconcile a falling CCC against the cash-flow statement — an improving cycle driven by financing tricks reverses abruptly and takes reported CFO down with it."},"anchor_values":{"standard":{"AccountsPayable":4854000000,"AccountsPayableCurrent":69860000000,"AccountsReceivableNetCurrent":39777000000,"AccruedIncomeTaxesCurrent":13016000000,"AccruedIncomeTaxesNoncurren   const W=1200,H=740;layoutMap(g,W,H);
  const _xs=g.nodes.map(n=>n.x),_ys=g.nodes.map(n=>n.y),_pad=70;
  const VB={x:Math.min(..._xs)-_pad,y:Math.min(..._ys)-_pad};VB.w=Math.max(..._xs)+_pad-VB.x;VB.h=Math.max(..._ys)+_pad-VB.y;
  const top=g.comps.slice().sort((a,b)=>b.deg-a.deg).slice(0,6);
  $('#pad').innerHTML=`<h2 class="viewtitle">Ratios</h2>${ratioSubtabs()}
    <p class="viewsub">Every ratio (coloured by family) wired to the <b>line items it consumes</b>. Bigger, central nodes are the inputs shared by the most ratios — the connective tissue of financial analysis. Hover to trace; click an input to drill into its real statement line.</p>
    <div class="mapcommon"><span class="mch">Most-used inputs</span>${top.map(c=>`<button class="mchip" data-comp="${esc(c.tag)}">${esc(c.label)} · <b>${c.deg}</b></button>`).join('')}</div>
    <div class="mapwrap"><svg id="rmap" viewBox="${VB.x} ${VB.y} ${VB.w} ${VB.h}" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="maplegend">${Object.keys(CATCOLOR).map(c=>`<span class="mlg"><span class="dot" style="background:${CATCOLOR[c]}"></span>${CATLABEL[c]}</span>`).join('')}
        <span class="mlg"><span class="dot" style="background:var(--muted);border-radius:2px"></span>line item (size = # ratios)</span></div></div>`;
  const svg=$('#rmap'),SVGNS='http://www.w3.org/2000/svg';
  const root=document.createElementNS(SVGNS,'g');svg.appendChild(root);
  const gE=document.createElementNS(SVGNS,'g'),gN=document.createElementNS(SVGNS,'g');root.appendChild(gE);root.appendChild(gN);
  const el=(t,a)=>{const e=document.createElementNS(SVGNS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const edgeEls=[],nodeEls=new Map();
  g.edges.forEach(e=>{const p=el('line',{class:'medge',x1:e.r.x,y1:e.r.y,x2:e.c.x,y2:e.c.y,stroke:CATCOLOR[e.r.category]||'var(--muted)'});gE.appendChild(p);e._el=p;edgeEls.push(e);});
  g.comps.forEach(c=>{const grp=el('g',{class:'mnode comp','data-comp':esc(c.tag),transform:`translate(${c.x},${c.y})`});
    grp.appendChild(el('circle',{class:'mc',r:c.r,fill:'var(--panel)',stroke:'var(--muted)','stroke-width':1.4}));
    const t=el('text',{class:'ml'+(c.deg<3?' hov':''),x:0,y:c.r+13,'text-anchor':'middle'});t.textContent=c.label;grp.appendChild(t);
    gN.appendChild(grp);nodeEls.set('c:'+c.tag,{grp,n:c});});
  g.ratios.forEach(r=>{const grp=el('g',{class:'mnode ratio','data-ratio':esc(r.id),transform:`translate(${r.x},${r.y})`});
    grp.appendChild(el('circle',{class:'mr',r:5.5,fill:CATCOLOR[r.category]||'var(--accent)',stroke:'none'}));
    const t=el('text',{class:'ml rl',x:0,y:-9,'text-anchor':'middle'});t.textContent=r.label;grp.appendChild(t);
    gN.appendChild(grp);nodeEls.set('r:'+r.id,{grp,n:r});});
  // pan/zoom
  _mapT={x:0,y:0,k:1};const applyT=()=>root.setAttribute('transform',`translate(${_mapT.x},${_mapT.y}) scale(${_mapT.k})`);
  svg.onwheel=ev=>{ev.preventDefault();const r=svg.getBoundingClientRect(),mx=VB.x+(ev.clientX-r.left)/r.width*VB.w,my=VB.y+(ev.clientY-r.top)/r.height*VB.h;
    const f=ev.deltaY<0?1.12:1/1.12,nk=Math.max(.5,Math.min(3,_mapT.k*f));_mapT.x=mx-(mx-_mapT.x)*(nk/_mapT.k);_mapT.y=my-(my-_mapT.y)*(nk/_mapT.k);_mapT.k=nk;applyT();};
  let pan=false,psx,psy,ptx,pty;
  svg.onpointerdown=ev=>{if(ev.target.closest('.mnode'))return;pan=true;psx=ev.clientX;psy=ev.clientY;ptx=_mapT.x;pty=_mapT.y;};
  svg.onpointermove=ev=>{if(!pan)return;const r=svg.getBoundingClientRect();_mapT.x=ptx+(ev.clientX-psx)/r.width*VB.w;_mapT.y=pty+(ev.clientY-psy)/r.height*VB.h;applyT();};
  svg.onpointerup=()=>pan=false;
  function hi(key){nodeEls.forEach(o=>o.grp.classList.remove('hot','dim'));edgeEls.forEach(e=>e._el.classList.remove('hot','dim'));
    if(!key)return;const keepE=new Set(),keepN=new Set([key]);
    edgeEls.forEach(e=>{const rk='r:'+e.r.id,ck='c:'+e.c.tag;if(rk===key||ck===key){keepE.add(e);keepN.add(rk);keepN.add(ck);}});
    nodeEls.forEach((o,k)=>{if(keepN.has(k))o.grp.classList.add('hot');else o.grp.classList.add('dim');});
    edgeEls.forEach(e=>{if(keepE.has(e))e._el.classList.add('hot');else e._el.classList.add('dim');});}
  nodeEls.forEach((o,k)=>{o.grp.addEventListener('mouseenter',()=>{if(!state.sel)hi(k);});
    o.grp.addEventListener('mouseleave',()=>{if(!state.sel)hi(state.selComp?'c:'+state.selComp:(state.selRatio?'r:'+state.selRatio:null));});});
  $('#pad').querySelectorAll('[data-comp]').forEach(b=>b.onclick=()=>{state.selComp=b.dataset.comp;state.selRatio=null;state.sel={t:'comp',tag:b.dataset.comp};state.mapExp=new Set();hi('c:'+b.dataset.comp);renderInspector();});
  $('#pad').querySelectorAll('[data-ratio]').forEach(b=>b.onclick=()=>{state.selRatio=b.dataset.ratio;state.selComp=null;state.sel={t:'ratio',id:b.dataset.ratio};hi('r:'+b.dataset.ratio);renderInspector();});
  if(state.selComp)hi('c:'+state.selComp);else if(state.selRatio)hi('r:'+state.selRatio);
  bindSubtabs();
}
function articulationNote(stmts){
  const list=stmts.map(STMTSHORT).join(' + ');
  return `<b>Draws from ${list||'—'}.</b> The three statements <b>articulate</b> — they must reconcile: net income (income statement) flows into retained earnings (balance sheet) and is the top line of the cash flow; the cash flow's ending cash equals the balance-sheet cash; and PP&E (balance sheet) ties to capex (cash flow) minus depreciation. That interlock is what an audit checks — and why cooking one line forces a tell in another (inflate revenue without cash and receivables swell while operating cash flow lags). A ratio spanning statements can therefore be cross-checked against one built from a different pair.`;
}
function ratioDetailHTML(rid){
  const r=(DATA.ratios||[]).find(x=>x.id===rid);if(!r)return '';
  const s=DATA.sectors[state.sector];s._byId=s._byId||Object.fromEntries((s.line_items||[]).map(it=>[it.id,it]));
  const byTag={};(s.line_items||[]).forEach(it=>{if(it.tag)byTag[it.tag]=it;});
  const av=DATA.anchor_values[state.sector]||{};
  const stmtsUsed=[...new Set((r.inputs||[]).map(t=>byTag[t]?byTag[t].statement:null).filter(Boolean))];
  const inputs=(r.inputs||[]).map(t=>{
    const it=byTag[t],val=it?it.value:av[t],stmt=it?it.statement:null;
    const tree=it?buildTree(s,it.statement):null;
    const kids=it&&tree?(tree.childrenOf[it.id]||[]):[];
    const treeHTML=kids.length?`<div class="rd-tree"><div class="stmt">${kids.map(k=>rowHTML(k,0,tree,state.ratioExp,null)).join('')}</div></div>`:'';
    const others=(ratiosByTag[t]||[]).filter(x=>x!==rid);
    return `<div class="rd-input">
      <div class="rd-in-head"><span class="rd-in-name">${esc(it?it.label:t)}</span>
        ${stmt?`<span class="stmt-chip">${STMTSHORT(stmt)}</span>`:'<span class="stmt-chip na">n/a here</span>'}
        <span class="rd-in-val">${val!=null?fmtUSD(val):'—'}</span></div>
      <div class="rd-in-tag">${esc(t)}</div>
      ${it&&it.redflag?`<div class="rd-flag">⚑ ${esc(it.redflag)}</div>`:''}
      ${treeHTML}
      ${others.length?`<div class="rd-also"><span>also feeds</span>${others.slice(0,6).map(o=>`<button class="rd-also-chip" data-goratio="${o}">${esc(RLABEL(o))}</button>`).join('')}</div>`:''}
    </div>`;}).join('');
  return `<div class="ratio-detail">
    <div class="rd-eyebrow">Build-up · ${esc(r.category)}${r.pro?' · forensic':''}</div>
    <h3 class="rd-title">${esc(r.label)}</h3>
    <div class="rd-formula">${esc(r.formula)}</div>
    <div class="rd-inputs-label">Depends on ${(r.inputs||[]).length} inputs · press an input's rows to drill into the actual line items</div>
    <div class="rd-inputs">${inputs}</div>
    ${r.manipulation?`<div class="rd-cook"><span class="rd-cook-h">⚑ How this ratio is cooked</span>${esc(r.manipulation)}</div>`:''}
    <div class="rd-artic">${articulationNote(stmtsUsed)}</div>
  </div>`;
}

// ---- redflags view ----

// ---- inspector ----
function renderInspector(){
  const insp=$('#inspector');
  if(!state.sel){renderOverviewInspector();return;}
  const s=DATA.sectors[state.sector];
  if(state.sel.t==='line'){
    const it=(s._byId||{})[state.sel.id]||(s.line_items||[]).find(x=>x.id===state.sel.id);if(!it)return renderOverviewInspector();
    const parent=it.parent&&s._byId[it.parent];
    insp.innerHTML=`<div class="insp-head"><div class="insp-kind"><span>${esc(it.kind||'line')}</span>·<span>${esc(STMTS.find(x=>x[0]===it.statement)[1])}</span></div>
      <h2 class="insp-title">${esc(it.label)}</h2><div class="badges">
      ${it.tag?`<span class="badge">us-gaap: ${esc(it.tag)}</span>`:''}
      ${it.value!=null?`<span class="badge val">${fmtUSD(it.value)}${it.value_fy?' · FY'+it.value_fy:''}</span>`:''}
      ${it.weight>0?'<span class="badge" style="color:var(--pos)">＋ adds up</span>':it.weight<0?'<span class="badge" style="color:var(--neg)">－ subtracts</span>':''}</div></div>
      <div class="insp-body">
      <div class="sec"><div class="h">What it is</div><p>${esc(it.def||'')}</p>
        ${it.xbrl_desc?`<p class="xbrldesc" style="margin-top:10px">${esc(it.xbrl_desc)}</p>`:''}</div>
      ${it.goes_in?`<div class="sec"><div class="h">What goes into it</div><p>${esc(it.goes_in)}</p></div>`:''}
      ${it.agg_note?`<div class="sec"><div class="h">How it rolls up</div><p>${esc(it.agg_note)}</p>${parent?`<p style="margin-top:8px;font-size:12px;color:var(--muted)">Feeds into <b style="color:var(--text)">${esc(parent.label)}</b> (${it.weight>0?'added':it.weight<0?'subtracted':'component'}).</p>`:''}</div>`:''}
      ${it.gaap_ifrs?`<div class="sec"><div class="h">GAAP / IFRS rule</div><p>${esc(it.gaap_ifrs)}</p></div>`:''}
      ${it.sector_note?`<div class="sec"><div class="h">Sector twist</div><p>${esc(it.sector_note)}</p></div>`:''}
      ${it.example?`<div class="sec"><div class="h">Worked example · ${esc(s.anchor_company||'')}</div><p>${esc(it.example)}</p></div>`:''}
      ${it.redflag?`<div class="sec flagbox"><div class="h">⚑ Dress-up / red flag</div><p>${esc(it.redflag)}</p></div>`:''}
      </div>`;
  }else if(state.sel.t==='ratio'){
    const r=(DATA.ratios||[]).find(x=>x.id===state.sel.id);if(!r)return;
    const av=DATA.anchor_values[state.sector]||{};
    const chips=(r.inputs||[]).map(t=>`<span class="datachip">${esc(t)}${av[t]!=null?` <b>${fmtUSD(av[t])}</b>`:''}</span>`).join('');
    insp.innerHTML=`<div class="insp-head"><div class="insp-kind"><span>${esc(r.category)}</span>${r.pro?' · forensic':''}</div>
      <h2 class="insp-title">${esc(r.label)}</h2><div class="badges">${r.pro?'<span class="badge pro">Pro / composite</span>':''}
      ${(r.sectors&&!r.sectors.includes('all'))?`<span class="badge">${esc(r.sectors.join(', '))}</span>`:'<span class="badge">all sectors</span>'}</div></div>
      <div class="insp-body">
      <div class="sec"><div class="h">Formula</div><div class="formula">${esc(r.formula)}</div></div>
      ${chips?`<div class="sec"><div class="h">Inputs · ${esc(s.anchor_company||'')} actuals</div><div class="chips">${chips}</div></div>`:''}
      <div class="sec"><div class="h">What it measures</div><p>${esc(r.measures||'')}</p></div>
      ${r.interpretation?`<div class="sec"><div class="h">How to read it</div><p>${esc(r.interpretation)}</p></div>`:''}
      ${r.manipulation?`<div class="sec flagbox"><div class="h">⚑ How it's gamed</div><p>${esc(r.manipulation)}</p></div>`:''}
      </div>`;
  }else if(state.sel.t==='comp'){
    s._byId=s._byId||Object.fromEntries((s.line_items||[]).map(it=>[it.id,it]));
    const tag=state.sel.tag;const byTag={};(s.line_items||[]).forEach(it=>{if(it.tag)byTag[it.tag]=it;});
    const it=byTag[tag];const av=DATA.anchor_values[state.sector]||{};const val=it?it.value:av[tag];
    const users=(ratiosByTag[tag]||[]).filter(id=>{const r=(DATA.ratios||[]).find(x=>x.id===id);return r&&(!r.sectors||r.sectors.includes('all')||r.sectors.includes(state.sector));});
    let treeHTML='';
    if(it){const tree=buildTree(s,it.statement);const kids=tree.childrenOf[it.id]||[];
      if(kids.length)treeHTML=`<div class="sec"><div class="h">What it's made of</div><div class="stmt">${kids.map(k=>rowHTML(k,0,tree,state.mapExp,null)).join('')}</div></div>`;}
    insp.innerHTML=`<div class="insp-head"><div class="insp-kind">shared input · in ${users.length} ratio${users.length!==1?'s':''}</div>
      <h2 class="insp-title">${esc(it?it.label:tag)}</h2><div class="badges">
      <span class="badge">us-gaap: ${esc(tag)}</span>${it&&it.statement?`<span class="badge">${STMTSHORT(it.statement)}</span>`:''}
      ${val!=null?`<span class="badge val">${fmtUSD(val)}</span>`:''}</div></div>
      <div class="insp-body">
      ${it&&it.def?`<div class="sec"><div class="h">What it is</div><p>${esc(it.def)}</p></div>`:''}
      <div class="sec"><div class="h">Feeds ${users.length} ratios — click to compare</div><div class="chips">${users.map(id=>`<button class="datachip" data-goratio2="${esc(id)}" style="cursor:pointer">${esc(RLABEL(id))}</button>`).join('')||'<span class="empty">—</span>'}</div></div>
      ${treeHTML}
      ${it?`<div class="actions"><button class="act primary" id="openLine">Open this line in the statement ↗</button></div>`:''}
      </div>`;
    insp.querySelectorAll('[data-goratio2]').forEach(b=>b.onclick=()=>{state.selRatio=b.dataset.goratio2;state.selComp=null;state.sel={t:'ratio',id:b.dataset.goratio2};renderRatios();renderInspector();});
    insp.querySelectorAll('.row[data-id]').forEach(r=>r.onclick=()=>{const id=r.dataset.id;
      if(r.dataset.k==='1'){state.mapExp.has(id)?state.mapExp.delete(id):state.mapExp.add(id);renderInspector();}
      else{const li=s._byId[id];if(li){state.view='statements';state.stmt=li.statement;state.sel={t:'line',id};$$('#viewseg [data-view]').forEach(x=>x.setAttribute('aria-pressed',x.dataset.view==='statements'));render();}}});
    const ol=insp.querySelector('#openLine');if(ol)ol.onclick=()=>{state.view='statements';state.stmt=it.statement;state.sel={t:'line',id:it.id};$$('#viewseg [data-view]').forEach(x=>x.setAttribute('aria-pressed',x.dataset.view==='statements'));render();};
  }else if(state.sel.t==='flag'){

      <h2 class="insp-title">${esc(f.label)}</h2></div><div class="insp-body">

      ${(f.distorts&&f.distorts.length)?`<div class="sec"><div class="h">What it distorts</div><div class="chips">${f.distorts.map(d=>`<span class="datachip">${esc(d)}</span>`).join('')}</div></div>`:''}
      ${f.detect?`<div class="sec"><div class="h">How to catch it</div><p>${esc(f.detect)}</p></div>`:''}
      ${f.example?`<div class="sec"><div class="h">Real-case archetype</div><p>${esc(f.example)}</p></div>`:''}</div>`;
  }
}
function renderOverviewInspector(){
  const s=DATA.sectors[state.sector];
  const guide={statements:'Click any line in the statement to unpack it — its definition, the real us-gaap XBRL tag it carries, what feeds it, how it rolls up into its total, the GAAP/IFRS rule, a worked example from the anchor company, and where it gets dressed up.',
    flow:'Follow how a raw sale or service becomes a journal entry, a line item, a subtotal, and finally cash.',
    ratios:"Pick a ratio to see its formula, the line items it consumes (with the anchor company's real values), how to read it, and how it's gamed.",
    redflags:'Each card is a way the numbers get dressed up — and the cross-check that exposes it.',
    liquidity:'How fast assets turn to cash, and the cash-conversion cycle from sale to collection.'};
  $('#inspector').innerHTML=`<div class="insp-pad">
    <div class="insp-kind">${esc(SECMETA.find(x=>x[0]===state.sector)[1])} · anchored to ${esc(s.anchor_company||'')}</div>
    <p class="lead" style="margin-top:12px">${guide[state.view]||''}</p></div>`;
}

// ---- dispatch ----
function render(){
  renderRail();
  if(state.view==='statements')renderStatements();
  else if(state.view==='flow')renderFlow();
  else if(state.view==='ratios')renderRatios();
  else if(state.view==='redflags')renderRedflags();
  else if(state.view==='liquidity')renderLiquidity();
  $('#canvas').scrollTop=0;renderInspector();
}
// deep-link from the atlas: #s=<sector>&stmt=<statement>&line=<lineId>  (or &view=ratios&ratio=<id>)
function initFromHash(){
  const h=(location.hash||'').replace(/^#/,'');if(!h)return;
  const q={};h.split('&').forEach(kv=>{const i=kv.indexOf('=');if(i>0)q[kv.slice(0,i)]=decodeURIComponent(kv.slice(i+1));});
  if(q.s&&DATA.sectors[q.s])state.sector=q.s;
  if(q.stmt)state.stmt=q.stmt;
  if(q.view)state.view=q.view;
  if(q.ratio){state.view='ratios';state.selRatio=q.ratio;state.sel={t:'ratio',id:q.ratio};}
  if(q.line){state.view='statements';state.sel={t:'line',id:q.line};
    const s=DATA.sectors[state.sector];const byId=Object.fromEntries((s.line_items||[]).map(it=>[it.id,it]));
    const key=state.sector+'|'+state.stmt;state.exp[key]=state.exp[key]||new Set();
    let cur=byId[q.line],g=0;while(cur&&cur.parent&&byId[cur.parent]&&g++<12){state.exp[key].add(cur.parent);cur=byId[cur.parent];}}
  $$('#sectorseg [data-sec]').forEach(x=>x.setAttribute('aria-pressed',x.dataset.sec===state.sector));
  $$('#viewseg [data-view]').forEach(x=>x.setAttribute('aria-pressed',x.dataset.view===state.view));
}
initFromHash();
render();
})();
