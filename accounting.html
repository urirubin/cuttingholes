nating and decommissioning nuclear facilities.","goes_in":"Total assets","gaap_ifrs":"US-GAAP; the funded-trust presentation is specific to nuclear operators.","agg_note":"Paired on the liability side with the asset retirement obligation — the trust is the funding vehicle for the eventual nuclear cleanup liability, with mark-to-market gains/losses on the trust largely offset through regulatory accounts.","sector_note":"Compare trust fair value to the estimated decommissioning obligation to see whether the utility is over- or under-funded for its nuclear retirement.","example":"NextEra decommissioning trust assets $10,953,000,000.","redflag":"Optimistic assumed trust return rates or long-dated decommissioning timing that understate required contributions; under-funding shifts cleanup cost onto future ratepayers or the parent.","value":10953000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The fair value of investments held in a trust fund to pay for the costs of decontaminating and decommissioning facilities, whether such amount is presented as a separate caption or as a parenthetical disclosure on the balance sheet. Additionally, this element may be used in connection with the fair value disclosures required in the footnote disclosures to the financial statements.","xbrl_label":"Decommissioning Fund Investments, Fair Value"},{"id":"cash","label":"Cash & cash equivalents","tag":"CashAndCashEquivalentsAtCarryingValue","statement":"balance","parent":"assets_total","weight":1,"kind":"asset","def":"Cash and highly liquid short-term investments at carrying value.","goes_in":"Total assets","gaap_ifrs":"US-GAAP; matches IFRS.","agg_note":"Deliberately thin for a utility — with continuous capital-market access and large revolving credit, utilities carry little idle cash and rely on commercial paper for liquidity.","sector_note":"Liquidity is judged by committed credit facility headroom, not cash on hand.","example":"NextEra cash & equivalents $2,812,000,000 against ~$212.7B of assets.","redflag":"A cash spike right before period-end can flatter liquidity optics; check whether it is funded by end-of-quarter commercial-paper draws.","value":2812000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of currency on hand as well as demand deposits with banks or financial institutions. Includes other kinds of accounts that have the general characteristics of demand deposits. Also includes short-term, highly liquid investments that are both readily convertible to known amounts of cash and so near their maturity that they present insignificant risk of changes in value because of changes in ","xbrl_label":"Cash and Cash Equivalents, at Carrying Value"},{"id":"inventory","label":"Inventory (fuel & materials)","tag":"InventoryNet","statement":"balance","parent":"assets_total","weight":1,"kind":"asset","def":"Net inventory — for a utility, principally fuel (gas, nuclear fuel components) and spare parts / maintenance materials for the plant fleet.","goes_in":"Total assets","gaap_ifrs":"US-GAAP; comparable to IFRS.","agg_note":"Modest relative to plant; fuel inventory cost is generally recoverable through fuel clauses so it carries little margin risk.","sector_note":"Fuel inventory swings are mostly a commodity-price/pass-through phenomenon, not a demand signal.","example":"NextEra net inventory $2,420,000,000.","redflag":"Slow-moving obsolete spare parts not written down; fuel inventory carried above recoverable clause amounts.","value":2420000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount after valuation and LIFO reserves of inventory expected to be sold, or consumed within one year or operating cycle, if longer.","xbrl_label":"Inventory, Net"},{"id":"assets_total","label":"Total assets","tag":"Assets","statement":"balance","parent":null,"weight":0,"kind":"total","def":"Sum of all recognized assets as of the balance-sheet date.","goes_in":"Balances against total liabilities + equity","gaap_ifrs":"US-GAAP; matches IFRS.","agg_note":"Dominated by net PP&E ($156.2B of $212.7B); the itemized asset children above are illustrative signatures, not an exhaustive sum — receivables, deferred tax assets, goodwill and other items also roll into the total.","sector_note":"Return on assets is low and stable for utilities by design — the equity story is rate-base growth funded by cheap capital, not asset turnover.","example":"NextEra total assets $212,721,000,000.","redflag":"Ballooning regulatory assets and goodwill as a share of the total dilute the tangible, return-earning plant base.","value":212721000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Sum of the carrying amounts as of the balance sheet date of all assets that are recognized. Assets are probable future economic benefits obtained or controlled by an entity as a result of past transactions or events.","xbrl_label":"Assets"},{"id":"ltd","label":"Long-term debt (noncurrent)","tag":"LongTermDebtNoncurrent","statement":"balance","parent":"liab_total","weight":1,"kind":"liability","def":"Long-term debt due beyond one year, net of discount, premium and issuance costs — the primary source funding the rate base.","goes_in":"Total liabilities","gaap_ifrs":"US-GAAP; matches IFRS.","agg_note":"Utilities are structurally the most leveraged non-financials because the regulator explicitly allows a debt-heavy capital structure (cheaper than equity, lowering customer bills) — debt is a feature, not a warning, so long as it stays investment grade.","sector_note":"FFO/debt (funds from operations to debt) is the master credit ratio — rating agencies and the utility's own allowed cost of capital hinge on keeping it in the target band; also watch the maturity wall.","example":"NextEra noncurrent long-term debt $89,556,000,000 (plus $3.5B current maturities).","redflag":"Debt growing faster than rate base (leverage creep) or FFO/debt sliding toward a downgrade threshold; heavy reliance on short-term commercial paper to fund long-lived assets is a maturity-mismatch red flag.","value":89556000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount after unamortized (discount) premium and debt issuance costs of long-term debt classified as noncurrent and excluding amounts to be repaid within one year or the normal operating cycle, if longer. Includes, but not limited to, notes payable, bonds payable, debentures, mortgage loans and commercial paper. Excludes capital lease obligations.","xbrl_label":"Long-term Debt, Excluding Current Maturities"},{"id":"reg_liab","label":"Regulatory liabilities (noncurrent)","tag":"RegulatoryLiabilityNoncurrent","statement":"balance","parent":"liab_total","weight":1,"kind":"liability","def":"Amounts the regulator requires the utility to refund or pass back to customers in future periods — over-collections, excess deferred income taxes (from the 2017 tax-rate cut), and cost of removal collected in advance.","goes_in":"Total liabilities","gaap_ifrs":"US-GAAP ASC 980 — the mirror image of regulatory assets and, like them, almost unique to regulated utilities; no clean IFRS recognition outside IFRS 14.","agg_note":"Large ($11.5B) mainly due to excess deferred taxes owed back to customers after the corporate rate fell to 21% — a genuine obligation to ratepayers, amortized back over decades.","sector_note":"Net regulatory position (regulatory assets minus regulatory liabilities) shows whether the utility is a net creditor or debtor to its own customers over time.","example":"NextEra noncurrent regulatory liabilities $11,474,000,000.","redflag":"Building regulatory liabilities (e.g., over-depreciation) that can be released into income later to smooth earnings; slow amortization of excess deferred taxes flatters current cash flow at future customers' expense.","value":11474000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The amount for the individual regulatory noncurrent liability as itemized in a table of regulatory noncurrent liabilities as of the end of the period.","xbrl_label":"Regulatory Liability, Noncurrent"},{"id":"deferred_tax","label":"Deferred income tax liabilities, net","tag":"DeferredIncomeTaxLiabilitiesNet","statement":"balance","parent":"liab_total","weight":1,"kind":"liability","def":"Net deferred tax liability from taxable temporary differences — overwhelmingly the gap between accelerated tax depreciation and slower book/regulatory depreciation on the huge plant base.","goes_in":"Total liabilities","gaap_ifrs":"US-GAAP; IFRS (IAS 12) measures deferred tax similarly but without the utility regulatory-netting conventions.","agg_note":"A quasi-permanent, interest-free financing source for the plant base; regulators treat accumulated deferred taxes as a reduction of rate base (customers don't pay a return on IRS-funded capital).","sector_note":"Growing deferred-tax liabilities are cheap funding for capex but shrink rate base — a subtle drag on rate-base growth during heavy bonus-depreciation years.","example":"NextEra net deferred income tax liabilities $12,359,000,000.","redflag":"A reversing deferred-tax liability (as accelerated depreciation runs off) becomes a future cash-tax headwind that can surprise on cash flow years later.","value":12359000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount, after deferred tax asset, of deferred tax liability attributable to taxable differences with jurisdictional netting.","xbrl_label":"Deferred Income Tax Liabilities, Net"},{"id":"aro","label":"Asset retirement obligations (noncurrent)","tag":"AssetRetirementObligationsNoncurrent","statement":"balance","parent":"liab_total","weight":1,"kind":"liability","def":"Discounted legal obligation to retire long-lived assets — principally nuclear decommissioning, plus fossil ash ponds and wind/solar site restoration.","goes_in":"Total liabilities","gaap_ifrs":"US-GAAP ASC 410; IFRS (IAS 37) uses a current discount rate and remeasures more frequently, so IFRS AROs are typically more volatile.","agg_note":"Paired with the decommissioning trust on the asset side; accretes each year (unwinding the discount) as a non-cash expense.","sector_note":"Compare the ARO to the funded trust; the assumptions (discount rate, cost estimate, retirement date) are highly judgmental and material for nuclear operators.","example":"NextEra noncurrent asset retirement obligations $3,669,000,000; annual accretion ~$177M.","redflag":"Optimistic decommissioning cost estimates, high discount rates, or pushed-out retirement dates that understate the liability — a slow-building, hard-to-audit obligation.","value":3669000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Noncurrent portion of the carrying amount of a liability for an asset retirement obligation. An asset retirement obligation is a legal obligation associated with the disposal or retirement of a tangible long-lived asset that results from the acquisition, construction or development, or the normal operations of a long-lived asset, except for certain obligations of lessees.","xbrl_label":"Asset Retirement Obligations, Noncurrent"},{"id":"liab_total","label":"Total liabilities","tag":"Liabilities","statement":"balance","parent":null,"weight":0,"kind":"total","def":"Sum of all recognized liabilities as of the balance-sheet date.","goes_in":"Balances against total assets (with equity)","gaap_ifrs":"US-GAAP; matches IFRS.","agg_note":"Dominated by long-term debt, deferred taxes and regulatory liabilities; the children shown are the utility-signature items, not an exhaustive sum.","sector_note":"Debt-to-total-capitalization (debt / (debt + equity)) is the regulatory capital-structure metric — the commission sets an allowed equity ratio that anchors the whole return calculation.","example":"NextEra total liabilities $146,242,000,000 against $212.7B of assets.","redflag":"Off-balance-sheet obligations — purchased-power agreements, tax-equity guarantees, supplier-finance programs ($4.2B here) — that add hidden leverage beyond reported debt.","value":146242000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Sum of the carrying amounts as of the balance sheet date of all liabilities that are recognized. Liabilities are probable future sacrifices of economic benefits arising from present obligations of an entity to transfer assets or provide services to other entities in the future.","xbrl_label":"Liabilities"},{"id":"nci_equity","label":"Noncontrolling interests (tax-equity & partnerships)","tag":"MinorityInterest","statement":"balance","parent":null,"weight":1,"kind":"equity","def":"Equity attributable to third-party owners of consolidated subsidiaries — for NextEra, largely tax-equity investors in renewable projects and public unitholders of NextEra Energy Partners.","goes_in":"Total equity (with parent stockholders' equity)","gaap_ifrs":"US-GAAP; IFRS presents non-controlling interests within equity similarly.","agg_note":"Unusually large ($11.9B) because renewables are financed with tax-equity partnerships; the HLBV method drives the volatile, often-negative NCI income allocation seen in the P&L.","sector_note":"For renewable-heavy utilities, parse how much of the enterprise the parent actually owns — large NCI means consolidated figures overstate the parent's economic stake.","example":"NextEra noncontrolling interests $11,871,000,000; total equity incl. NCI $66,479,000,000 = parent equity $54,608,000,000 + NCI $11,871,000,000.","redflag":"Complex tax-equity/HLBV structures obscure the parent's true earnings and leverage; distributions to NCI can drain cash the parent's dividend depends on.","value":11871000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Total of all stockholders' equity (deficit) items, net of receivables from officers, directors, owners, and affiliates of the entity which is directly or indirectly attributable to that ownership interest in subsidiary equity which is not attributable to the parent (that is, noncontrolling interest, previously referred to as minority interest).","xbrl_label":"Stockholders' Equity Attributable to Noncontrolling Interest"},{"id":"retained","label":"Retained earnings","tag":"RetainedEarningsAccumulatedDeficit","statement":"balance","parent":"equity_parent","weight":1,"kind":"equity","def":"Cumulative undistributed earnings — net income retained after dividends over the life of the company.","goes_in":"Parent stockholders' equity","gaap_ifrs":"US-GAAP; matches IFRS retained earnings.","agg_note":"Grows slowly relative to earnings because utilities pay out a high, steadily rising dividend — much of the equity funding for rate-base growth comes from new share issuance, not retention.","sector_note":"Payout ratio and dividend-growth track record are central to the utility equity thesis (a bond-like total-return story).","example":"NextEra retained earnings $35,102,000,000.","redflag":"Paying dividends that exceed sustainable earnings (payout > ~65-70%) while funding capex with debt/equity issuance erodes the balance sheet quality.","value":35102000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The cumulative amount of the reporting entity's undistributed earnings or deficit.","xbrl_label":"Retained Earnings (Accumulated Deficit)"},{"id":"equity_parent","label":"Parent stockholders' equity","tag":"StockholdersEquity","statement":"balance","parent":null,"weight":0,"kind":"total","def":"Total equity attributable to the parent's shareholders — common stock, additional paid-in capital, retained earnings and accumulated other comprehensive income.","goes_in":"Total capitalization (with debt and NCI)","gaap_ifrs":"US-GAAP; matches IFRS parent equity.","agg_note":"The equity slice of the capital structure on which the regulator authorizes the allowed ROE; grown heavily via new share issuance ($2.0B this year) to fund the capex program.","sector_note":"The equity ratio (equity / total cap) versus the regulator's authorized equity ratio determines how much of rate base earns the (higher) equity return vs the (lower) debt cost.","example":"NextEra parent stockholders' equity $54,608,000,000; retained earnings $35.1B of that.","redflag":"Persistent equity issuance to fund capex dilutes existing holders; watch book value per share growth versus rate-base growth.","value":54608000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Total of all stockholders' equity (deficit) items, net of receivables from officers, directors, owners, and affiliates of the entity which are attributable to the parent. The amount of the economic entity's stockholders' equity attributable to the parent excludes the amount of stockholders' equity which is allocable to that ownership interest in subsidiary equity which is not attributable to the p","xbrl_label":"Stockholders' Equity Attributable to Parent"},{"id":"cfo","label":"Cash from operating activities","tag":"NetCashProvidedByUsedInOperatingActivities","statement":"cashflow","parent":null,"weight":0,"kind":"total","def":"Cash generated by operations — net income adjusted for large non-cash items (depreciation, deferred taxes, AFUDC, regulatory deferrals) and working-capital changes.","goes_in":"Funds capex, debt service and dividends","gaap_ifrs":"US-GAAP; matches IFRS, though IFRS allows interest paid in operating or financing.","agg_note":"For a utility, cash flow >> net income because depreciation and deferred taxes are enormous non-cash add-backs — CFO is the number that funds the business, not EPS.","sector_note":"FFO (a close cousin of CFO, before working capital) over debt is the master credit ratio; CFO is the numerator of the FCF gap the utility must fund externally.","example":"NextEra operating cash flow $12,485,000,000 versus $6.84B parent net income — the wedge is depreciation and deferred taxes.","redflag":"CFO propped up by working-capital releases or by growing regulatory-asset deferrals (non-cash income that never converts to cash); back out AFUDC-equity, which is in earnings but not cash.","value":12485000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of cash inflow (outflow) from operating activities, including discontinued operations. Operating activity cash flows include transactions, adjustments, and changes in value not defined as investing or financing activities.","xbrl_label":"Net Cash Provided by (Used in) Operating Activities"},{"id":"capex_accrued","label":"Capital expenditures (accrued, memo)","tag":"CapitalExpendituresIncurredButNotYetPaid","statement":"cashflow","parent":"cfi","weight":0,"kind":"memo","def":"Purchases of fixed assets that have been incurred but not yet paid in cash — a disclosure of the scale of the ongoing plant-build accrual (NextEra does not tag a single us-gaap cash-capex line in this filing).","goes_in":"Investing activities (the cash capex is the bulk of the outflow below)","gaap_ifrs":"US-GAAP supplemental disclosure; the accrual reconciles the difference between capex incurred and cash paid.","agg_note":"Cash capex is the dominant driver of the $(23.9)B investing outflow; this $7.6B accrued figure signals how large the build is even before it fully hits cash.","sector_note":"Capex relative to depreciation (>2× for growth utilities) is the rate-base-growth signal — capex above depreciation means the rate base (and future earnings) is expanding.","example":"NextEra capex incurred but not yet paid $7,645,000,000; total investing outflow $(23.9)B.","redflag":"Capex consistently and dramatically above operating cash flow is normal for utilities but means the dividend is entirely debt/equity-funded — sustainable only while capital markets stay open and the credit rating holds.","value":7645000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Future cash outflow to pay for purchases of fixed assets that have occurred.","xbrl_label":"Capital Expenditures Incurred but Not yet Paid"},{"id":"decomm_invest","label":"Payments into decommissioning fund","tag":"PaymentsToInvestInDecommissioningFund","statement":"cashflow","parent":"cfi","weight":-1,"kind":"outflow","def":"Cash used to purchase investments held in the nuclear decommissioning trust fund.","goes_in":"Investing activities","gaap_ifrs":"US-GAAP; specific to nuclear operators funding retirement trusts.","agg_note":"Largely offset by proceeds from the fund ($5.4B) as the trust reinvests; the net contribution is what actually pre-funds the future nuclear cleanup.","sector_note":"Net decommissioning funding vs the growing ARO shows whether cleanup is being pre-funded on schedule.","example":"NextEra payments into decommissioning fund $5,893,000,000 (offset by $5.4B of proceeds).","redflag":"Slowing net contributions while the ARO grows shifts the funding burden to future periods and ratepayers.","value":5893000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The cash outflow for the purchase of investments that will be held in a decommissioning trust fund.","xbrl_label":"Payments to Acquire Investments to be Held in Decommissioning Trust Fund"},{"id":"cfi","label":"Cash from investing activities","tag":"NetCashProvidedByUsedInInvestingActivities","statement":"cashflow","parent":null,"weight":0,"kind":"total","def":"Net cash used in investing — dominated by capital expenditures on new plant, plus decommissioning-fund and other investment flows.","goes_in":"Combined with operating and financing cash flows","gaap_ifrs":"US-GAAP; matches IFRS.","agg_note":"Massively negative ($23.9B out) and far larger than operating cash inflow — the structural cash deficit that defines a growth utility.","sector_note":"CFO + CFI (roughly free cash flow before financing) is reliably negative for growth utilities — the external-funding requirement is the point, not a defect.","example":"NextEra investing cash flow $(23,865,000,000) versus $12.5B operating inflow — an ~$11B gap to fund externally before dividends.","redflag":"A sudden drop in investing outflow can mean the growth program (and future rate base) is stalling — for a utility, falling capex is often bad news, not good.","value":-23865000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of cash inflow (outflow) from investing activities, including discontinued operations. Investing activity cash flows include making and collecting loans and acquiring and disposing of debt or equity instruments and property, plant, and equipment and other productive assets.","xbrl_label":"Net Cash Provided by (Used in) Investing Activities"},{"id":"debt_issued","label":"Proceeds from long-term debt issuance","tag":"ProceedsFromIssuanceOfLongTermDebt","statement":"cashflow","parent":"cff","weight":1,"kind":"inflow","def":"Cash raised from issuing long-term debt maturing beyond one year — the primary external funding for the capex program.","goes_in":"Financing activities","gaap_ifrs":"US-GAAP; matches IFRS.","agg_note":"Gross issuance is large ($23.4B) but much is refinancing of maturities ($10.3B repaid) — read net debt change, not gross issuance.","sector_note":"Net debt issuance funds the FCF gap; the relentless issuance cadence is why utility access to investment-grade debt markets is existential.","example":"NextEra long-term debt issued $23,394,000,000; repaid $10,347,000,000 — net ~$13B new debt.","redflag":"Rising gross issuance just to roll maturities at higher rates signals refinancing pressure; funding long-lived plant with short-term paper is a maturity mismatch.","value":23394000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The cash inflow from a debt initially having maturity due after one year or beyond the operating cycle, if longer.","xbrl_label":"Proceeds from Issuance of Long-term Debt"},{"id":"debt_repaid","label":"Repayments of long-term debt","tag":"RepaymentsOfLongTermDebt","statement":"cashflow","parent":"cff","weight":-1,"kind":"outflow","def":"Cash used to repay maturing long-term debt principal.","goes_in":"Financing activities","gaap_ifrs":"US-GAAP; matches IFRS.","agg_note":"Netted against issuance to see the true change in leverage; utilities perpetually refinance rather than de-lever.","sector_note":"The maturity schedule (repayments over the next five years) reveals refinancing risk in a rising-rate environment.","example":"NextEra long-term debt repaid $10,347,000,000.","redflag":"A bunched maturity wall repriced at sharply higher coupons pressures interest coverage and the allowed cost of debt in the next rate case.","value":10347000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"The cash outflow for debt initially having maturity due after one year or beyond the normal operating cycle, if longer.","xbrl_label":"Repayments of Long-term Debt"},{"id":"dividends","label":"Dividends paid","tag":"PaymentsOfDividends","statement":"cashflow","parent":"cff","weight":-1,"kind":"outflow","def":"Cash paid as dividends to common and preferred shareholders and to noncontrolling interests.","goes_in":"Financing activities","gaap_ifrs":"US-GAAP; matches IFRS.","agg_note":"Paid every year and steadily raised even though free cash flow is negative — the dividend is effectively funded by new debt and equity issuance, a defining and deliberate feature of the utility model.","sector_note":"Dividend coverage (CFO or FFO vs dividend) and dividend-growth streak are core to the utility total-return thesis; the payout ratio must leave room to reinvest in rate base.","example":"NextEra dividends paid $4,680,000,000, comfortably covered by $12.5B operating cash flow (though not by free cash flow after capex).","redflag":"A dividend growing faster than FFO, or a payout ratio pushed too high, forces even more external funding and is the first thing at risk if capital markets tighten.","value":4680000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Cash outflow in the form of capital distributions and dividends to common shareholders, preferred shareholders and noncontrolling interests.","xbrl_label":"Payments of Dividends"},{"id":"cff","label":"Cash from financing activities","tag":"NetCashProvidedByUsedInFinancingActivities","statement":"cashflow","parent":null,"weight":0,"kind":"total","def":"Net cash from financing — debt and equity issuance net of repayments and dividends; the plug that funds the operating-plus-investing cash deficit.","goes_in":"Combined with operating and investing to change cash","gaap_ifrs":"US-GAAP; matches IFRS.","agg_note":"Strongly positive ($13.0B in) — the mirror image of the negative free cash flow: financing must raise roughly what operating cash flow fails to cover of capex plus the dividend.","sector_note":"Persistently positive financing cash flow is the structural signature of a growth utility — it is continuously tapping capital markets to grow rate base.","example":"NextEra financing cash flow $12,979,000,000, closing the gap between $12.5B operating inflow and $23.9B investing outflow plus the $4.68B dividend.","redflag":"If financing inflow ever cannot cover the capex-plus-dividend gap (markets closed, downgrade), the utility must cut capex or the dividend — the central risk of the perpetually-externally-funded model.","value":12979000000,"value_fy":2025,"value_end":"2025-12-31","xbrl_desc":"Amount of cash inflow (outflow) from financing activities, including discontinued operations. Financing activity cash flows include obtaining resources from owners and providing them with a return on, and a return of, their investment; borrowing money and repaying amounts borrowed, or settling the obligation; and obtaining and paying for other resources obtained from creditors on long-term credit.","xbrl_label":"Net Cash Provided by (Used in) Financing Activities"}],"anchor_company":"NEXTERA ENERGY, INC."},"saas":{"id":"saas","label":"Tech / SaaS","anchor":"Salesforce, Inc.","summary":"A SaaS company recognizes subscription revenue ratably OVER the service term under ASC 606, so cash collected up front sits as deferred revenue (a contract liability) and the total contracted backlog shows as RPO — meaning bookings and billings lead reported revenue. Its statements are shaped by huge sales & marketing spend, heavy non-cash stock-based comp (the main GAAP-vs-non-GAAP wedge), acquisition-driven goodwill/intangibles, and cash from operations that runs well above net income thanks to the SBC add-back and deferred-revenue float.","flow":[{"step":"A customer signs an annual (or multi-year) subscription contract","note":"At signing NOTHING hits revenue — the contract creates a performance obligation. The full contract value enters RPO (remaining performance obligations / backlog); the sales commission is capitalized as a deferred contract cost (ASC 340-40), not expensed now."},{"step":"The company invoices the customer, typically annually in advance","note":"Invoicing creates accounts receivable and a matching deferred-revenue (contract liability) balance — it is 'billings', not yet revenue. Billings ≈ revenue + change in deferred revenue and is a leading indicator."},{"step":"The customer pays the up-front invoice","note":"Cash comes in and AR clears; deferred revenue (the float) stays on the balance sheet as an obligation to deliver the service. This up-front cash is why SaaS CFO leads net income."},{"step":"Each month the service is delivered, revenue is recognized ratably","note":"1/12 of an annual deal moves from deferred revenue into recognized subscription revenue every month (ASC 606 over-time recognition). Deferred revenue and RPO draw down as revenue is earned."},{"step":"Matching costs are recognized — hosting in COGS, commission amortization in S&M","note":"Cloud-hosting and support flow through cost of revenue (~78% gross margin); the capitalized commission amortizes over the expected customer life, spreading the sales cost across the relationship, not the contract term."},{"step":"At quarter/year end the statements are assembled and adjusted to non-GAAP","note":"GAAP operating income is thin because S&M is enormous and stock-based comp is expensed across every line; management adds back SBC and acquired-intangible amortization to present a much higher non-GAAP operating margin — the wedge investors must scrutinize."},{"step":"Cash converts and is redeployed","note":"CFO (net income + SBC add-back + deferred-revenue growth) far exceeds net income; with near-zero capex this becomes high free cash flow, funding acquisitions (creating goodwill), buybacks (offsetting SBC dilution), and now dividends."}],"line_items":[{"id":"revenue","label":"Total revenue (subscription + support & professional services)","tag":"RevenueFromContractWithCustomerExcludingAssessedTax","statement":"income","parent":"gross_profit","weight":1,"kind":"line","def":"Amount, excluding tax collected from customer, of revenue from satisfaction of performance obligation by transferring promised good or service to customer.","goes_in":"Gross profit","gaap_ifrs":"GAAP ASC 606 and IFRS 15 are converged on the 5-step model; both recognize subscription revenue ratably over the service term rather than at contract signing.","agg_note":"Salesforce reports one blended figure; the 10-K disaggregates it into 'Subscription & support' (~94%) and 'Professional services & other'. When aggregating a SaaS peer group, split ratable subscription from lumpy services before comparing growth.","sector_note":"SaaS revenue is recognized OVER the subscription term, not when the contract is signed or invoiced — a 12-month deal signed today drips into revenue 1/12 per month. Bookings and billings lead revenue; RPO is the backlog behind it.","example":"$41,525M FY2025 (fiscal year ended 2026-01-31). Subscription & support is the recurring core; services is low-margin and used to seed adoption.","redflag":"Acquisition-driven revenue (e.g. Informatica) can mask organic subscription deceleration — always back out inorganic contribution and constant-currency to see the real growth rate.","value":41525000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount, excluding tax collected from customer, of revenue from satisfaction of performance obligation by transferring promised good or service to customer. Tax collected from customer is tax assessed by governmental authority that is both imposed on and concurrent with specific revenue-producing transaction, including, but not limited to, sales, use, value added and excise.","xbrl_label":"Revenue from Contract with Customer, Excluding Assessed Tax"},{"id":"cost_of_revenue","label":"Cost of revenue (hosting, support, amortization of acquired tech)","tag":"CostOfGoodsAndServicesSold","statement":"income","parent":"gross_profit","weight":-1,"kind":"line","def":"The aggregate cost of goods produced and sold and services rendered during the reporting period.","goes_in":"Gross profit","gaap_ifrs":"GAAP/IFRS both require cost of the service (data-center/hosting, support staff, amortized developed technology) here; classification of amortized acquired technology is a judgment area.","agg_note":"SaaS COGS is mostly cloud-hosting + customer-success headcount + amortization of acquired developed technology. Compare gross margin only after normalizing where each peer parks amortization of acquired tech.","sector_note":"Gross margin (~78% here) is the software-quality signal; a services-heavy or infrastructure-owning mix drags it down, so judge SaaS on subscription gross margin specifically.","example":"$9,270M FY2025. Includes amortization of acquired developed technology, which is why reported gross margin understates the 'organic' software margin.","redflag":"Gross-margin optics: shifting hosting or support costs from COGS into operating expense (or vice-versa) flatters/deflates the ~78% gross margin. Watch reclassifications between COGS and R&D/S&M.","value":9270000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"The aggregate costs related to goods produced and sold and services rendered by an entity during the reporting period. This excludes costs incurred during the reporting period related to financial services rendered and other revenue generating activities.","xbrl_label":"Cost of Goods and Services Sold"},{"id":"gross_profit","label":"Gross profit","tag":"GrossProfit","statement":"income","parent":"operating_income","weight":1,"kind":"total","def":"Aggregate revenue less cost of goods and services sold.","goes_in":"Operating income","gaap_ifrs":"Converged; a subtotal both frameworks present.","agg_note":"SaaS gross margin (~78% here) is the headline software-economics number; sum revenue minus cost_of_revenue across the peer set, don't average reported percentages.","sector_note":"Mature SaaS runs 75-85% gross margin. The gap to 100% is hosting + support + acquired-tech amortization.","example":"$32,255M FY2025 (77.7% margin). A structurally low or falling SaaS gross margin signals a services-heavy or infrastructure-heavy mix, not pure software.","redflag":"Non-standard 'gross margin' that excludes hosting depreciation or stock-based comp in COGS to reach a prettier number — reconcile to the GAAP subtotal.","value":32255000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Aggregate revenue less cost of goods and services sold or operating expenses directly attributable to the revenue generation activity.","xbrl_label":"Gross Profit"},{"id":"research_development","label":"Research & development","tag":"ResearchAndDevelopmentExpense","statement":"income","parent":"operating_expenses","weight":1,"kind":"line","def":"The aggregate costs incurred (1) in a planned search or critical investigation aimed at discovery of new knowledge and (2) to translate research findings into a plan or design of a new product or process.","goes_in":"Operating income","gaap_ifrs":"GAAP generally expenses R&D as incurred (except some capitalized internal-use software). IFRS (IAS 38) REQUIRES capitalizing development costs that meet criteria — a real cross-framework comparability gap for SaaS.","agg_note":"R&D is expensed under US GAAP, so US SaaS names show lower assets/higher opex than IFRS peers who capitalize development. Normalize before cross-listing comparisons.","sector_note":"SaaS R&D typically runs 12-18% of revenue; it is the product engine, not discretionary.","example":"$5,993M FY2025 (14.4% of revenue). Heavy SBC sits inside this line.","redflag":"Capitalizing internal software development to move cost off the income statement (into CapitalizedComputerSoftware) flatters operating margin and defers the expense — inspect the capitalization policy and the software-asset roll-forward.","value":5993000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"The aggregate costs incurred (1) in a planned search or critical investigation aimed at discovery of new knowledge with the hope that such knowledge will be useful in developing a new product or service, a new process or technique, or in bringing about a significant improvement to an existing product or process; or (2) to translate research findings or other knowledge into a plan or design for a n","xbrl_label":"Research and Development Expense"},{"id":"sales_marketing","label":"Sales & marketing","tag":"SellingAndMarketingExpense","statement":"income","parent":"operating_expenses","weight":1,"kind":"line","def":"The aggregate total amount of expenses directly related to the marketing or selling of products or services.","goes_in":"Operating income","gaap_ifrs":"Converged; but the deferred-commission portion (ASC 340-40 / IFRS 15) is capitalized and amortized, not fully expensed here.","agg_note":"S&M is the single largest opex line for SaaS — the customer-acquisition cost. Pair it with net revenue retention and CAC-payback across the peer set.","sector_note":"SaaS S&M is often 25-40% of revenue; it embeds the sales-commission spend, most of which is capitalized as deferred commissions and amortized over the expected customer life.","example":"$14,345M FY2025 (34.5% of revenue) — the biggest single expense, larger than gross-profit-to-operating-income drop from all other lines.","redflag":"Commission capitalization (deferred commissions) lets a company grow bookings while reporting only a sliver of the sales cost — a booking slowdown can hide behind rising commission amortization. Watch S&M vs new-ARR efficiency.","value":14345000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"The aggregate total amount of expenses directly related to the marketing or selling of products or services.","xbrl_label":"Selling and Marketing Expense"},{"id":"general_administrative","label":"General & administrative","tag":"GeneralAndAdministrativeExpense","statement":"income","parent":"operating_expenses","weight":1,"kind":"line","def":"The aggregate total amount of expenses of managing and administering the affairs of an entity, including salaries, legal, accounting, and corporate overhead not otherwise classified.","goes_in":"Operating income","gaap_ifrs":"Converged.","agg_note":"G&A should scale sublinearly with revenue as SaaS matures; rising G&A/revenue is a de-leverage warning.","sector_note":"SaaS G&A typically 6-10% of revenue.","example":"$3,000M FY2025 (7.2% of revenue).","redflag":"G&A used as a dumping ground for one-time or restructuring costs that management then also excludes from non-GAAP — double-counting the 'adjustment'.","value":3000000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"The aggregate total of expenses of managing and administering the affairs of an entity, including affiliates of the reporting entity, which are not directly or indirectly associated with the manufacture, sale or creation of a product or product line.","xbrl_label":"General and Administrative Expense"},{"id":"amort_acquired_intangibles","label":"Amortization of purchased intangibles (operating)","tag":"AmortizationOfIntangibleAssets","statement":"income","parent":"operating_expenses","weight":1,"kind":"line","def":"The aggregate expense charged against earnings to allocate the cost of intangible assets (nonphysical assets not used in production) over their remaining economic lives.","goes_in":"Operating income","gaap_ifrs":"Converged in mechanics; a heavily acquisitive SaaS name carries large recurring amortization that both frameworks require.","agg_note":"This is the income-statement echo of the goodwill/intangibles balance-sheet buildup from M&A. Track it alongside acquisition cash outflows.","sector_note":"For a serial acquirer, amortization of acquired customer relationships and tradenames is a recurring drag that management routinely excludes from non-GAAP.","example":"~$0.6B FY2025 (derived: OperatingExpenses 23,924 less R&D+S&M+G&A 23,338). Scales with each acquisition (Slack, Tableau, MuleSoft, Informatica).","redflag":"Non-GAAP add-back abuse: excluding acquired-intangible amortization every year while making acquisitions the core growth strategy treats a recurring cost as 'one-time'.","value":227768000,"value_fy":2017,"value_end":"2017-01-31","xbrl_desc":"The aggregate expense charged against earnings to allocate the cost of intangible assets (nonphysical assets not used in production) in a systematic and rational manner to the periods expected to benefit from such assets. As a noncash expense, this element is added back to net income when calculating cash provided by or used in operations using the indirect method.","xbrl_label":"Amortization of Intangible Assets"},{"id":"operating_expenses","label":"Total operating expenses","tag":"OperatingExpenses","statement":"income","parent":"operating_income","weight":-1,"kind":"total","def":"Generally recurring costs associated with normal operations except for the portion of these expenses which can be clearly related to production and included in cost of sales or services.","goes_in":"Operating income","gaap_ifrs":"Converged subtotal.","agg_note":"Sum the components rather than trusting a single tag; different SaaS filers scope this line differently (some fold amortization in, some break it out).","sector_note":"For SaaS, operating expenses (ex-COGS) frequently EXCEED gross profit in the high-growth phase, producing GAAP operating losses even at scale.","example":"$23,924M FY2025 = R&D 5,993 + S&M 14,345 + G&A 3,000 + acquired-intangible amortization ~586.","redflag":"Reclassifying opex into COGS (or capitalizing it) to manufacture operating-margin improvement — reconcile the components year over year.","value":23924000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Generally recurring costs associated with normal operations except for the portion of these expenses which can be clearly related to production and included in cost of sales or services. Includes selling, general and administrative expense.","xbrl_label":"Operating Expenses"},{"id":"operating_income","label":"Operating income (GAAP)","tag":"OperatingIncomeLoss","statement":"income","parent":"income_before_taxes","weight":1,"kind":"total","def":"The net result for the period of deducting operating expenses from operating revenues.","goes_in":"Pre-tax income","gaap_ifrs":"Converged.","agg_note":"GAAP operating margin is the honest profitability anchor for SaaS; compare it to the company's own non-GAAP operating margin to size the adjustment wedge.","sector_note":"GAAP operating margin for SaaS is often thin or negative even when non-GAAP margin looks healthy — the difference is almost entirely stock-based comp plus acquired-intangible amortization.","example":"$8,331M FY2025 → 20.1% GAAP operating margin. Non-GAAP operating income (adding back SBC $3.5B + amortization ~$0.6B) is ~$12.4B, ~30% margin — a ~10-point wedge.","redflag":"The GAAP-vs-non-GAAP gap IS the red flag when it is dominated by recurring stock-based comp: non-GAAP margin flatters a business whose real, dilutive cost of paying employees never shows up.","value":8331000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"The net result for the period of deducting operating expenses from operating revenues.","xbrl_label":"Operating Income (Loss)"},{"id":"investment_income","label":"Investment & interest income","tag":"InvestmentIncomeInterest","statement":"income","parent":"income_before_taxes","weight":1,"kind":"line","def":"Amount before accretion (amortization) of purchase discount (premium) of interest income on nonoperating securities, and dividend and interest income from other investments.","goes_in":"Pre-tax income","gaap_ifrs":"Converged.","agg_note":"For cash-rich mature SaaS, investment income on the securities portfolio can be a material non-operating contributor — strip it out to judge operating quality.","sector_note":"Large deferred-revenue balances and low capex give SaaS a big net-cash/securities pile that throws off interest income.","example":"$539M FY2025 on the marketable-securities and cash portfolio.","redflag":"Leaning on investment income to hit an EPS number while operating income stalls — separate operating from portfolio earnings.","value":539000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount before accretion (amortization) of purchase discount (premium) of interest income on nonoperating securities.","xbrl_label":"Investment Income, Interest"},{"id":"income_before_taxes","label":"Income before income taxes","tag":"IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest","statement":"income","parent":"net_income","weight":1,"kind":"total","def":"Amount of income (loss) from continuing operations, including income (loss) from equity method investments, before deduction of income tax expense (benefit), and income (loss) attributable to noncontrolling interest.","goes_in":"Net income","gaap_ifrs":"Converged subtotal.","agg_note":"Bridges operating income to net income via non-operating items; check that the gap is portfolio income, not one-off gains.","sector_note":"SaaS pre-tax income often gets a lift from investment income given the large cash/securities balance.","example":"$9,520M FY2025 = operating income 8,331 + net non-operating (incl. investment income 539) ~1,189.","redflag":"Non-operating gains (equity-stake mark-ups on strategic investments) inflating pre-tax income in an up market, then reversing when marks fall.","value":9520000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount of income (loss) from continuing operations, including income (loss) from equity method investments, before deduction of income tax expense (benefit), and income (loss) attributable to noncontrolling interest.","xbrl_label":"Income (Loss) from Continuing Operations before Income Taxes, Noncontrolling Interest"},{"id":"income_tax","label":"Income tax expense (benefit)","tag":"IncomeTaxExpenseBenefit","statement":"income","parent":"net_income","weight":-1,"kind":"line","def":"Amount of current and deferred income tax expense (benefit) attributable to income (loss) from continuing operations.","goes_in":"Net income","gaap_ifrs":"Converged; but large deferred-tax-asset valuation-allowance releases (common when a SaaS name turns profitable) can swing the rate under both frameworks.","agg_note":"A SaaS company crossing into sustained GAAP profitability often books a one-time DTA valuation-allowance release that crushes the effective rate — normalize it out.","sector_note":"Effective rate is volatile for SaaS due to SBC tax effects and DTA changes.","example":"$2,063M FY2025 → ~21.7% effective rate on $9,520M pre-tax.","redflag":"A suspiciously low or negative effective tax rate driven by a one-time DTA release presented as if it were sustainable go-forward profitability.","value":2063000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount of current income tax expense (benefit) and deferred income tax expense (benefit) pertaining to continuing operations.","xbrl_label":"Income Tax Expense (Benefit)"},{"id":"net_income","label":"Net income (GAAP)","tag":"NetIncomeLoss","statement":"income","parent":null,"weight":0,"kind":"total","def":"The portion of profit or loss for the period, net of income taxes, which is attributable to the parent.","goes_in":"Bottom line / retained earnings","gaap_ifrs":"Converged bottom line.","agg_note":"GAAP net income is the anchor; SaaS management steers attention to non-GAAP EPS, which excludes SBC — always reconcile.","sector_note":"For SaaS, GAAP net income is typically much lower than non-GAAP net income and far below cash from operations, because SBC and deferred-revenue growth are non-cash/working-capital tailwinds.","example":"$7,457M FY2025 (18.0% net margin) versus cash from operations of $14,996M — CFO is ~2x net income.","redflag":"Wide, persistent gap between GAAP net income and non-GAAP net income that is driven by recurring stock-based comp — non-GAAP treats a real, dilutive cost as if it were free.","value":7457000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"The portion of profit or loss for the period, net of income taxes, which is attributable to the parent.","xbrl_label":"Net Income (Loss) Attributable to Parent"},{"id":"cash","label":"Cash & cash equivalents","tag":"CashAndCashEquivalentsAtCarryingValue","statement":"balance","parent":"total_assets","weight":1,"kind":"line","def":"Amount of currency on hand as well as demand deposits with banks or financial institutions. Includes other kinds of accounts that have the general characteristics of demand deposits.","goes_in":"Total assets","gaap_ifrs":"Converged.","agg_note":"Combine with marketable securities for the true liquidity/net-cash picture; SaaS often holds more in short-term securities than in cash proper.","sector_note":"Deferred revenue (cash collected up front) funds a large cash/securities balance — SaaS is often net cash.","example":"$7,327M FY2025 cash, plus $2,238M current marketable securities.","redflag":"Cash balance shrinking while buybacks/acquisitions accelerate — check that the deferred-revenue float is not being consumed to fund financial engineering.","value":7327000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount of currency on hand as well as demand deposits with banks or financial institutions. Includes other kinds of accounts that have the general characteristics of demand deposits. Also includes short-term, highly liquid investments that are both readily convertible to known amounts of cash and so near their maturity that they present insignificant risk of changes in value because of changes in ","xbrl_label":"Cash and Cash Equivalents, at Carrying Value"},{"id":"marketable_securities","label":"Marketable securities (short-term)","tag":"AvailableForSaleSecuritiesDebtSecuritiesCurrent","statement":"balance","parent":"total_assets","weight":1,"kind":"line","def":"Amount of investment in debt security measured at fair value with change in fair value recognized in other comprehensive income (OCI), classified as current.","goes_in":"Total assets","gaap_ifrs":"Converged (ASC 320 / IFRS 9); AFS debt marks flow through OCI under both.","agg_note":"Add to cash for total liquidity; the portfolio is what generates the investment income above.","sector_note":"The up-front-cash business model gives SaaS a securities portfolio far larger than its receivables.","example":"$2,238M FY2025 current AFS debt securities.","redflag":"Unrealized losses on the AFS portfolio parked in OCI (not net income) masking a real economic hit when rates move.","value":2238000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount of investment in debt security measured at fair value with change in fair value recognized in other comprehensive income (available-for-sale), classified as current.","xbrl_label":"Debt Securities, Available-for-sale, Current"},{"id":"accounts_receivable","label":"Accounts receivable, net","tag":"AccountsReceivableNetCurrent","statement":"balance","parent":"total_assets","weight":1,"kind":"line","def":"Amount, after allowance for credit loss, of right to consideration from customer for product sold and service rendered in normal course of business, classified as current.","goes_in":"Total assets","gaap_ifrs":"Converged (ASC 326 CECL vs IFRS 9 ECL differ slightly on allowance methodology).","agg_note":"SaaS AR is highly seasonal — it spikes at the fiscal-year-end billing peak (here Jan 31) then unwinds. Compare same-quarter, not sequential.","sector_note":"Because most SaaS billing is annual-in-advance, AR balloons at renewal-heavy quarter-ends and largely reverses next quarter as cash arrives.","example":"$14,339M FY2025 at the Jan-31 billing peak — unusually large relative to a $41.5B revenue base because of year-end invoicing concentration.","redflag":"AR growing faster than billings, or DSO creeping up, can signal channel-stuffing, aggressive year-end invoicing, or collection problems.","value":14339000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount, after allowance for credit loss, of right to consideration from customer for product sold and service rendered in normal course of business, classified as current.","xbrl_label":"Accounts Receivable, after Allowance for Credit Loss, Current"},{"id":"deferred_commissions","label":"Deferred commissions (capitalized contract costs)","tag":"CapitalizedContractCostNet","statement":"balance","parent":"total_assets","weight":1,"kind":"line","def":"Amount, after amortization, of capitalized cost to obtain and fulfill a contract with a customer.","goes_in":"Total assets","gaap_ifrs":"GAAP ASC 340-40 and IFRS 15 both REQUIRE capitalizing incremental costs of obtaining a contract (sales commissions) and amortizing over the expected customer life — converged.","agg_note":"This asset is the deferred portion of the S&M commission spend; its growth vs. S&M expense tells you how much sales cost is being pushed to the future.","sector_note":"Sales commissions on multi-year deals are capitalized here and amortized over the estimated customer relationship (often 4-6 years), not the contract term.","example":"$5,060M FY2025 (current 2,075 + noncurrent 2,985). A large, growing balance means big commission spend is being deferred off the current income statement.","redflag":"Lengthening the amortization period or capitalizing more commission cost flatters current-period S&M and operating margin — check the amortization-period assumption and the current-vs-noncurrent split.","value":3800000000,"value_fy":2022,"value_end":"2022-01-31","xbrl_desc":"Amount, after accumulated amortization and accumulated impairment loss, of asset recognized from cost incurred to obtain or fulfill contract with customer.","xbrl_label":"Capitalized Contract Cost, Net"},{"id":"goodwill","label":"Goodwill","tag":"Goodwill","statement":"balance","parent":"total_assets","weight":1,"kind":"line","def":"Amount, after accumulated impairment loss, of asset representing future economic benefits arising from other assets acquired in a business combination that are not individually identified and separately recognized.","goes_in":"Total assets","gaap_ifrs":"GAAP no longer amortizes goodwill (impairment-only, ASU 2017-04); IFRS (IAS 36) is also impairment-only — converged, but US private-co alternative allows amortization.","agg_note":"For a serial acquirer like Salesforce, goodwill can be half the balance sheet — a proxy for cumulative acquisition premium, not operating capital.","sector_note":"M&A-heavy SaaS carries enormous goodwill; the risk is a future impairment if an acquired unit underperforms.","example":"$57,941M FY2025 — 52% of total assets, built from Slack, Tableau, MuleSoft, Informatica and prior deals.","redflag":"A goodwill balance that dwarfs tangible equity, with no impairment taken even as acquired units miss — impairment is a discretionary, often-delayed judgment that can hide a bad deal.","value":57941000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount after accumulated impairment loss of an asset representing future economic benefits arising from other assets acquired in a business combination that are not individually identified and separately recognized.","xbrl_label":"Goodwill"},{"id":"intangibles","label":"Intangible assets, net (acquired)","tag":"IntangibleAssetsNetExcludingGoodwill","statement":"balance","parent":"total_assets","weight":1,"kind":"line","def":"Sum of the carrying amounts of all intangible assets, excluding goodwill, as of the balance sheet date, net of accumulated amortization and impairment charges.","goes_in":"Total assets","gaap_ifrs":"Converged; developed technology, customer relationships and tradenames are amortized under both frameworks.","agg_note":"The amortizable counterpart to goodwill; feeds the acquired-intangible amortization line on the income statement.","sector_note":"Acquired developed technology and customer relationships from deals sit here and amortize into COGS and operating expense.","example":"$6,815M FY2025.","redflag":"Assigning too much of a purchase price to non-amortizing goodwill vs. amortizing intangibles to minimize the future income-statement drag — inspect purchase-price allocation.","value":6815000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Sum of the carrying amounts of all intangible assets, excluding goodwill, as of the balance sheet date, net of accumulated amortization and impairment charges.","xbrl_label":"Intangible Assets, Net (Excluding Goodwill)"},{"id":"total_assets","label":"Total assets","tag":"Assets","statement":"balance","parent":null,"weight":0,"kind":"total","def":"Sum of the carrying amounts as of the balance sheet date of all assets that are recognized.","goes_in":"Balance-sheet total","gaap_ifrs":"Converged control total.","agg_note":"For SaaS this total is dominated by goodwill + intangibles (acquisition history) rather than physical or working capital.","sector_note":"A SaaS balance sheet is intangible-heavy: goodwill + acquired intangibles often exceed 60% of assets; hard operating assets are small.","example":"$112,305M FY2025 — of which ~$64.8B is goodwill+intangibles.","redflag":"Asset base that is mostly acquisition goodwill — tangible book value can be negative even when the company is highly profitable.","value":112305000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Sum of the carrying amounts as of the balance sheet date of all assets that are recognized. Assets are probable future economic benefits obtained or controlled by an entity as a result of past transactions or events.","xbrl_label":"Assets"},{"id":"accounts_payable_accrued","label":"Accounts payable & accrued liabilities","tag":"AccountsPayableAndOtherAccruedLiabilitiesCurrent","statement":"balance","parent":"total_liabilities","weight":1,"kind":"line","def":"Amount of liabilities incurred to vendors for goods and services received, and accrued liabilities, classified as current.","goes_in":"Total liabilities","gaap_ifrs":"Converged.","agg_note":"Includes accrued payroll, commissions and bonuses — sizable for a headcount-heavy SaaS.","sector_note":"Accrued compensation (commissions/bonuses) is a big component given the large sales force.","example":"$8,253M FY2025.","redflag":"Stretching payables or under-accruing bonuses at period end to flatter working capital and cash from operations.","value":8253000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount of liabilities incurred to vendors for goods and services received, and accrued liabilities classified as other, payable within one year or the normal operating cycle, if longer.","xbrl_label":"Accounts Payable and Other Accrued Liabilities, Current"},{"id":"deferred_revenue_current","label":"Deferred revenue (contract liability, current)","tag":"ContractWithCustomerLiabilityCurrent","statement":"balance","parent":"total_liabilities","weight":1,"kind":"line","def":"Amount of obligation to transfer good or service to customer for which consideration has been received or is receivable, classified as current.","goes_in":"Total liabilities","gaap_ifrs":"GAAP ASC 606 'contract liability' = IFRS 15 'contract liability' — converged; both represent billed-but-unearned revenue.","agg_note":"Deferred revenue is the liability that BECOMES revenue as the service is delivered; its period-over-period change is the core of the 'billings' calculation. Track it, not just revenue.","sector_note":"This is cash already collected for subscriptions not yet delivered — it converts to revenue ratably. It is a 'good' liability: a source of float, not a debt.","example":"$24,317M FY2025 current contract liability. Billings (a leading indicator) ≈ revenue + Δ deferred revenue = 41,525 + ~2,924 ≈ $44.4B.","redflag":"Deferred-revenue DRAWDOWN masking a booking slowdown: revenue can keep rising for a few quarters off the existing deferred balance even as new bookings fall. Falling deferred revenue / calculated billings is an early demand warning that reported revenue hides.","value":24317000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount of obligation to transfer good or service to customer for which consideration has been received or is receivable, classified as current.","xbrl_label":"Contract with Customer, Liability, Current"},{"id":"long_term_debt","label":"Long-term debt (incl. current portion)","tag":"LongTermDebt","statement":"balance","parent":"total_liabilities","weight":1,"kind":"line","def":"Amount, after unamortized (discount) premium and debt issuance costs, of long-term debt. Includes, but not limited to, notes payable, bonds payable, and convertible debt.","goes_in":"Total liabilities","gaap_ifrs":"Converged; convertible notes have GAAP-specific split-accounting nuances (ASU 2020-06 simplified them).","agg_note":"Modest for a mature SaaS — often raised opportunistically for acquisitions/buybacks, not operations. Net of the cash+securities pile the company is usually net cash.","sector_note":"SaaS carries little operating debt; leverage, when present, funds M&A or repurchases.","example":"$14,439M FY2025 (noncurrent 10,439 + current 4,000) against $9.6B cash+securities.","redflag":"Debt raised to fund buybacks while operating cash is strong is fine; debt raised because the deferred-revenue float is being consumed is not — check the use of proceeds.","value":14439000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount, after unamortized (discount) premium and debt issuance costs, of long-term debt. Includes, but not limited to, notes payable, bonds payable, debentures, mortgage loans and commercial paper. Excludes capital lease obligations.","xbrl_label":"Long-term Debt"},{"id":"total_liabilities","label":"Total liabilities","tag":"Liabilities","statement":"balance","parent":null,"weight":0,"kind":"total","def":"Sum of the carrying amounts as of the balance sheet date of all liabilities that are recognized.","goes_in":"Balance-sheet total","gaap_ifrs":"Converged control total.","agg_note":"For SaaS a large slice of liabilities is deferred revenue (customer float), not financial debt — segregate the two when assessing leverage.","sector_note":"'Liabilities' here overstates financial risk because deferred revenue (billed-in-advance subscriptions) is a large, benign component.","example":"$53,163M FY2025, of which ~$24.3B is current deferred revenue — customer prepayments, not borrowings.","redflag":"Treating total liabilities as 'debt' when most of it is deferred revenue mis-states the credit picture in either direction — split float from financial obligations.","value":53163000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Sum of the carrying amounts as of the balance sheet date of all liabilities that are recognized. Liabilities are probable future sacrifices of economic benefits arising from present obligations of an entity to transfer assets or provide services to other entities in the future.","xbrl_label":"Liabilities"},{"id":"rpo","label":"Remaining performance obligations (RPO / backlog)","tag":"RevenueRemainingPerformanceObligation","statement":"balance","parent":null,"weight":0,"kind":"memo","def":"Amount of transaction price allocated to performance obligation that has not yet been satisfied (or has been partially satisfied), for contract with customer.","goes_in":"Off-balance-sheet disclosure (backlog)","gaap_ifrs":"GAAP ASC 606 and IFRS 15 both require RPO disclosure — the contracted-but-unrecognized revenue including amounts not yet billed.","agg_note":"RPO is the single best forward-demand gauge for SaaS: it captures BOTH deferred revenue (billed) AND unbilled contracted backlog. Current RPO (cRPO, next-12-month) growth is the sell-side's favorite leading metric.","sector_note":"RPO = total future contracted revenue not yet recognized; unlike deferred revenue it includes amounts not yet invoiced. cRPO is the portion due within 12 months.","example":"$72,400M FY2025 total RPO — ~1.7x annual revenue — is the contracted backlog underpinning future revenue.","redflag":"RPO growth decelerating (especially cRPO) while reported revenue holds up is an early sign of a bookings slowdown that the income statement will show only later; also watch for RPO inflated by long-dated, cancellable, or non-binding commitments.","value":72400000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount of transaction price allocated to performance obligation that has not been recognized as revenue.","xbrl_label":"Revenue, Remaining Performance Obligation, Amount"},{"id":"common_stock","label":"Common stock (par)","tag":"CommonStockValue","statement":"balance","parent":"stockholders_equity","weight":1,"kind":"line","def":"Dollar value of issued common stock whether issued at par value, no par or stated value; excludes common stock held in treasury.","goes_in":"Total stockholders' equity","gaap_ifrs":"Converged; par value is nominal.","agg_note":"Trivial par line; the real equity story is retained earnings and paid-in capital from SBC issuance.","sector_note":"Par value is immaterial; note it mainly to complete the equity roll-up.","example":"$1M FY2025 par — economically meaningless; equity value is in retained earnings and APIC.","redflag":"N/A on its own; the equity dilution story is in shares outstanding growth from SBC, not par value.","value":1000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Aggregate par or stated value of issued nonredeemable common stock (or common stock redeemable solely at the option of the issuer). This item includes treasury stock repurchased by the entity. Note: elements for number of nonredeemable common shares, par value and other disclosure concepts are in another section within stockholders' equity.","xbrl_label":"Common Stock, Value, Issued"},{"id":"retained_earnings","label":"Retained earnings (accumulated deficit)","tag":"RetainedEarningsAccumulatedDeficit","statement":"balance","parent":"stockholders_equity","weight":1,"kind":"line","def":"The cumulative amount of the reporting entity's undistributed earnings or deficit.","goes_in":"Total stockholders' equity","gaap_ifrs":"Converged.","agg_note":"A positive, growing retained-earnings balance marks the transition from cash-burning growth SaaS to self-funding profitability.","sector_note":"Many SaaS names carried an accumulated DEFICIT for years; a swing to positive retained earnings is a maturity milestone.","example":"$22,221M FY2025 retained earnings — Salesforce is well past the accumulated-deficit phase.","redflag":"Buybacks funded faster than earnings can drive equity negative even for a profitable company — reconcile equity changes to net income, buybacks, and SBC issuance.","value":22221000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"The cumulative amount of the reporting entity's undistributed earnings or deficit.","xbrl_label":"Retained Earnings (Accumulated Deficit)"},{"id":"stockholders_equity","label":"Total stockholders' equity","tag":"StockholdersEquity","statement":"balance","parent":null,"weight":0,"kind":"total","def":"Total of all stockholders' equity (deficit) items, net of receivables from officers, directors, owners, and affiliates of the entity which are attributable to the parent.","goes_in":"Balance-sheet total","gaap_ifrs":"Converged control total.","agg_note":"SBC continuously issues shares (raising paid-in capital and equity) while buybacks retire them — net share count, not equity dollars, is what dilutes owners.","sector_note":"Equity is inflated by cumulative goodwill from acquisitions; tangible equity (equity minus goodwill/intangibles) is far smaller or negative.","example":"$59,142M FY2025 total equity; tangible equity (less $64.8B goodwill+intangibles) is negative.","redflag":"Equity that looks healthy only because of acquisition goodwill — a future impairment would wipe out reported book value.","value":59142000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Total of all stockholders' equity (deficit) items, net of receivables from officers, directors, owners, and affiliates of the entity which are attributable to the parent. The amount of the economic entity's stockholders' equity attributable to the parent excludes the amount of stockholders' equity which is allocable to that ownership interest in subsidiary equity which is not attributable to the p","xbrl_label":"Stockholders' Equity Attributable to Parent"},{"id":"cf_net_income","label":"Net income (CFO starting point)","tag":"NetIncomeLoss","statement":"cashflow","parent":"cfo","weight":1,"kind":"line","def":"The portion of profit or loss for the period, net of income taxes, which is attributable to the parent; the starting line of the indirect-method operating cash flow.","goes_in":"Cash from operations","gaap_ifrs":"Converged; both frameworks permit the indirect method starting from net income.","agg_note":"CFO starts here and is then bridged by non-cash add-backs (SBC, D&A) and working-capital changes (deferred revenue) — the bridge is where SaaS economics show.","sector_note":"For SaaS, net income is a poor cash proxy: CFO is far higher because of SBC add-back and deferred-revenue growth.","example":"$7,457M FY2025 — the starting point that CFO ($14,996M) builds up from.","redflag":"N/A here (see net_income); the story is how much of the gap to CFO is non-cash SBC vs. real working-capital float.","value":7457000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"The portion of profit or loss for the period, net of income taxes, which is attributable to the parent.","xbrl_label":"Net Income (Loss) Attributable to Parent"},{"id":"cf_sbc","label":"Stock-based compensation (add-back)","tag":"ShareBasedCompensation","statement":"cashflow","parent":"cfo","weight":1,"kind":"line","def":"Amount of noncash expense for share-based payment arrangement.","goes_in":"Cash from operations","gaap_ifrs":"GAAP ASC 718 and IFRS 2 both expense SBC on the income statement and add it back in operating cash flow — converged in mechanics.","agg_note":"SBC is the biggest non-cash add-back for SaaS and the core of the GAAP-vs-non-GAAP debate. It boosts CFO but is a REAL cost paid in dilution — adjust CFO/FCF for it when valuing.","sector_note":"SBC is added back to reach CFO because it is non-cash, but it dilutes shareholders every year — it is not 'free'. It is simultaneously an income-statement expense, a CFO add-back, and a non-GAAP exclusion.","example":"$3,509M FY2025 (8.5% of revenue) — a major driver of the ~$7.5B gap between net income and $15.0B CFO.","redflag":"The central SaaS red flag: excluding recurring SBC from non-GAAP profit AND relying on the CFO add-back to show 'strong cash generation' double-counts the benefit while ignoring the dilution cost. Track share count growth, not just the add-back.","value":3509000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount of noncash expense for share-based payment arrangement.","xbrl_label":"Share-based Payment Arrangement, Noncash Expense"},{"id":"cf_dep_amort","label":"Depreciation & amortization (add-back)","tag":"DepreciationDepletionAndAmortization","statement":"cashflow","parent":"cfo","weight":1,"kind":"line","def":"The aggregate expense recognized in the current period that allocates the cost of tangible and intangible assets to periods that benefit from use of the assets.","goes_in":"Cash from operations","gaap_ifrs":"Converged non-cash add-back.","agg_note":"Large for acquisitive SaaS because it includes amortization of acquired intangibles; distinguish maintenance depreciation from acquisition amortization.","sector_note":"D&A is inflated by acquired-intangible amortization, not by heavy physical capex — SaaS is asset-light.","example":"$1,200M FY2025, dominated by amortization of acquired technology and intangibles.","redflag":"Adding back acquisition-amortization to boost CFO while simultaneously excluding it from non-GAAP earnings — the M&A cost disappears from every metric.","value":1200000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"The aggregate expense recognized in the current period that allocates the cost of tangible assets, intangible assets, or depleting assets to periods that benefit from use of the assets.","xbrl_label":"Depreciation, Depletion and Amortization"},{"id":"cf_change_deferred_revenue","label":"Change in deferred revenue (working capital)","tag":"IncreaseDecreaseInContractWithCustomerLiability","statement":"cashflow","parent":"cfo","weight":1,"kind":"line","def":"Amount of increase (decrease) in obligation to transfer good or service to customer for which consideration from customer has been received or is due.","goes_in":"Cash from operations","gaap_ifrs":"Converged working-capital line under ASC 606 / IFRS 15.","agg_note":"This is the cash-flow face of the billings-vs-revenue gap. A positive change means the company collected more up front than it recognized — a genuine cash tailwind that can turn negative when growth slows.","sector_note":"Deferred-revenue growth is a structural CFO tailwind for growing SaaS: customers pre-pay, so cash leads revenue. It reverses (drag) if bookings decline.","example":"+$2,924M FY2025 — up-front subscription collections exceeded revenue recognized, adding directly to CFO. Billings ≈ 41,525 + 2,924 ≈ $44.4B.","redflag":"Billings vs revenue divergence: CFO propped up by deferred-revenue growth can mask a decelerating business, and CFO will fall sharply once billings growth stalls even before revenue does. Normalize CFO for the deferred-revenue swing.","value":2924000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount of increase (decrease) in obligation to transfer good or service to customer for which consideration has been received or is receivable.","xbrl_label":"Increase (Decrease) in Contract with Customer, Liability"},{"id":"cfo","label":"Cash from operations","tag":"NetCashProvidedByUsedInOperatingActivities","statement":"cashflow","parent":null,"weight":0,"kind":"total","def":"Amount of cash inflow (outflow) from operating activities, including discontinued operations.","goes_in":"Cash-flow statement total","gaap_ifrs":"Converged.","agg_note":"The headline cash metric for SaaS; combine with low capex to get free cash flow, then compute FCF margin for Rule-of-40.","sector_note":"SaaS CFO structurally exceeds net income (SBC add-back + deferred-revenue float) — it is the number the market capitalizes.","example":"$14,996M FY2025 — ~2.0x GAAP net income, reflecting $3.5B SBC add-back and $2.9B deferred-revenue growth.","redflag":"CFO that is 'high quality' only because of non-cash SBC and one-time deferred-revenue swings — strip SBC and normalize working capital to judge sustainable cash generation.","value":14996000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"Amount of cash inflow (outflow) from operating activities, including discontinued operations. Operating activity cash flows include transactions, adjustments, and changes in value not defined as investing or financing activities.","xbrl_label":"Net Cash Provided by (Used in) Operating Activities"},{"id":"capex","label":"Capital expenditures","tag":"PaymentsToAcquirePropertyPlantAndEquipment","statement":"cashflow","parent":null,"weight":-1,"kind":"line","def":"The cash outflow associated with the acquisition of long-lived, physical assets that are used in the normal conduct of business to produce goods and services.","goes_in":"Cash used in investing / free-cash-flow bridge","gaap_ifrs":"Converged.","agg_note":"Low capex is the SaaS superpower: FCF = CFO - capex is nearly all of CFO. Compute FCF margin for the Rule-of-40 test.","sector_note":"SaaS capex is tiny (offices, some infrastructure) because hosting is largely rented cloud — giving very high FCF conversion.","example":"$594M FY2025 (1.4% of revenue). Free cash flow = 14,996 - 594 = $14,402M → ~34.7% FCF margin. Rule-of-40 ≈ revenue growth% + FCF margin%.","redflag":"Capex understated because compute is expensed as COGS (rented cloud) rather than capitalized — makes FCF margin look better than an infrastructure-owning peer; also watch capitalized software shifted out of R&D into capex.","value":594000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"The cash outflow associated with the acquisition of long-lived, physical assets that are used in the normal conduct of business to produce goods and services and not intended for resale; includes cash outflows to pay for construction of self-constructed assets.","xbrl_label":"Payments to Acquire Property, Plant, and Equipment"},{"id":"cf_acquisitions","label":"Acquisitions, net of cash acquired","tag":"PaymentsToAcquireBusinessesNetOfCashAcquired","statement":"cashflow","parent":null,"weight":-1,"kind":"line","def":"The cash outflow associated with the acquisition of a business, net of the cash acquired from the purchase.","goes_in":"Cash used in investing","gaap_ifrs":"Converged.","agg_note":"This is the cash counterpart to the goodwill/intangibles buildup — a serial-acquirer SaaS spends here to buy growth. Compare with organic revenue growth.","sector_note":"Acquisitions are a primary SaaS growth lever; the cash out here creates the goodwill, intangibles, and future amortization drag on the income statement.","example":"$9,268M FY2025 (largely the Informatica-scale deal), versus $594M capex — M&A dwarfs organic investment.","redflag":"Acquisition-driven revenue hiding organic deceleration: heavy M&A cash outflow plus 'record revenue' can conceal that the legacy business is barely growing — always separate organic from inorganic growth.","value":9268000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"The cash outflow associated with the acquisition of a business, net of the cash acquired from the purchase.","xbrl_label":"Payments to Acquire Businesses, Net of Cash Acquired"},{"id":"cf_buybacks","label":"Repurchases of common stock","tag":"PaymentsForRepurchaseOfCommonStock","statement":"cashflow","parent":null,"weight":-1,"kind":"line","def":"The cash outflow to reacquire common stock during the period.","goes_in":"Cash used in financing","gaap_ifrs":"Converged.","agg_note":"For SaaS, buybacks largely offset SBC dilution rather than shrink the share count — net the two to see true capital return.","sector_note":"Mature SaaS uses buybacks to mop up shares issued via SBC; gross buybacks overstate shareholder return if dilution is high.","example":"$12,596M FY2025 repurchases against $3,509M SBC issued — net buyback shrinks the float, but a large chunk just neutralizes comp dilution.","redflag":"Framing gross buybacks as 'returning capital' while a big share of the spend merely offsets SBC dilution — compute buybacks net of SBC to see real per-share accretion.","value":12596000000,"value_fy":2025,"value_end":"2026-01-31","xbrl_desc":"The cash outflow to reacquire common stock during the period.","xbrl_label":"Payments for Repurchase of Common Stock"},{"id":"cf_dividends","label":"Dividends paid","tag":"DividendsCommonStockCash","statement":"cashflow","parent":null,"weight":-1,"kind":"line","def":"Amount of cash dividends declared and paid
